<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tutor Portal — KenyaVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        /* ────────────────────────────────────────────────
           RESET & BASE
           ──────────────────────────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }
        .dark body {
            background: #111827;
            color: #e5e7eb;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        /* ── KENYAVAULT COLORS ── */
        .bg-navy { background: #0a1a3a; }
        .bg-navy-light { background: #1a2a5a; }
        .text-navy { color: #0a1a3a; }
        .border-navy { border-color: #0a1a3a; }
        .bg-gold { background: #D4A017; }
        .bg-gold-light { background: #FCD34D; }
        .text-gold { color: #D4A017; }
        .text-gold-light { color: #FCD34D; }
        .border-gold { border-color: #D4A017; }
        .hover-bg-gold:hover { background: #D4A017; }
        .hover-text-gold:hover { color: #D4A017; }
        .hover-border-gold:hover { border-color: #D4A017; }

        /* ────────────────────────────────────────────────
           LOGIN PAGE
           ──────────────────────────────────────────────── */
        .login-banner {
            background: linear-gradient(135deg, #0a1a3a 0%, #1a2a5a 50%, #2a3a6a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .login-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FCD34D' fill-opacity='0.03'%3E%3Cpath d='M50 30L20 46l30 16 30-16-30-16zm0 0l-20 10 20 10 20-10-20-10zM20 46v18l30 16 30-16V46l-30 16-30-16z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px, 100px 100px;
            background-position: 0 0, 40px 20px;
            pointer-events: none;
        }
        .login-banner .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }
        .login-banner .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-banner .logo .logo-icon {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .login-banner .logo .logo-icon .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #D4A017;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0a1a3a;
        }
        .login-banner .logo .logo-icon .logo-text {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: #fff;
        }
        .login-banner .logo .logo-icon .logo-text span { color: #FCD34D; }
        .login-banner .logo .logo-sub {
            font-size: 0.75rem;
            color: #8FBAA6;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .auth-box {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.95);
        }
        .dark .auth-box {
            background: rgba(31, 41, 55, 0.95);
            border-color: rgba(255,255,255,0.05);
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .dark .auth-tabs { background: #1f2937; }
        .auth-tab {
            flex: 1;
            padding: 14px 24px;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .auth-tab:hover { background: rgba(212, 160, 23, 0.1); }
        .auth-tab.active {
            background: #D4A017;
            color: #0a1a3a;
        }
        .dark .auth-tab { color: #9ca3af; }
        .dark .auth-tab.active {
            background: #D4A017;
            color: #0a1a3a;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            background: #fff;
            color: #1f2937;
        }
        .form-input:focus {
            outline: none;
            border-color: #D4A017;
            box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.1);
        }
        .dark .form-input {
            background: #1f2937;
            border-color: #374151;
            color: #e5e7eb;
        }
        .dark .form-input:focus {
            border-color: #D4A017;
            box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.2);
        }
        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            color: #374151;
            margin-bottom: 4px;
        }
        .dark .form-label { color: #d1d5db; }
        .req { color: #dc2626; }

        .btn-gold {
            background: #D4A017;
            color: #0a1a3a;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .btn-gold:hover {
            background: #FCD34D;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 160, 23, 0.3);
        }
        .btn-gold:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-link {
            color: #D4A017;
            font-weight: 600;
            font-size: 0.85rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-link:hover { text-decoration: underline; color: #FCD34D; }

        .forgot-password-section { text-align: center; margin-top: 16px; }
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .password-strength .bar {
            flex: 1;
            height: 3px;
            border-radius: 99px;
            background: #e5e7eb;
            transition: all 0.3s ease;
        }
        .dark .password-strength .bar { background: #374151; }
        .password-strength .bar.active.weak { background: #dc2626; }
        .password-strength .bar.active.medium { background: #f59e0b; }
        .password-strength .bar.active.strong { background: #16a34a; }

        .reset-password-modal {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-password-modal.open { display: flex; }
        .reset-modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .dark .reset-modal-box { background: #1f2937; }
        .reset-modal-box h4 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1f2937;
            margin-bottom: 4px;
            text-align: center;
        }
        .dark .reset-modal-box h4 { color: #fff; }
        .reset-modal-box p {
            font-size: 0.85rem;
            color: #6b7280;
            text-align: center;
            margin-bottom: 16px;
        }
        .dark .reset-modal-box p { color: #9ca3af; }
        .reset-modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-outline {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: transparent;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-outline:hover {
            border-color: #D4A017;
            color: #D4A017;
        }
        .dark .btn-outline {
            border-color: #374151;
            color: #9ca3af;
        }
        .dark .btn-outline:hover {
            border-color: #D4A017;
            color: #D4A017;
        }

        .dark-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }
        .dark-toggle:hover {
            background: rgba(255,255,255,0.15);
        }

        /* ────────────────────────────────────────────────
           DASHBOARD - PROFESSIONAL LAYOUT
           ──────────────────────────────────────────────── */
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 280px;
            background: #0a1a3a;
            color: #fff;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .sidebar {
            background: #0f172a;
        }
        .sidebar-logo {
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-logo .logo-text {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: #fff;
        }
        .sidebar-logo .logo-text span { color: #FCD34D; }
        .sidebar-logo .logo-sub {
            font-size: 0.7rem;
            color: #8FBAA6;
            letter-spacing: 1px;
        }
        .sidebar-close-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .sidebar-close-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            flex: 1;
            padding: 0 12px;
        }
        .sidebar-menu .menu-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            padding: 0 12px 8px;
        }
        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
        }
        .sidebar-menu .menu-item:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }
        .sidebar-menu .menu-item.active {
            background: rgba(212, 160, 23, 0.15);
            color: #FCD34D;
            border-left: 3px solid #D4A017;
        }
        .sidebar-menu .menu-item i {
            width: 20px;
            font-size: 1rem;
        }
        .sidebar-menu .menu-item .badge {
            margin-left: auto;
            background: rgba(212, 160, 23, 0.2);
            color: #FCD34D;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: auto;
        }
        .sidebar-footer .tutor-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-footer .tutor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D4A017;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #0a1a3a;
        }
        .sidebar-footer .tutor-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .sidebar-footer .tutor-status {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        .sidebar-footer .tutor-status.approved { color: #34d399; }
        .sidebar-footer .tutor-status.pending { color: #fbbf24; }
        .sidebar-footer .tutor-status.rejected { color: #f87171; }
        .sidebar-footer .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            color: #ef4444;
            background: rgba(220, 38, 38, 0.1);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .sidebar-footer .logout-btn:hover {
            background: rgba(220, 38, 38, 0.2);
        }
        .sidebar-footer .logout-btn i {
            font-size: 1rem;
        }

        /* ── OVERLAY ── */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            margin-left: 280px;
            min-height: 100vh;
        }

        /* ── TOP NAVBAR ── */
        .top-navbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.9);
            min-height: 64px;
        }
        .dark .top-navbar {
            background: rgba(17, 24, 39, 0.9);
            border-color: #374151;
        }
        .top-navbar .page-title {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1f2937;
        }
        .dark .top-navbar .page-title { color: #fff; }
        .top-navbar .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-navbar .nav-actions .dark-toggle-nav {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #6b7280;
        }
        .dark .top-navbar .nav-actions .dark-toggle-nav {
            border-color: #374151;
            color: #9ca3af;
        }
        .top-navbar .nav-actions .dark-toggle-nav:hover {
            background: #f3f4f6;
        }
        .dark .top-navbar .nav-actions .dark-toggle-nav:hover {
            background: #1f2937;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ── MOBILE MENU TOGGLE ── */
        .mobile-menu-toggle {
            display: none;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: transparent;
            cursor: pointer;
            font-size: 1.2rem;
            color: #6b7280;
            transition: all 0.2s ease;
        }
        .dark .mobile-menu-toggle {
            border-color: #374151;
            color: #9ca3af;
        }
        .mobile-menu-toggle:hover {
            background: rgba(0,0,0,0.05);
        }
        .dark .mobile-menu-toggle:hover {
            background: rgba(255,255,255,0.05);
        }

        /* ── PAGE CONTENT ── */
        .page-content {
            padding: 24px 32px;
        }

        /* ── STAT CARDS ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        .dark .stat-card {
            background: #1f2937;
            border-color: #374151;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        .stat-card .stat-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }
        .stat-card .stat-number {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: #0a1a3a;
        }
        .dark .stat-card .stat-number { color: #fff; }
        .stat-card .stat-number.gold { color: #D4A017; }
        .stat-card .stat-number.green { color: #16a34a; }
        .stat-card .stat-number.purple { color: #8b5cf6; }
        .stat-card .stat-number.blue { color: #3b82f6; }
        .stat-card .stat-number.red { color: #dc2626; }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 2px;
        }
        .dark .stat-card .stat-label { color: #9ca3af; }

        /* ── CHART ── */
        .chart-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            border: 1px solid #e5e7eb;
            margin-bottom: 24px;
        }
        .dark .chart-container {
            background: #1f2937;
            border-color: #374151;
        }
        .chart-container .chart-title {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #1f2937;
            margin-bottom: 16px;
        }
        .dark .chart-container .chart-title { color: #fff; }
        .chart-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 180px;
            gap: 12px;
            padding: 0 4px;
        }
        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
        }
        .chart-bar {
            width: 100%;
            max-width: 40px;
            border-radius: 4px 4px 0 0;
            background: linear-gradient(180deg, #D4A017, #FCD34D);
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 8px;
            position: relative;
        }
        .chart-bar .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            font-weight: 700;
            color: #D4A017;
            white-space: nowrap;
        }
        .chart-bar-label {
            font-size: 0.6rem;
            color: #6b7280;
            margin-top: 6px;
            text-align: center;
        }
        .dark .chart-bar-label { color: #9ca3af; }

        /* ── CONTENT CARDS ── */
        .content-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e7eb;
            margin-bottom: 24px;
        }
        .dark .content-card {
            background: #1f2937;
            border-color: #374151;
        }
        .content-card .card-header {
            display: flex;
            justify-content: space-between;

        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';

        const CURRICULUMS = [
            { value: 'cbc', label: '📋 CBC' },
            { value: 'igcse', label: '🌍 IGCSE' },
            { value: '8-4-4', label: '📚 8-4-4' },
            { value: 'tvet', label: '🔧 TVET' }
        ];

        // ────────────────────────────────────────────────
        // CONTEXT
        // ────────────────────────────────────────────────
        const TutorContext = createContext(null);

        function TutorProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('tutor-dark-mode') === 'true');
            const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem('tutor_id') !== null);
            const [tutor, setTutor] = useState(null);
            const [resources, setResources] = useState([]);
            const [orders, setOrders] = useState([]);
            const [classes, setClasses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [debugInfo, setDebugInfo] = useState([]);
            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
            const [payoutRequests, setPayoutRequests] = useState([]);

            useEffect(() => {
                localStorage.setItem('tutor-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const tutorId = sessionStorage.getItem('tutor_id');
                if (tutorId) loadTutorData(tutorId);
                else setLoading(false);
            }, []);

            useEffect(() => {
                const handleResize = () => {
                    setIsMobile(window.innerWidth <= 768);
                    if (window.innerWidth > 768) setSidebarOpen(false);
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const addDebug = (message, type = 'info') => {
                setDebugInfo(prev => [...prev, { message, type, timestamp: new Date().toLocaleTimeString() }]);
                console.log(message);
            };

            const loadTutorData = async (tutorId) => {
                setLoading(true);
                setDebugInfo([]);
                try {
                    // Load tutor
                    const tRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}&select=*`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (tRes.ok) {
                        const data = await tRes.json();
                        if (data.length > 0) {
                            setTutor(data[0]);
                            sessionStorage.setItem('tutor_name', data[0].name);
                            addDebug('✅ Tutor data loaded', 'success');
                        } else {
                            addDebug('❌ No tutor found with ID: ' + tutorId, 'error');
                        }
                    } else {
                        addDebug('❌ Failed to load tutor: ' + tRes.status, 'error');
                    }

                    // Load resources
                    try {
                        const rRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?tutor_id=eq.${tutorId}&select=*`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (rRes.ok) {
                            const data = await rRes.json();
                            setResources(data || []);
                            addDebug(`✅ Loaded ${data.length} resources`, 'success');
                        } else {
                            addDebug('❌ Failed to load resources: ' + rRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading resources: ' + e.message, 'error');
                    }

                    // Load orders with tutor_share
                    try {
                        const oRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?tutor_id=eq.${tutorId}&select=*&order=created_at.desc`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (oRes.ok) {
                            const data = await oRes.json();
                            const processedOrders = data.map(o => ({
                                ...o,
                                tutor_share: o.tutor_share || Math.round((o.total_amount || o.item_price || 0) * 0.8)
                            }));
                            setOrders(processedOrders);
                            addDebug(`✅ Loaded ${processedOrders.length} orders with tutor shares`, 'success');
                        } else {
                            addDebug('❌ Failed to load orders: ' + oRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading orders: ' + e.message, 'error');
                    }

                    // Load classes
                    try {
                        const cRes = await fetch(`${SUPABASE_URL}/rest/v1/classes?tutor_id=eq.${tutorId}&select=*`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (cRes.ok) {
                            const data = await cRes.json();
                            setClasses(data || []);
                            addDebug(`✅ Loaded ${data.length} classes`, 'success');
                        } else {
                            addDebug('❌ Failed to load classes: ' + cRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading classes: ' + e.message, 'error');
                    }

                    // Load payout requests
                    try {
                        const pRes = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payouts?tutor_id=eq.${tutorId}&select=*&order=created_at.desc`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (pRes.ok) {
                            const data = await pRes.json();
                            setPayoutRequests(data || []);
                            addDebug(`✅ Loaded ${data.length} payout requests`, 'success');
                        } else {
                            addDebug('❌ Failed to load payout requests: ' + pRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading payout requests: ' + e.message, 'error');
                    }

                } catch (e) { 
                    console.error('Load error:', e); 
                    addDebug('❌ Error loading data: ' + e.message, 'error');
                }
                setLoading(false);
            };

            const refreshData = () => {
                const tutorId = sessionStorage.getItem('tutor_id');
                if (tutorId) loadTutorData(tutorId);
            };

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const logout = () => {
                sessionStorage.removeItem('tutor_id');
                sessionStorage.removeItem('tutor_email');
                sessionStorage.removeItem('tutor_name');
                setIsLoggedIn(false);
                setTutor(null);
                setResources([]);
                setOrders([]);
                setClasses([]);
                setPayoutRequests([]);
                setActiveTab('dashboard');
                setDebugInfo([]);
                showNotification('Logged out successfully', 'success');
                setTimeout(() => { window.location.href = '/'; }, 500);
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
            const closeSidebar = () => setSidebarOpen(false);

            const calculateEarnings = () => {
                let total = 0, pending = 0, completed = 0;
                orders.forEach(o => {
                    const share = o.tutor_share || Math.round((o.total_amount || o.item_price || 0) * 0.8);
                    total += share;
                    const status = o.status || o.payment_status || 'pending';
                    if (status === 'pending' || status === 'processing' || status === 'initiated') {
                        pending += share;
                    } else if (status === 'completed' || status === 'paid' || status === 'approved' || status === 'success' || status === 'confirmed') {
                        completed += share;
                    }
                });
                // Subtract paid out amounts
                const paidOut = payoutRequests
                    .filter(p => p.status === 'paid')
                    .reduce((sum, p) => sum + (p.amount || 0), 0);
                return { total, pending, completed, paidOut };
            };

            const requestPayout = async (amount) => {
                const tutorId = sessionStorage.getItem('tutor_id');
                if (!tutorId) return null;
                
                try {
                    const payoutData = {
                        tutor_id: tutorId,
                        tutor_name: tutor?.name || sessionStorage.getItem('tutor_name') || 'Tutor',
                        amount: amount,
                        phone: tutor?.mpesa_number || '',
                        status: 'pending',
                        created_at: new Date().toISOString()
                    };
                    
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payouts`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(payoutData)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        setPayoutRequests(prev => [data[0], ...prev]);
                        return data[0];
                    }
                    return null;
                } catch (e) {
                    console.error('Payout request error:', e);
                    return null;
                }
            };

            return (
                <TutorContext.Provider value={{
                    darkMode, toggleDarkMode,
                    isLoggedIn, setIsLoggedIn,
                    tutor, setTutor,
                    resources, setResources,
                    orders, setOrders,
                    classes, setClasses,
                    payoutRequests, setPayoutRequests,
                    loading, setLoading,
                    notification, showNotification,
                    activeTab, setActiveTab,
                    logout,
                    loadTutorData,
                    refreshData,
                    sidebarOpen, toggleSidebar, closeSidebar,
                    debugInfo, addDebug,
                    isMobile,
                    calculateEarnings,
                    requestPayout,
                }}>
                    {children}
                </TutorContext.Provider>
            );
        }

        function useTutor() {
            const context = useContext(TutorContext);
            if (!context) throw new Error('useTutor must be used within TutorProvider');
            return context;
        }

        // ────────────────────────────────────────────────
        // LOGIN PAGE
        // ────────────────────────────────────────────────
        function LoginPage() {
            const { setIsLoggedIn, setTutor, showNotification, loadTutorData, darkMode, toggleDarkMode, addDebug } = useTutor();
            const [activeAuth, setActiveAuth] = useState('login');
            const [loginPhone, setLoginPhone] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginLoading, setLoginLoading] = useState(false);
            const [loginError, setLoginError] = useState('');
            const [showResetModal, setShowResetModal] = useState(false);
            const [resetPhone, setResetPhone] = useState('');
            const [resetLoading, setResetLoading] = useState(false);
            const [resetMessage, setResetMessage] = useState('');
            const [debugInfo, setDebugInfo] = useState([]);

            const [signupData, setSignupData] = useState({
                name: '', email: '', phone: '', mpesa: '', password: '', confirmPassword: '',
                subjects: [], levels: [], bio: ''
            });
            const [signupLoading, setSignupLoading] = useState(false);
            const [signupError, setSignupError] = useState('');
            const [passwordStrength, setPasswordStrength] = useState(0);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                setDebugInfo([]);
                
                if (!loginPhone || !loginPassword) {
                    setLoginError('Please enter both phone number and password.');
                    return;
                }

                setLoginLoading(true);
                addDebug(`Attempting login with phone: ${loginPhone}`);

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${loginPhone}&select=*`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!res.ok) {
                        addDebug(`Query failed: ${res.status}`, 'error');
                        setLoginError('Error connecting to database.');
                        setLoginLoading(false);
                        return;
                    }

                    const data = await res.json();

                    if (data.length === 0) {
                        addDebug('No tutor found', 'error');
                        setLoginError('No account found with this phone number.');
                        setLoginLoading(false);
                        return;
                    }

                    const tutor = data[0];

                    if (tutor.password !== loginPassword) {
                        addDebug('Password mismatch', 'error');
                        setLoginError('Invalid password.');
                        setLoginLoading(false);
                        return;
                    }

                    if (tutor.status === 'rejected') {
                        setLoginError('Your application has been rejected.');
                        setLoginLoading(false);
                        return;
                    }

                    addDebug('Login successful!', 'success');
                    sessionStorage.setItem('tutor_id', tutor.id);
                    sessionStorage.setItem('tutor_email', tutor.email);
                    sessionStorage.setItem('tutor_name', tutor.name);
                    setIsLoggedIn(true);
                    setTutor(tutor);
                    await loadTutorData(tutor.id);
                    showNotification(`Welcome back, ${tutor.name}! 🎉`, 'success');

                } catch (e) {
                    addDebug(`Error: ${e.message}`, 'error');
                    setLoginError('Error logging in. Please try again.');
                }
                setLoginLoading(false);
            };

            const handleForgotPassword = async () => {
                if (!resetPhone) {
                    setResetMessage('Please enter your phone number.');
                    return;
                }
                setResetLoading(true);
                setResetMessage('');

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${resetPhone}&select=id,name`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const data = await res.json();

                    if (data.length === 0) {
                        setResetMessage('No account found with this phone number.');
                        setResetLoading(false);
                        return;
                    }

                    const tempPassword = 'temp' + Math.floor(1000 + Math.random() * 9000);
                    
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${data[0].id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: tempPassword })
                    });

                    if (updateRes.ok) {
                        setResetMessage(`✅ Password reset successful! Your temporary password is: ${tempPassword}`);
                        window.open(`https://wa.me/254${resetPhone.replace(/^0+/, '')}?text=Your%20KenyaVault%20temporary%20password%20is%3A%20${tempPassword}`, '_blank');
                    } else {
                        setResetMessage('Failed to reset password.');
                    }
                } catch (e) {
                    setResetMessage('Error: ' + e.message);
                }
                setResetLoading(false);
            };

            const checkPasswordStrength = (pass) => {
                let score = 0;
                if (pass.length >= 6) score++;
                if (pass.length >= 8) score++;
                if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
                if (/[0-9]/.test(pass)) score++;
                setPasswordStrength(score);
                return score;
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const { name, email, phone, mpesa, password, confirmPassword, subjects, levels, bio } = signupData;
                setSignupError('');
                setDebugInfo([]);

                if (!name || !email || !phone || !mpesa || !password || !confirmPassword || subjects.length === 0 || levels.length === 0) {
                    setSignupError('Please fill all required fields.');
                    return;
                }
                if (password.length < 6) {
                    setSignupError('Password must be at least 6 characters.');
                    return;
                }
                if (password !== confirmPassword) {
                    setSignupError('Passwords do not match.');
                    return;
                }

                setSignupLoading(true);
                addDebug(`Creating account for ${name}`);

                try {
                    const checkPhone = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${phone}&select=id`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const existing = await checkPhone.json();
                    if (existing.length > 0) {
                        setSignupError('A tutor with this phone number already exists.');
                        setSignupLoading(false);
                        return;
                    }

                    const tutorData = {
                        name, email, phone, 
                        mpesa_number: mpesa,
                        password, subjects, levels, 
                        bio: bio || '',
                        status: 'pending',
                        total_earnings: 0, pending_earnings: 0, total_paid_out: 0,
                        created_at: new Date().toISOString()
                    };

                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(tutorData)
                    });

                    if (!res.ok) throw new Error('Signup failed');

                    const data = await res.json();
                    const tutor = data[0];
                    addDebug('Account created!', 'success');

                    sessionStorage.setItem('tutor_id', tutor.id);
                    sessionStorage.setItem('tutor_email', tutor.email);
                    sessionStorage.setItem('tutor_name', tutor.name);
                    setIsLoggedIn(true);
                    setTutor(tutor);
                    await loadTutorData(tutor.id);
                    showNotification('Application submitted successfully! 🎉', 'success');

                } catch (e) {
                    addDebug(`Error: ${e.message}`, 'error');
                    setSignupError('Error submitting application: ' + e.message);
                }
                setSignupLoading(false);
            };

            return (
                <div className="login-banner">
                    <button onClick={toggleDarkMode} className="dark-toggle">
                        {darkMode ? '☀️' : '🌙'}
                    </button>
                    <div className="container">
                        <div className="logo">
                            <div className="logo-icon">
                                <div className="icon-box">KV</div>
                                <div className="logo-text">Kenya<span>Vault</span></div>
                            </div>
                            <div className="logo-sub">Tutor Portal</div>
                        </div>

                        <div className="auth-box">
                            <div className="auth-tabs">
                                <button onClick={() => {setActiveAuth('login'); setDebugInfo([]);}} className={`auth-tab ${activeAuth === 'login' ? 'active' : ''}`}>🔑 Login</button>
                                <button onClick={() => {setActiveAuth('signup'); setDebugInfo([]);}} className={`auth-tab ${activeAuth === 'signup' ? 'active' : ''}`}>📝 Sign Up</button>
                            </div>

                            {activeAuth === 'login' ? (
                                <form onSubmit={handleLogin}>
                                    {loginError && <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm">{loginError}</div>}
                                    <div className="mb-4">
                                        <label className="form-label">Phone Number <span className="req">*</span></label>
                                        <input type="tel" value={loginPhone} onChange={(e) => setLoginPhone(e.target.value)} className="form-input" placeholder="0712 345 678" required />
                                    </div>
                                    <div className="mb-4">
                                        <label className="form-label">Password <span className="req">*</span></label>
                                        <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} className="form-input" placeholder="Enter your password" required />
                                    </div>
                                    <button type="submit" disabled={loginLoading} className="btn-gold">
                                        {loginLoading ? '⏳ Logging in...' : '🔑 Login'}
                                    </button>
                                    <div className="forgot-password-section">
                                        <button type="button" className="btn-link" onClick={() => setShowResetModal(true)}>
                                            Forgot your password?
                                        </button>
                                    </div>
                                    {debugInfo.length > 0 && (
                                        <div className="debug-info mt-4">
                                            <strong>🔍 Debug:</strong>
                                            {debugInfo.map((d, i) => (
                                                <div key={i} className={d.type === 'error' ? 'error' : d.type === 'success' ? 'success' : ''}>
                                                    [{d.timestamp}] {d.message}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </form>
                            ) : (
                                <form onSubmit={handleSignup}>
                                    {signupError && <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm">{signupError}</div>}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Full Name <span className="req">*</span></label>
                                            <input type="text" value={signupData.name} onChange={(e) => setSignupData({...signupData, name: e.target.value})} className="form-input" placeholder="Dr. John Mwangi" required />
                                        </div>
                                        <div>
                                            <label className="form-label">Email <span className="req">*</span></label>
                                            <input type="email" value={signupData.email} onChange={(e) => setSignupData({...signupData, email: e.target.value})} className="form-input" placeholder="you@example.com" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Phone Number <span className="req">*</span></label>
                                            <input type="tel" value={signupData.phone} onChange={(e) => setSignupData({...signupData, phone: e.target.value})} className="form-input" placeholder="0712 345 678" required />
                                        </div>
                                        <div>
                                            <label className="form-label">M-PESA Number <span className="req">*</span></label>
                                            <input type="tel" value={signupData.mpesa} onChange={(e) => setSignupData({...signupData, mpesa: e.target.value})} className="form-input" placeholder="0712 345 678" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Password <span className="req">*</span></label>
                                            <input type="password" value={signupData.password} onChange={(e) => {
                                                setSignupData({...signupData, password: e.target.value});
                                                checkPasswordStrength(e.target.value);
                                            }} className="form-input" placeholder="Min 6 characters" required />
                                            <div className="password-strength">
                                                {[1,2,3,4].map(i => (
                                                    <div key={i} className={`bar ${i <= passwordStrength ? `active ${passwordStrength <= 2 ? 'weak' : passwordStrength <= 3 ? 'medium' : 'strong'}` : ''}`}></div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="form-label">Confirm Password <span className="req">*</span></label>
                                            <input type="password" value={signupData.confirmPassword} onChange={(e) => setSignupData({...signupData, confirmPassword: e.target.value})} className="form-input" placeholder="Confirm password" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Subjects <span className="req">*</span></label>
                                            <select multiple value={signupData.subjects} onChange={(e) => setSignupData({...signupData, subjects: Array.from(e.target.selectedOptions, o => o.value)})} className="form-input h-24" required>
                                                {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
                                            </select>
                                            <span className="text-xs text-gray-400 mt-1">Hold Ctrl (Cmd) to select multiple</span>
                                        </div>
                                        <div>
                                            <label className="form-label">Levels <span className="req">*</span></label>
                                            <select multiple value={signupData.levels} onChange={(e) => setSignupData({...signupData, levels: Array.from(e.target.selectedOptions, o => o.value)})} className="form-input h-24" required>
                                                {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                                            </select>
                                            <span className="text-xs text-gray-400 mt-1">Hold Ctrl (Cmd) to select multiple</span>
                                        </div>
                                    </div>
                                    <div className="mb-4">
                                        <label className="form-label">About You / Experience</label>
                                        <textarea value={signupData.bio} onChange={(e) => setSignupData({...signupData, bio: e.target.value})} className="form-input" rows="3" placeholder="Tell us about your teaching experience..."></textarea>
                                    </div>
                                    <button type="submit" disabled={signupLoading} className="btn-gold">
                                        {signupLoading ? '⏳ Submitting...' : '📤 Submit Application'}
                                    </button>
                                    {debugInfo.length > 0 && (
                                        <div className="debug-info mt-4">
                                            <strong>🔍 Debug:</strong>
                                            {debugInfo.map((d, i) => (
                                                <div key={i} className={d.type === 'error' ? 'error' : d.type === 'success' ? 'success' : ''}>
                                                    [{d.timestamp}] {d.message}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </form>
                            )}
                        </div>
                    </div>

                    <div className={`reset-password-modal ${showResetModal ? 'open' : ''}`} onClick={(e) => { if (e.target === e.currentTarget) setShowResetModal(false); }}>
                        <div className="reset-modal-box">
                            <h4>🔑 Reset Password</h4>
                            <p>Enter your phone number to reset your password.</p>
                            {resetMessage && (
                                <div className={`mb-4 p-3 rounded-xl text-sm ${resetMessage.startsWith('✅') ? 'bg-green-500/20 border border-green-500/30 text-green-300' : 'bg-red-500/20 border border-red-500/30 text-red-300'}`}>
                                    {resetMessage}
                                </div>
                            )}
                            <input type="tel" value={resetPhone} onChange={(e) => setResetPhone(e.target.value)} className="form-input" placeholder="0712 345 678" />
                            <div className="reset-modal-actions">
                                <button onClick={() => setShowResetModal(false)} className="btn-outline">Cancel</button>
                                <button onClick={handleForgotPassword} disabled={resetLoading} className="btn-gold" style={{ fontSize: '0.9rem' }}>
                                    {resetLoading ? '⏳ Sending...' : 'Send Reset Code'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // DASHBOARD
        // ────────────────────────────────────────────────
        function Dashboard() {
            const { 
                tutor, resources, orders, classes, 
                activeTab, setActiveTab, 
                showNotification, refreshData,
                darkMode, toggleDarkMode,
                logout,
                sidebarOpen, toggleSidebar, closeSidebar,
                debugInfo,
                isMobile,
                calculateEarnings,
            } = useTutor();

            const earnings = calculateEarnings();
            const totalDownloads = resources.reduce((sum, r) => sum + (r.download_count || 0), 0);

            const menuItems = [
                { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                { id: 'resources', icon: 'fa-book', label: 'Resources', badge: resources.length },
                { id: 'orders', icon: 'fa-shopping-bag', label: 'Orders', badge: orders.length },
                { id: 'earnings', icon: 'fa-coins', label: 'Earnings' },
                { id: 'upload', icon: 'fa-upload', label: 'Upload Resource' },
                { id: 'promote', icon: 'fa-share-alt', label: 'Promote' },
                { id: 'profile', icon: 'fa-user', label: 'Profile' },
            ];

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <DashboardContent />;
                    case 'resources': return <ResourcesTab />;
                    case 'orders': return <OrdersTab />;
                    case 'earnings': return <EarningsTab />;
                    case 'upload': return <UploadTab />;
                    case 'promote': return <PromoteTab />;
                    case 'profile': return <ProfileTab />;
                    default: return <DashboardContent />;
                }
            };

            const getPageTitle = () => {
                const item = menuItems.find(m => m.id === activeTab);
                return item ? item.label : 'Dashboard';
            };

            const hasErrors = debugInfo.some(d => d.type === 'error');

            return (
                <div className="dashboard-wrapper">
                    <div className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`} onClick={closeSidebar}></div>

                    <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-logo">
                            <div className="logo-text">Kenya<span>Vault</span></div>
                            <button className="sidebar-close-btn" onClick={closeSidebar}>✕</button>
                        </div>

                        <div className="sidebar-menu">
                            <div className="menu-label">Main</div>
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    className={`menu-item ${activeTab === item.id ? 'active' : ''}`}
                                    onClick={() => { setActiveTab(item.id); closeSidebar(); }}
                                >
                                    <i className={`fas ${item.icon}`}></i>
                                    <span>{item.label}</span>
                                    {item.badge !== undefined && item.badge > 0 && (
                                        <span className="badge">{item.badge}</span>
                                    )}
                                </button>
                            ))}
                        </div>

                        <div className="sidebar-footer">
                            <div className="tutor-info">
                                <div className="tutor-avatar">
                                    {tutor?.name ? tutor.name.charAt(0).toUpperCase() : 'T'}
                                </div>
                                <div>
                                    <div className="tutor-name">{tutor?.name || 'Tutor'}</div>
                                    <div className={`tutor-status ${tutor?.status || 'pending'}`}>
                                        {tutor?.status === 'approved' ? '✅ Approved' : 
                                         tutor?.status === 'rejected' ? '❌ Rejected' : 
                                         '⏳ Pending Approval'}
                                    </div>
                                </div>
                            </div>
                            <button className="logout-btn" onClick={logout}>
                                <i className="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="top-navbar">
                            <div className="topbar-left">
                                <button className="mobile-menu-toggle" onClick={toggleSidebar}>
                                    <i className="fas fa-bars"></i>
                                </button>
                                <span className="page-title">{getPageTitle()}</span>
                            </div>
                            <div className="nav-actions">
                                <button className="dark-toggle-nav" onClick={toggleDarkMode}>
                                    <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'}`}></i>
                                </button>
                                <button onClick={refreshData} className="text-sm text-[#D4A017] hover:text-[#FCD34D] transition">
                                    🔄 Refresh
                                </button>
                            </div>
                        </div>

                        {hasErrors && (
                            <div className="debug-info" style={{marginBottom: '16px'}}>
                                <strong>⚠️ Debug Info:</strong>
                                {debugInfo.map((d, i) => (
                                    <div key={i} className={d.type === 'error' ? 'error' : d.type === 'success' ? 'success' : ''}>
                                        [{d.timestamp}] {d.message}
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="page-content">
                            {renderContent()}
                        </div>
                    </div>
                </div>
            );
        }

        // ── DASHBOARD CONTENT ──
        function DashboardContent() {

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${id}`, {
                        method: 'DELETE',
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }

                    if (res.ok) {

        // ── EARNINGS TAB ──
        function EarningsTab() {
            const { orders, tutor, showNotification, refreshData, calculateEarnings, requestPayout } = useTutor();

            const earnings = calculateEarnings();
            const [payoutAmount, setPayoutAmount] = useState('');
            const [requesting, setRequesting] = useState(false);

            const handlePayoutRequest = async () => {
                const amount = parseFloat(payoutAmount);
                if (!amount || amount <= 0) {
                    showNotification('⚠️ Please enter a valid amount', 'error');
                    return;
                }
                if (amount > earnings.pending) {
                    showNotification(`⚠️ You only have KES ${earnings.pending.toLocaleString()} pending`, 'error');
                    return;
                }
                if (amount < 500) {
                    showNotification('⚠️ Minimum payout is KES 500', 'error');
                    return;
                }
                if (!tutor?.mpesa_number) {
                    showNotification('⚠️ Please set your M-PESA number in profile settings first.', 'error');
                    return;
                }

                setRequesting(true);
                try {
                    const result = await requestPayout(amount);
                    if (result) {
                        showNotification(`✅ Payout request of KES ${amount.toLocaleString()} submitted!`, 'success');
                        setPayoutAmount('');
                        refreshData();
                    } else {
                        showNotification('❌ Failed to submit payout request', 'error');
                    }
                } catch (e) {
                    showNotification('❌ Error: ' + e.message, 'error');
                }
                setRequesting(false);
            };

            const getTotalPaid = () => {
                return earnings.paidOut || 0;
            };

            return (
                <div className="content-card">
                    <div className="card-header">
                        <h3>💰 Earnings</h3>
                        <button onClick={refreshData} className="btn-sm" style={{ background: '#3b82f6', color: '#fff' }}>
                            🔄 Refresh

                    <div className="stat-grid" style={{ marginBottom: '20px' }}>

                        <div className="stat-card" style={{ textAlign: 'center' }}>

                            <div className="stat-label">Pending Payout</div>
                        </div>
                        <div className="stat-card" style={{ textAlign: 'center' }}>
                            <div className="stat-number green">KES {getTotalPaid().toLocaleString()}</div>
                            <div className="stat-label">Paid Out</div>
                        </div>
                        <div className="stat-card" style={{ textAlign: 'center' }}>
                            <div className="stat-number blue">{orders.filter(o => o.status === 'completed' || o.payment_status === 'paid' || o.payment_status === 'confirmed').length}</div>
                            <div className="stat-label">Completed Sales</div>

                    <div style={{ padding: '16px', background: 'rgba(212,160,23,0.05)', borderRadius: '8px', marginBottom: '16px' }}>

                            Payouts are processed when your pending earnings reach <strong style={{ color: '#D4A017' }}>KES 500</strong> or more.
                            <br/>
                            <span style={{ fontSize: '0.75rem', color: '#9ca3af' }}>
                                M-PESA Number: {tutor?.mpesa_number || 'Not set'}
                            </span>
                        </p>
                    </div>

                    {earnings.pending >= 500 && tutor?.mpesa_number && (
                        <div style={{ marginTop: '16px', padding: '16px', background: '#f0fdf4', borderRadius: '8px', border: '1px solid #bbf7d0' }}>
                            <h4 style={{ fontFamily: 'Sora, sans-serif', fontWeight: 700, fontSize: '0.9rem', marginBottom: '8px' }}>💰 Request Payout</h4>
                            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                                <input

        // ── PROMOTE TAB ──
        function PromoteTab() {
            const { resources, showNotification } = useTutor();
            const [shareUrl, setShareUrl] = useState('');
            const [selectedResource, setSelectedResource] = useState('');

            useEffect(() => {
                if (resources.length > 0 && !selectedResource) {
                    setSelectedResource(resources[0].id);
                }
            }, [resources]);

            useEffect(() => {
                if (selectedResource) {
                    const baseUrl = window.location.origin;
                    setShareUrl(`${baseUrl}/shop.html?resource=${selectedResource}`);
                }
            }, [selectedResource]);

            const copyLink = () => {
                if (!shareUrl) return;
                navigator.clipboard?.writeText(shareUrl).then(() => {
                    showNotification('📋 Link copied to clipboard!', 'success');
                }).catch(() => {
                    showNotification('📋 Link: ' + shareUrl, 'info');
                });
            };

            const shareOn = (platform) => {
                if (!shareUrl) return;
                const text = `📚 Check out my educational resource on KenyaVault! I'm earning from my teaching materials. Join me at KenyaVault - the year-round education marketplace! 🇰🇪`;
                const urls = {
                    whatsapp: `https://wa.me/?text=${encodeURIComponent(text + '\n\n🔗 ' + shareUrl)}`,
                    facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`,
                    twitter: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text + '\n\n🔗 ' + shareUrl + '\n\n#KenyaVault #Education #TeachingResources')}`,
                    telegram: `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(text)}`,
                    linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}`
                };
