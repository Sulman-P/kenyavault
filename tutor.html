        const SUBJECTS = [
            'mathematics', 'english', 'kiswahili', 'integrated-science', 'social-studies',
            'pre-technical', 'agriculture', 'religious-education', 'creative-arts', 'health-pe',
            'biology', 'chemistry', 'physics', 'business', 'computer-studies',
            'engineering', 'law', 'medicine', 'personal-growth', 'financial-literacy', 'leadership'
        ];

        // ────────────────────────────────────────────────
        // CONTEXT
        // ────────────────────────────────────────────────
        const TutorContext = createContext(null);

        function TutorProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('tutor-dark-mode') === 'true');
            const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem('tutor_id') !== null);
            const [tutor, setTutor] = useState(null);
            const [resources, setResources] = useState([]);
            const [orders, setOrders] = useState([]);
            const [classes, setClasses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('resources');

            useEffect(() => {
                localStorage.setItem('tutor-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const tutorId = sessionStorage.getItem('tutor_id');
                if (tutorId) loadTutorData(tutorId);
                else setLoading(false);
            }, []);

            const loadTutorData = async (tutorId) => {
                setLoading(true);
                try {
                    const tRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}&select=*`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (tRes.ok) {
                        const data = await tRes.json();
                        if (data.length > 0) {
                            setTutor(data[0]);
                            sessionStorage.setItem('tutor_name', data[0].name);
                        }
                    }

                    try {
                        const rRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?tutor_id=eq.${tutorId}&select=*`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (rRes.ok) setResources(await rRes.json());
                    } catch (e) { console.log('Resources not available yet'); }

                    try {
                        const oRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?tutor_id=eq.${tutorId}&select=*&order=created_at.desc`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (oRes.ok) setOrders(await oRes.json());
                    } catch (e) { console.log('Orders not available yet'); }

                    try {
                        const cRes = await fetch(`${SUPABASE_URL}/rest/v1/classes?tutor_id=eq.${tutorId}&select=*&order=date.asc`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (cRes.ok) setClasses(await cRes.json());
                    } catch (e) { console.log('Classes not available yet'); }

                } catch (e) { 
                    console.error('Load error:', e); 
                }
                setLoading(false);
            };

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const logout = () => {
                sessionStorage.removeItem('tutor_id');
                sessionStorage.removeItem('tutor_email');
                sessionStorage.removeItem('tutor_name');
                setIsLoggedIn(false);
                setTutor(null);
                setResources([]);
                setOrders([]);
                setClasses([]);
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);

            return (
                <TutorContext.Provider value={{
                    darkMode, toggleDarkMode,
                    isLoggedIn, setIsLoggedIn,
                    tutor, setTutor,
                    resources, setResources,
                    orders, setOrders,
                    classes, setClasses,
                    loading, setLoading,
                    notification, showNotification,
                    activeTab, setActiveTab,
                    logout,
                    loadTutorData
                }}>
                    {children}
                </TutorContext.Provider>
            );
        }

        function useTutor() {
            const context = useContext(TutorContext);
            if (!context) throw new Error('useTutor must be used within TutorProvider');
            return context;
        }

        // ────────────────────────────────────────────────
        // LOGIN PAGE
        // ────────────────────────────────────────────────
        function LoginPage() {
            const { setIsLoggedIn, setTutor, showNotification, loadTutorData, darkMode, toggleDarkMode } = useTutor();
            const [activeAuth, setActiveAuth] = useState('login');
            const [loginPhone, setLoginPhone] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginLoading, setLoginLoading] = useState(false);
            const [loginError, setLoginError] = useState('');
            const [showResetModal, setShowResetModal] = useState(false);
            const [resetPhone, setResetPhone] = useState('');
            const [resetLoading, setResetLoading] = useState(false);
            const [resetMessage, setResetMessage] = useState('');
            const [debugInfo, setDebugInfo] = useState([]);

            const [signupData, setSignupData] = useState({
                name: '', email: '', phone: '', mpesa: '', password: '', confirmPassword: '',
                subjects: [], levels: [], bio: ''
            });
            const [signupLoading, setSignupLoading] = useState(false);
            const [signupError, setSignupError] = useState('');
            const [passwordStrength, setPasswordStrength] = useState(0);

            const addDebug = (message, type = 'info') => {
                setDebugInfo(prev => [...prev, { message, type, timestamp: new Date().toLocaleTimeString() }]);
                console.log(message);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                setDebugInfo([]);
                
                if (!loginPhone || !loginPassword) {
                    setLoginError('Please enter both phone number and password.');
                    return;
                }

                setLoginLoading(true);
                addDebug(`Attempting login with phone: ${loginPhone}`);

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${loginPhone}&select=*`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    addDebug(`Query response status: ${res.status}`);

                    if (!res.ok) {
                        addDebug(`Query failed: ${res.status} ${res.statusText}`, 'error');
                        setLoginError('Error connecting to database. Please try again.');
                        setLoginLoading(false);
                        return;
                    }

                    const data = await res.json();
                    addDebug(`Found ${data.length} matching tutors`);

                    if (data.length === 0) {
                        addDebug('No tutor found with this phone number', 'error');
                        setLoginError('No account found with this phone number. Please sign up.');
                        setLoginLoading(false);
                        return;
                    }

                    const tutor = data[0];
                    addDebug(`Found tutor: ${tutor.name}, status: ${tutor.status}`);

                    if (tutor.password !== loginPassword) {
                        addDebug('Password mismatch', 'error');
                        setLoginError('Invalid password. Please try again.');
                        setLoginLoading(false);
                        return;
                    }

                    if (tutor.status === 'rejected') {
                        addDebug('Rejected tutor attempted login', 'error');
                        setLoginError('Your application has been rejected. Contact support.');
                        setLoginLoading(false);
                        return;
                    }

                    addDebug('Login successful!', 'success');
                    sessionStorage.setItem('tutor_id', tutor.id);
                    sessionStorage.setItem('tutor_email', tutor.email);
                    sessionStorage.setItem('tutor_name', tutor.name);
                    setIsLoggedIn(true);
                    setTutor(tutor);
                    await loadTutorData(tutor.id);
                    showNotification(`Welcome back, ${tutor.name}! 🎉`, 'success');

                } catch (e) {
                    addDebug(`Error: ${e.message}`, 'error');
                    setLoginError('Error logging in. Please check your connection and try again.');
                }
                setLoginLoading(false);
            };

            const handleForgotPassword = async () => {
                if (!resetPhone) {
                    setResetMessage('Please enter your phone number.');
                    return;
                }
                setResetLoading(true);
                setResetMessage('');

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${resetPhone}&select=id,name`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const data = await res.json();

                    if (data.length === 0) {
                        setResetMessage('No account found with this phone number.');
                        setResetLoading(false);
                        return;
                    }

                    const tempPassword = 'temp' + Math.floor(1000 + Math.random() * 9000);
                    
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${data[0].id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: tempPassword })
                    });

                    if (updateRes.ok) {
                        setResetMessage(`✅ Password reset successful! Your temporary password is: ${tempPassword}. Please login and change your password.`);
                        window.open(`https://wa.me/254${resetPhone.replace(/^0+/, '')}?text=Your%20KenyaVault%20temporary%20password%20is%3A%20${tempPassword}%20Please%20login%20and%20change%20your%20password.`, '_blank');
                    } else {
                        setResetMessage('Failed to reset password. Please try again.');
                    }
                } catch (e) {
                    setResetMessage('Error: ' + e.message);
                }
                setResetLoading(false);
            };

            const checkPasswordStrength = (pass) => {
                let score = 0;
                if (pass.length >= 6) score++;
                if (pass.length >= 8) score++;
                if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
                if (/[0-9]/.test(pass)) score++;
                setPasswordStrength(score);
                return score;
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const { name, email, phone, mpesa, password, confirmPassword, subjects, levels, bio } = signupData;
                setSignupError('');
                setDebugInfo([]);

                if (!name || !email || !phone || !mpesa || !password || !confirmPassword || subjects.length === 0 || levels.length === 0) {
                    setSignupError('Please fill all required fields.');
                    return;
                }
                if (password.length < 6) {
                    setSignupError('Password must be at least 6 characters.');
                    return;
                }
                if (password !== confirmPassword) {
                    setSignupError('Passwords do not match.');
                    return;
                }

                setSignupLoading(true);
                addDebug(`Creating account for ${name} (${phone})`);

                try {
                    const checkPhone = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${phone}&select=id`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const existing = await checkPhone.json();
                    if (existing.length > 0) {
                        addDebug(`Phone ${phone} already registered`, 'error');
                        setSignupError('A tutor with this phone number already exists. Please login.');
                        setSignupLoading(false);
                        return;
                    }

                    const tutorData = {
                        name, 
                        email, 
                        phone, 
                        mpesa_number: mpesa,
                        password, 
                        subjects, 
                        levels, 
                        bio: bio || '',
                        status: 'pending',
                        total_earnings: 0, 
                        pending_earnings: 0, 
                        total_paid_out: 0,
                        created_at: new Date().toISOString()
                    };

                    addDebug('Submitting tutor data to Supabase...');
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(tutorData)
                    });

                    if (!res.ok) {
                        const errorText = await res.text();
                        addDebug(`Signup failed: ${res.status} - ${errorText}`, 'error');
                        throw new Error(`Signup failed: ${res.status}`);
                    }

                    const data = await res.json();
                    const tutor = data[0];
                    addDebug(`Account created successfully! ID: ${tutor.id}`, 'success');

                    sessionStorage.setItem('tutor_id', tutor.id);
                    sessionStorage.setItem('tutor_email', tutor.email);
                    sessionStorage.setItem('tutor_name', tutor.name);
                    setIsLoggedIn(true);
                    setTutor(tutor);
                    await loadTutorData(tutor.id);
                    showNotification('Application submitted successfully! 🎉', 'success');

                } catch (e) {
                    addDebug(`Error: ${e.message}`, 'error');
                    setSignupError('Error submitting application: ' + e.message);
                }
                setSignupLoading(false);
            };

            return (
                <div className="login-banner">
                    <button onClick={toggleDarkMode} className="dark-toggle">
                        {darkMode ? '☀️' : '🌙'}
                    </button>
                    <div className="container">
                        <div className="logo">
                            <div className="logo-icon">
                                <div className="icon-box">KV</div>
                                <div className="logo-text">Kenya<span>Vault</span></div>
                            </div>
                            <div className="logo-sub">Tutor Portal</div>
                        </div>

                        <div className="auth-box">
                            <div className="auth-tabs">
                                <button onClick={() => {setActiveAuth('login'); setDebugInfo([]);}} className={`auth-tab ${activeAuth === 'login' ? 'active' : ''}`}>🔑 Login</button>
                                <button onClick={() => {setActiveAuth('signup'); setDebugInfo([]);}} className={`auth-tab ${activeAuth === 'signup' ? 'active' : ''}`}>📝 Sign Up</button>
                            </div>

                            {activeAuth === 'login' ? (
                                <form onSubmit={handleLogin}>
                                    {loginError && <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm">{loginError}</div>}
                                    <div className="mb-4">
                                        <label className="form-label">Phone Number <span className="req">*</span></label>
                                        <input type="tel" value={loginPhone} onChange={(e) => setLoginPhone(e.target.value)} className="form-input" placeholder="0712 345 678" required />
                                    </div>
                                    <div className="mb-4">
                                        <label className="form-label">Password <span className="req">*</span></label>
                                        <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} className="form-input" placeholder="Enter your password" required />
                                    </div>
                                    <button type="submit" disabled={loginLoading} className="btn-gold">
                                        {loginLoading ? '⏳ Logging in...' : '🔑 Login'}
                                    </button>

                                    <div className="forgot-password-section">
                                        <button type="button" className="btn-link" onClick={() => setShowResetModal(true)}>
                                            Forgot your password?
                                        </button>
                                    </div>

                                    {debugInfo.length > 0 && (
                                        <div className="debug-info mt-4">
                                            <strong>🔍 Debug Info:</strong>
                                            {debugInfo.map((d, i) => (
                                                <div key={i} className={d.type}>
                                                    [{d.timestamp}] {d.message}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </form>
                            ) : (
                                <form onSubmit={handleSignup}>
                                    {signupError && <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm">{signupError}</div>}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Full Name <span className="req">*</span></label>
                                            <input type="text" value={signupData.name} onChange={(e) => setSignupData({...signupData, name: e.target.value})} className="form-input" placeholder="Dr. John Mwangi" required />
                                        </div>
                                        <div>
                                            <label className="form-label">Email <span className="req">*</span></label>
                                            <input type="email" value={signupData.email} onChange={(e) => setSignupData({...signupData, email: e.target.value})} className="form-input" placeholder="you@example.com" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Phone Number <span className="req">*</span></label>
                                            <input type="tel" value={signupData.phone} onChange={(e) => setSignupData({...signupData, phone: e.target.value})} className="form-input" placeholder="0712 345 678" required />
                                        </div>
                                        <div>
                                            <label className="form-label">M-PESA Number <span className="req">*</span></label>
                                            <input type="tel" value={signupData.mpesa} onChange={(e) => setSignupData({...signupData, mpesa: e.target.value})} className="form-input" placeholder="0712 345 678" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Password <span className="req">*</span></label>
                                            <input type="password" value={signupData.password} onChange={(e) => {
                                                setSignupData({...signupData, password: e.target.value});
                                                checkPasswordStrength(e.target.value);
                                            }} className="form-input" placeholder="Min 6 characters" required />
                                            <div className="password-strength">
                                                {[1,2,3,4].map(i => (
                                                    <div key={i} className={`bar ${i <= passwordStrength ? `active ${passwordStrength <= 2 ? 'weak' : passwordStrength <= 3 ? 'medium' : 'strong'}` : ''}`}></div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="form-label">Confirm Password <span className="req">*</span></label>
                                            <input type="password" value={signupData.confirmPassword} onChange={(e) => setSignupData({...signupData, confirmPassword: e.target.value})} className="form-input" placeholder="Confirm password" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="form-label">Subjects <span className="req">*</span></label>
                                            <select multiple value={signupData.subjects} onChange={(e) => setSignupData({...signupData, subjects: Array.from(e.target.selectedOptions, o => o.value)})} className="form-input h-24" required>
                                                {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
                                            </select>
                                            <span className="text-xs text-gray-400 mt-1">Hold Ctrl (Cmd) to select multiple</span>
                                        </div>
                                        <div>
                                            <label className="form-label">Levels <span className="req">*</span></label>
                                            <select multiple value={signupData.levels} onChange={(e) => setSignupData({...signupData, levels: Array.from(e.target.selectedOptions, o => o.value)})} className="form-input h-24" required>
                                                {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                                            </select>
                                            <span className="text-xs text-gray-400 mt-1">Hold Ctrl (Cmd) to select multiple</span>
                                        </div>
                                    </div>
                                    <div className="mb-4">
                                        <label className="form-label">About You / Experience</label>
                                        <textarea value={signupData.bio} onChange={(e) => setSignupData({...signupData, bio: e.target.value})} className="form-input" rows="3" placeholder="Tell us about your teaching experience..."></textarea>
                                    </div>
                                    <button type="submit" disabled={signupLoading} className="btn-gold">
                                        {signupLoading ? '⏳ Submitting...' : '📤 Submit Application'}
                                    </button>

                                    {debugInfo.length > 0 && (
                                        <div className="debug-info mt-4">
                                            <strong>🔍 Debug Info:</strong>
                                            {debugInfo.map((d, i) => (
                                                <div key={i} className={d.type}>
                                                    [{d.timestamp}] {d.message}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </form>
                            )}
                        </div>
                    </div>

                    <div className={`reset-password-modal ${showResetModal ? 'open' : ''}`} onClick={(e) => { if (e.target === e.currentTarget) setShowResetModal(false); }}>
                        <div className="reset-modal-box">
                            <h4>🔑 Reset Password</h4>
                            <p>Enter your phone number to reset your password. You'll receive a temporary password via WhatsApp.</p>
                            {resetMessage && (
                                <div className={`mb-4 p-3 rounded-xl text-sm ${resetMessage.startsWith('✅') ? 'bg-green-500/20 border border-green-500/30 text-green-300' : 'bg-red-500/20 border border-red-500/30 text-red-300'}`}>
                                    {resetMessage}
                                </div>
                            )}
                            <input type="tel" value={resetPhone} onChange={(e) => setResetPhone(e.target.value)} className="form-input" placeholder="0712 345 678" />
                            <div className="reset-modal-actions">
                                <button onClick={() => setShowResetModal(false)} className="btn-outline">Cancel</button>
                                <button onClick={handleForgotPassword} disabled={resetLoading} className="btn-gold" style={{ fontSize: '0.9rem' }}>
                                    {resetLoading ? '⏳ Sending...' : 'Send Reset Code'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // DASHBOARD COMPONENTS
        // ────────────────────────────────────────────────
        function Dashboard() {
            const { tutor, resources, orders, classes, activeTab, setActiveTab, showNotification, loadTutorData } = useTutor();

            const totalEarnings = orders.reduce((sum, o) => sum + (o.tutor_share || 0), 0);
            const pendingEarnings = orders.filter(o => o.status === 'pending' || o.status === 'pending_verification').reduce((sum, o) => sum + (o.tutor_share || 0), 0);
            const totalDownloads = orders.reduce((sum, o) => sum + (o.downloads || 0), 0);

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-navy dark:text-white">📊 Your Dashboard</h1>
                            <p className="text-gray-500 dark:text-gray-400">Welcome back, {tutor?.name || 'Tutor'}! {tutor?.status === 'approved' ? '✅ Approved' : '⏳ Pending Approval'}</p>
                        </div>
                        {tutor?.status === 'approved' && (
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('upload')} className="btn-gold text-sm" style={{ width: 'auto' }}>📤 Upload Resource</button>
                                <button onClick={() => setActiveTab('classes')} className="btn-outline-gold text-sm" style={{ width: 'auto' }}>📅 Create Class</button>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div className="dash-card">
                            <div className="number">{resources.length}</div>
                            <div className="text-sm text-gray-500 dark:text-gray-400">📚 Resources</div>
                        </div>
                        <div className="dash-card">
                            <div className="number gold">KES {totalEarnings.toLocaleString()}</div>
                            <div className="text-sm text-gray-500 dark:text-gray-400">💰 Total Earnings (80%)</div>
                        </div>
                        <div className="dash-card">
                            <div className="number purple">KES {pendingEarnings.toLocaleString()}</div>
                            <div className="text-sm text-gray-500 dark:text-gray-400">⏳ Pending</div>
                        </div>
                        <div className="dash-card">
                            <div className="number green">{totalDownloads}</div>
                            <div className="text-sm text-gray-500 dark:text-gray-400">📥 Downloads</div>
                        </div>
                    </div>

                    <div className="flex flex-wrap gap-2 mb-6">
                        <button onClick={() => setActiveTab('resources')} className={`dash-tab ${activeTab === 'resources' ? 'active' : ''}`}>📚 Resources</button>
                        <button onClick={() => setActiveTab('orders')} className={`dash-tab ${activeTab === 'orders' ? 'active' : ''}`}>📦 Orders</button>

        function UploadTab() {
            const { showNotification, loadTutorData } = useTutor();
            const tutorId = sessionStorage.getItem('tutor_id');
            const [title, setTitle] = useState('');
            const [price, setPrice] = useState(30);
            const [level, setLevel] = useState('');
            const [subject, setSubject] = useState('');
            const [description, setDescription] = useState('');
            const [pages, setPages] = useState('');
            const [pricingTier, setPricingTier] = useState('single');
            const [selectedFile, setSelectedFile] = useState(null);
            const [selectedCover, setSelectedCover] = useState(null);
            const [coverPreview, setCoverPreview] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [published, setPublished] = useState(true);
            const [kicdAligned, setKicdAligned] = useState(true);
            const [cbcCompliant, setCbcCompliant] = useState(true);
            const [teacherReviewed, setTeacherReviewed] = useState(true);

            const fileInputRef = useRef(null);
            const coverInputRef = useRef(null);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type === 'application/pdf') {
                    setSelectedFile(file);
                } else {
                    showNotification('Please select a PDF file', 'error');
                }
            };

            const handleCoverSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    setSelectedCover(file);
                    const reader = new FileReader();
                    reader.onload = (e) => setCoverPreview(e.target.result);
                    reader.readAsDataURL(file);
                } else {
                    showNotification('Please select an image file', 'error');
                }
            };

            const handleUpload = async () => {
                if (!title || !price || !level || !subject || !selectedFile) {
                    showNotification('Please fill all required fields and select a PDF', 'error');
                    return;
                }

                setUploading(true);
                setProgress(10);

                try {
                    const fileExt = selectedFile.name.split('.').pop();
                    const filePath = `resources/${level}/${subject}/${Date.now()}.${fileExt}`;
                    setProgress(30);

                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${filePath}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: selectedFile
                    });

                    if (!uploadRes.ok) throw new Error('PDF upload failed');
                    setProgress(60);

                    const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${filePath}`;

                    let coverUrl = null;
                    if (selectedCover) {
                        const coverExt = selectedCover.name.split('.').pop();
                        const coverPath = `covers/${level}/${subject}/${Date.now()}.${coverExt}`;
                        const coverRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${coverPath}`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                            body: selectedCover
                        });
                        if (coverRes.ok) {
                            coverUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${coverPath}`;
                        }
                    }

                    setProgress(80);

                    const resourceData = {
                        title,
                        price: parseInt(price),
                        level,
                        subject,
                        description,
                        pages: parseInt(pages) || 0,
                        pricing_tier: pricingTier,
                        file_url: fileUrl,
                        cover_image_url: coverUrl,
                        published,
                        kicd_aligned: kicdAligned,
                        cbc_compliant: cbcCompliant,
                        teacher_reviewed: teacherReviewed,
                        tutor_id: tutorId,
                        tutor_name: sessionStorage.getItem('tutor_name') || 'Tutor',
                        status: 'pending',
                        download_count: 0,
                        created_at: new Date().toISOString()
                    };

                    const saveRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify(resourceData)
                    });

                    if (!saveRes.ok) throw new Error('Failed to save resource');

                    setProgress(100);
                    showNotification('Resource uploaded successfully! It will be reviewed by admin.', 'success');

                    setTitle('');
                    setPrice(30);
                    setLevel('');
                    setSubject('');
                    setDescription('');
                    setPages('');
                    setSelectedFile(null);
                    setSelectedCover(null);
                    setCoverPreview(null);
                    if (fileInputRef.current) fileInputRef.current.value = '';
                    if (coverInputRef.current) coverInputRef.current.value = '';

                    loadTutorData(tutorId);

                } catch (e) {
                    console.error('Upload error:', e);
                    showNotification('Upload failed: ' + e.message, 'error');
                }
                setUploading(false);
                setProgress(0);
            };

            return (
                <div>
                    <h3 className="font-semibold text-gray-800 dark:text-white mb-4">📤 Upload Resource</h3>
                    <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Upload your resource for review. You'll earn 80% of each sale once approved.</p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Resource Title <span className="req">*</span></label>
                            <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="form-input" placeholder="e.g. Grade 7 Mathematics Notes" />
                        </div>
                        <div>
                            <label className="form-label">Price (KES) <span className="req">*</span></label>
                            <input type="number" value={price} onChange={(e) => setPrice(e.target.value)} className="form-input" min="0" />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Level <span className="req">*</span></label>
                            <select value={level} onChange={(e) => setLevel(e.target.value)} className="form-input">
                                <option value="">Select level...</option>
                                {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="form-label">Subject <span className="req">*</span></label>
                            <select value={subject} onChange={(e) => setSubject(e.target.value)} className="form-input">
                                <option value="">Select subject...</option>
                                {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="form-label">Pages</label>
                            <input type="number" value={pages} onChange={(e) => setPages(e.target.value)} className="form-input" min="1" />
                        </div>
                        <div>
                            <label className="form-label">Pricing Tier</label>
                            <select value={pricingTier} onChange={(e) => setPricingTier(e.target.value)} className="form-input">
                                <option value="single">Single Paper</option>
                                <option value="bundle">Subject Bundle</option>
                                <option value="termly">Termly Set</option>
                                <option value="kjsea">KJSEA Package</option>
                                <option value="free">Free Resource</option>
                            </select>
                        </div>
                        <div className="flex items-center gap-4 pt-6">
                            <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                <input type="checkbox" checked={published} onChange={(e) => setPublished(e.target.checked)} /> Published
                            </label>
                        </div>
                    </div>

                    <div className="mb-4">
                        <label className="form-label">Description</label>
                        <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="form-input" rows="3" placeholder="Brief description of the resource..." />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">PDF File <span className="req">*</span></label>
                            <div className="drop-zone" onClick={() => fileInputRef.current?.click()}>
                                <div className="text-2xl mb-2">📄</div>
                                <p className="text-sm text-gray-600 dark:text-gray-400">Click or drag to upload PDF</p>
                                <p className="text-xs text-gray-400 dark:text-gray-500">Max size: 20 MB</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".pdf" className="hidden" />
                            </div>
                            {selectedFile && <div className="mt-2 p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-sm text-green-600 dark:text-green-400">✅ {selectedFile.name}</div>}
                        </div>
                        <div>
                            <label className="form-label">Cover Image</label>
                            <div className="drop-zone" onClick={() => coverInputRef.current?.click()}>
                                <div className="text-2xl mb-2">🖼️</div>
                                <p className="text-sm text-gray-600 dark:text-gray-400">Click to upload cover image</p>
                                <input type="file" ref={coverInputRef} onChange={handleCoverSelect} accept="image/*" className="hidden" />
                            </div>
                            {coverPreview && <img src={coverPreview} alt="Cover preview" className="mt-2 cover-preview-img" />}
                        </div>
                    </div>

                    <div className="flex flex-wrap gap-4 mb-4">
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={kicdAligned} onChange={(e) => setKicdAligned(e.target.checked)} /> KICD Aligned
                        </label>
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={cbcCompliant} onChange={(e) => setCbcCompliant(e.target.checked)} /> CBC Compliant
                        </label>
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={teacherReviewed} onChange={(e) => setTeacherReviewed(e.target.checked)} /> Teacher Reviewed
                        </label>
                    </div>

                    <div id="uploadProgress" className={uploading ? 'block' : 'hidden'}>
                        <div className="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
                            <span>Uploading...</span>
                            <span>{progress}%</span>
                        </div>
                        <div className="progress-track"><div id="uploadBar" style={{ width: progress + '%' }}></div></div>
                    </div>

                    <button onClick={handleUpload} disabled={uploading} className="btn-gold">
                        {uploading ? '⏳ Uploading...' : '⬆️ Upload Resource'}
                    </button>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // MAIN APP
        // ────────────────────────────────────────────────
        function App() {
            const { isLoggedIn, notification } = useTutor();

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-900">
                    {isLoggedIn ? <Dashboard /> : <LoginPage />}

                    {notification && (
                        <div className={`toast-notification show ${notification.type === 'error' ? 'error' : 'success'}`}>
                            <span>{notification.type === 'error' ? '❌' : '✅'}</span>
                            <span>{notification.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // RENDER
        // ────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <TutorProvider>
                <App />
            </TutorProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
