<style>
/* ── ROOT VARIABLES ── */
:root {
  --navy: #0a1a3a;
  --navy-light: #1a2a5a;
  --gold: #D4A017;
  --gold-light: #FCD34D;
  --white: #FFFFFF;
  --surface: #F8FAF9;
  --text: #1F2937;
  --muted: #6B7280;
  --border: #E5E7EB;
  --radius: 12px;
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
  --transition: all 0.2s ease;
  --purple: #7C3AED;
  --blue: #2563EB;
  --pink: #EC4899;
  --red: #DC2626;
  --green: #16A34A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s ease, color 0.3s ease;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ── DARK MODE ── */
.dark body {
  background: #111827;
  color: #e5e7eb;
}
.dark .bg-white { background: #1f2937; }
.dark .border-gray-200 { border-color: #374151; }
.dark .text-gray-700 { color: #d1d5db; }
.dark .text-gray-600 { color: #9ca3af; }
.dark .text-gray-500 { color: #6b7280; }
.dark .bg-gray-50 { background: #1f2937; }
.dark .bg-gray-100 { background: #374151; }
.dark .hover\:bg-gray-50:hover { background: #374151; }

/* ── KENYAVAULT COLORS ── */
.bg-navy { background: var(--navy); }
.bg-navy-light { background: var(--navy-light); }
.text-navy { color: var(--navy); }
.border-navy { border-color: var(--navy); }
.bg-gold { background: var(--gold); }
.bg-gold-light { background: var(--gold-light); }
.text-gold { color: var(--gold); }
.text-gold-light { color: var(--gold-light); }
.border-gold { border-color: var(--gold); }
.hover-bg-gold:hover { background: var(--gold); }
.hover-text-gold:hover { color: var(--gold); }
.hover-border-gold:hover { border-color: var(--gold); }

/* ── NAVBAR ── */
.navbar {
  background: var(--navy);
  border-bottom: 2px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 500;
  backdrop-filter: blur(12px);
}
.navbar a { color: #fff; }
.navbar a:hover { color: var(--gold-light); }
.nav-logo span { color: var(--gold-light); }

/* ── TUTOR HERO ── */
.tutor-hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #2a3a6a 100%);
  padding: 60px 0 40px;
  position: relative;
  overflow: hidden;
}
.tutor-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),

/* ── AUTH TABS ── */
.auth-tab {

  font-size: 0.95rem;

  text-align: center;

}
.auth-tab:hover { background: #f3f4f6; }

}
.dark .auth-tab { background: #1f2937; color: #9ca3af; }
.dark .auth-tab:hover { background: #374151; }

/* ── FORM STYLES ── */
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;

  color: #1f2937;
}
.form-input:focus {

  border-color: var(--gold);

}
.dark .form-input {
  background: #1f2937;
  border-color: #374151;
  color: #e5e7eb;
}
.dark .form-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.2);
}
.form-label {
  display: block;
  font-weight: 600;
  font-size: 0.82rem;
  color: #374151;
  margin-bottom: 4px;
}
.dark .form-label { color: #d1d5db; }
.req { color: var(--red); }

/* ── BUTTONS ── */
.btn-gold {
  background: var(--gold);
  color: var(--navy);
  padding: 12px 32px;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: all 0.2s ease;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-gold:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
}
.btn-gold:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.btn-outline-gold {
  background: transparent;
  color: var(--gold);
  padding: 10px 24px;
  border: 2px solid var(--gold);
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.9rem;
  transition: all 0.2s ease;
  cursor: pointer;
}
.btn-outline-gold:hover {
  background: var(--gold);
  color: var(--navy);
  transform: translateY(-2px);
}
.btn-danger {
  background: var(--red);
  color: #fff;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  font-size: 0.78rem;
  transition: all 0.2s ease;
  cursor: pointer;
}
.btn-danger:hover { background: #b91c1c; }
.btn-sm {
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-sm-success { background: #DCFCE7; color: #15803D; }
.btn-sm-success:hover { background: #15803D; color: #fff; }
.btn-sm-danger { background: #FEE2E2; color: var(--red); }
.btn-sm-danger:hover { background: var(--red); color: #fff; }
.btn-sm-warning { background: #FEF3C7; color: #92400E; }
.btn-sm-warning:hover { background: #92400E; color: #fff; }
.btn-sm-info { background: #EFF6FF; color: #1D4ED8; }
.btn-sm-info:hover { background: #1D4ED8; color: #fff; }

/* ── STATUS BADGES ── */
.status-badge {
  padding: 2px 10px;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
}
.status-badge.pending { background: #fef3c7; color: #92400e; }
.status-badge.active { background: #dbeafe; color: #1e40af; }
.status-badge.approved { background: #d1fae5; color: #065f46; }
.status-badge.rejected { background: #fee2e2; color: #991b1b; }
.status-badge.live { background: #fee2e2; color: #dc2626; }
.status-badge.upcoming { background: #dbeafe; color: #1e40af; }
.status-badge.completed { background: #d1fae5; color: #065f46; }
.dark .status-badge.pending { background: #78350f; color: #fbbf24; }
.dark .status-badge.active { background: #1e3a5f; color: #60a5fa; }
.dark .status-badge.approved { background: #064e3b; color: #34d399; }
.dark .status-badge.rejected { background: #7f1d1d; color: #f87171; }
.dark .status-badge.live { background: #7f1d1d; color: #f87171; }
.dark .status-badge.upcoming { background: #1e3a5f; color: #60a5fa; }
.dark .status-badge.completed { background: #064e3b; color: #34d399; }

/* ── DASHBOARD CARDS ── */
.dash-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  border: 1px solid #e5e7eb;
  transition: all 0.2s ease;
}
.dash-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.dark .dash-card {
  background: #1f2937;
  border-color: #374151;
}
.dash-card .number {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 1.8rem;
  color: var(--navy);
}
.dash-card .number.gold { color: var(--gold); }
.dash-card .number.green { color: var(--green); }
.dash-card .number.purple { color: var(--purple); }
.dark .dash-card .number { color: #fff; }

/* ── TABS ── */
.dash-tab {
  padding: 10px 20px;
  border-radius: 9999px;
  border: 1.5px solid #e5e7eb;
  background: #fff;
  font-weight: 600;
  font-size: 0.85rem;
  color: #6b7280;
  transition: all 0.2s ease;
  cursor: pointer;
}
.dash-tab:hover { border-color: var(--gold); color: var(--gold); }
.dash-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
}
.dark .dash-tab {
  background: #1f2937;
  border-color: #374151;
  color: #9ca3af;
}
.dark .dash-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
}
.dash-content { display: none; }
.dash-content.active { display: block; }

/* ── ITEM CARDS ── */
.item-card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  border: 1px solid #e5e7eb;
  margin-bottom: 12px;
  transition: all 0.2s ease;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.item-card:hover { border-color: var(--gold); }
.dark .item-card {
  background: #1f2937;
  border-color: #374151;
}
.item-card .info .title {
  font-weight: 700;
  font-size: 0.95rem;
  color: #1f2937;
}
.dark .item-card .info .title { color: #fff; }
.item-card .info .meta {
  font-size: 0.78rem;
  color: #6b7280;
  margin-top: 2px;
}
.dark .item-card .info .meta { color: #9ca3af; }
.item-card .info .meta span { margin-right: 12px; }
.item-card .earnings {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  color: var(--gold);

/* ── DROP ZONE ── */
.drop-zone {
  border: 2px dashed #d1d5db;
  border-radius: 8px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #f9fafb;
}
.drop-zone:hover {
  border-color: var(--gold);
  background: rgba(212, 160, 23, 0.05);
}
.dark .drop-zone {
  background: #1f2937;
  border-color: #374151;
}
.dark .drop-zone:hover {
  border-color: var(--gold);
  background: rgba(212, 160, 23, 0.1);
}
.cover-preview-img {
  max-width: 200px;
  max-height: 150px;
  border-radius: 8px;
  object-fit: cover;
  display: block;
  margin: 0 auto;
}

/* ── TOAST ── */
.toast-notification {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 99999;
  background: var(--navy);
  color: #fff;
  padding: 13px 20px;
  border-radius: 12px;
  font-size: 0.86rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  max-width: 380px;
}
.toast-notification.show {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.toast-notification.error { background: var(--red); }
.toast-notification.success { background: var(--green); }

/* ── PROGRESS ── */
.progress-track {
  width: 100%;
  height: 8px;
  background: #e5e7eb;
  border-radius: 99px;
  overflow: hidden;
  margin-top: 5px;
}
.dark .progress-track { background: #374151; }
#uploadBar {
  width: 0%;
  height: 100%;
  background: var(--gold);
  border-radius: 99px;
  transition: width 0.3s;
}
#uploadProgress { display: none; }
#uploadProgress.show { display: block; }

/* ── PASSWORD STRENGTH ── */
.password-strength .bar {
  flex: 1;
  height: 3px;
  border-radius: 99px;
  background: #e5e7eb;
  transition: all 0.3s ease;
}
.dark .password-strength .bar { background: #374151; }
.password-strength .bar.active.weak { background: var(--red); }
.password-strength .bar.active.medium { background: #f59e0b; }
.password-strength .bar.active.strong { background: var(--green); }

/* ── LOGIN BACKGROUND ── */
.login-bg {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #2a3a6a 100%);
  position: relative;
  overflow: hidden;
  min-height: 100vh;
}
.login-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
    url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FCD34D' fill-opacity='0.03'%3E%3Cpath d='M50 30L20 46l30 16 30-16-30-16zm0 0l-20 10 20 10 20-10-20-10zM20 46v18l30 16 30-16V46l-30 16-30-16z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  background-size: 80px 80px, 100px 100px;
  background-position: 0 0, 40px 20px;
  pointer-events: none;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .item-card { flex-direction: column; align-items: flex-start; }
  .auth-tab { font-size: 0.82rem; padding: 10px 16px; }
  .tutor-hero { padding: 40px 0 24px; }
  .dash-card .number { font-size: 1.4rem; }
}
@media (max-width: 480px) {
  .auth-tab { font-size: 0.72rem; padding: 8px 12px; }

}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, createContext, useContext } = React;

// ────────────────────────────────────────────────
// SUPABASE CONFIG
// ────────────────────────────────────────────────
const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';

// ────────────────────────────────────────────────
// LEVELS & SUBJECTS
// ────────────────────────────────────────────────
const LEVELS = [
  { value: 'pp1', label: '📚 PP1' }, { value: 'pp2', label: '📚 PP2' },
  { value: 'grade-1', label: 'Grade 1' }, { value: 'grade-2', label: 'Grade 2' },
  { value: 'grade-3', label: 'Grade 3' }, { value: 'grade-4', label: 'Grade 4' },
  { value: 'grade-5', label: 'Grade 5' }, { value: 'grade-6', label: 'Grade 6' },
  { value: 'grade-7', label: 'Grade 7' }, { value: 'grade-8', label: 'Grade 8' },
  { value: 'grade-9', label: 'Grade 9 (KJSEA)' }, { value: 'grade-10', label: 'Grade 10' },
  { value: 'grade-11', label: 'Grade 11' }, { value: 'grade-12', label: 'Grade 12' },
  { value: 'form-1', label: 'Form 1' }, { value: 'form-2', label: 'Form 2' },
  { value: 'form-3', label: 'Form 3' }, { value: 'form-4', label: 'Form 4' },
  { value: 'college', label: '🏛️ College' }, { value: 'tvet', label: '🔧 TVET' },
  { value: 'university', label: '🏫 University' }, { value: 'self-development', label: '🌱 Self Development' }
];

const SUBJECTS = [
  'mathematics', 'english', 'kiswahili', 'integrated-science', 'social-studies',
  'pre-technical', 'agriculture', 'religious-education', 'creative-arts', 'health-pe',
  'biology', 'chemistry', 'physics', 'business', 'computer-studies',
  'engineering', 'law', 'medicine', 'personal-growth', 'financial-literacy', 'leadership'
];

// ────────────────────────────────────────────────
// CONTEXT
// ────────────────────────────────────────────────
const TutorContext = createContext(null);

function TutorProvider({ children }) {
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('tutor-dark-mode') === 'true');
  const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem('tutor_id') !== null);
  const [tutor, setTutor] = useState(null);
  const [resources, setResources] = useState([]);
  const [orders, setOrders] = useState([]);
  const [classes, setClasses] = useState([]);
  const [loading, setLoading] = useState(true);
  const [notification, setNotification] = useState(null);
  const [activeTab, setActiveTab] = useState('resources');

  useEffect(() => {
    localStorage.setItem('tutor-dark-mode', darkMode);
    if (darkMode) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [darkMode]);

  useEffect(() => {
    const tutorId = sessionStorage.getItem('tutor_id');
    if (tutorId) loadTutorData(tutorId);
  }, []);

  const loadTutorData = async (tutorId) => {
    setLoading(true);
    try {
      // Get tutor info
      const tRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (tRes.ok) {
        const data = await tRes.json();
        if (data.length > 0) setTutor(data[0]);
      }

      // Get tutor's resources
      const rRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?tutor_id=eq.${tutorId}&select=*`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (rRes.ok) setResources(await rRes.json());

      // Get tutor's orders
      const oRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?tutor_id=eq.${tutorId}&select=*&order=created_at.desc`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (oRes.ok) setOrders(await oRes.json());

      // Get tutor's classes
      const cRes = await fetch(`${SUPABASE_URL}/rest/v1/classes?tutor_id=eq.${tutorId}&select=*&order=date.asc`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (cRes.ok) setClasses(await cRes.json());

    } catch (e) { console.error('Load error:', e); }
    setLoading(false);
  };

  const showNotification = (msg, type = 'success') => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 4000);
  };

  const logout = () => {
    sessionStorage.removeItem('tutor_id');
    sessionStorage.removeItem('tutor_email');
    setIsLoggedIn(false);
    setTutor(null);
    setResources([]);
    setOrders([]);
    setClasses([]);
    window.location.href = '/tutor.html';
  };

  const toggleDarkMode = () => setDarkMode(!darkMode);

  return (
    <TutorContext.Provider value={{
      darkMode, toggleDarkMode,
      isLoggedIn, setIsLoggedIn,
      tutor, setTutor,
      resources, setResources,
      orders, setOrders,
      classes, setClasses,
      loading, setLoading,
      notification, showNotification,
      activeTab, setActiveTab,
      logout,
      loadTutorData
    }}>
      {children}
    </TutorContext.Provider>
  );
}

function useTutor() {
  const context = useContext(TutorContext);
  if (!context) throw new Error('useTutor must be used within TutorProvider');
  return context;
}

// LOGIN PAGE
// ────────────────────────────────────────────────
function LoginPage() {
  const { setIsLoggedIn, setTutor, showNotification, loadTutorData, darkMode, toggleDarkMode } = useTutor();
  const [activeAuth, setActiveAuth] = useState('login');
  const [loginPhone, setLoginPhone] = useState('');
  const [loginPassword, setLoginPassword] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);
  const [loginError, setLoginError] = useState('');

  const [signupData, setSignupData] = useState({
    name: '', email: '', phone: '', mpesa: '', password: '', confirmPassword: '',
    subjects: [], levels: [], bio: ''
  });
  const [signupLoading, setSignupLoading] = useState(false);
  const [signupError, setSignupError] = useState('');
  const [passwordStrength, setPasswordStrength] = useState(0);

  const handleLogin = async (e) => {
    e.preventDefault();
    if (!loginPhone || !loginPassword) {
      setLoginError('Please enter both phone number and password.');
      return;
    }
    setLoginLoading(true);
    setLoginError('');

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${loginPhone}`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      const data = await res.json();

      if (data.length === 0) {
        setLoginError('No account found with this phone number.');
        setLoginLoading(false);
        return;
      }

      const tutor = data[0];

      if (tutor.password !== loginPassword) {
        setLoginError('Invalid password. Please try again.');
        setLoginLoading(false);
        return;
      }

      if (tutor.status === 'rejected') {
        setLoginError('Your application has been rejected. Contact support.');
        setLoginLoading(false);
        return;
      }

      sessionStorage.setItem('tutor_id', tutor.id);
      sessionStorage.setItem('tutor_email', tutor.email);
      setIsLoggedIn(true);
      setTutor(tutor);
      await loadTutorData(tutor.id);
      showNotification('Welcome back, ' + tutor.name + '! 🎉', 'success');

    } catch (e) {
      setLoginError('Error logging in. Please try again.');
    }
    setLoginLoading(false);
  };

  const checkPasswordStrength = (pass) => {
    let score = 0;
    if (pass.length >= 6) score++;
    if (pass.length >= 8) score++;
    if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    setPasswordStrength(score);
    return score;
  };

  const handleSignup = async (e) => {
    e.preventDefault();
    const { name, email, phone, mpesa, password, confirmPassword, subjects, levels, bio } = signupData;

    if (!name || !email || !phone || !mpesa || !password || !confirmPassword || subjects.length === 0 || levels.length === 0) {
      setSignupError('Please fill all required fields.');
      return;
    }
    if (password.length < 6) {
      setSignupError('Password must be at least 6 characters.');
      return;
    }
    if (password !== confirmPassword) {
      setSignupError('Passwords do not match.');
      return;
    }

    setSignupLoading(true);
    setSignupError('');

    try {
      const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${phone}`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      const existing = await checkRes.json();
      if (existing.length > 0) {
        setSignupError('A tutor with this phone number already exists. Please login.');
        setSignupLoading(false);
        return;
      }

      const tutorData = {
        name, email, phone, mpesa_number: mpesa,
        password, subjects, levels, bio,
        status: 'pending',
        total_earnings: 0, pending_earnings: 0, total_paid_out: 0,
        created_at: new Date().toISOString()
      };

      const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(tutorData)
      });

      if (!res.ok) throw new Error('Signup failed');

      const data = await res.json();
      const tutor = data[0];

      sessionStorage.setItem('tutor_id', tutor.id);
      sessionStorage.setItem('tutor_email', tutor.email);
      setIsLoggedIn(true);
      setTutor(tutor);
      await loadTutorData(tutor.id);
      showNotification('Application submitted successfully! 🎉', 'success');

    } catch (e) {
      setSignupError('Error submitting application: ' + e.message);
    }
    setSignupLoading(false);
  };

  return (
    <div className="min-h-screen login-bg flex items-center justify-center p-4 relative">
      <button onClick={toggleDarkMode} className="absolute top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition">
        {darkMode ? '☀️' : '🌙'}
      </button>
      <div className="w-full max-w-lg relative z-10">
        <div className="text-center mb-6">
          <div className="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-2xl border border-white/10">
            <div className="w-10 h-10 rounded-xl bg-gold flex items-center justify-center text-navy font-bold text-lg">KV</div>
            <div className="text-left">
              <h1 className="text-xl font-bold text-white">Kenya<span className="text-gold-light">Vault</span></h1>
              <p className="text-xs text-gray-400">Tutor Portal</p>
            </div>
          </div>
        </div>

        <div className="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10">
          <div className="flex rounded-lg overflow-hidden mb-6 border border-white/10">
            <button onClick={() => setActiveAuth('login')} className={`auth-tab ${activeAuth === 'login' ? 'active' : ''}`}>🔑 Login</button>
            <button onClick={() => setActiveAuth('signup')} className={`auth-tab ${activeAuth === 'signup' ? 'active' : ''}`}>📝 Sign Up</button>
          </div>

          {activeAuth === 'login' ? (
            <form onSubmit={handleLogin}>
              {loginError && <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm">{loginError}</div>}
              <div className="mb-4">
                <label className="form-label text-white">Phone Number <span className="req">*</span></label>
                <input type="tel" value={loginPhone} onChange={(e) => setLoginPhone(e.target.value)} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="0712 345 678" required />
              </div>
              <div className="mb-4">
                <label className="form-label text-white">Password <span className="req">*</span></label>
                <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="Enter your password" required />
              </div>
              <button type="submit" disabled={loginLoading} className="btn-gold w-full justify-center">
                {loginLoading ? '⏳ Logging in...' : '🔑 Login'}
              </button>
            </form>
          ) : (
            <form onSubmit={handleSignup}>
              {signupError && <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm">{signupError}</div>}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="form-label text-white">Full Name <span className="req">*</span></label>
                  <input type="text" value={signupData.name} onChange={(e) => setSignupData({...signupData, name: e.target.value})} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="Dr. John Mwangi" required />
                </div>
                <div>
                  <label className="form-label text-white">Email <span className="req">*</span></label>
                  <input type="email" value={signupData.email} onChange={(e) => setSignupData({...signupData, email: e.target.value})} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="you@example.com" required />
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="form-label text-white">Phone Number <span className="req">*</span></label>
                  <input type="tel" value={signupData.phone} onChange={(e) => setSignupData({...signupData, phone: e.target.value})} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="0712 345 678" required />
                </div>
                <div>
                  <label className="form-label text-white">M-PESA Number <span className="req">*</span></label>
                  <input type="tel" value={signupData.mpesa} onChange={(e) => setSignupData({...signupData, mpesa: e.target.value})} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="0712 345 678" required />
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="form-label text-white">Password <span className="req">*</span></label>
                  <input type="password" value={signupData.password} onChange={(e) => {
                    setSignupData({...signupData, password: e.target.value});
                    checkPasswordStrength(e.target.value);
                  }} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="Min 6 characters" required />
                  <div className="password-strength flex gap-1 mt-2">
                    {[1,2,3,4].map(i => (
                      <div key={i} className={`bar ${i <= passwordStrength ? `active ${passwordStrength <= 2 ? 'weak' : passwordStrength <= 3 ? 'medium' : 'strong'}` : ''}`}></div>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="form-label text-white">Confirm Password <span className="req">*</span></label>
                  <input type="password" value={signupData.confirmPassword} onChange={(e) => setSignupData({...signupData, confirmPassword: e.target.value})} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" placeholder="Confirm password" required />
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="form-label text-white">Subjects <span className="req">*</span></label>
                  <select multiple value={signupData.subjects} onChange={(e) => setSignupData({...signupData, subjects: Array.from(e.target.selectedOptions, o => o.value)})} className="form-input bg-white/10 border-white/10 text-white h-24" required>
                    {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
                  </select>
                  <span className="text-xs text-gray-400 mt-1">Hold Ctrl (Cmd) to select multiple</span>
                </div>
                <div>
                  <label className="form-label text-white">Levels <span className="req">*</span></label>
                  <select multiple value={signupData.levels} onChange={(e) => setSignupData({...signupData, levels: Array.from(e.target.selectedOptions, o => o.value)})} className="form-input bg-white/10 border-white/10 text-white h-24" required>
                    {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                  </select>
                  <span className="text-xs text-gray-400 mt-1">Hold Ctrl (Cmd) to select multiple</span>
                </div>
              </div>
              <div className="mb-4">
                <label className="form-label text-white">About You / Experience</label>
                <textarea value={signupData.bio} onChange={(e) => setSignupData({...signupData, bio: e.target.value})} className="form-input bg-white/10 border-white/10 text-white placeholder-gray-400" rows="3" placeholder="Tell us about your teaching experience..."></textarea>
              </div>
              <button type="submit" disabled={signupLoading} className="btn-gold w-full justify-center">
                {signupLoading ? '⏳ Submitting...' : '📤 Submit Application'}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// ── RESOURCES TAB ──
function ResourcesTab() {
  const { resources, showNotification, loadTutorData } = useTutor();
  const tutorId = sessionStorage.getItem('tutor_id');

  const deleteResource = async (id) => {
    if (!confirm('Delete this resource permanently?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (res.ok) {
        showNotification('Resource deleted', 'success');
        loadTutorData(tutorId);
      }
    } catch (e) { showNotification('Error deleting', 'error'); }
  };

  if (resources.length === 0) {
    return (
      <div className="text-center py-8">
        <div className="text-4xl mb-4">📤</div>
        <p className="text-gray-500 dark:text-gray-400">You haven't uploaded any resources yet.</p>
        <p className="text-sm text-gray-400 dark:text-gray-500">Upload your first resource to start earning!</p>
      </div>
    );
  }

  return (
    <div className="space-y-3">
      {resources.map(r => (
        <div key={r.id} className="item-card">
          <div className="info">
            <div className="title">{r.title}</div>
            <div className="meta">
              <span>📚 {r.level}</span>
              <span>📖 {r.subject}</span>
              <span>💰 KES {r.price}</span>
              <span>📥 {r.download_count || 0} downloads</span>
              <span className={`status-badge ${r.published !== false ? 'approved' : 'pending'}`}>
                {r.published !== false ? '✅ Published' : '📌 Draft'}
              </span>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <span className="earnings">KES {r.total_earnings || 0}</span>
            <button onClick={() => deleteResource(r.id)} className="btn-danger text-sm">Delete</button>
          </div>
        </div>
      ))}
    </div>
  );
}

              <td className="px-4 py-2 text-gray-500 dark:text-gray-400 text-xs">{new Date(o.created_at).toLocaleDateString()}</td>

}

// ── CLASSES TAB ──
function ClassesTab() {
  const { classes, showNotification, loadTutorData } = useTutor();
  const tutorId = sessionStorage.getItem('tutor_id');
  const [showCreateForm, setShowCreateForm] = useState(false);
  const [classData, setClassData] = useState({
    title: '', description: '', date: '', time: '', duration: '60', price: 100, max_students: 20, status: 'upcoming'
  });
  const [submitting, setSubmitting] = useState(false);

  const deleteClass = async (id) => {
    if (!confirm('Delete this class?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/classes?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (res.ok) {
        showNotification('Class deleted', 'success');
        loadTutorData(tutorId);
      }
    } catch (e) { showNotification('Error deleting', 'error'); }
  };

  const createClass = async (e) => {
    e.preventDefault();
    if (!classData.title || !classData.date || !classData.time) {
      showNotification('Please fill all required fields.', 'error');
      return;
    }
    setSubmitting(true);
    try {
      const data = {
        ...classData,
        tutor_id: tutorId,
        tutor_name: sessionStorage.getItem('tutor_name') || 'Tutor',
        created_at: new Date().toISOString()
      };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/classes`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        showNotification('Class created successfully! 🎉', 'success');
        setShowCreateForm(false);
        setClassData({ title: '', description: '', date: '', time: '', duration: '60', price: 100, max_students: 20, status: 'upcoming' });
        loadTutorData(tutorId);
      } else {
        showNotification('Failed to create class', 'error');
      }
    } catch (e) { showNotification('Error: ' + e.message, 'error'); }
    setSubmitting(false);
  };

  return (
    <div>
      <div className="flex justify-between items-center mb-4">
        <h3 className="font-semibold text-gray-800 dark:text-white">📅 Your Classes</h3>
        <button onClick={() => setShowCreateForm(!showCreateForm)} className="btn-gold text-sm">
          {showCreateForm ? '✕ Cancel' : '➕ Create Class'}
        </button>
      </div>

      {showCreateForm && (
        <form onSubmit={createClass} className="bg-gray-50 dark:bg-gray-700/30 p-4 rounded-lg mb-4 border border-gray-200 dark:border-gray-600">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label className="form-label">Class Title <span className="req">*</span></label>
              <input type="text" value={classData.title} onChange={(e) => setClassData({...classData, title: e.target.value})} className="form-input" required />
            </div>
            <div>
              <label className="form-label">Description</label>
              <input type="text" value={classData.description} onChange={(e) => setClassData({...classData, description: e.target.value})} className="form-input" />
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div>
              <label className="form-label">Date <span className="req">*</span></label>
              <input type="date" value={classData.date} onChange={(e) => setClassData({...classData, date: e.target.value})} className="form-input" required />
            </div>
            <div>
              <label className="form-label">Time <span className="req">*</span></label>
              <input type="time" value={classData.time} onChange={(e) => setClassData({...classData, time: e.target.value})} className="form-input" required />
            </div>
            <div>
              <label className="form-label">Duration (minutes)</label>
              <input type="number" value={classData.duration} onChange={(e) => setClassData({...classData, duration: e.target.value})} className="form-input" min="15" step="15" />
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div>
              <label className="form-label">Price (KES) <span className="req">*</span></label>
              <input type="number" value={classData.price} onChange={(e) => setClassData({...classData, price: parseInt(e.target.value) || 0})} className="form-input" min="0" required />
            </div>
            <div>
              <label className="form-label">Max Students</label>
              <input type="number" value={classData.max_students} onChange={(e) => setClassData({...classData, max_students: parseInt(e.target.value) || 20})} className="form-input" min="1" />
            </div>
          </div>
          <button type="submit" disabled={submitting} className="btn-gold mt-4">
            {submitting ? '⏳ Creating...' : '✅ Create Class'}
          </button>
        </form>
      )}

      {classes.length === 0 ? (
        <div className="text-center py-6">
          <p className="text-gray-500 dark:text-gray-400">No classes scheduled yet.</p>
        </div>
      ) : (
        classes.map(c => (
          <div key={c.id} className="item-card">
            <div className="info">
              <div className="title">{c.title}</div>
              <div className="meta">
                <span>📅 {c.date}</span>
                <span>⏰ {c.time}</span>
                <span>⏱️ {c.duration} min</span>
                <span>💰 KES {c.price}</span>
                <span>👥 {c.bookings || 0}/{c.max_students || 20}</span>
                <span className={`status-badge ${c.status || 'upcoming'}`}>{c.status || 'upcoming'}</span>
              </div>
            </div>
            <button onClick={() => deleteClass(c.id)} className="btn-danger text-sm">Delete</button>
          </div>
        ))
      )}
    </div>
  );
}

// ── PROFILE TAB ──
function ProfileTab() {
  const { tutor, logout, showNotification } = useTutor();
  const [changingPassword, setChangingPassword] = useState(false);
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [updating, setUpdating] = useState(false);
  const tutorId = sessionStorage.getItem('tutor_id');

  const updatePassword = async () => {
    if (newPassword.length < 6) {
      showNotification('Password must be at least 6 characters.', 'error');
      return;
    }
    if (newPassword !== confirmPassword) {
      showNotification('Passwords do not match.', 'error');
      return;
    }
    setUpdating(true);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ password: newPassword })
      });
      if (res.ok) {
        showNotification('Password updated successfully! 🔒', 'success');
        setChangingPassword(false);
        setNewPassword('');
        setConfirmPassword('');
      } else {
        showNotification('Failed to update password.', 'error');
      }
    } catch (e) { showNotification('Error: ' + e.message, 'error'); }
    setUpdating(false);
  };

  if (!tutor) return <div className="text-center py-8">Loading profile...</div>;

  return (
    <div className="max-w-2xl mx-auto">
      <div className="flex items-center gap-4 mb-6">
        <div className="w-16 h-16 rounded-full bg-gold flex items-center justify-center text-navy text-2xl font-bold">
          {tutor.name ? tutor.name.charAt(0).toUpperCase() : 'T'}
        </div>
        <div>
          <h3 className="text-xl font-bold text-gray-800 dark:text-white">{tutor.name}</h3>
          <p className="text-gray-500 dark:text-gray-400">{tutor.email}</p>
          <p className="text-gray-500 dark:text-gray-400">📱 {tutor.phone}</p>
          <p className="text-gray-500 dark:text-gray-400">💰 M-PESA: {tutor.mpesa_number}</p>
          <span className={`status-badge ${tutor.status === 'approved' ? 'approved' : tutor.status === 'pending' ? 'pending' : 'rejected'}`}>
            {tutor.status === 'approved' ? '✅ Approved' : tutor.status === 'pending' ? '⏳ Pending' : '❌ Rejected'}
          </span>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-4">
          <h4 className="font-semibold text-gray-800 dark:text-white mb-2">📚 Subjects</h4>
          <div className="flex flex-wrap gap-1">
            {tutor.subjects?.map(s => (
              <span key={s} className="bg-gray-200 dark:bg-gray-600 px-2 py-1 rounded text-xs">{s}</span>
            )) || <span className="text-gray-400 text-sm">No subjects selected</span>}
          </div>
        </div>
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-4">
          <h4 className="font-semibold text-gray-800 dark:text-white mb-2">🎓 Levels</h4>
          <div className="flex flex-wrap gap-1">
            {tutor.levels?.map(l => (
              <span key={l} className="bg-gray-200 dark:bg-gray-600 px-2 py-1 rounded text-xs">{l}</span>
            )) || <span className="text-gray-400 text-sm">No levels selected</span>}
          </div>
        </div>
      </div>

      {tutor.bio && (
        <div className="mb-6 p-4 bg-gray-50 dark:bg-gray-700/30 rounded-lg">
          <h4 className="font-semibold text-gray-800 dark:text-white mb-2">📝 About</h4>
          <p className="text-gray-600 dark:text-gray-400 text-sm">{tutor.bio}</p>
        </div>
      )}

      <div className="border-t border-gray-200 dark:border-gray-700 pt-4">
        <button onClick={() => setChangingPassword(!changingPassword)} className="text-gold hover:text-gold-light transition">
          🔑 {changingPassword ? 'Cancel' : 'Change Password'}
        </button>
        {changingPassword && (
          <div className="mt-4 space-y-4">
            <div>
              <label className="form-label">New Password <span className="req">*</span></label>
              <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} className="form-input" placeholder="Min 6 characters" />
            </div>
            <div>
              <label className="form-label">Confirm Password <span className="req">*</span></label>
              <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className="form-input" placeholder="Confirm your password" />
            </div>
            <button onClick={updatePassword} disabled={updating} className="btn-gold">
              {updating ? '⏳ Updating...' : '✅ Update Password'}
            </button>
          </div>
        )}
      </div>

      <div className="mt-4">
        <button onClick={logout} className="text-red-500 hover:text-red-600 transition text-sm">🚪 Logout</button>
      </div>
    </div>
  );
}

// ── UPLOAD TAB ──
function UploadTab() {
  const { showNotification, loadTutorData } = useTutor();
  const tutorId = sessionStorage.getItem('tutor_id');
  const [title, setTitle] = useState('');
  const [price, setPrice] = useState(30);
  const [level, setLevel] = useState('');
  const [subject, setSubject] = useState('');
  const [description, setDescription] = useState('');
  const [pages, setPages] = useState('');
  const [pricingTier, setPricingTier] = useState('single');
  const [selectedFile, setSelectedFile] = useState(null);
  const [selectedCover, setSelectedCover] = useState(null);
  const [coverPreview, setCoverPreview] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [published, setPublished] = useState(true);
  const [kicdAligned, setKicdAligned] = useState(true);
  const [cbcCompliant, setCbcCompliant] = useState(true);
  const [teacherReviewed, setTeacherReviewed] = useState(true);

  const fileInputRef = useRef(null);
  const coverInputRef = useRef(null);

  const handleFileSelect = (e) => {
    const file = e.target.files[0];
    if (file && file.type === 'application/pdf') {
      setSelectedFile(file);
    } else {
      showNotification('Please select a PDF file', 'error');
    }
  };

  const handleCoverSelect = (e) => {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
      setSelectedCover(file);
      const reader = new FileReader();
      reader.onload = (e) => setCoverPreview(e.target.result);
      reader.readAsDataURL(file);
    } else {
      showNotification('Please select an image file', 'error');
    }
  };

  const handleUpload = async () => {
    if (!title || !price || !level || !subject || !selectedFile) {
      showNotification('Please fill all required fields and select a PDF', 'error');
      return;
    }

    setUploading(true);
    setProgress(10);

    try {
      const fileExt = selectedFile.name.split('.').pop();
      const filePath = `resources/${level}/${subject}/${Date.now()}.${fileExt}`;
      setProgress(30);

      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${filePath}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
        body: selectedFile
      });

      if (!uploadRes.ok) throw new Error('PDF upload failed');
      setProgress(60);

      const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${filePath}`;

      let coverUrl = null;
      if (selectedCover) {
        const coverExt = selectedCover.name.split('.').pop();
        const coverPath = `covers/${level}/${subject}/${Date.now()}.${coverExt}`;
        const coverRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${coverPath}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
          body: selectedCover
        });
        if (coverRes.ok) {
          coverUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${coverPath}`;
        }
      }

      setProgress(80);

      const resourceData = {
        title,
        price: parseInt(price),
        level,
        subject,
        description,
        pages: parseInt(pages) || 0,
        pricing_tier: pricingTier,
        file_url: fileUrl,
        cover_image_url: coverUrl,
        published,
        kicd_aligned: kicdAligned,
        cbc_compliant: cbcCompliant,
        teacher_reviewed: teacherReviewed,
        tutor_id: tutorId,
        tutor_name: sessionStorage.getItem('tutor_name') || 'Tutor',
        status: 'pending',
        download_count: 0,
        created_at: new Date().toISOString()
      };

      const saveRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(resourceData)
      });

      if (!saveRes.ok) throw new Error('Failed to save resource');

      setProgress(100);
      showNotification('Resource uploaded successfully! It will be reviewed by admin.', 'success');

      setTitle('');
      setPrice(30);
      setLevel('');
      setSubject('');
      setDescription('');
      setPages('');
      setSelectedFile(null);
      setSelectedCover(null);
      setCoverPreview(null);
      if (fileInputRef.current) fileInputRef.current.value = '';
      if (coverInputRef.current) coverInputRef.current.value = '';

      loadTutorData(tutorId);

    } catch (e) {
      console.error('Upload error:', e);
      showNotification('Upload failed: ' + e.message, 'error');
    }
    setUploading(false);
    setProgress(0);
  };

  return (
    <div>
      <h3 className="font-semibold text-gray-800 dark:text-white mb-4">📤 Upload Resource</h3>
      <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Upload your resource for review. You'll earn 80% of each sale once approved.</p>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label className="form-label">Resource Title <span className="req">*</span></label>
          <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="form-input" placeholder="e.g. Grade 7 Mathematics Notes" />
        </div>
        <div>
          <label className="form-label">Price (KES) <span className="req">*</span></label>
          <input type="number" value={price} onChange={(e) => setPrice(e.target.value)} className="form-input" min="0" />
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label className="form-label">Level <span className="req">*</span></label>
          <select value={level} onChange={(e) => setLevel(e.target.value)} className="form-input">
            <option value="">Select level...</option>
            {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
          </select>
        </div>
        <div>
          <label className="form-label">Subject <span className="req">*</span></label>
          <select value={subject} onChange={(e) => setSubject(e.target.value)} className="form-input">
            <option value="">Select subject...</option>
            {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
          </select>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div>
          <label className="form-label">Pages</label>
          <input type="number" value={pages} onChange={(e) => setPages(e.target.value)} className="form-input" min="1" />
        </div>
        <div>
          <label className="form-label">Pricing Tier</label>
          <select value={pricingTier} onChange={(e) => setPricingTier(e.target.value)} className="form-input">
            <option value="single">Single Paper</option>
            <option value="bundle">Subject Bundle</option>
            <option value="termly">Termly Set</option>
            <option value="kjsea">KJSEA Package</option>
            <option value="free">Free Resource</option>
          </select>
        </div>
        <div className="flex items-center gap-4 pt-6">
          <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
            <input type="checkbox" checked={published} onChange={(e) => setPublished(e.target.checked)} /> Published
          </label>
        </div>
      </div>

      <div className="mb-4">
        <label className="form-label">Description</label>
        <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="form-input" rows="3" placeholder="Brief description of the resource..." />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label className="form-label">PDF File <span className="req">*</span></label>
          <div className="drop-zone" onClick={() => fileInputRef.current?.click()}>
            <div className="text-2xl mb-2">📄</div>
            <p className="text-sm text-gray-600 dark:text-gray-400">Click or drag to upload PDF</p>
            <p className="text-xs text-gray-400 dark:text-gray-500">Max size: 20 MB</p>
            <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".pdf" className="hidden" />
          </div>
          {selectedFile && <div className="mt-2 p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-sm text-green-600 dark:text-green-400">✅ {selectedFile.name}</div>}
        </div>
        <div>
          <label className="form-label">Cover Image</label>
          <div className="drop-zone" onClick={() => coverInputRef.current?.click()}>
            <div className="text-2xl mb-2">🖼️</div>
            <p className="text-sm text-gray-600 dark:text-gray-400">Click to upload cover image</p>
            <input type="file" ref={coverInputRef} onChange={handleCoverSelect} accept="image/*" className="hidden" />
          </div>
          {coverPreview && <img src={coverPreview} alt="Cover preview" className="mt-2 cover-preview-img" />}
        </div>
      </div>

      <div className="flex flex-wrap gap-4 mb-4">
        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
          <input type="checkbox" checked={kicdAligned} onChange={(e) => setKicdAligned(e.target.checked)} /> KICD Aligned
        </label>
        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
          <input type="checkbox" checked={cbcCompliant} onChange={(e) => setCbcCompliant(e.target.checked)} /> CBC Compliant
        </label>
        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
          <input type="checkbox" checked={teacherReviewed} onChange={(e) => setTeacherReviewed(e.target.checked)} /> Teacher Reviewed
        </label>
      </div>

      <div id="uploadProgress" className={uploading ? 'block' : 'hidden'}>
        <div className="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
          <span>Uploading...</span>
          <span>{progress}%</span>
        </div>
        <div className="progress-track"><div id="uploadBar" style={{ width: progress + '%' }}></div></div>
      </div>

      <button onClick={handleUpload} disabled={uploading} className="btn-gold">
        {uploading ? '⏳ Uploading...' : '⬆️ Upload Resource'}
      </button>
    </div>
  );
}

// ────────────────────────────────────────────────
// MAIN APP
// ────────────────────────────────────────────────
function App() {
  const { isLoggedIn, notification } = useTutor();

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900">
      <Navbar />
      {isLoggedIn ? <Dashboard /> : <LoginPage />}

      {notification && (
        <div className={`toast-notification show ${notification.type === 'error' ? 'error' : 'success'}`}>
          <span>{notification.type === 'error' ? '❌' : '✅'}</span>
          <span>{notification.msg}</span>
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <TutorProvider>
    <App />
  </TutorProvider>
);
</script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
