<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tutor Portal — KenyaVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        /* ────────────────────────────────────────────────
           RESET & BASE
           ──────────────────────────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }
        .dark body {
            background: #111827;
            color: #e5e7eb;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        /* ── KENYAVAULT COLORS ── */
        .bg-navy { background: #0a1a3a; }
        .bg-navy-light { background: #1a2a5a; }
        .text-navy { color: #0a1a3a; }
        .border-navy { border-color: #0a1a3a; }
        .bg-gold { background: #D4A017; }
        .bg-gold-light { background: #FCD34D; }
        .text-gold { color: #D4A017; }
        .text-gold-light { color: #FCD34D; }
        .border-gold { border-color: #D4A017; }
        .hover-bg-gold:hover { background: #D4A017; }
        .hover-text-gold:hover { color: #D4A017; }
        .hover-border-gold:hover { border-color: #D4A017; }

        /* ────────────────────────────────────────────────
           LOGIN PAGE
           ──────────────────────────────────────────────── */
        .login-banner {
            background: linear-gradient(135deg, #0a1a3a 0%, #1a2a5a 50%, #2a3a6a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .login-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FCD34D' fill-opacity='0.03'%3E%3Cpath d='M50 30L20 46l30 16 30-16-30-16zm0 0l-20 10 20 10 20-10-20-10zM20 46v18l30 16 30-16V46l-30 16-30-16z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px, 100px 100px;
            background-position: 0 0, 40px 20px;
            pointer-events: none;
        }
        .login-banner .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }
        .login-banner .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-banner .logo .logo-icon {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .login-banner .logo .logo-icon .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #D4A017;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0a1a3a;
        }
        .login-banner .logo .logo-icon .logo-text {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: #fff;
        }
        .login-banner .logo .logo-icon .logo-text span { color: #FCD34D; }
        .login-banner .logo .logo-sub {
            font-size: 0.75rem;
            color: #8FBAA6;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .auth-box {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.95);
        }
        .dark .auth-box {
            background: rgba(31, 41, 55, 0.95);
            border-color: rgba(255,255,255,0.05);
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .dark .auth-tabs { background: #1f2937; }
        .auth-tab {
            flex: 1;
            padding: 14px 24px;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .auth-tab:hover { background: rgba(212, 160, 23, 0.1); }
        .auth-tab.active {
            background: #D4A017;
            color: #0a1a3a;
        }
        .dark .auth-tab { color: #9ca3af; }
        .dark .auth-tab.active {
            background: #D4A017;
            color: #0a1a3a;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            background: #fff;
            color: #1f2937;
        }
        .form-input:focus {
            outline: none;
            border-color: #D4A017;
            box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.1);
        }
        .dark .form-input {
            background: #1f2937;
            border-color: #374151;
            color: #e5e7eb;
        }
        .dark .form-input:focus {
            border-color: #D4A017;
            box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.2);
        }
        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            color: #374151;
            margin-bottom: 4px;
        }
        .dark .form-label { color: #d1d5db; }
        .req { color: #dc2626; }

        .btn-gold {
            background: #D4A017;
            color: #0a1a3a;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .btn-gold:hover {
            background: #FCD34D;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 160, 23, 0.3);
        }
        .btn-gold:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-link {
            color: #D4A017;
            font-weight: 600;
            font-size: 0.85rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-link:hover { text-decoration: underline; color: #FCD34D; }

        .forgot-password-section { text-align: center; margin-top: 16px; }
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .password-strength .bar {
            flex: 1;
            height: 3px;
            border-radius: 99px;
            background: #e5e7eb;
            transition: all 0.3s ease;
        }
        .dark .password-strength .bar { background: #374151; }
        .password-strength .bar.active.weak { background: #dc2626; }
        .password-strength .bar.active.medium { background: #f59e0b; }
        .password-strength .bar.active.strong { background: #16a34a; }

        .reset-password-modal {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-password-modal.open { display: flex; }
        .reset-modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .dark .reset-modal-box { background: #1f2937; }
        .reset-modal-box h4 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1f2937;
            margin-bottom: 4px;
            text-align: center;
        }
        .dark .reset-modal-box h4 { color: #fff; }
        .reset-modal-box p {
            font-size: 0.85rem;
            color: #6b7280;
            text-align: center;
            margin-bottom: 16px;
        }
        .dark .reset-modal-box p { color: #9ca3af; }
        .reset-modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-outline {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: transparent;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-outline:hover {
            border-color: #D4A017;
            color: #D4A017;
        }
        .dark .btn-outline {
            border-color: #374151;
            color: #9ca3af;
        }
        .dark .btn-outline:hover {
            border-color: #D4A017;
            color: #D4A017;
        }

        .dark-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }
        .dark-toggle:hover {
            background: rgba(255,255,255,0.15);
        }

        /* ────────────────────────────────────────────────
           DASHBOARD - PROFESSIONAL LAYOUT
           ──────────────────────────────────────────────── */
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 280px;
            background: #0a1a3a;
            color: #fff;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .dark .sidebar {
            background: #0f172a;
        }
        .sidebar-logo {
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 24px;
        }
        .sidebar-logo .logo-text {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: #fff;
        }
        .sidebar-logo .logo-text span { color: #FCD34D; }
        .sidebar-logo .logo-sub {
            font-size: 0.7rem;
            color: #8FBAA6;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            flex: 1;
            padding: 0 12px;
        }
        .sidebar-menu .menu-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            padding: 0 12px 8px;
        }
        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
        }
        .sidebar-menu .menu-item:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }
        .sidebar-menu .menu-item.active {
            background: rgba(212, 160, 23, 0.15);
            color: #FCD34D;
            border-left: 3px solid #D4A017;
        }
        .sidebar-menu .menu-item i {
            width: 20px;
            font-size: 1rem;
        }
        .sidebar-menu .menu-item .badge {
            margin-left: auto;
            background: rgba(212, 160, 23, 0.2);
            color: #FCD34D;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: auto;
        }
        .sidebar-footer .tutor-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-footer .tutor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D4A017;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #0a1a3a;
        }
        .sidebar-footer .tutor-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .sidebar-footer .tutor-status {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        .sidebar-footer .tutor-status.approved { color: #34d399; }
        .sidebar-footer .tutor-status.pending { color: #fbbf24; }
        .sidebar-footer .tutor-status.rejected { color: #f87171; }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            margin-left: 280px;
            min-height: 100vh;
        }

        /* ── TOP NAVBAR ── */
        .top-navbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.9);
        }
        .dark .top-navbar {
            background: rgba(17, 24, 39, 0.9);
            border-color: #374151;
        }
        .top-navbar .page-title {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1f2937;
        }
        .dark .top-navbar .page-title { color: #fff; }
        .top-navbar .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .top-navbar .nav-actions .dark-toggle-nav {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #6b7280;
        }
        .dark .top-navbar .nav-actions .dark-toggle-nav {
            border-color: #374151;
            color: #9ca3af;
        }
        .top-navbar .nav-actions .dark-toggle-nav:hover {
            background: #f3f4f6;
        }
        .dark .top-navbar .nav-actions .dark-toggle-nav:hover {
            background: #1f2937;
        }
        .top-navbar .nav-actions .logout-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #fee2e2;
            color: #dc2626;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .top-navbar .nav-actions .logout-btn:hover {
            background: #fecaca;
        }
        .dark .top-navbar .nav-actions .logout-btn {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
        }
        .dark .top-navbar .nav-actions .logout-btn:hover {
            background: rgba(220, 38, 38, 0.3);
        }

        /* ── MOBILE MENU TOGGLE ── */
        .mobile-menu-toggle {
            display: none;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: transparent;
            cursor: pointer;
            font-size: 1.2rem;
            color: #6b7280;
        }
        .dark .mobile-menu-toggle {
            border-color: #374151;
            color: #9ca3af;
        }

        /* ── PAGE CONTENT ── */
        .page-content {
            padding: 24px 32px;
        }

        /* ── STAT CARDS ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        .dark .stat-card {
            background: #1f2937;
            border-color: #374151;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        .stat-card .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .stat-card .stat-number {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #0a1a3a;
        }
        .dark .stat-card .stat-number { color: #fff; }
        .stat-card .stat-number.gold { color: #D4A017; }
        .stat-card .stat-number.green { color: #16a34a; }
        .stat-card .stat-number.purple { color: #8b5cf6; }
        .stat-card .stat-number.blue { color: #3b82f6; }
        .stat-card .stat-number.red { color: #dc2626; }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 4px;
        }
        .dark .stat-card .stat-label { color: #9ca3af; }

        /* ── CONTENT CARDS ── */
        .content-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e7eb;
            margin-bottom: 24px;
        }
        .dark .content-card {
            background: #1f2937;
            border-color: #374151;
        }
        .content-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .dark .content-card .card-header {
            border-color: #374151;
        }
        .content-card .card-header h3 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1f2937;
        }
        .dark .content-card .card-header h3 { color: #fff; }

        /* ── TABLE STYLES ── */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        thead {
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
        }
        .dark thead {
            background: #1f2937;
            border-color: #374151;
        }
        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #6b7280;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dark th { color: #9ca3af; }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
            color: #1f2937;
        }
        .dark td {
            border-color: #374151;
            color: #e5e7eb;
        }
        tr:hover td { background: #f9fafb; }
        .dark tr:hover td { background: #1f2937; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-badge.approved { background: #dcfce7; color: #16a34a; }
        .status-badge.pending { background: #fef3c7; color: #d97706; }
        .status-badge.rejected { background: #fee2e2; color: #dc2626; }
        .status-badge.completed { background: #dbeafe; color: #2563eb; }
        .status-badge.upcoming { background: #dbeafe; color: #2563eb; }
        .status-badge.ongoing { background: #fef3c7; color: #d97706; }
        .status-badge.paid { background: #dcfce7; color: #16a34a; }
        .status-badge.live { background: #dcfce7; color: #16a34a; }
        .status-badge.draft { background: #f3f4f6; color: #6b7280; }

        /* ── ITEM CARDS ── */
        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        .dark .item-card {
            border-color: #374151;
        }
        .item-card:hover {
            background: #f9fafb;
        }
        .dark .item-card:hover {
            background: #1f2937;
        }
        .item-card .info .title {
            font-weight: 600;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // ────────────────────────────────────────────────
        // SUPABASE CONFIG
        // ────────────────────────────────────────────────
        const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';

        // ────────────────────────────────────────────────
        // LEVELS & SUBJECTS
        // ────────────────────────────────────────────────
        const LEVELS = [
            { value: 'pp1', label: '📚 PP1' }, { value: 'pp2', label: '📚 PP2' },
            { value: 'grade-1', label: 'Grade 1' }, { value: 'grade-2', label: 'Grade 2' },
            { value: 'grade-3', label: 'Grade 3' }, { value: 'grade-4', label: 'Grade 4' },
            { value: 'grade-5', label: 'Grade 5' }, { value: 'grade-6', label: 'Grade 6' },
            { value: 'grade-7', label: 'Grade 7' }, { value: 'grade-8', label: 'Grade 8' },
            { value: 'grade-9', label: 'Grade 9 (KJSEA)' }, { value: 'grade-10', label: 'Grade 10' },
            { value: 'grade-11', label: 'Grade 11' }, { value: 'grade-12', label: 'Grade 12' },
            { value: 'form-1', label: 'Form 1' }, { value: 'form-2', label: 'Form 2' },
            { value: 'form-3', label: 'Form 3' }, { value: 'form-4', label: 'Form 4' },
            { value: 'college', label: '🏛️ College' }, { value: 'tvet', label: '🔧 TVET' },
            { value: 'university', label: '🏫 University' }, { value: 'self-development', label: '🌱 Self Development' }
        ];

        const SUBJECTS = [
            'mathematics', 'english', 'kiswahili', 'integrated-science', 'social-studies',
            'pre-technical', 'agriculture', 'religious-education', 'creative-arts', 'health-pe',
            'biology', 'chemistry', 'physics', 'business', 'computer-studies',
            'engineering', 'law', 'medicine', 'personal-growth', 'financial-literacy', 'leadership'
        ];

        // ────────────────────────────────────────────────
        // CONTEXT
        // ────────────────────────────────────────────────
        const TutorContext = createContext(null);

        function TutorProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('tutor-dark-mode') === 'true');
            const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem('tutor_id') !== null);
            const [tutor, setTutor] = useState(null);
            const [resources, setResources] = useState([]);
            const [orders, setOrders] = useState([]);
            const [classes, setClasses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [debugInfo, setDebugInfo] = useState([]);

            useEffect(() => {
                localStorage.setItem('tutor-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const tutorId = sessionStorage.getItem('tutor_id');
                if (tutorId) loadTutorData(tutorId);
                else setLoading(false);
            }, []);

            const addDebug = (message, type = 'info') => {
                setDebugInfo(prev => [...prev, { message, type, timestamp: new Date().toLocaleTimeString() }]);
                console.log(message);
            };

            // ── UPDATED: loadTutorData with earnings fix ──
            const loadTutorData = async (tutorId) => {
                setLoading(true);
                try {
                    // Load tutor data
                    const tRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}&select=*`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (tRes.ok) {
                        const data = await tRes.json();
                        if (data.length > 0) {
                            setTutor(data[0]);
                            sessionStorage.setItem('tutor_name', data[0].name);
                            addDebug('✅ Tutor data loaded', 'success');
                        }
                    } else {
                        addDebug('❌ Failed to load tutor: ' + tRes.status, 'error');
                    }

                    // Load resources
                    try {
                        const rRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?tutor_id=eq.${tutorId}&select=*`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (rRes.ok) {
                            const data = await rRes.json();
                            setResources(data || []);
                            addDebug(`✅ Loaded ${data.length} resources`, 'success');
                        } else {
                            addDebug('❌ Failed to load resources: ' + rRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading resources: ' + e.message, 'error');
                    }

                    // ── UPDATED: Load orders with tutor_share fix ──
                    try {
                        const oRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?tutor_id=eq.${tutorId}&select=*&order=created_at.desc`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (oRes.ok) {
                            const data = await oRes.json();
                            // ── FIX: Ensure tutor_share is calculated if missing ──
                            const processedOrders = data.map(o => ({
                                ...o,
                                tutor_share: o.tutor_share || Math.round((o.total_amount || o.item_price || 0) * 0.8)
                            }));
                            setOrders(processedOrders);
                            addDebug(`✅ Loaded ${processedOrders.length} orders with tutor shares`, 'success');
                        } else {
                            addDebug('❌ Failed to load orders: ' + oRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading orders: ' + e.message, 'error');
                    }

                    // Load classes
                    try {
                        const cRes = await fetch(`${SUPABASE_URL}/rest/v1/classes?tutor_id=eq.${tutorId}&select=*&order=class_date.asc`, {
                            headers: { 
                                'apikey': SUPABASE_ANON_KEY, 
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (cRes.ok) {
                            const data = await cRes.json();
                            setClasses(data || []);
                            addDebug(`✅ Loaded ${data.length} classes`, 'success');
                        } else if (cRes.status === 400) {
                            addDebug('⚠️ Order by class_date failed, trying without order', 'info');
                            const cRes2 = await fetch(`${SUPABASE_URL}/rest/v1/classes?tutor_id=eq.${tutorId}&select=*`, {
                                headers: { 
                                    'apikey': SUPABASE_ANON_KEY, 
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                    'Content-Type': 'application/json'
                                }
                            });
                            if (cRes2.ok) {
                                const data = await cRes2.json();
                                setClasses(data || []);
                                addDebug(`✅ Loaded ${data.length} classes (no order)`, 'success');
                            } else {
                                addDebug('❌ Failed to load classes: ' + cRes2.status, 'error');
                            }
                        } else {
                            addDebug('❌ Failed to load classes: ' + cRes.status, 'error');
                        }
                    } catch (e) { 
                        addDebug('❌ Error loading classes: ' + e.message, 'error');
                    }

                } catch (e) { 
                    console.error('Load error:', e); 
                    addDebug('❌ Error loading data: ' + e.message, 'error');
                }
                setLoading(false);
            };

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const logout = () => {
                sessionStorage.removeItem('tutor_id');
                sessionStorage.removeItem('tutor_email');
                sessionStorage.removeItem('tutor_name');
                setIsLoggedIn(false);
                setTutor(null);
                setResources([]);
                setOrders([]);
                setClasses([]);
                setActiveTab('dashboard');
                setDebugInfo([]);
                showNotification('Logged out successfully', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 500);
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
            const closeSidebar = () => setSidebarOpen(false);

            return (
                <TutorContext.Provider value={{
                    darkMode, toggleDarkMode,
                    isLoggedIn, setIsLoggedIn,
                    tutor, setTutor,
                    resources, setResources,
                    orders, setOrders,
                    classes, setClasses,
                    loading, setLoading,
                    notification, showNotification,
                    activeTab, setActiveTab,
                    logout,
                    loadTutorData,
                    sidebarOpen, toggleSidebar, closeSidebar,
                    debugInfo, addDebug
                }}>
                    {children}
                </TutorContext.Provider>
            );
        }

        function useTutor() {
            const context = useContext(TutorContext);
            if (!context) throw new Error('useTutor must be used within TutorProvider');
            return context;
        }

        // ────────────────────────────────────────────────
        // LOGIN PAGE
        // ────────────────────────────────────────────────
        function LoginPage() {
            const { setIsLoggedIn, setTutor, showNotification, loadTutorData, darkMode, toggleDarkMode, addDebug } = useTutor();
            const [activeAuth, setActiveAuth] = useState('login');
            const [loginPhone, setLoginPhone] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginLoading, setLoginLoading] = useState(false);
            const [loginError, setLoginError] = useState('');
            const [showResetModal, setShowResetModal] = useState(false);
            const [resetPhone, setResetPhone] = useState('');
            const [resetLoading, setResetLoading] = useState(false);
            const [resetMessage, setResetMessage] = useState('');
            const [debugInfo, setDebugInfo] = useState([]);

            const [signupData, setSignupData] = useState({
                name: '', email: '', phone: '', mpesa: '', password: '', confirmPassword: '',
                subjects: [], levels: [], bio: ''
            });
            const [signupLoading, setSignupLoading] = useState(false);
            const [signupError, setSignupError] = useState('');
            const [passwordStrength, setPasswordStrength] = useState(0);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                setDebugInfo([]);
                
                if (!loginPhone || !loginPassword) {
                    setLoginError('Please enter both phone number and password.');
                    return;
                }

                setLoginLoading(true);
                addDebug(`Attempting login with phone: ${loginPhone}`);

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${loginPhone}&select=*`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!res.ok) {
                        addDebug(`Query failed: ${res.status}`, 'error');
                        setLoginError('Error connecting to database.');
                        setLoginLoading(false);
                        return;
                    }

                    const data = await res.json();

                    if (data.length === 0) {
                        addDebug('No tutor found', 'error');
                        setLoginError('No account found with this phone number.');
                        setLoginLoading(false);
                        return;
                    }

                    const tutor = data[0];

                    if (tutor.password !== loginPassword) {
                        addDebug('Password mismatch', 'error');
                        setLoginError('Invalid password.');
                        setLoginLoading(false);
                        return;
                    }

                    if (tutor.status === 'rejected') {
                        setLoginError('Your application has been rejected.');
                        setLoginLoading(false);
                        return;
                    }

                    addDebug('Login successful!', 'success');
                    sessionStorage.setItem('tutor_id', tutor.id);
                    sessionStorage.setItem('tutor_email', tutor.email);
                    sessionStorage.setItem('tutor_name', tutor.name);
                    setIsLoggedIn(true);
                    setTutor(tutor);
                    await loadTutorData(tutor.id);
                    showNotification(`Welcome back, ${tutor.name}! 🎉`, 'success');

                } catch (e) {
                    addDebug(`Error: ${e.message}`, 'error');
                    setLoginError('Error logging in. Please try again.');
                }
                setLoginLoading(false);
            };

            const handleForgotPassword = async () => {
                if (!resetPhone) {
                    setResetMessage('Please enter your phone number.');
                    return;
                }
                setResetLoading(true);
                setResetMessage('');

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${resetPhone}&select=id,name`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const data = await res.json();

                    if (data.length === 0) {
                        setResetMessage('No account found with this phone number.');
                        setResetLoading(false);
                        return;
                    }

                    const tempPassword = 'temp' + Math.floor(1000 + Math.random() * 9000);
                    
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${data[0].id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: tempPassword })
                    });

                    if (updateRes.ok) {
                        setResetMessage(`✅ Password reset successful! Your temporary password is: ${tempPassword}`);
                        window.open(`https://wa.me/254${resetPhone.replace(/^0+/, '')}?text=Your%20KenyaVault%20temporary%20password%20is%3A%20${tempPassword}`, '_blank');
                    } else {
                        setResetMessage('Failed to reset password.');
                    }
                } catch (e) {
                    setResetMessage('Error: ' + e.message);
                }
                setResetLoading(false);
            };

            const checkPasswordStrength = (pass) => {
                let score = 0;
                if (pass.length >= 6) score++;
                if (pass.length >= 8) score++;
                if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
                if (/[0-9]/.test(pass)) score++;
                setPasswordStrength(score);
                return score;
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const { name, email, phone, mpesa, password, confirmPassword, subjects, levels, bio } = signupData;
                setSignupError('');
                setDebugInfo([]);

                if (!name || !email || !phone || !mpesa || !password || !confirmPassword || subjects.length === 0 || levels.length === 0) {
                    setSignupError('Please fill all required fields.');
                    return;
                }
                if (password.length < 6) {
                    setSignupError('Password must be at least 6 characters.');
                    return;
                }
                if (password !== confirmPassword) {
                    setSignupError('Passwords do not match.');
                    return;
                }

                setSignupLoading(true);
                addDebug(`Creating account for ${name}`);

                try {
                    const checkPhone = await fetch(`${SUPABASE_URL}/rest/v1/tutors?phone=eq.${phone}&select=id`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const existing = await checkPhone.json();
                    if (existing.length > 0) {
                        setSignupError('A tutor with this phone number already exists.');
                        setSignupLoading(false);
                        return;
                    }

                    const tutorData = {
                        name, email, phone, 
                        mpesa_number: mpesa,
                        password, subjects, levels, 
                        bio: bio || '',
                        status: 'pending',
                        total_earnings: 0, pending_earnings: 0, total_paid_out: 0,
                        created_at: new Date().toISOString()
                    };

                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(tutorData)
                    });

                    if (!res.ok) throw new Error('Signup failed');

                    const data = await res.json();
                    const tutor = data[0];
                    addDebug('Account created!', 'success');

                        completed += share;

                });
                return { total, pending, completed };

        // ── EARNINGS TAB (FIXED WITH REFRESH BUTTON) ──
        function EarningsTab() {
            const { orders, tutor, showNotification, setOrders } = useTutor();
            const tutorId = sessionStorage.getItem('tutor_id');

            // ── CALCULATE EARNINGS ──
            const calculateEarnings = () => {
                let totalEarnings = 0, pendingEarnings = 0, completedEarnings = 0;
                orders.forEach(o => {
                    const share = o.tutor_share || Math.round((o.total_amount || o.item_price || 0) * 0.8);
                    totalEarnings += share;
                    const status = o.status || o.payment_status || 'pending';
                    if (status === 'pending' || status === 'processing' || status === 'initiated') {
                        pendingEarnings += share;
                    } else if (status === 'completed' || status === 'paid' || status === 'approved' || status === 'success') {
                        completedEarnings += share;
                    }
                });
                return { totalEarnings, pendingEarnings, completedEarnings };
            };

            const { totalEarnings, pendingEarnings, completedEarnings } = calculateEarnings();
            const paidOut = tutor?.total_paid_out || 0;
            const completedOrders = orders.filter(o => 
                o.status === 'completed' || o.payment_status === 'paid' || o.payment_status === 'completed'
            ).length;

            // ── REFRESH EARNINGS ──
            const refreshEarnings = async () => {
                if (!tutorId) return;
                showNotification('🔄 Refreshing earnings...', 'info');
                
                try {
                    const oRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?tutor_id=eq.${tutorId}&select=*&order=created_at.desc`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (oRes.ok) {
                        const data = await oRes.json();
                        const processedOrders = data.map(o => ({
                            ...o,
                            tutor_share: o.tutor_share || Math.round((o.total_amount || o.item_price || 0) * 0.8)
                        }));
                        setOrders(processedOrders);
                        showNotification('✅ Earnings refreshed successfully!', 'success');
                    } else {
                        showNotification('❌ Failed to refresh. Status: ' + oRes.status, 'error');

                } catch (e) {
                    showNotification('❌ Error: ' + e.message, 'error');
                }

            return (
                <div className="content-card">

                        <h3>💰 Earnings</h3>

                    <div className="stat-grid" style={{ marginBottom: '20px' }}>
                        <div className="stat-card" style={{ textAlign: 'center' }}>
                            <div className="stat-number gold">KES {totalEarnings.toLocaleString()}</div>

                        <div className="stat-card" style={{ textAlign: 'center' }}>
                            <div className="stat-number purple">KES {pendingEarnings.toLocaleString()}</div>
                            <div className="stat-label">Pending Payout</div>
                        </div>
                        <div className="stat-card" style={{ textAlign: 'center' }}>
                            <div className="stat-number green">KES {paidOut.toLocaleString()}</div>
                            <div className="stat-label">Paid Out</div>
                        </div>
                        <div className="stat-card" style={{ textAlign: 'center' }}>
                            <div className="stat-number blue">{completedOrders}</div>
                            <div className="stat-label">Completed Sales</div>
                        </div>
                    </div>

                    <div style={{ padding: '16px', background: 'rgba(212,160,23,0.05)', borderRadius: '8px' }}>
                        <p style={{ fontSize: '0.9rem', color: '#6b7280' }}>

                            Payouts are processed when your pending earnings reach <strong style={{ color: '#D4A017' }}>KES 500</strong> or more.
                        </p>
                        <p style={{ fontSize: '0.8rem', color: '#9ca3af', marginTop: '8px' }}>
                            📊 Showing {orders.length} orders • Last updated: {new Date().toLocaleTimeString()}
                        </p>
                    </div>

                    {orders.length > 0 && (
                        <div style={{ marginTop: '20px' }}>
                            <h4 style={{ fontFamily: 'Sora, sans-serif', fontWeight: 600, fontSize: '0.9rem', marginBottom: '12px' }}>📋 Order History</h4>
                            <div className="table-wrapper">

        // ── UPLOAD TAB ──
        function UploadTab() {
            const { showNotification, loadTutorData } = useTutor();
            const tutorId = sessionStorage.getItem('tutor_id');
            const [title, setTitle] = useState('');
            const [price, setPrice] = useState(30);
            const [level, setLevel] = useState('');
            const [subject, setSubject] = useState('');
            const [description, setDescription] = useState('');
            const [pages, setPages] = useState('');
            const [pricingTier, setPricingTier] = useState('single');
            const [selectedFile, setSelectedFile] = useState(null);
            const [selectedCover, setSelectedCover] = useState(null);
            const [coverPreview, setCoverPreview] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [published, setPublished] = useState(true);
            const [kicdAligned, setKicdAligned] = useState(true);
            const [cbcCompliant, setCbcCompliant] = useState(true);
            const [teacherReviewed, setTeacherReviewed] = useState(true);

            const fileInputRef = useRef(null);
            const coverInputRef = useRef(null);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type === 'application/pdf') {
                    setSelectedFile(file);
                } else {
                    showNotification('Please select a PDF file', 'error');
                }
            };

            const handleCoverSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    setSelectedCover(file);
                    const reader = new FileReader();
                    reader.onload = (e) => setCoverPreview(e.target.result);
                    reader.readAsDataURL(file);
                } else {
                    showNotification('Please select an image file', 'error');
                }
            };

            const handleUpload = async () => {
                if (!title || !price || !level || !subject || !selectedFile) {
                    showNotification('Please fill all required fields and select a PDF', 'error');
                    return;
                }

                setUploading(true);
                setProgress(10);

                try {
                    const fileExt = selectedFile.name.split('.').pop();
                    const filePath = `resources/${level}/${subject}/${Date.now()}.${fileExt}`;
                    setProgress(30);

                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${filePath}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: selectedFile
                    });

                    if (!uploadRes.ok) throw new Error('PDF upload failed');
                    setProgress(60);

                    const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${filePath}`;

                    let coverUrl = null;
                    if (selectedCover) {
                        const coverExt = selectedCover.name.split('.').pop();
                        const coverPath = `covers/${level}/${subject}/${Date.now()}.${coverExt}`;
                        const coverRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${coverPath}`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                            body: selectedCover
                        });
                        if (coverRes.ok) {
                            coverUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${coverPath}`;
                        }
                    }

                    setProgress(80);

                    const resourceData = {
                        title,
                        price: parseInt(price),
                        level,
                        subject,
                        description,
                        pages: parseInt(pages) || 0,
                        pricing_tier: pricingTier,
                        file_url: fileUrl,
                        cover_image_url: coverUrl,
                        published,
                        kicd_aligned: kicdAligned,
                        cbc_compliant: cbcCompliant,
                        teacher_reviewed: teacherReviewed,
                        tutor_id: tutorId,
                        tutor_name: sessionStorage.getItem('tutor_name') || 'Tutor',
                        status: 'draft',
                        download_count: 0,
                        created_at: new Date().toISOString()
                    };

                    const saveRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify(resourceData)
                    });

                    if (!saveRes.ok) throw new Error('Failed to save resource');

                    setProgress(100);
                    showNotification('Resource uploaded successfully! It will be reviewed by admin.', 'success');

                    setTitle('');
                    setPrice(30);
                    setLevel('');
                    setSubject('');
                    setDescription('');
                    setPages('');
                    setSelectedFile(null);
                    setSelectedCover(null);
                    setCoverPreview(null);
                    if (fileInputRef.current) fileInputRef.current.value = '';
                    if (coverInputRef.current) coverInputRef.current.value = '';

                    loadTutorData(tutorId);

                } catch (e) {
                    console.error('Upload error:', e);
                    showNotification('Upload failed: ' + e.message, 'error');
                }
                setUploading(false);
                setProgress(0);
            };

            return (
                <div className="content-card">
                    <div className="card-header">
                        <h3>📤 Upload Resource</h3>
                    </div>

                    <p style={{ color: '#6b7280', marginBottom: '16px' }}>
                        Upload your resource for review. You'll earn 80% of each sale once approved.
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Resource Title <span className="req">*</span></label>
                            <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="form-input" placeholder="e.g. Grade 7 Mathematics Notes" />
                        </div>
                        <div>
                            <label className="form-label">Price (KES) <span className="req">*</span></label>
                            <input type="number" value={price} onChange={(e) => setPrice(e.target.value)} className="form-input" min="0" />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Level <span className="req">*</span></label>
                            <select value={level} onChange={(e) => setLevel(e.target.value)} className="form-input">
                                <option value="">Select level...</option>
                                {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="form-label">Subject <span className="req">*</span></label>
                            <select value={subject} onChange={(e) => setSubject(e.target.value)} className="form-input">
                                <option value="">Select subject...</option>
                                {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="form-label">Pages</label>
                            <input type="number" value={pages} onChange={(e) => setPages(e.target.value)} className="form-input" min="1" />
                        </div>
                        <div>
                            <label className="form-label">Pricing Tier</label>
                            <select value={pricingTier} onChange={(e) => setPricingTier(e.target.value)} className="form-input">
                                <option value="single">Single Paper</option>
                                <option value="bundle">Subject Bundle</option>
                                <option value="termly">Termly Set</option>
                                <option value="kjsea">KJSEA Package</option>
                                <option value="free">Free Resource</option>
                            </select>
                        </div>
                        <div className="flex items-center gap-4 pt-6">
                            <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                <input type="checkbox" checked={published} onChange={(e) => setPublished(e.target.checked)} /> Published
                            </label>
                        </div>
                    </div>

                    <div className="mb-4">
                        <label className="form-label">Description</label>
                        <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="form-input" rows="3" placeholder="Brief description of the resource..." />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">PDF File <span className="req">*</span></label>
                            <div className="drop-zone" onClick={() => fileInputRef.current?.click()}>
                                <div style={{ fontSize: '2rem', marginBottom: '8px' }}>📄</div>
                                <p style={{ fontSize: '0.9rem', color: '#6b7280' }}>Click or drag to upload PDF</p>
                                <p style={{ fontSize: '0.8rem', color: '#9ca3af' }}>Max size: 20 MB</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".pdf" className="hidden" />
                            </div>
                            {selectedFile && <div className="mt-2 p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-sm text-green-600 dark:text-green-400">✅ {selectedFile.name}</div>}
                        </div>
                        <div>
                            <label className="form-label">Cover Image</label>
                            <div className="drop-zone" onClick={() => coverInputRef.current?.click()}>
                                <div style={{ fontSize: '2rem', marginBottom: '8px' }}>🖼️</div>
                                <p style={{ fontSize: '0.9rem', color: '#6b7280' }}>Click to upload cover image</p>
                                <input type="file" ref={coverInputRef} onChange={handleCoverSelect} accept="image/*" className="hidden" />
                            </div>
                            {coverPreview && <img src={coverPreview} alt="Cover preview" className="cover-preview-img" />}
                        </div>
                    </div>

                    <div className="flex flex-wrap gap-4 mb-4">
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={kicdAligned} onChange={(e) => setKicdAligned(e.target.checked)} /> KICD Aligned
                        </label>
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={cbcCompliant} onChange={(e) => setCbcCompliant(e.target.checked)} /> CBC Compliant
                        </label>
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={teacherReviewed} onChange={(e) => setTeacherReviewed(e.target.checked)} /> Teacher Reviewed
                        </label>
                    </div>

                    {uploading && (
                        <div>
                            <div className="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
                                <span>Uploading...</span>
                                <span>{progress}%</span>
                            </div>
                            <div className="progress-track"><div id="uploadBar" style={{ width: progress + '%' }}></div></div>
                        </div>
                    )}

                    <button onClick={handleUpload} disabled={uploading} className="btn-gold" style={{ width: 'auto', marginTop: '8px' }}>
                        {uploading ? '⏳ Uploading...' : '⬆️ Upload Resource'}
                    </button>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // MAIN APP
        // ────────────────────────────────────────────────
        function App() {
            const { isLoggedIn, notification } = useTutor();

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-900">
                    {isLoggedIn ? <Dashboard /> : <LoginPage />}

                    {notification && (
                        <div className={`toast-notification show ${notification.type === 'error' ? 'error' : 'success'}`}>
                            <span>{notification.type === 'error' ? '❌' : '✅'}</span>
                            <span>{notification.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // RENDER
        // ────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <TutorProvider>
                <App />
            </TutorProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
