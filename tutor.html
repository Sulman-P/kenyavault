                            </button>
                            <button className="social-share-btn facebook" onClick={() => shareOn('facebook')}>
                                <i className="fab fa-facebook"></i> Facebook
                            </button>
                            <button className="social-share-btn twitter" onClick={() => shareOn('twitter')}>
                                <i className="fab fa-twitter"></i> Twitter/X
                            </button>
                            <button className="social-share-btn telegram" onClick={() => shareOn('telegram')}>
                                <i className="fab fa-telegram"></i> Telegram
                            </button>
                            <button className="social-share-btn linkedin" onClick={() => shareOn('linkedin')}>
                                <i className="fab fa-linkedin"></i> LinkedIn
                            </button>
                        </div>
                    </div>

                    <div style={{ padding: '12px 16px', background: 'rgba(212,160,23,0.08)', borderRadius: '8px' }}>
                        <p style={{ fontSize: '0.8rem', color: '#6b7280' }}>
                            💡 <strong>Tip:</strong> Share your resource on educational WhatsApp groups, Facebook teaching communities, 
                            and with your colleagues to boost sales. Every share brings you closer to your next payout!
                        </p>
                    </div>
                </div>
            );
        }

        // ── PROFILE TAB ──
        function ProfileTab() {
            const { tutor, showNotification, refreshData } = useTutor();
            const [changingPassword, setChangingPassword] = useState(false);
            const [newPassword, setNewPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [updating, setUpdating] = useState(false);
            const [editMode, setEditMode] = useState(false);
            const [editData, setEditData] = useState({
                name: '',
                email: '',
                phone: '',
                mpesa_number: '',
                bio: '',
                subjects: [],
                levels: []
            });

            useEffect(() => {
                if (tutor) {
                    setEditData({
                        name: tutor.name || '',
                        email: tutor.email || '',
                        phone: tutor.phone || '',
                        mpesa_number: tutor.mpesa_number || '',
                        bio: tutor.bio || '',
                        subjects: tutor.subjects || [],
                        levels: tutor.levels || []
                    });
                }
            }, [tutor]);

            const updateProfile = async () => {
                const tutorId = sessionStorage.getItem('tutor_id');
                if (!tutorId) return;

                setUpdating(true);
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: editData.name,
                            email: editData.email,
                            phone: editData.phone,
                            mpesa_number: editData.mpesa_number,
                            bio: editData.bio,
                            subjects: editData.subjects,
                            levels: editData.levels
                        })
                    });
                    if (response.ok) {
                        showNotification('✅ Profile updated successfully!', 'success');
                        setEditMode(false);
                        refreshData();
                    } else {
                        showNotification('❌ Failed to update profile', 'error');
                    }
                } catch (e) {
                    showNotification('❌ Error: ' + e.message, 'error');
                }
                setUpdating(false);
            };

            const updatePassword = async () => {
                if (newPassword.length < 6) {
                    showNotification('Password must be at least 6 characters.', 'error');
                    return;
                }
                if (newPassword !== confirmPassword) {
                    showNotification('Passwords do not match.', 'error');
                    return;
                }
                const tutorId = sessionStorage.getItem('tutor_id');
                if (!tutorId) return;

                setUpdating(true);
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutorId}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: newPassword })
                    });
                    if (res.ok) {
                        showNotification('Password updated successfully! 🔒', 'success');
                        setChangingPassword(false);
                        setNewPassword('');
                        setConfirmPassword('');
                    } else {
                        showNotification('Failed to update password.', 'error');
                    }
                } catch (e) { showNotification('Error: ' + e.message, 'error'); }
                setUpdating(false);
            };

            if (!tutor) return <div>Loading...</div>;

            return (
                <div className="content-card">
                    <div className="card-header">
                        <h3>👤 Profile</h3>
                        {!editMode && (
                            <button onClick={() => setEditMode(true)} className="btn-sm">
                                ✏️ Edit Profile
                            </button>
                        )}
                    </div>

                    <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                        <div style={{ textAlign: 'center' }}>
                            <div className="profile-avatar" style={{ margin: '0 auto' }}>
                                {tutor.name ? tutor.name.charAt(0).toUpperCase() : 'T'}
                            </div>
                            <span className={`status-badge ${tutor.status === 'approved' ? 'approved' : tutor.status === 'pending' ? 'pending' : 'rejected'}`} style={{ marginTop: '8px', display: 'inline-block' }}>
                                {tutor.status === 'approved' ? '✅ Approved' : tutor.status === 'pending' ? '⏳ Pending' : '❌ Rejected'}
                            </span>
                        </div>

                        <div style={{ flex: 1 }}>
                            {editMode ? (
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="form-label">Full Name *</label>
                                            <input 
                                                type="text" 
                                                value={editData.name} 
                                                onChange={(e) => setEditData({...editData, name: e.target.value})} 
                                                className="form-input" 
                                            />
                                        </div>
                                        <div>
                                            <label className="form-label">Email *</label>
                                            <input 
                                                type="email" 
                                                value={editData.email} 
                                                onChange={(e) => setEditData({...editData, email: e.target.value})} 
                                                className="form-input" 
                                            />
                                        </div>
                                        <div>
                                            <label className="form-label">Phone</label>
                                            <input 
                                                type="tel" 
                                                value={editData.phone} 
                                                onChange={(e) => setEditData({...editData, phone: e.target.value})} 
                                                className="form-input" 
                                            />
                                        </div>
                                        <div>
                                            <label className="form-label">M-PESA Number *</label>
                                            <input 
                                                type="tel" 
                                                value={editData.mpesa_number} 
                                                onChange={(e) => setEditData({...editData, mpesa_number: e.target.value})} 
                                                className="form-input" 
                                                placeholder="0712 345 678"
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="form-label">Bio</label>
                                        <textarea 
                                            value={editData.bio} 
                                            onChange={(e) => setEditData({...editData, bio: e.target.value})} 
                                            className="form-input" 
                                            rows="3"
                                        />
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={updateProfile} disabled={updating} className="btn-gold" style={{ width: 'auto', padding: '10px 24px' }}>
                                            {updating ? '⏳ Saving...' : '💾 Save Changes'}
                                        </button>
                                        <button onClick={() => setEditMode(false)} className="btn-sm outline">
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                        <div>
                                            <label className="form-label">Full Name</label>
                                            <p style={{ fontWeight: 600 }}>{tutor.name}</p>
                                        </div>
                                        <div>
                                            <label className="form-label">Email</label>
                                            <p style={{ fontWeight: 600 }}>{tutor.email}</p>
                                        </div>
                                        <div>
                                            <label className="form-label">Phone</label>
                                            <p style={{ fontWeight: 600 }}>{tutor.phone}</p>
                                        </div>
                                        <div>
                                            <label className="form-label">M-PESA Number</label>
                                            <p style={{ fontWeight: 600 }}>{tutor.mpesa_number || 'Not set'}</p>
                                        </div>
                                    </div>

                                    <div style={{ marginTop: '16px' }}>
                                        <label className="form-label">📚 Subjects</label>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                                            {tutor.subjects?.map(s => (
                                                <span key={s} className="status-badge approved" style={{ background: '#dbeafe', color: '#1e40af' }}>{s}</span>
                                            ))}
                                        </div>
                                    </div>

                                    <div style={{ marginTop: '12px' }}>
                                        <label className="form-label">🎓 Levels</label>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                                            {tutor.levels?.map(l => {
                                                const levelLabel = LEVELS.find(lev => lev.value === l)?.label || l;
                                                return (
                                                    <span key={l} className="status-badge pending" style={{ background: '#fef3c7', color: '#92400e' }}>{levelLabel}</span>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {tutor.bio && (
                                        <div style={{ marginTop: '12px' }}>
                                            <label className="form-label">📝 About</label>
                                            <p style={{ fontSize: '0.9rem', color: '#6b7280' }}>{tutor.bio}</p>
                                        </div>
                                    )}

                                    <div style={{ marginTop: '20px', borderTop: '1px solid #e5e7eb', paddingTop: '16px' }}>
                                        <button onClick={() => setChangingPassword(!changingPassword)} className="btn-link">
                                            🔑 {changingPassword ? 'Cancel' : 'Change Password'}
                                        </button>
                                        {changingPassword && (
                                            <div style={{ marginTop: '12px', display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                                                <div style={{ flex: 1, minWidth: '200px' }}>
                                                    <label className="form-label">New Password</label>
                                                    <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} className="form-input" placeholder="Min 6 characters" />
                                                </div>
                                                <div style={{ flex: 1, minWidth: '200px' }}>
                                                    <label className="form-label">Confirm Password</label>
                                                    <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className="form-input" placeholder="Confirm" />
                                                </div>
                                                <button onClick={updatePassword} disabled={updating} className="btn-sm" style={{ alignSelf: 'flex-end' }}>
                                                    {updating ? '⏳ Updating...' : 'Update'}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ── UPLOAD TAB ──
        function UploadTab() {
            const { showNotification, refreshData } = useTutor();
            const tutorId = sessionStorage.getItem('tutor_id');
            const [title, setTitle] = useState('');
            const [price, setPrice] = useState(30);
            const [level, setLevel] = useState('');
            const [subject, setSubject] = useState('');
            const [description, setDescription] = useState('');
            const [pages, setPages] = useState('');
            const [pricingTier, setPricingTier] = useState('single');
            const [selectedFile, setSelectedFile] = useState(null);
            const [selectedCover, setSelectedCover] = useState(null);
            const [coverPreview, setCoverPreview] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [published, setPublished] = useState(true);
            const [isFree, setIsFree] = useState(false);
            const [resourceType, setResourceType] = useState('lesson-plan');
            const [curriculum, setCurriculum] = useState('cbc');
            const [kicdAligned, setKicdAligned] = useState(true);
            const [cbcCompliant, setCbcCompliant] = useState(true);
            const [teacherReviewed, setTeacherReviewed] = useState(true);

            const fileInputRef = useRef(null);
            const coverInputRef = useRef(null);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type === 'application/pdf') {
                    setSelectedFile(file);
                } else {
                    showNotification('Please select a PDF file', 'error');
                }
            };

            const handleCoverSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    setSelectedCover(file);
                    const reader = new FileReader();
                    reader.onload = (e) => setCoverPreview(e.target.result);
                    reader.readAsDataURL(file);
                } else {
                    showNotification('Please select an image file', 'error');
                }
            };

            const handleUpload = async () => {
                if (!title || !price || !level || !subject || !selectedFile) {
                    showNotification('Please fill all required fields and select a PDF', 'error');
                    return;
                }

                if (!tutorId) {
                    showNotification('You must be logged in to upload', 'error');
                    return;
                }

                setUploading(true);
                setProgress(10);

                try {
                    const fileExt = selectedFile.name.split('.').pop();
                    const filePath = `resources/${level}/${subject}/${Date.now()}.${fileExt}`;
                    setProgress(30);

                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${filePath}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: selectedFile
                    });

                    if (!uploadRes.ok) throw new Error('PDF upload failed');
                    setProgress(60);

                    const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${filePath}`;

                    let coverUrl = null;
                    if (selectedCover) {
                        const coverExt = selectedCover.name.split('.').pop();
                        const coverPath = `covers/${level}/${subject}/${Date.now()}.${coverExt}`;
                        const coverRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-resources/${coverPath}`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                            body: selectedCover
                        });
                        if (coverRes.ok) {
                            coverUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-resources/${coverPath}`;
                        }
                    }

                    setProgress(80);

                    const resourceData = {
                        title,
                        price: isFree ? 0 : parseInt(price),
                        level,
                        subject,
                        description,
                        pages: parseInt(pages) || 0,
                        resource_type: resourceType,
                        curriculum: curriculum,
                        pricing_tier: pricingTier,
                        file_url: fileUrl,
                        cover_image_url: coverUrl,
                        published,
                        is_free: isFree,
                        kicd_aligned: kicdAligned,
                        cbc_compliant: cbcCompliant,
                        teacher_reviewed: teacherReviewed,
                        tutor_id: tutorId,
                        tutor_name: sessionStorage.getItem('tutor_name') || 'Tutor',
                        status: published ? 'pending_review' : 'draft',
                        download_count: 0,
                        total_earnings: 0,
                        created_at: new Date().toISOString()
                    };

                    const saveRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify(resourceData)
                    });

                    if (!saveRes.ok) throw new Error('Failed to save resource');

                    setProgress(100);
                    showNotification('Resource uploaded successfully! It will be reviewed by admin.', 'success');

                    setTitle('');
                    setPrice(30);
                    setLevel('');
                    setSubject('');
                    setDescription('');
                    setPages('');
                    setSelectedFile(null);
                    setSelectedCover(null);
                    setCoverPreview(null);
                    if (fileInputRef.current) fileInputRef.current.value = '';
                    if (coverInputRef.current) coverInputRef.current.value = '';

                    refreshData();

                } catch (e) {
                    console.error('Upload error:', e);
                    showNotification('Upload failed: ' + e.message, 'error');
                }
                setUploading(false);
                setProgress(0);
            };

            return (
                <div className="content-card">
                    <div className="card-header">
                        <h3>📤 Upload Resource</h3>
                    </div>

                    <p style={{ color: '#6b7280', marginBottom: '16px' }}>
                        Upload your resource for review. You'll earn <strong style={{ color: '#D4A017' }}>80%</strong> of each sale once approved.
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Resource Title <span className="req">*</span></label>
                            <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="form-input" placeholder="e.g. Grade 7 Mathematics Notes" />
                        </div>
                        <div>
                            <label className="form-label">Price (KES) <span className="req">*</span></label>
                            <input type="number" value={price} onChange={(e) => setPrice(e.target.value)} className="form-input" min="0" disabled={isFree} />
                            <label className="flex items-center gap-2 mt-1 text-sm text-gray-600 dark:text-gray-400">
                                <input type="checkbox" checked={isFree} onChange={(e) => setIsFree(e.target.checked)} /> This is a free resource
                            </label>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Grade Level <span className="req">*</span></label>
                            <select value={level} onChange={(e) => setLevel(e.target.value)} className="form-input">
                                <option value="">Select level...</option>
                                {LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="form-label">Subject <span className="req">*</span></label>
                            <select value={subject} onChange={(e) => setSubject(e.target.value)} className="form-input">
                                <option value="">Select subject...</option>
                                {SUBJECTS.map(s => <option key={s} value={s}>{s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">Resource Type <span className="req">*</span></label>
                            <select value={resourceType} onChange={(e) => setResourceType(e.target.value)} className="form-input">
                                {RESOURCE_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="form-label">Curriculum Alignment <span className="req">*</span></label>
                            <select value={curriculum} onChange={(e) => setCurriculum(e.target.value)} className="form-input">
                                {CURRICULUMS.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="form-label">Pages</label>
                            <input type="number" value={pages} onChange={(e) => setPages(e.target.value)} className="form-input" min="1" />
                        </div>
                        <div>
                            <label className="form-label">Pricing Tier</label>
                            <select value={pricingTier} onChange={(e) => setPricingTier(e.target.value)} className="form-input">
                                <option value="single">Single Paper</option>
                                <option value="bundle">Subject Bundle</option>
                                <option value="termly">Termly Set</option>
                                <option value="kjsea">KJSEA Package</option>
                                <option value="free">Free Resource</option>
                            </select>
                        </div>
                        <div className="flex items-center gap-4 pt-6">
                            <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                <input type="checkbox" checked={published} onChange={(e) => setPublished(e.target.checked)} /> Publish now
                            </label>
                        </div>
                    </div>

                    <div className="mb-4">
                        <label className="form-label">Description</label>
                        <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="form-input" rows="3" placeholder="Brief description of the resource..." />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="form-label">PDF File <span className="req">*</span></label>
                            <div className="drop-zone" onClick={() => fileInputRef.current?.click()}>
                                <div style={{ fontSize: '2rem', marginBottom: '8px' }}>📄</div>
                                <p style={{ fontSize: '0.9rem', color: '#6b7280' }}>Click or drag to upload PDF</p>
                                <p style={{ fontSize: '0.8rem', color: '#9ca3af' }}>Max size: 20 MB</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".pdf" className="hidden" />
                            </div>
                            {selectedFile && <div className="mt-2 p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-sm text-green-600 dark:text-green-400">✅ {selectedFile.name}</div>}
                        </div>
                        <div>
                            <label className="form-label">Cover Image</label>
                            <div className="drop-zone" onClick={() => coverInputRef.current?.click()}>
                                <div style={{ fontSize: '2rem', marginBottom: '8px' }}>🖼️</div>
                                <p style={{ fontSize: '0.9rem', color: '#6b7280' }}>Click to upload cover image</p>
                                <input type="file" ref={coverInputRef} onChange={handleCoverSelect} accept="image/*" className="hidden" />
                            </div>
                            {coverPreview && <img src={coverPreview} alt="Cover preview" className="cover-preview-img" />}
                        </div>
                    </div>

                    <div className="flex flex-wrap gap-4 mb-4">
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={kicdAligned} onChange={(e) => setKicdAligned(e.target.checked)} /> KICD Aligned
                        </label>
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={cbcCompliant} onChange={(e) => setCbcCompliant(e.target.checked)} /> CBC Compliant
                        </label>
                        <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                            <input type="checkbox" checked={teacherReviewed} onChange={(e) => setTeacherReviewed(e.target.checked)} /> Teacher Reviewed
                        </label>
                    </div>

                    {uploading && (
                        <div>
                            <div className="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
                                <span>Uploading...</span>
                                <span>{progress}%</span>
                            </div>
                            <div className="progress-track"><div id="uploadBar" style={{ width: progress + '%' }}></div></div>
                        </div>
                    )}

                    <button onClick={handleUpload} disabled={uploading} className="btn-gold" style={{ width: 'auto', marginTop: '8px' }}>
                        {uploading ? '⏳ Uploading...' : '⬆️ Upload Resource'}
                    </button>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // MAIN APP
        // ────────────────────────────────────────────────
        function App() {
            const { isLoggedIn, notification } = useTutor();

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-900">
                    {isLoggedIn ? <Dashboard /> : <LoginPage />}

                    {notification && (
                        <div className={`toast-notification show ${notification.type === 'error' ? 'error' : 'success'}`}>
                            <span>{notification.type === 'error' ? '❌' : '✅'}</span>
                            <span>{notification.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // RENDER
        // ────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <TutorProvider>
                <App />
            </TutorProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
