        // ── COMPRESS PDF FUNCTION ──
        function compressPDF(file, onProgress) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const arrayBuffer = e.target.result;
                        const originalSize = file.size;
                        
                        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                        const pageCount = pdfDoc.getPageCount();
                        const newPdf = await PDFLib.PDFDocument.create();
                        
                        for (let i = 0; i < pageCount; i++) {
                            const [page] = await newPdf.copyPages(pdfDoc, [i]);
                            newPdf.addPage(page);
                            if (onProgress) {
                                const progress = ((i + 1) / pageCount) * 100;
                                onProgress(progress, originalSize);
                            }
                        }
                        
                        const compressedBytes = await newPdf.save({
                            useObjectStreams: true,
                            addDefaultPage: false,
                            objectsPerTick: 50,
                        });
                        
                        const compressedSize = compressedBytes.length;
                        const compressionRatio = (1 - compressedSize / originalSize) * 100;
                        
                        if (onProgress) {
                            onProgress(100, originalSize, compressedSize);
                        }
                        
                        const compressedFile = new File(
                            [compressedBytes],
                            file.name,
                            { type: 'application/pdf' }
                        );
                        
                        compressedFile.compressionRatio = compressionRatio;
                        compressedFile.originalSize = originalSize;
                        compressedFile.compressedSize = compressedSize;
                        compressedFile.pageCount = pageCount;
                        
                        resolve(compressedFile);
                    } catch (error) {
                        console.error('PDF compression error:', error);
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // ── ORDERS MODULE ──
        function OrdersModule() {
            const { orders, loadOrders, showNotification, newOrderIds, setNewOrderIds, pendingOrderCount, setPendingOrderCount } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [revenueStats, setRevenueStats] = useState({
                totalRevenue: 0,
                pendingRevenue: 0,
                completedRevenue: 0,
                totalOrders: 0,
                pendingOrders: 0,
                completedOrders: 0            });

            const toggleOrderExpand = (orderId) => {
                setExpandedOrderId(expandedOrderId === orderId ? null : orderId);
            };

            const getOrderItems = (order) => {
                if (order.order_items && order.order_items.length > 0) {
                    return order.order_items;
                }
                if (order.item_title || order.resource_title) {
                    return [{
                        resource_title: order.item_title || order.resource_title || 'Resource',
                        resource_type: order.resource_type || 'Digital',
                        quantity: order.quantity || 1,
                        price: order.item_price || order.total_amount || 0,
                        resources: {
                            title: order.item_title || order.resource_title || 'Resource',
                            resource_type: order.resource_type || 'Digital'
                        }
                    }];
                }
                return [];
            };

            const getResourceTypeDisplay = (item) => {
                const type = item.resource_type || item.resources?.resource_type || 'digital';
                if (type === 'physical' || type === 'book') {
                    return '📖 Physical Book';
                }
                return '📄 Digital Download';
            };

            useEffect(() => {
                calculateRevenueStats();
            }, [orders]);

            const calculateRevenueStats = () => {
                const total = orders.reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
                const pending = orders
                    .filter(o => o.payment_status === 'pending' || o.status === 'pending')
                    .reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
                const completed = orders
                    .filter(o => o.payment_status === 'confirmed' || o.payment_status === 'paid' || o.payment_status === 'completed' || o.status === 'completed' || o.status === 'confirmed' || o.status === 'paid')
                    .reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
                const pendingCount = orders.filter(o => o.payment_status === 'pending' || o.status === 'pending').length;
                const completedCount = orders.filter(o => o.payment_status === 'confirmed' || o.payment_status === 'paid' || o.payment_status === 'completed' || o.status === 'completed' || o.status === 'confirmed' || o.status === 'paid').length;
                
                setRevenueStats({
                    totalRevenue: total,
                    pendingRevenue: pending,
                    completedRevenue: completed,
                    totalOrders: orders.length,
                    pendingOrders: pendingCount,
                    completedOrders: completedCount
                });
                setPendingOrderCount(pendingCount);
            };

            useEffect(() => {
                const interval = setInterval(() => loadOrders(), 10000);
                return () => clearInterval(interval);
            }, []);

            const getStatusBadge = (status) => {
                const map = {
                    'pending': 'pending',
                    'pending_verification': 'pending_verification',
                    'confirmed': 'confirmed',
                    'paid': 'paid',
                    'completed': 'paid',
                    'cancelled': 'rejected',
                    'rejected': 'rejected'
                };
                return map[status] || 'pending';
            };

            const getStatusLabel = (status) => {
                const map = {
                    'pending': '⏳ Pending',
                    'pending_verification': '⏳ Pending Approval',
                    'confirmed': '✅ Confirmed',
                    'paid': '✅ Paid',
                    'completed': '✅ Paid',
                    'cancelled': '❌ Cancelled',
                    'rejected': '❌ Rejected'
                };
                return map[status] || '⏳ Pending';
            };

            const isPending = (order) => order.payment_status === 'pending' || order.status === 'pending';
            const isCompleted = (order) => order.payment_status === 'confirmed' || order.payment_status === 'paid' || order.payment_status === 'completed' || order.status === 'completed' || order.status === 'confirmed' || order.status === 'paid';

            const handleConfirmOrder = async (order) => {
                const ref = order.payment_ref || order.order_ref || order.id.slice(0, 8).toUpperCase();
                if (!confirm(`Confirm order #${ref}?`)) return;
                setLoadingOrderId(order.id);
                try {
                    const updateData = { payment_status: 'confirmed', status: 'confirmed' };
                    let updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updateData)
                    });
                    if (!updateRes.ok && order.order_ref) {
                        updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?order_ref=eq.${order.order_ref}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(updateData)
                        });
                    }
                    if (!updateRes.ok) {
                        const errorText = await updateRes.text();
                        throw new Error(`Failed to update order: ${updateRes.status} - ${errorText}`);
                    }
                    showNotification('✅ Order confirmed!', 'success');
                    await loadOrders();
                    setNewOrderIds(prev => prev.filter(id => id !== order.id));
                } catch (e) {
                    console.error('Confirm error:', e);
                    showNotification('Error confirming order: ' + e.message, 'error');
                }
                setLoadingOrderId(null);
            };

            const handleRejectOrder = async (order) => {
                const ref = order.payment_ref || order.order_ref || order.id.slice(0, 8).toUpperCase();
                if (!confirm(`Reject order #${ref}?`)) return;
                try {
                    const updateData = { payment_status: 'rejected', status: 'rejected' };
                    let updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updateData)
                    });
                    if (!updateRes.ok && order.order_ref) {
                        updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?order_ref=eq.${order.order_ref}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(updateData)
                        });
                    }
                    if (!updateRes.ok) {
                        const errorText = await updateRes.text();
                        throw new Error(`Failed to reject order: ${updateRes.status} - ${errorText}`);
                    }
                    showNotification('❌ Order rejected', 'success');
                    await loadOrders();
                    setNewOrderIds(prev => prev.filter(id => id !== order.id));
                } catch (e) {
                    console.error('Reject error:', e);
                    showNotification('Error rejecting order: ' + e.message, 'error');
                }
            };

            const filteredOrders = orders.filter(o => {
                if (searchTerm) {
                    const search = searchTerm.toLowerCase();
                    const match = (o.order_ref || '').toLowerCase().includes(search) ||
                        (o.payment_ref || '').toLowerCase().includes(search) ||
                        (o.customer_name || '').toLowerCase().includes(search) ||
                        (o.customer_phone || '').includes(search) ||
                        (o.phone || '').includes(search) ||
                        (o.item_title || '').toLowerCase().includes(search) ||
                        (o.resource_title || '').toLowerCase().includes(search);
                    if (!match) return false;
                }
                if (filter === 'pending') return isPending(o);
                if (filter === 'confirmed') return o.payment_status === 'confirmed' || o.status === 'confirmed';
                if (filter === 'paid') return o.payment_status === 'paid' || o.payment_status === 'completed' || o.status === 'completed' || o.status === 'paid';
                if (filter === 'cancelled') return o.payment_status === 'cancelled' || o.payment_status === 'rejected' || o.status === 'cancelled' || o.status === 'rejected';
                return true;
            });

            return (
                <div className="fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</p>
                            <p className="text-2xl font-bold text-[#D4A017]">KES {revenueStats.totalRevenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{revenueStats.totalOrders} total orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Pending Revenue</p>
                            <p className="text-2xl font-bold text-amber-600">KES {revenueStats.pendingRevenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{revenueStats.pendingOrders} pending orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Completed Revenue</p>
                            <p className="text-2xl font-bold text-green-600">KES {revenueStats.completedRevenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{revenueStats.completedOrders} completed orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Platform Fee (20%)</p>
                            <p className="text-2xl font-bold text-purple-600">KES {Math.round(revenueStats.completedRevenue * 0.2).toLocaleString()}</p>
                            <p className="text-xs text-gray-400">80% goes to tutors</p>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">
                                📦 Orders ({orders.length})
                                {revenueStats.pendingOrders > 0 && (
                                    <span className="ml-2 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-full animate-pulse">
                                        {revenueStats.pendingOrders} pending approval
                                    </span>
                                )}
                            </h2>
                            <button onClick={() => loadOrders()} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition">
                                🔄 Refresh
                            </button>
                        </div>

                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>⏳ Pending</button>
                            <button onClick={() => setFilter('confirmed')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'confirmed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>✅ Confirmed</button>
                            <button onClick={() => setFilter('paid')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'paid' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>💳 Paid</button>
                            <button onClick={() => setFilter('cancelled')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'cancelled' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>❌ Cancelled/Rejected</button>
                        </div>

                        <div className="mb-4">
                            <input 
                                type="text" 
                                placeholder="🔍 Search by order ref, customer, phone, or resource..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#D4A017]"
                            />
                        </div>

                        {filteredOrders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">
                                {orders.length === 0 ? 'No orders found. Orders will appear here when customers make purchases.' : 'No orders match your filters.'}
                            </div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left">Reference</th>
                                            <th className="px-4 py-2 text-left">Customer</th>
                                            <th className="px-4 py-2 text-left">📱 Phone</th>
                                            <th className="px-4 py-2 text-left">Items</th>
                                            <th className="px-4 py-2 text-left">Total</th>
                                            <th className="px-4 py-2 text-left">Status</th>
                                            <th className="px-4 py-2 text-left">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.map(o => {
                                            const isNew = newOrderIds.includes(o.id);
                                            const pending = isPending(o);
                                            const ref = o.order_ref || o.payment_ref || o.id.slice(0, 8).toUpperCase();
                                            const orderItems = getOrderItems(o);
                                            const isExpanded = expandedOrderId === o.id;
                                            const customerPhone = o.customer_phone || o.phone || '—';

                                            return (
                                                <React.Fragment key={o.id}>
                                                    <tr className={`border-t border-gray-100 dark:border-gray-700 ${pending ? 'bg-amber-50 dark:bg-amber-900/10' : ''} ${isNew ? 'new-order-flash' : ''}`}>
                                                        <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{ref}</td>
                                                        <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                        <td className="px-4 py-2 text-gray-600 dark:text-gray-400 font-mono text-sm">
                                                            {customerPhone !== '—' ? (
                                                                <a href={`tel:${customerPhone}`} className="text-[#D4A017] hover:underline flex items-center gap-1">
                                                                    <i className="fas fa-phone text-xs"></i> {customerPhone}
                                                                </a>
                                                            ) : (
                                                                '—'
                                                            )}
                                                        </td>
                                                        <td className="px-4 py-2 text-gray-600 dark:text-gray-400">
                                                            <button 
                                                                onClick={() => toggleOrderExpand(o.id)} 
                                                                className="text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded-full hover:bg-blue-200 transition flex items-center gap-1"
                                                            >
                                                                <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-xs`}></i>
                                                                {isExpanded ? 'Hide Items' : `${orderItems.length} item${orderItems.length > 1 ? 's' : ''}`}
                                                            </button>
                                                        </td>
                                                        <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || o.item_price || 0}</td>
                                                        <td className="px-4 py-2">
                                                            <span className={`status-badge ${getStatusBadge(o.payment_status || o.status)}`}>
                                                                {getStatusLabel(o.payment_status || o.status)}
                                                            </span>
                                                            {isNew && <span className="ml-1 text-xs text-green-500 font-bold">NEW!</span>}
                                                            {o.mpesa_code && <div className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">M-PESA: {o.mpesa_code}</div>}
                                                        </td>
                                                        <td className="px-4 py-2">
                                                            <div className="flex gap-2 flex-wrap">
                                                                {pending && (
                                                                    <>
                                                                        <button 
                                                                            onClick={() => handleConfirmOrder(o)} 
                                                                            disabled={loadingOrderId === o.id}
                                                                            className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs hover:bg-green-200 transition disabled:opacity-50 flex items-center gap-1"
                                                                        >
                                                                            {loadingOrderId === o.id ? (
                                                                                <><span className="spinner"></span> Processing</>
                                                                            ) : (
                                                                                '✅ Confirm'
                                                                            )}
                                                                        </button>
                                                                        <button 
                                                                            onClick={() => handleRejectOrder(o)} 
                                                                            className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs hover:bg-red-200 transition"
                                                                        >
                                                                            ❌ Reject
                                                                        </button>
                                                                    </>
                                                                )}
                                                                {(o.payment_status === 'confirmed' || o.status === 'confirmed') && (
                                                                    <span className="text-xs text-green-600 dark:text-green-400">✅ Confirmed</span>
                                                                )}
                                                                {(o.payment_status === 'paid' || o.payment_status === 'completed') && (
                                                                    <span className="text-xs text-blue-600 dark:text-blue-400">💳 Paid</span>
                                                                )}
                                                                {(o.payment_status === 'cancelled' || o.payment_status === 'rejected') && (
                                                                    <span className="text-xs text-red-600 dark:text-red-400">✗ Cancelled</span>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>

                                                    {isExpanded && orderItems.length > 0 && (
                                                        <tr>
                                                            <td colSpan="7" className="px-4 py-3 bg-gray-50 dark:bg-gray-800/50">
                                                                <div className="space-y-2">
                                                                    <div className="text-xs font-semibold text-gray-600 dark:text-gray-400 mb-2">
                                                                        📦 Order Items
                                                                    </div>
                                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                                        {orderItems.map((item, idx) => {
                                                                            const title = item.resource_title || item.resources?.title || 'Resource';
                                                                            const type = getResourceTypeDisplay(item);
                                                                            const price = item.price || item.resources?.price || 0;
                                                                            const qty = item.quantity || 1;
                                                                            return (
                                                                                <div key={idx} className="bg-white dark:bg-gray-700 rounded-lg p-3 border border-gray-200 dark:border-gray-600 flex justify-between items-center">
                                                                                    <div className="flex-1 min-w-0">
                                                                                        <div className="font-medium text-sm text-gray-800 dark:text-white truncate">
                                                                                            {title}
                                                                                        </div>
                                                                                        <div className="flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400 mt-1">
                                                                                            <span className="flex items-center gap-1">
                                                                                                <i className="fas fa-tag text-[#D4A017]"></i>
                                                                                                {type}
                                                                                            </span>
                                                                                            <span>× {qty}</span>
                                                                                            <span className="font-semibold text-[#D4A017]">
                                                                                                KES {price}
                                                                                            </span>
                                                                                        </div>
                                                                                    </div>
                                                                                    {item.resource_type === 'physical' && (
                                                                                        <span className="text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded-full">📦 Physical</span>
                                                                                    )}
                                                                                </div>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                    <div className="text-xs text-gray-500 dark:text-gray-400 mt-2 pt-2 border-t border-gray-200 dark:border-gray-600 flex justify-end">
                                                                        Subtotal: <span className="font-semibold text-[#D4A017] ml-1">KES {orderItems.reduce((sum, item) => sum + (item.price || item.resources?.price || 0) * (item.quantity || 1), 0)}</span>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </React.Fragment>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── FINANCE MODULE ──
        function FinanceModule() {
            const { orders, tutors, payments, setPayments, showNotification, TUTOR_PAYOUT_PERCENTAGE, classes } = useApp();
            const [selectedTutor, setSelectedTutor] = useState(null);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [paymentAmount, setPaymentAmount] = useState(0);
            const [showAuditModal, setShowAuditModal] = useState(false);
            const [auditData, setAuditData] = useState({
                marketing_spent: 0,
                tutor_payouts_total: 0,
                notes: ''
            });
            const [auditLoading, setAuditLoading] = useState(false);
            const [financeSummary, setFinanceSummary] = useState({
                total_revenue: 0,
                platform_fee: 0,
                tutor_payouts: 0,
                marketing_spent: 0,
                actual_balance: 0,
                pending_payouts: 0
            });

            const loadPayments = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments?select=*&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setPayments(data || []);
                        return data;
                    }
                } catch (e) { console.error('Load payments error:', e); }
            };

            useEffect(() => {
                loadPayments();
            }, []);

            useEffect(() => {
                loadFinanceSummary();
            }, [orders, payments]);

            const loadFinanceSummary = async () => {
                try {
                    const savedAudit = localStorage.getItem('kv_finance_audit');
                    if (savedAudit) {
                        const parsed = JSON.parse(savedAudit);
                        setAuditData({
                            marketing_spent: parsed.marketing_spent || 0,
                            tutor_payouts_total: parsed.tutor_payouts_total || 0,
                            notes: parsed.notes || ''
                        });
                    }

                    const totalRevenue = Array.isArray(orders) ? orders.reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0) : 0;
                    const platformFee = totalRevenue * 0.2;
                    const tutorEarnings = totalRevenue * 0.8;

                    const pendingPayouts = Array.isArray(orders) ? orders
                        .filter(o => o.payment_status === 'confirmed' || o.payment_status === 'completed' || o.status === 'confirmed')
                        .reduce((sum, o) => sum + Math.round((o.total_amount || o.item_price || 0) * 0.8), 0) : 0;

                    const paidPayouts = Array.isArray(payments) ? payments
                        .filter(p => p.status === 'paid')
                        .reduce((sum, p) => sum + (p.amount || 0), 0) : 0;

                    const marketingSpent = auditData.marketing_spent || 0;
                    const tutorPayoutsTotal = auditData.tutor_payouts_total || paidPayouts;

                    const actualBalance = totalRevenue - marketingSpent - tutorPayoutsTotal;

                    setFinanceSummary({
                        total_revenue: totalRevenue,
                        platform_fee: platformFee,
                        tutor_payouts: tutorPayoutsTotal,
                        marketing_spent: marketingSpent,
                        actual_balance: actualBalance,
                        pending_payouts: pendingPayouts
                    });
                } catch (e) {
                    console.error('Error loading finance summary:', e);
                }
            };

            const calculateTutorEarnings = (tutorId) => {
                const tutorOrders = Array.isArray(orders) ? orders.filter(o => o.tutor_id === tutorId) : [];
                let totalRevenue = 0;
                let completedRevenue = 0;
                
                tutorOrders.forEach(o => {
                    const amount = o.total_amount || o.item_price || 0;
                    totalRevenue += amount;
                    if (o.payment_status === 'confirmed' || o.payment_status === 'completed' || o.status === 'confirmed') {
                        completedRevenue += amount;
                    }
                });
                
                const tutorPayout = totalRevenue * (TUTOR_PAYOUT_PERCENTAGE / 100);
                const completedPayout = completedRevenue * (TUTOR_PAYOUT_PERCENTAGE / 100);
                
                return {
                    totalRevenue,
                    completedRevenue,
                    tutorPayout,
                    completedPayout,
                    ordersCount: tutorOrders.length
                };
            };

            const getTutorPaymentStatus = (tutorId) => {
                const tutorPayments = Array.isArray(payments) ? payments.filter(p => p.tutor_id === tutorId) : [];
                const totalPaid = tutorPayments
                    .filter(p => p.status === 'paid')
                    .reduce((sum, p) => sum + (p.amount || 0), 0);
                const hasPending = tutorPayments.some(p => p.status === 'pending');
                return { totalPaid, hasPending };
            };

            const handleProcessPayment = async (tutor) => {
                const earnings = calculateTutorEarnings(tutor.id);
                const pendingAmount = earnings.completedPayout - getTutorPaymentStatus(tutor.id).totalPaid;
                
                if (pendingAmount <= 0) {
                    showNotification('⚠️ No pending earnings for this tutor', 'warning');
                    return;
                }
                
                setSelectedTutor(tutor);
                setPaymentAmount(pendingAmount);
                setShowPaymentModal(true);
            };

            const confirmPayment = async () => {
                if (!selectedTutor) return;
                
                try {
                    const paymentData = {
                        tutor_id: selectedTutor.id,
                        tutor_name: selectedTutor.name,
                        amount: paymentAmount,
                        status: 'paid',
                        payment_date: new Date().toISOString(),
                        created_at: new Date().toISOString()
                    };
                    
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(paymentData)
                    });
                    
                    if (response.ok) {
                        showNotification(`✅ Payment of KES ${paymentAmount.toLocaleString()} processed for ${selectedTutor.name}`, 'success');
                        setShowPaymentModal(false);
                        await loadPayments();
                        await loadFinanceSummary();
                    } else {
                        throw new Error('Failed to process payment');
                    }
                } catch (e) {
                    showNotification('❌ Failed to process payment: ' + e.message, 'error');
                }
            };

            const openAuditModal = () => {
                setAuditData({
                    marketing_spent: financeSummary.marketing_spent || 0,
                    tutor_payouts_total: financeSummary.tutor_payouts || 0,
                    notes: auditData.notes || ''
                });
                setShowAuditModal(true);
            };

            const saveAudit = async () => {
                if (!confirm('Save audit changes? This will update the account balance.')) return;
                
                setAuditLoading(true);
                try {
                    const marketingSpent = parseFloat(auditData.marketing_spent) || 0;
                    const tutorPayoutsTotal = parseFloat(auditData.tutor_payouts_total) || 0;
                    
                    const auditRecord = {
                        marketing_spent: marketingSpent,
                        tutor_payouts_total: tutorPayoutsTotal,
                        notes: auditData.notes || '',
                        updated_at: new Date().toISOString(),
                        updated_by: 'Admin'
                    };

                    localStorage.setItem('kv_finance_audit', JSON.stringify(auditRecord));
                    
                    const totalRevenue = Array.isArray(orders) ? orders.reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0) : 0;
                    const actualBalance = totalRevenue - marketingSpent - tutorPayoutsTotal;
                    
                    setFinanceSummary(prev => ({
                        ...prev,
                        marketing_spent: marketingSpent,
                        tutor_payouts: tutorPayoutsTotal,
                        actual_balance: actualBalance
                    }));

                    showNotification('✅ Audit saved successfully!', 'success');
                    setShowAuditModal(false);
                } catch (e) {
                    showNotification('❌ Failed to save audit: ' + e.message, 'error');
                }
                setAuditLoading(false);
            };

            const totalPayouts = Array.isArray(payments) ? payments
                .filter(p => p.status === 'paid')
                .reduce((s, p) => s + (p.amount || 0), 0) : 0;
            
            const pendingPayouts = Array.isArray(payments) ? payments
                .filter(p => p.status === 'pending')
                .reduce((s, p) => s + (p.amount || 0), 0) : 0;

            return (
                <div className="space-y-6 fade-in">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</p>
                            <p className="text-2xl font-bold text-[#D4A017]">KES {financeSummary.total_revenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{Array.isArray(orders) ? orders.length : 0} total orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Pending Payouts</p>
                            <p className="text-2xl font-bold text-amber-600">KES {financeSummary.pending_payouts.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">Awaiting tutor payment</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Amount Spent</p>
                            <p className="text-2xl font-bold text-red-600">KES {(financeSummary.marketing_spent + financeSummary.tutor_payouts).toLocaleString()}</p>
                            <p className="text-xs text-gray-400">Marketing + Tutor Payouts</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">💰 Actual Balance</p>
                            <p className="text-2xl font-bold text-green-600">KES {financeSummary.actual_balance.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">Revenue - Spending</p>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📊 Financial Breakdown</h3>
                            <button onClick={openAuditModal} className="btn-gold px-4 py-2 rounded-lg font-semibold text-sm">
                                🔍 Audit Account
                            </button>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-2">
                                <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                                    <span className="text-gray-600 dark:text-gray-400">Total Revenue</span>
                                    <span className="font-semibold text-[#D4A017]">KES {financeSummary.total_revenue.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                                    <span className="text-gray-600 dark:text-gray-400">Platform Fee (20%)</span>
                                    <span className="font-semibold text-blue-600">KES {financeSummary.platform_fee.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                                    <span className="text-gray-600 dark:text-gray-400">Tutor Payouts (80%)</span>
                                    <span className="font-semibold text-amber-600">KES {financeSummary.tutor_payouts.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                                    <span className="text-gray-600 dark:text-gray-400">Marketing Spent</span>
                                    <span className="font-semibold text-red-600">KES {financeSummary.marketing_spent.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                                    <span className="text-gray-600 dark:text-gray-400">Pending Payouts</span>
                                    <span className="font-semibold text-amber-600">KES {financeSummary.pending_payouts.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between py-2 bg-green-50 dark:bg-green-900/20 rounded-lg px-3 -mx-3">
                                    <span className="font-bold text-gray-800 dark:text-white">💰 Actual Balance</span>
                                    <span className="font-bold text-green-600">KES {financeSummary.actual_balance.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">🧑‍🏫 Tutor Payouts ({TUTOR_PAYOUT_PERCENTAGE}% of Revenue)</h3>
                            <span className="text-xs text-gray-500 dark:text-gray-400">80% to tutors · 20% to platform</span>
                        </div>
                        
                        {Array.isArray(tutors) && tutors.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No tutors available</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left">Tutor</th>
                                            <th className="px-4 py-2 text-left">Orders</th>
                                            <th className="px-4 py-2 text-left">Total Revenue</th>
                                            <th className="px-4 py-2 text-left">Payout (80%)</th>
                                            <th className="px-4 py-2 text-left">Paid</th>
                                            <th className="px-4 py-2 text-left">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(Array.isArray(tutors) ? tutors.filter(t => t.status === 'active' || t.status === 'approved') : []).map(tutor => {
                                            const earnings = calculateTutorEarnings(tutor.id);
                                            const { totalPaid, hasPending } = getTutorPaymentStatus(tutor.id);
                                            const pendingAmount = earnings.completedPayout - totalPaid;
                                            
                                            return (
                                                <tr key={tutor.id} className="border-t border-gray-100 dark:border-gray-700">
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">{tutor.name}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{earnings.ordersCount}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">KES {earnings.totalRevenue.toLocaleString()}</td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {earnings.tutorPayout.toLocaleString()}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">KES {totalPaid.toLocaleString()}</td>
                                                    <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                        {pendingAmount > 0 && (
                                                            <button 
                                                                onClick={() => handleProcessPayment(tutor)}
                                                                className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs hover:bg-green-200 transition"
                                                            >
                                                                💰 Pay KES {pendingAmount.toLocaleString()}
                                                            </button>
                                                        )}
                                                        {pendingAmount <= 0 && earnings.ordersCount > 0 && (
                                                            <span className="text-xs text-green-600 dark:text-green-400">✅ Fully Paid</span>
                                                        )}
                                                        {earnings.ordersCount === 0 && (
                                                            <span className="text-xs text-gray-400">No revenue yet</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📋 Payment History</h3>
                            <button onClick={() => { loadPayments(); loadFinanceSummary(); }} className="text-sm text-[#D4A017] hover:text-[#FCD34D] transition">
                                🔄 Refresh
                            </button>
                        </div>
                        
                        {Array.isArray(payments) && payments.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No payments recorded yet</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left">Tutor</th>
                                            <th className="px-4 py-2 text-left">Amount</th>
                                            <th className="px-4 py-2 text-left">Status</th>
                                            <th className="px-4 py-2 text-left">Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(Array.isArray(payments) ? payments.slice(0, 20) : []).map(p => (

                                            className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"

                                            <span className="font-semibold">KES {financeSummary.total_revenue.toLocaleString()}</span>
                                        </div>

                                            <span className="text-gray-600 dark:text-gray-400">Marketing Spent:</span>

        // ── UPDATES & NEWS MODULE ──
        function NewsModule() {
            const { newsItems, addNewsItem, updateNewsItem, deleteNewsItem, togglePinNews, showToast, loadNewsFromSupabase, newsLoading } = useApp();
            const [formData, setFormData] = useState({
                title: '',
                category: 'CBC News',
                audience: 'All',
                content: '',
                pinned: false,
            });
            const [editingId, setEditingId] = useState(null);
            const [editFormData, setEditFormData] = useState({
                title: '',
                category: 'CBC News',
                audience: 'All',
                content: '',
                pinned: false,
                status: 'Active'
            });
            const [showEditModal, setShowEditModal] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [loadError, setLoadError] = useState(null);

            const handleRefresh = async () => {
                setLoadError(null);
                try {
                    await loadNewsFromSupabase();
                    showToast('✅ News refreshed successfully!', 'success');
                } catch (e) {
                    setLoadError(e.message);
                    showToast('❌ Failed to refresh: ' + e.message, 'error');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { title, category, audience, content, pinned } = formData;
                if (!title || !content) {
                    showToast('⚠️ Please fill in Title and Content', 'error');
                    return;
                }
                setIsSubmitting(true);
                try {
                    const newItem = await addNewsItem({
                        title,
                        category,
                        audience,
                        content,
                        pinned,
                    });
                    showToast(`✅ "${newItem.title}" published successfully!`);
                    setFormData({ title: '', category: 'CBC News', audience: 'All', content: '', pinned: false });
                    await loadNewsFromSupabase();
                } catch (e) {
                    showToast('❌ Failed to publish: ' + e.message, 'error');
                }
                setIsSubmitting(false);
            };

            const openEditModal = (item) => {
                setEditingId(item.id);
                setEditFormData({
                    title: item.title,
                    category: item.category,
                    audience: item.audience,
                    content: item.content,
                    pinned: item.pinned,
                    status: item.status || 'Active'
                });
                setShowEditModal(true);
            };

            const closeEditModal = () => {
                setShowEditModal(false);
                setEditingId(null);
            };

            const handleEditSave = async () => {
                if (!editingId) return;
                const { title, category, audience, content, pinned, status } = editFormData;
                if (!title || !content) {
                    showToast('⚠️ Please fill in Title and Content', 'error');
                    return;
                }
                setIsSubmitting(true);
                try {
                    await updateNewsItem(editingId, {
                        title,
                        category,
                        audience,
                        content,
                        pinned,
                        status
                    });
                    showToast('✅ Update saved successfully!');
                    closeEditModal();
                    await loadNewsFromSupabase();
                } catch (e) {
                    showToast('❌ Failed to update: ' + e.message, 'error');
                }
                setIsSubmitting(false);
            };

            const handleDelete = async (id) => {
                if (!confirm('Delete this news item permanently?')) return;
                try {
                    await deleteNewsItem(id);
                    showToast('🗑️ News item deleted');
                    await loadNewsFromSupabase();
                } catch (e) {
                    showToast('❌ Failed to delete: ' + e.message, 'error');
                }
            };

            const handleTogglePin = async (id) => {
                try {
                    await togglePinNews(id);
                    await loadNewsFromSupabase();
                } catch (e) {
                    showToast('❌ Failed to update pin status: ' + e.message, 'error');
                }
            };

            const sortedNews = [...newsItems].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return new Date(b.date) - new Date(a.date);
            });

            const activeNews = sortedNews.filter(item => item.status !== 'Archived');

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-lg font-semibold text-gray-800 dark:text-white mb-4">📰 Publish New Update</h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title *</label>
                                <input 
                                    type="text" 
                                    value={formData.title} 
                                    onChange={(e) => setFormData({...formData, title: e.target.value})}
                                    className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    placeholder="e.g. KJSEA 2026 Registration Opens"
                                    required
                                />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
                                    <select 
                                        value={formData.category} 
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    >
                                        <option value="CBC News">CBC News</option>
                                        <option value="Exam Alerts">Exam Alerts</option>
                                        <option value="System Updates">System Updates</option>
                                        <option value="Maintenance">Maintenance</option>
                                        <option value="General">General</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Target Audience</label>
                                    <select 
                                        value={formData.audience} 
                                        onChange={(e) => setFormData({...formData, audience: e.target.value})}
                                        className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    >
                                        <option value="All">All</option>
                                        <option value="Teachers">Teachers</option>
                                        <option value="Students">Students</option>
                                        <option value="Parents">Parents</option>
                                        <option value="Admins">Admins</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Content *</label>
                                <textarea 
                                    value={formData.content} 
                                    onChange={(e) => setFormData({...formData, content: e.target.value})}
                                    className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    rows="4"
                                    placeholder="Write your news update here..."
                                    required
                                ></textarea>
                            </div>
                            <div className="flex items-center gap-4">
                                <label className="flex items-center gap-2 cursor-pointer">
                                    <input 
                                        type="checkbox" 
                                        checked={formData.pinned} 
                                        onChange={(e) => setFormData({...formData, pinned: e.target.checked})}
                                        className="w-4 h-4 accent-[#D4A017]"
                                    />
                                    <span className="text-sm text-gray-700 dark:text-gray-300">📌 Pin this post</span>
                                </label>
                                <button type="submit" disabled={isSubmitting} className="btn-gold px-6 py-2 rounded-lg font-semibold disabled:opacity-50">
                                    {isSubmitting ? '⏳ Publishing...' : '🚀 Publish'}
                                </button>
                            </div>
                        </form>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📋 Published Updates</h3>
                            <div className="flex items-center gap-2">
                                <span className="text-sm text-gray-500 dark:text-gray-400">{activeNews.length} items</span>
                                <button 
                                    onClick={handleRefresh} 
                                    className="text-sm text-[#D4A017] hover:text-[#FCD34D] transition flex items-center gap-1"
                                    disabled={newsLoading}
                                >
                                    {newsLoading ? '⏳' : '🔄'} Refresh
                                </button>
                            </div>
                        </div>
                        
                        {loadError && (
                            <div className="mb-4 p-3 bg-red-100 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-red-700 dark:text-red-400 text-sm">
                                ⚠️ Error loading news: {loadError}
                                <button onClick={handleRefresh} className="ml-2 underline">Try again</button>
                            </div>
                        )}
                        
                        {newsLoading ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">
                                <div className="inline-block animate-spin text-2xl mr-2">⏳</div>
                                Loading updates...
                            </div>
                        ) : activeNews.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">
                                📭 No updates published yet. Create your first news item!
                            </div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left">Title</th>
                                            <th className="px-4 py-2 text-left">Category</th>
                                            <th className="px-4 py-2 text-left">Audience</th>
                                            <th className="px-4 py-2 text-left">Date</th>
                                            <th className="px-4 py-2 text-left">Status</th>
                                            <th className="px-4 py-2 text-left">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {activeNews.map(item => (
                                            <tr key={item.id} className="border-t border-gray-100 dark:border-gray-700">
                                                <td className="px-4 py-2 font-medium text-gray-800 dark:text-white flex items-center gap-2">
                                                    {item.pinned && <span className="text-[#D4A017]">📌</span>}
                                                    {item.title}
                                                </td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">
                                                    <span className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full">{item.category}</span>
                                                </td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{item.audience}</td>
                                                <td className="px-4 py-2 text-gray-500 dark:text-gray-400">{item.date}</td>
                                                <td className="px-4 py-2">
                                                    <span className={`status-badge ${item.status === 'Active' ? 'live' : 'draft'}`}>
                                                        {item.status || 'Active'}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                    <button onClick={() => openEditModal(item)} className="px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded hover:bg-blue-200 transition">✏️ Edit</button>
                                                    <button onClick={() => handleTogglePin(item.id)} className="px-2 py-1 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded hover:bg-amber-200 transition">
                                                        {item.pinned ? '📌 Unpin' : '📌 Pin'}
                                                    </button>
                                                    <button onClick={() => handleDelete(item.id)} className="px-2 py-1 text-xs bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded hover:bg-red-200 transition">🗑️</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {/* Edit Modal */}
                    {showEditModal && (
                        <div className="modal-overlay open" onClick={closeEditModal}>

                                    <div>

                                            type="text" 
                                            value={editFormData.title}

                                            required

                                            <select

                                                onChange={(e) => setEditFormData({...editFormData, category: e.target.value})}

                                                <option value="Exam Alerts">Exam Alerts</option>
                                                <option value="System Updates">System Updates</option>
                                                <option value="Maintenance">Maintenance</option>
                                                <option value="General">General</option>

                                                onChange={(e) => setEditFormData({...editFormData, audience: e.target.value})}
                                                className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                            >
                                                <option value="All">All</option>
                                                <option value="Teachers">Teachers</option>
                                                <option value="Students">Students</option>
                                                <option value="Parents">Parents</option>
                                                <option value="Admins">Admins</option>
                                            </select>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Content *</label>
                                        <textarea 
                                            value={editFormData.content} 
                                            onChange={(e) => setEditFormData({...editFormData, content: e.target.value})}
                                            className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"

                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input 
                                                type="checkbox" 
                                                checked={editFormData.pinned} 
                                                onChange={(e) => setEditFormData({...editFormData, pinned: e.target.checked})}

                                        </label>
                                        <div>

                                            <select 
                                                value={editFormData.status}

                                                <option value="Archived">Archived</option>
