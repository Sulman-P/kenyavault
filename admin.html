<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background: #111827;
            color: #e5e7eb;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass-card {
            background: rgba(17, 24, 39, 0.7);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .kanban-column {
            min-height: 300px;
        }
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.active { background: #dbeafe; color: #1e40af; }
        .status-badge.completed { background: #d1fae5; color: #065f46; }
        .status-badge.rejected { background: #fee2e2; color: #991b1b; }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.active { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.completed { background: #064e3b; color: #34d399; }
        .dark .status-badge.rejected { background: #7f1d1d; color: #f87171; }
        .chat-bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .chat-bubble.user {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.ai {
            background: #e5e7eb;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .dark .chat-bubble.ai {
            background: #374151;
            color: #e5e7eb;
        }
        .notification-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext, useRef } = React;

        // ────────────────────────────────────────────────
        // CONTEXT: App State
        // ────────────────────────────────────────────────
        const AppContext = createContext(null);

        function AppProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => {
                return localStorage.getItem('kv-dark-mode') === 'true';
            });
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [currentModule, setCurrentModule] = useState('dashboard');
            const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
            const [notifications, setNotifications] = useState([
                { id: 1, title: 'New order received', time: '2 min ago', read: false },
                { id: 2, title: 'KJSEA 2026 resources updated', time: '1 hour ago', read: false },
                { id: 3, title: 'Tutor registration pending', time: '3 hours ago', read: true },
                { id: 4, title: 'Payment verification required', time: '5 hours ago', read: false },
            ]);

            useEffect(() => {
                localStorage.setItem('kv-dark-mode', darkMode);
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => {
                if (window.innerWidth < 1024) {
                    setMobileSidebarOpen(!mobileSidebarOpen);
                } else {
                    setSidebarOpen(!sidebarOpen);
                }
            };

            const markNotificationRead = (id) => {
                setNotifications(notifications.map(n => 
                    n.id === id ? { ...n, read: true } : n
                ));
            };

            const unreadCount = notifications.filter(n => !n.read).length;

            return (
                <AppContext.Provider value={{
                    darkMode, setDarkMode, toggleDarkMode,
                    sidebarOpen, setSidebarOpen,
                    mobileSidebarOpen, setMobileSidebarOpen,
                    currentModule, setCurrentModule,
                    notifications, setNotifications,
                    markNotificationRead, unreadCount,
                    toggleSidebar
                }}>
                    {children}
                </AppContext.Provider>
            );
        }

        function useApp() {
            const context = useContext(AppContext);
            if (!context) throw new Error('useApp must be used within AppProvider');
            return context;
        }

        // ────────────────────────────────────────────────
        // DATA
        // ────────────────────────────────────────────────
        const modules = [
            { id: 'dashboard', icon: '📊', label: 'Dashboard', color: 'text-blue-600' },
            { id: 'users', icon: '👥', label: 'User Management', color: 'text-indigo-600' },
            { id: 'projects', icon: '📋', label: 'Projects & Tasks', color: 'text-emerald-600' },
            { id: 'crm', icon: '🤝', label: 'CRM', color: 'text-purple-600' },
            { id: 'finance', icon: '💰', label: 'Finance & Billing', color: 'text-amber-600' },
            { id: 'hr', icon: '👨‍💼', label: 'HR Management', color: 'text-rose-600' },
            { id: 'analytics', icon: '📈', label: 'Reports & Analytics', color: 'text-cyan-600' },
            { id: 'support', icon: '🎫', label: 'Support Tickets', color: 'text-orange-600' },
            { id: 'inventory', icon: '📦', label: 'Inventory', color: 'text-teal-600' },
            { id: 'marketing', icon: '📣', label: 'Marketing', color: 'text-pink-600' },
            { id: 'knowledge', icon: '📚', label: 'Knowledge Base', color: 'text-sky-600' },
            { id: 'tools', icon: '🔧', label: 'System Tools', color: 'text-gray-600' },
            { id: 'settings', icon: '⚙️', label: 'Settings', color: 'text-slate-600' },
            { id: 'ai', icon: '🤖', label: 'AI Chat', color: 'text-violet-600' },
        ];

        const recentOrders = [
            { id: 'KV-2024001', customer: 'Jane Mwangi', resource: 'KJSEA Maths Paper', amount: 250, status: 'pending', date: '2024-01-15' },
            { id: 'KV-2024002', customer: 'Peter Kiprop', resource: 'Grade 7 Science Notes', amount: 100, status: 'completed', date: '2024-01-14' },
            { id: 'KV-2024003', customer: 'Sarah Ochieng', resource: 'Form 4 Biology Guide', amount: 150, status: 'active', date: '2024-01-14' },
            { id: 'KV-2024004', customer: 'James Otieno', resource: 'Financial Literacy Course', amount: 80, status: 'pending', date: '2024-01-13' },
            { id: 'KV-2024005', customer: 'Mary Wanjiru', resource: 'Grade 9 KJSEA Bundle', amount: 250, status: 'completed', date: '2024-01-13' },
        ];

        const recentTutors = [
            { id: 1, name: 'Dr. Grace Akinyi', subject: 'Mathematics', status: 'active', earnings: 4500 },
            { id: 2, name: 'Mr. David Ochieng', subject: 'English', status: 'pending', earnings: 0 },
            { id: 3, name: 'Ms. Faith Wanjiru', subject: 'Science', status: 'active', earnings: 2800 },
            { id: 4, name: 'Mr. Samuel Kiprop', subject: 'History', status: 'pending', earnings: 0 },
        ];

        const tasks = [
            { id: 1, title: 'Review KJSEA 2026 Papers', status: 'completed', priority: 'high', assignee: 'Admin' },
            { id: 2, title: 'Upload Grade 8 Resources', status: 'in-progress', priority: 'medium', assignee: 'Tutor' },
            { id: 3, title: 'Fix Payment Gateway Issue', status: 'todo', priority: 'high', assignee: 'Dev' },
            { id: 4, title: 'Update KICD Alignment', status: 'review', priority: 'low', assignee: 'Admin' },
            { id: 5, title: 'Create Monthly Report', status: 'done', priority: 'medium', assignee: 'Admin' },
        ];

        // ────────────────────────────────────────────────
        // COMPONENTS
        // ────────────────────────────────────────────────

        // ── Sidebar ──
        function Sidebar() {
            const { darkMode, sidebarOpen, mobileSidebarOpen, currentModule, setCurrentModule, toggleSidebar } = useApp();

            const isVisible = sidebarOpen || mobileSidebarOpen;

            return (
                <>
                    {/* Mobile overlay */}
                    {mobileSidebarOpen && (
                        <div 
                            className="fixed inset-0 bg-black/50 z-40 lg:hidden"
                            onClick={toggleSidebar}
                        />
                    )}
                    
                    <aside className={`
                        fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800
                        sidebar-transition
                        ${isVisible ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
                        lg:w-20 lg:hover:w-64 group
                        flex flex-col
                    `}>
                        {/* Logo */}
                        <div className="flex items-center gap-3 px-4 h-16 border-b border-gray-200 dark:border-gray-800 flex-shrink-0">
                            <div className="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                                KV
                            </div>
                            <span className={`
                                font-bold text-lg text-gray-800 dark:text-white whitespace-nowrap
                                transition-opacity duration-300
                                ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}
                            `}>
                                KenyaVault
                            </span>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 overflow-y-auto py-4 px-3">
                            {modules.map((mod) => (
                                <button
                                    key={mod.id}
                                    onClick={() => {
                                        setCurrentModule(mod.id);
                                        if (mobileSidebarOpen) toggleSidebar();
                                    }}
                                    className={`
                                        w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all
                                        ${currentModule === mod.id 
                                            ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' 
                                            : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}
                                    `}
                                >
                                    <span className="text-xl flex-shrink-0">{mod.icon}</span>
                                    <span className={`
                                        text-sm font-medium whitespace-nowrap
                                        transition-opacity duration-300
                                        ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}
                                    `}>
                                        {mod.label}
                                    </span>
                                    {mod.id === 'support' && (
                                        <span className="ml-auto bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">
                                            3
                                        </span>
                                    )}
                                    {mod.id === 'ai' && (
                                        <span className="ml-auto bg-violet-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full animate-pulse">
                                            NEW
                                        </span>
                                    )}
                                </button>
                            ))}
                        </nav>

                        {/* Footer */}
                        <div className="border-t border-gray-200 dark:border-gray-800 p-4 flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold text-sm">
                                    A
                                </div>
                                <div className={`
                                    transition-opacity duration-300
                                    ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}
                                `}>
                                    <p className="text-sm font-medium text-gray-800 dark:text-white">Admin</p>
                                    <p className="text-xs text-gray-500 dark:text-gray-400">admin@kenyavault.co.ke</p>
                                </div>
                            </div>
                        </div>
                    </aside>
                </>
            );
        }

        // ── Topbar ──
        function Topbar() {
            const { darkMode, toggleDarkMode, toggleSidebar, unreadCount, notifications, markNotificationRead } = useApp();
            const [showNotifications, setShowNotifications] = useState(false);

            return (
                <header className="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
                    <div className="flex items-center justify-between px-4 h-16">
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={toggleSidebar}
                                className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 lg:hidden"
                            >
                                <svg className="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                </svg>
                            </button>
                            <h1 className="text-lg font-semibold text-gray-800 dark:text-white hidden sm:block">
                                Welcome back, Admin 👋
                            </h1>
                        </div>

                        <div className="flex items-center gap-2">
                            {/* Search */}
                            <button className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 hidden md:block">
                                <svg className="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </button>

                            {/* Dark Mode */}
                            <button 
                                onClick={toggleDarkMode}
                                className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800"
                            >
                                {darkMode ? (
                                    <svg className="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clipRule="evenodd" />
                                    </svg>
                                ) : (
                                    <svg className="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                                    </svg>
                                )}
                            </button>

                            {/* Notifications */}
                            <div className="relative">
                                <button 
                                    onClick={() => setShowNotifications(!showNotifications)}
                                    className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 relative"
                                >
                                    <svg className="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                                    </svg>
                                    {unreadCount > 0 && (
                                        <span className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">
                                            {unreadCount}
                                        </span>
                                    )}
                                </button>
                                {showNotifications && (
                                    <div className="absolute right-0 mt-2 w-80 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden z-50 fade-in">
                                        <div className="p-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                                            <span className="font-semibold text-gray-800 dark:text-white">Notifications</span>
                                            <button className="text-xs text-emerald-600 dark:text-emerald-400 hover:underline">
                                                Mark all read
                                            </button>
                                        </div>
                                        <div className="max-h-80 overflow-y-auto">
                                            {notifications.map(n => (
                                                <div 
                                                    key={n.id}
                                                    onClick={() => markNotificationRead(n.id)}
                                                    className={`p-3 border-b border-gray-100 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 transition ${!n.read ? 'bg-emerald-50 dark:bg-emerald-900/20' : ''}`}
                                                >
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-sm font-medium text-gray-800 dark:text-white">{n.title}</span>
                                                        {!n.read && <span className="w-2 h-2 bg-emerald-500 rounded-full flex-shrink-0 mt-1"></span>}
                                                    </div>
                                                    <span className="text-xs text-gray-500 dark:text-gray-400">{n.time}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-2 text-center border-t border-gray-200 dark:border-gray-700">
                                            <button className="text-xs text-emerald-600 dark:text-emerald-400 hover:underline">
                                                View all notifications
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Profile */}
                            <button className="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold text-sm">
                                A
                            </button>
                        </div>
                    </div>
                </header>
            );
        }

        // ── Dashboard Module ──
        function DashboardModule() {
            return (
                <div className="space-y-6 fade-in">
                    {/* Stats */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[
                            { label: 'Total Resources', value: '1,284', change: '+12%', icon: '📚', color: 'bg-blue-50 dark:bg-blue-900/20 text-blue-600' },
                            { label: 'Total Orders', value: '847', change: '+8%', icon: '📦', color: 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600' },
                            { label: 'Revenue', value: 'KSh 42,850', change: '+15%', icon: '💰', color: 'bg-amber-50 dark:bg-amber-900/20 text-amber-600' },
                            { label: 'Active Tutors', value: '64', change: '+3', icon: '👨‍🏫', color: 'bg-purple-50 dark:bg-purple-900/20 text-purple-600' },
                        ].map((stat, i) => (
                            <div key={i} className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                                <div className="flex items-center justify-between">
                                    <div className={`w-10 h-10 rounded-lg ${stat.color} flex items-center justify-center text-xl`}>
                                        {stat.icon}
                                    </div>
                                    <span className="text-xs font-medium text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-2 py-0.5 rounded-full">
                                        {stat.change}
                                    </span>
                                </div>
                                <p className="text-2xl font-bold text-gray-800 dark:text-white mt-2">{stat.value}</p>
                                <p className="text-sm text-gray-500 dark:text-gray-400">{stat.label}</p>
                            </div>
                        ))}
                    </div>

                    {/* Charts & Recent Activity */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-semibold text-gray-800 dark:text-white">Revenue Overview</h3>
                                <select className="text-sm border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-1 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300">
                                    <option>This Week</option>
                                    <option>This Month</option>
                                    <option>This Year</option>
                                </select>
                            </div>
                            <div className="chart-container">
                                <canvas id="revenueChart"></canvas>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <h3 className="font-semibold text-gray-800 dark:text-white mb-4">Recent Orders</h3>
                            <div className="space-y-3">
                                {recentOrders.slice(0, 4).map(order => (
                                    <div key={order.id} className="flex items-center justify-between p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                                        <div>
                                            <p className="text-sm font-medium text-gray-800 dark:text-white">{order.resource}</p>
                                            <p className="text-xs text-gray-500 dark:text-gray-400">{order.customer}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm font-semibold text-gray-800 dark:text-white">KES {order.amount}</p>
                                            <span className={`status-badge ${order.status}`}>{order.status}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button className="w-full mt-3 text-center text-sm text-emerald-600 dark:text-emerald-400 hover:underline font-medium">
                                View all orders →
                            </button>
                        </div>
                    </div>

                    {/* Tutors & Tasks */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <h3 className="font-semibold text-gray-800 dark:text-white mb-4">Recent Tutors</h3>
                            <div className="space-y-3">
                                {recentTutors.map(tutor => (
                                    <div key={tutor.id} className="flex items-center justify-between p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 dark:text-emerald-400 font-semibold text-sm">
                                                {tutor.name.charAt(0)}
                                            </div>
                                            <div>
                                                <p className="text-sm font-medium text-gray-800 dark:text-white">{tutor.name}</p>
                                                <p className="text-xs text-gray-500 dark:text-gray-400">{tutor.subject}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className={`status-badge ${tutor.status}`}>{tutor.status}</span>
                                            {tutor.earnings > 0 && (
                                                <p className="text-xs font-medium text-gray-600 dark:text-gray-300 mt-1">KES {tutor.earnings}</p>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <h3 className="font-semibold text-gray-800 dark:text-white mb-4">Task Overview</h3>
                            <div className="space-y-2">
                                {tasks.map(task => (
                                    <div key={task.id} className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                                        <div className={`w-2 h-2 rounded-full ${task.status === 'completed' || task.status === 'done' ? 'bg-emerald-500' : task.status === 'in-progress' ? 'bg-blue-500' : task.status === 'review' ? 'bg-amber-500' : 'bg-gray-400'}`} />
                                        <span className="flex-1 text-sm text-gray-700 dark:text-gray-300">{task.title}</span>
                                        <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${task.priority === 'high' ? 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400' : task.priority === 'medium' ? 'bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400'}`}>
                                            {task.priority}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── AI Chat Module ──
        function AIChatModule() {
            const [messages, setMessages] = useState([
                { id: 1, text: "Hello! I'm KenyaVault AI Assistant. How can I help you today?", sender: 'ai', timestamp: new Date() }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                
                const userMsg = { id: Date.now(), text: input.trim(), sender: 'user', timestamp: new Date() };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsTyping(true);

                // Simulate AI response
                setTimeout(() => {
                    const responses = [
                        "I can help you with that! What specific information do you need?",
                        "Great question! Let me find the best resources for you.",
                        "Based on your query, I recommend checking our KJSEA 2026 resources.",
                        "I've analyzed your request. The KenyaVault platform has excellent materials for that.",
                        "Would you like me to connect you with a tutor for personalized help?"
                    ];
                    const aiMsg = { 
                        id: Date.now() + 1, 
                        text: responses[Math.floor(Math.random() * responses.length)], 
                        sender: 'ai', 
                        timestamp: new Date() 
                    };
                    setMessages(prev => [...prev, aiMsg]);
                    setIsTyping(false);
                }, 1200);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') handleSend();
            };

            const quickActions = [
                { label: '📚 Find Resources', action: 'Find resources for Grade 7 Mathematics' },
                { label: '💰 Check Revenue', action: 'What is my total revenue this month?' },
                { label: '👨‍🏫 Tutor Help', action: 'How do I become a tutor?' },
                { label: '📦 Order Status', action: 'Check my recent orders' },
            ];

            return (
                <div className="flex flex-col h-[calc(100vh-180px)] fade-in">
                    {/* Header */}
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 mb-4 flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-violet-100 dark:bg-violet-900/30 flex items-center justify-center text-2xl">
                            🤖
                        </div>
                        <div>
                            <h3 className="font-semibold text-gray-800 dark:text-white">AI Assistant</h3>
                            <p className="text-xs text-gray-500 dark:text-gray-400">Powered by KenyaVault AI • Online</p>
                        </div>
                        <span className="ml-auto text-xs text-emerald-600 dark:text-emerald-400 flex items-center gap-1">
                            <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                            Active
                        </span>
                    </div>

                    {/* Messages */}
                    <div className="flex-1 bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 overflow-y-auto mb-4 min-h-[300px]">
                        <div className="flex flex-col space-y-2">
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`chat-bubble ${msg.sender === 'user' ? 'user' : 'ai'}`}>
                                        {msg.text}
                                        <div className="text-[10px] opacity-60 mt-1">
                                            {msg.timestamp.toLocaleTimeString()}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="chat-bubble ai">
                                        <span className="flex gap-1">
                                            <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0s' }}></span>
                                            <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></span>
                                            <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></span>
                                        </span>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>
                    </div>

                    {/* Quick Actions */}
                    <div className="flex flex-wrap gap-2 mb-3">
                        {quickActions.map((action, i) => (
                            <button
                                key={i}
                                onClick={() => setInput(action.action)}
                                className="text-xs bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-3 py-1.5 rounded-full transition"
                            >
                                {action.label}
                            </button>
                        ))}
                    </div>

                    {/* Input */}
                    <div className="flex gap-2">
                        <input
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={handleKeyPress}
                            placeholder="Type your message..."
                            className="flex-1 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-violet-500 focus:border-transparent outline-none transition"
                        />
                        <button
                            onClick={handleSend}
                            className="px-6 py-3 bg-violet-600 hover:bg-violet-700 text-white rounded-xl font-medium transition flex items-center gap-2"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                            Send
                        </button>
                    </div>
                </div>
            );
        }

        // ── Placeholder Modules ──
        function PlaceholderModule({ title, icon, description }) {
            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex items-center gap-3 mb-4">
                            <span className="text-3xl">{icon}</span>
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">{title}</h2>
                        </div>
                        <p className="text-gray-600 dark:text-gray-400">{description}</p>
                        <div className="mt-6 p-4 bg-gray-50 dark:bg-gray-700/30 rounded-lg border border-dashed border-gray-300 dark:border-gray-600">
                            <p className="text-center text-gray-500 dark:text-gray-400 text-sm">
                                🚧 This module is under development. Coming soon!
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // ── Module Renderer ──
        function ModuleRenderer() {
            const { currentModule } = useApp();

            const moduleMap = {
                dashboard: <DashboardModule />,
                ai: <AIChatModule />,
                users: <PlaceholderModule title="User Management" icon="👥" description="Manage users, roles, and permissions across the platform." />,
                projects: <PlaceholderModule title="Projects & Tasks" icon="📋" description="Track projects, tasks, and team progress with Kanban boards." />,
                crm: <PlaceholderModule title="CRM" icon="🤝" description="Manage customer relationships, leads, and communications." />,
                finance: <PlaceholderModule title="Finance & Billing" icon="💰" description="Track revenue, invoices, and financial reports." />,
                hr: <PlaceholderModule title="HR Management" icon="👨‍💼" description="Manage employees, attendance, and payroll." />,
                analytics: <PlaceholderModule title="Reports & Analytics" icon="📈" description="View detailed reports and analytics dashboards." />,
                support: <PlaceholderModule title="Support Tickets" icon="🎫" description="Manage customer support tickets and inquiries." />,
                inventory: <PlaceholderModule title="Inventory" icon="📦" description="Track inventory, stock levels, and assets." />,
                marketing: <PlaceholderModule title="Marketing" icon="📣" description="Manage campaigns, email lists, and communications." />,
                knowledge: <PlaceholderModule title="Knowledge Base" icon="📚" description="Create and manage documentation and guides." />,
                tools: <PlaceholderModule title="System Tools" icon="🔧" description="Access system utilities and maintenance tools." />,
                settings: <PlaceholderModule title="Settings" icon="⚙️" description="Configure platform settings and preferences." />,
            };

            return moduleMap[currentModule] || <DashboardModule />;
        }

        // ────────────────────────────────────────────────
        // MAIN APP
        // ────────────────────────────────────────────────
        function App() {
            const { darkMode } = useApp();
            const chartRef = useRef(null);

            useEffect(() => {
                if (typeof Chart === 'undefined') return;
                
                const ctx = document.getElementById('revenueChart')?.getContext('2d');
                if (!ctx) return;

                // Destroy existing chart
                if (chartRef.current) {
                    chartRef.current.destroy();
                }

                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, 'rgba(16, 185, 129, 0.3)');
                gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');

                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                        datasets: [{
                            label: 'Revenue (KES)',
                            data: [12500, 9800, 15200, 11100, 18400, 10600, 14200],
                            borderColor: '#10b981',
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#10b981',
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false,
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: (value) => 'KES ' + value.toLocaleString(),
                                    color: darkMode ? '#9ca3af' : '#6b7280',
                                },
                                grid: {
                                    color: darkMode ? 'rgba(55, 65, 81, 0.3)' : 'rgba(209, 213, 219, 0.3)',
                                }
                            },
                            x: {
                                ticks: {
                                    color: darkMode ? '#9ca3af' : '#6b7280',
                                },
                                grid: {
                                    display: false,
                                }
                            }
                        }
                    }
                });
            }, [darkMode]);

            return (
                <div className="flex min-h-screen bg-gray-50 dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6">
                            <ModuleRenderer />
                        </main>
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // RENDER
        // ────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
