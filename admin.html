                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.product_title || o.resource || 'Resource'}</td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">KES {o.product_price || o.amount || 0}</td>
                                                <td className="px-4 py-2 font-mono font-bold text-blue-600 dark:text-blue-400">{o.mpesa_code || '-'}</td>
                                                <td className="px-4 py-2">
                                                    <span className={`status-badge ${
                                                        o.status === 'pending_verification' ? 'pending_verification' :
                                                        o.status === 'completed' || o.status === 'confirmed' ? 'confirmed' :
                                                        o.status === 'rejected' ? 'rejected' :
                                                        o.status || 'pending'
                                                    }`}>
                                                        {o.status === 'pending_verification' ? '⏳ Pending' :
                                                         o.status === 'confirmed' ? '✅ Confirmed' :
                                                         o.status === 'completed' ? '✅ Completed' :
                                                         o.status || 'Pending'}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                    {(o.status === 'pending' || o.status === 'pending_verification') && (
                                                        <>
                                                            <button onClick={() => updateOrderStatus(o.id, 'confirmed')} className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs">✅ Confirm & Send</button>
                                                            <button onClick={() => updateOrderStatus(o.id, 'rejected')} className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs">❌ Reject</button>
                                                        </>
                                                    )}
                                                    {o.status === 'confirmed' && (
                                                        <button onClick={() => sendWhatsAppNotification(o)} className="px-3 py-1 bg-[#25D366] text-white rounded-lg text-xs">📱 Resend WhatsApp</button>
                                                    )}
                                                    {o.status === 'completed' && <span className="text-xs text-green-600 dark:text-green-400">✓ Done</span>}
                                                    {o.status === 'rejected' && <span className="text-xs text-red-600 dark:text-red-400">✗ Rejected</span>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // MEGAPAY LOGS MODULE
        // ────────────────────────────────────────────────
        function MegaPayModule() {
            const { megapayLogs, showNotification, loadData } = useApp();
            const [filter, setFilter] = useState('all');
            const [selectedLog, setSelectedLog] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [processingPayout, setProcessingPayout] = useState(false);

            const filtered = megapayLogs.filter(l => {
                if (filter === 'success') return l.status === 'success';
                if (filter === 'failed') return l.status === 'failed';
                if (filter === 'pending') return l.status === 'pending';
                return true;
            });

            const processPayout = async (phone, amount) => {
                if (!confirm(`Process MegaPay B2C payout of KES ${amount} to ${phone}?`)) return;
                setProcessingPayout(true);
                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    showNotification(`✅ MegaPay B2C payout of KES ${amount} sent to ${phone}`, 'success');
                    const logData = {
                        event: 'b2c_payout',
                        phone: phone,
                        amount: amount,
                        status: 'processing',
                        reference: 'B2C-' + Date.now(),
                        created_at: new Date().toISOString(),
                        payload: { amount, phone, type: 'teacher_royalty' }
                    };
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/megapay_logs`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(logData)
                    });
                    loadData();
                } catch (e) {
                    showNotification('Payout failed: ' + e.message, 'error');
                }
                setProcessingPayout(false);
            };

            const manualConfirm = async (logId) => {
                if (!confirm('Manually confirm this transaction? This will unlock the resource for the customer.')) return;
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/megapay_logs?id=eq.${logId}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ status: 'success', manual_override: true, confirmed_at: new Date().toISOString() })
                    });
                    if (res.ok) {
                        showNotification('Transaction manually confirmed ✅', 'success');
                        loadData();
                    }
                } catch (e) {
                    showNotification('Error: ' + e.message, 'error');
                }
            };

            const viewLog = (log) => {
                setSelectedLog(log);
                setShowModal(true);
            };

            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">💳 MegaPay Logs</h2>
                            <div className="flex gap-2 flex-wrap">
                                <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                                <button onClick={() => setFilter('success')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'success' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Success</button>
                                <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Pending</button>
                                <button onClick={() => setFilter('failed')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'failed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Failed</button>
                            </div>
                        </div>

                        {filtered.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No MegaPay transactions found</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr><th className="px-4 py-2 text-left">Reference</th><th className="px-4 py-2 text-left">Phone</th><th className="px-4 py-2 text-left">Amount</th><th className="px-4 py-2 text-left">Status</th><th className="px-4 py-2 text-left">Date</th><th className="px-4 py-2 text-left">Actions</th></tr>
                                    </thead>
                                    <tbody>
                                        {filtered.map(log => (
                                            <tr key={log.id} className="border-t border-gray-100 dark:border-gray-700">
                                                <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">{log.reference || log.id.slice(0, 8).toUpperCase()}</td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{log.phone || 'N/A'}</td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">KES {log.amount || 0}</td>
                                                <td className="px-4 py-2"><span className={`status-badge ${log.status === 'success' ? 'completed' : log.status === 'pending' ? 'pending' : 'rejected'}`}>{log.status || 'pending'}</span></td>
                                                <td className="px-4 py-2 text-gray-500 dark:text-gray-400 text-xs">{new Date(log.created_at).toLocaleString()}</td>
                                                <td className="px-4 py-2 flex gap-2">
                                                    <button onClick={() => viewLog(log)} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs">👁️ View</button>
                                                    {log.status === 'pending' && (
                                                        <button onClick={() => manualConfirm(log.id)} className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs">✅ Confirm</button>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {/* Log Detail Modal */}
                    {showModal && selectedLog && (
                        <div className={`modal-overlay open`} onClick={() => setShowModal(false)}>
                            <div className="modal-box" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-800 dark:text-white">📋 Webhook Log Detail</h3>
                                    <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">✕</button>
                                </div>
                                <div className="space-y-3">
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Reference:</span> <span className="text-gray-800 dark:text-white">{selectedLog.reference || selectedLog.id}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Event:</span> <span className="text-gray-800 dark:text-white">{selectedLog.event || 'STK Push'}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Phone:</span> <span className="text-gray-800 dark:text-white">{selectedLog.phone || 'N/A'}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Amount:</span> <span className="text-gray-800 dark:text-white">KES {selectedLog.amount || 0}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Status:</span> <span className={`status-badge ${selectedLog.status === 'success' ? 'completed' : selectedLog.status === 'pending' ? 'pending' : 'rejected'}`}>{selectedLog.status || 'pending'}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Date:</span> <span className="text-gray-800 dark:text-white">{new Date(selectedLog.created_at).toLocaleString()}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Manual Override:</span> <span className="text-gray-800 dark:text-white">{selectedLog.manual_override ? '✅ Yes' : 'No'}</span></div>
                                    <div><span className="font-medium text-gray-600 dark:text-gray-400">Webhook Payload:</span></div>
                                    <div className="webhook-log">
                                        <div><span className="timestamp">[{new Date(selectedLog.created_at).toLocaleTimeString()}]</span> <span className="payload">WEBHOOK_RECEIVED</span></div>
                                        <div><span className="payload">{JSON.stringify(selectedLog.payload || { status: selectedLog.status, amount: selectedLog.amount, phone: selectedLog.phone }, null, 2)}</span></div>
                                        {selectedLog.status === 'success' && <div><span className="status-success">✅ Transaction Successful</span></div>}
                                        {selectedLog.status === 'failed' && <div><span className="status-error">❌ Transaction Failed</span></div>}
                                        {selectedLog.status === 'pending' && <div><span className="text-yellow-400">⏳ Transaction Pending</span></div>}
                                    </div>
                                    {selectedLog.status === 'pending' && (
                                        <button onClick={() => { manualConfirm(selectedLog.id); setShowModal(false); }} className="btn-gold px-4 py-2 rounded-lg font-semibold w-full">✅ Confirm Transaction</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // TUTORS MANAGEMENT MODULE
        // ────────────────────────────────────────────────
        function TutorsModule() {
            const { tutors, orders, showNotification, loadData } = useApp();
            const [filter, setFilter] = useState('all');
            const [selectedTutor, setSelectedTutor] = useState(null);
            const [showRoyaltyModal, setShowRoyaltyModal] = useState(false);
            const [processingPayout, setProcessingPayout] = useState(false);

            const updateTutorStatus = async (id, status) => {
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status, approved_at: status === 'approved' ? new Date().toISOString() : null })
                    });
                    if (res.ok) { showNotification(`Tutor ${status}`, 'success'); loadData(); }
                } catch (e) { showNotification('Error', 'error'); }
            };

            const deleteTutor = async (id) => {
                if (!confirm('Delete this tutor permanently?')) return;
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${id}`, {
                        method: 'DELETE',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (res.ok) { showNotification('Tutor deleted', 'success'); loadData(); }
                } catch (e) { showNotification('Error', 'error'); }
            };

            const processRoyaltyPayout = async (tutor) => {
                const earnings = orders
                    .filter(o => o.tutor_id === tutor.id && (o.status === 'completed' || o.status === 'paid'))
                    .reduce((s, o) => s + (o.tutor_share || 0), 0);
                
                if (earnings < 500) {
                    showNotification('Minimum payout is KES 500', 'error');
                    return;
                }

                if (!confirm(`Process MegaPay B2C payout of KES ${earnings} to ${tutor.phone || tutor.mpesa_number}?`)) return;
                setProcessingPayout(true);
                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    showNotification(`✅ MegaPay B2C payout of KES ${earnings} sent to ${tutor.name}`, 'success');
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutors?id=eq.${tutor.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            total_paid_out: (tutor.total_paid_out || 0) + earnings,
                            pending_earnings: 0
                        })
                    });
                    loadData();
                } catch (e) {
                    showNotification('Payout failed: ' + e.message, 'error');
                }
                setProcessingPayout(false);
            };

            const viewTutorRoyalties = (tutor) => {
                setSelectedTutor(tutor);
                setShowRoyaltyModal(true);
            };

            const filtered = tutors.filter(t => {
                if (filter === 'active') return t.status === 'active' || t.status === 'approved';
                if (filter === 'pending') return t.status === 'pending';
                if (filter === 'rejected') return t.status === 'rejected';
                return true;
            });

            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">👨‍🏫 Tutors ({tutors.length})</h2>
                            <div className="flex gap-2 flex-wrap">
                                <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                                <button onClick={() => setFilter('active')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'active' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Active</button>
                                <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Pending</button>
                            </div>
                        </div>
                        {filtered.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No tutors found</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr><th className="px-4 py-2 text-left">Name</th><th className="px-4 py-2 text-left">Email</th><th className="px-4 py-2 text-left">Phone</th><th className="px-4 py-2 text-left">Status</th><th className="px-4 py-2 text-left">Earnings</th><th className="px-4 py-2 text-left">Actions</th></tr>
                                    </thead>
                                    <tbody>
                                        {filtered.map(t => {
                                            const tutorEarnings = orders
                                                .filter(o => o.tutor_id === t.id && (o.status === 'completed' || o.status === 'paid'))
                                                .reduce((s, o) => s + (o.tutor_share || 0), 0);
                                            return (
                                                <tr key={t.id} className="border-t border-gray-100 dark:border-gray-700">
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">{t.name}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{t.email}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{t.phone || t.mpesa_number || 'N/A'}</td>
                                                    <td className="px-4 py-2"><span className={`status-badge ${t.status === 'active' || t.status === 'approved' ? 'active' : t.status === 'pending' ? 'pending' : 'rejected'}`}>{t.status || 'pending'}</span></td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {tutorEarnings.toLocaleString()}</td>
                                                    <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                        {(t.status === 'pending') && (
                                                            <>
                                                                <button onClick={() => updateTutorStatus(t.id, 'approved')} className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs">✅ Approve</button>
                                                                <button onClick={() => updateTutorStatus(t.id, 'rejected')} className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs">❌ Reject</button>
                                                            </>
                                                        )}
                                                        <button onClick={() => viewTutorRoyalties(t)} className="px-3 py-1 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-lg text-xs">💰 Royalties</button>
                                                        {tutorEarnings >= 500 && (t.status === 'active' || t.status === 'approved') && (
                                                            <button onClick={() => processRoyaltyPayout(t)} disabled={processingPayout} className="px-3 py-1 bg-[#D4A017] text-[#0a1a3a] rounded-lg text-xs font-semibold disabled:opacity-50">💳 Payout</button>
                                                        )}
                                                        <button onClick={() => deleteTutor(t.id)} className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs">Delete</button>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {/* Royalty Detail Modal */}
                    {showRoyaltyModal && selectedTutor && (
                        <div className={`modal-overlay open`} onClick={() => setShowRoyaltyModal(false)}>
                            <div className="modal-box" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-800 dark:text-white">💰 Royalties for {selectedTutor.name}</h3>
                                    <button onClick={() => setShowRoyaltyModal(false)} className="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">✕</button>
                                </div>
                                <div className="space-y-3">
                                    <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4">
                                        <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Total Completed Orders</span><span className="font-semibold">{orders.filter(o => o.tutor_id === selectedTutor.id && (o.status === 'completed' || o.status === 'paid')).length}</span></div>
                                        <div className="flex justify-between mt-2"><span className="text-gray-600 dark:text-gray-400">Total Earnings (80%)</span><span className="font-semibold text-[#D4A017]">KES {orders.filter(o => o.tutor_id === selectedTutor.id && (o.status === 'completed' || o.status === 'paid')).reduce((s, o) => s + (o.tutor_share || 0), 0).toLocaleString()}</span></div>
                                        <div className="flex justify-between mt-2"><span className="text-gray-600 dark:text-gray-400">Commission (20%)</span><span className="font-semibold">KES {orders.filter(o => o.tutor_id === selectedTutor.id && (o.status === 'completed' || o.status === 'paid')).reduce((s, o) => s + (o.product_price || o.amount || 0), 0) * 0.2}</span></div>
                                        <div className="flex justify-between mt-2 pt-2 border-t border-gray-200 dark:border-gray-600"><span className="font-semibold">Total Revenue</span><span className="font-semibold text-[#D4A017]">KES {orders.filter(o => o.tutor_id === selectedTutor.id && (o.status === 'completed' || o.status === 'paid')).reduce((s, o) => s + (o.product_price || o.amount || 0), 0).toLocaleString()}</span></div>
                                    </div>
                                    <div className="text-sm text-gray-600 dark:text-gray-400 bg-amber-50 dark:bg-amber-900/20 p-3 rounded-lg border border-amber-200 dark:border-amber-800">
                                        💡 Minimum payout is KES 500. Payouts are processed via MegaPay B2C to {selectedTutor.phone || selectedTutor.mpesa_number}
                                    </div>
                                    {orders.filter(o => o.tutor_id === selectedTutor.id && (o.status === 'completed' || o.status === 'paid')).reduce((s, o) => s + (o.tutor_share || 0), 0) >= 500 && (
                                        <button onClick={() => { processRoyaltyPayout(selectedTutor); setShowRoyaltyModal(false); }} disabled={processingPayout} className="btn-gold px-4 py-2 rounded-lg font-semibold w-full disabled:opacity-50">
                                            {processingPayout ? '⏳ Processing...' : '💳 Process MegaPay Payout'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // FINANCE MODULE
        // ────────────────────────────────────────────────
        function FinanceModule() {
            const { orders, tutors, megapayLogs } = useApp();
            const [filter, setFilter] = useState('all');

            const totalRevenue = orders.reduce((s, o) => s + (o.product_price || o.amount || 0), 0);
            const completedOrders = orders.filter(o => o.status === 'completed' || o.status === 'paid' || o.status === 'confirmed').length;
            const pendingOrders = orders.filter(o => o.status === 'pending' || o.status === 'pending_verification').length;
            const totalTutorEarnings = tutors.reduce((s, t) => s + (t.total_earnings || 0), 0);
            const totalPaidOut = tutors.reduce((s, t) => s + (t.total_paid_out || 0), 0);

            const filteredOrders = orders.filter(o => {
                if (filter === 'megapay') return o.payment_method === 'megapay' || o.megapay_ref;
                if (filter === 'international') return o.payment_method === 'stripe' || o.payment_method === 'paypal';
                if (filter === 'completed') return o.status === 'completed' || o.status === 'paid' || o.status === 'confirmed';
                if (filter === 'pending') return o.status === 'pending' || o.status === 'pending_verification';
                return true;
            });

            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">💰 Finance Dashboard</h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center"><p className="text-2xl font-bold text-[#D4A017]">KES {totalRevenue.toLocaleString()}</p><p className="text-sm text-gray-600 dark:text-gray-400">Total Revenue</p></div>
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center"><p className="text-2xl font-bold text-green-600">{completedOrders}</p><p className="text-sm text-gray-600 dark:text-gray-400">Completed Orders</p></div>
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center"><p className="text-2xl font-bold text-amber-600">{pendingOrders}</p><p className="text-sm text-gray-600 dark:text-gray-400">Pending Orders</p></div>
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center"><p className="text-2xl font-bold text-purple-600">KES {totalPaidOut.toLocaleString()}</p><p className="text-sm text-gray-600 dark:text-gray-400">Paid to Tutors</p></div>
                        </div>

                        <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 mb-4">
                            <h4 className="font-semibold text-gray-800 dark:text-white mb-2">📊 Reconciliation Ledger</h4>
                            <div className="flex gap-2 flex-wrap mb-3">
                                <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-xs ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300'}`}>All</button>
                                <button onClick={() => setFilter('megapay')} className={`px-3 py-1 rounded-lg text-xs ${filter === 'megapay' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300'}`}>MegaPay</button>
                                <button onClick={() => setFilter('international')} className={`px-3 py-1 rounded-lg text-xs ${filter === 'international' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300'}`}>International</button>
                                <button onClick={() => setFilter('completed')} className={`px-3 py-1 rounded-lg text-xs ${filter === 'completed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300'}`}>Completed</button>
                                <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-xs ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300'}`}>Pending</button>
                            </div>
                            <div className="overflow-x-auto max-h-64 overflow-y-auto">
                                <table className="w-full text-xs">
                                    <thead className="bg-gray-100 dark:bg-gray-600 sticky top-0">
                                        <tr><th className="px-3 py-2 text-left">Txn ID</th><th className="px-3 py-2 text-left">MegaPay Ref</th><th className="px-3 py-2 text-left">Customer</th><th className="px-3 py-2 text-left">Amount</th><th className="px-3 py-2 text-left">Tutor Share</th><th className="px-3 py-2 text-left">Status</th><th className="px-3 py-2 text-left">Payment</th></tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.slice(0, 20).map(o => (
                                            <tr key={o.id} className="border-t border-gray-200 dark:border-gray-600">
                                                <td className="px-3 py-2 text-gray-800 dark:text-white font-medium">#{o.ref || (o.id || '').slice(0, 6).toUpperCase()}</td>
                                                <td className="px-3 py-2 text-gray-600 dark:text-gray-400">{o.megapay_ref || '-'}</td>
                                                <td className="px-3 py-2 text-gray-600 dark:text-gray-400">{o.customer_phone || o.phone || 'N/A'}</td>
                                                <td className="px-3 py-2 text-gray-600 dark:text-gray-400">KES {o.product_price || o.amount || 0}</td>
                                                <td className="px-3 py-2 text-[#D4A017] font-semibold">KES {o.tutor_share || Math.round((o.product_price || o.amount || 0) * 0.8)}</td>
                                                <td className="px-3 py-2"><span className={`status-badge ${o.status === 'completed' || o.status === 'confirmed' ? 'completed' : o.status === 'pending' ? 'pending' : 'rejected'}`}>{o.status || 'pending'}</span></td>
                                                <td className="px-3 py-2"><span className="text-xs px-2 py-0.5 rounded-full bg-gray-200 dark:bg-gray-600">{o.payment_method || 'MegaPay'}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4">
                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">📊 Revenue Breakdown</h4>
                                <div className="space-y-2">
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">🏢 KenyaVault Resources</span><span className="font-semibold">KES {totalRevenue.toLocaleString()}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">👨‍🏫 Tutor Earnings (80%)</span><span className="font-semibold">KES {totalTutorEarnings.toLocaleString()}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">💳 Paid to Tutors</span><span className="font-semibold">KES {totalPaidOut.toLocaleString()}</span></div>
                                    <div className="flex justify-between border-t border-gray-200 dark:border-gray-600 pt-2"><span className="font-semibold">Net Platform Revenue</span><span className="font-semibold text-[#D4A017]">KES {(totalRevenue - totalTutorEarnings).toLocaleString()}</span></div>
                                </div>
                            </div>
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4">
                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">💳 MegaPay Summary</h4>
                                <div className="space-y-2">
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Total Transactions</span><span className="font-semibold">{megapayLogs.length}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Successful</span><span className="font-semibold text-green-600">{megapayLogs.filter(l => l.status === 'success').length}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Failed</span><span className="font-semibold text-red-600">{megapayLogs.filter(l => l.status === 'failed').length}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Pending</span><span className="font-semibold text-amber-600">{megapayLogs.filter(l => l.status === 'pending').length}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // AI CHAT MODULE
        // ────────────────────────────────────────────────
        function AIChatModule() {
            const [messages, setMessages] = useState([
                { id: 1, text: "Hello! I'm KenyaVault AI Assistant. I can help you with MegaPay transactions, tutor management, and platform analytics. What would you like to know?", sender: 'ai', timestamp: new Date() }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                const userMsg = { id: Date.now(), text: input.trim(), sender: 'user', timestamp: new Date() };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsTyping(true);
                setTimeout(() => {
                    const responses = [
                        "I can help you with MegaPay transactions! You can view all webhook logs in the MegaPay Logs section.",
                        "Tutor royalties are calculated at 80% of each sale. Payouts are processed via MegaPay B2C.",
                        "The reconciliation ledger shows all transactions with MegaPay reference IDs.",
                        "You can manually confirm pending transactions in the MegaPay Logs section.",
                        "Digital watermarking is automatically applied to PDFs upon successful payment confirmation.",
                        "International payments are routed through Stripe and PayPal for USD/GBP transactions.",
                        "You can edit resource prices and add discounts in the Resources section.",
                        "When you confirm an order, a WhatsApp notification is sent to the customer automatically."
                    ];
                    setMessages(prev => [...prev, { id: Date.now() + 1, text: responses[Math.floor(Math.random() * responses.length)], sender: 'ai', timestamp: new Date() }]);
                    setIsTyping(false);
                }, 1000 + Math.random() * 800);
            };

            return (
                <div className="flex flex-col h-[calc(100vh-200px)] fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 mb-4 flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-violet-100 dark:bg-violet-900/30 flex items-center justify-center text-2xl">🤖</div>
                        <div><h3 className="font-semibold text-gray-800 dark:text-white">AI Assistant</h3><p className="text-xs text-gray-500 dark:text-gray-400">MegaPay & Platform Support</p></div>
                        <span className="ml-auto text-xs text-[#D4A017] flex items-center gap-1"><span className="pulse-dot green"></span> Online</span>
                    </div>
                    <div className="flex-1 bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 overflow-y-auto mb-4">
                        <div className="flex flex-col space-y-2">
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`chat-bubble ${msg.sender === 'user' ? 'user' : 'ai'}`}>
                                        {msg.text}
                                        <div className="text-[10px] opacity-60 mt-1">{msg.timestamp.toLocaleTimeString()}</div>
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="flex justify-start"><div className="chat-bubble ai"><span className="flex gap-1"><span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0s' }}></span><span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></span><span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></span></span></div></div>}
                            <div ref={chatEndRef} />
                        </div>
                    </div>
                    <div className="flex gap-2">
                        <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()} placeholder="Ask about MegaPay, royalties, or platform management..." className="flex-1 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-[#D4A017] focus:border-transparent outline-none transition" />
                        <button onClick={handleSend} className="px-6 py-3 bg-[#D4A017] hover:bg-[#FCD34D] text-[#0a1a3a] rounded-xl font-medium transition">Send</button>
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // SETTINGS MODULE
        // ────────────────────────────────────────────────
        function SettingsModule() {
            const { showNotification } = useApp();
            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">⚙️ Settings</h2>
                        <div className="space-y-4">
                            <div className="p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">Payment Settings</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">MegaPay API Key</label><input type="password" value="••••••••••••••••" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" /></div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">MegaPay B2C Key</label><input type="password" value="••••••••••••••••" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" /></div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">Stripe Secret Key</label><input type="password" value="••••••••••••••••" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" /></div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">PayPal Client ID</label><input type="password" value="••••••••••••••••" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" /></div>
                                </div>
                                <button className="mt-3 btn-gold px-4 py-2 rounded-lg font-semibold">💾 Save Payment Settings</button>
                            </div>
                            <div className="p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">Commission Settings</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">Tutor Commission Rate</label><input type="number" value="80" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" />%</div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">Platform Fee</label><input type="number" value="20" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" />%</div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">Minimum Payout</label><input type="number" value="500" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" />KES</div>
                                </div>
                                <button className="mt-3 btn-gold px-4 py-2 rounded-lg font-semibold">💾 Save Commission Settings</button>
                            </div>
                            <div className="p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">Digital Rights Management (DRM)</h4>
                                <div className="space-y-2">
                                    <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300"><input type="checkbox" defaultChecked /> Auto-watermark PDFs with Transaction ID & Phone</label>
                                    <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300"><input type="checkbox" defaultChecked /> Prevent PDF Downloads without Payment</label>
                                    <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300"><input type="checkbox" defaultChecked /> Enable Watermark Overlay</label>
                                </div>
                                <button className="mt-3 btn-gold px-4 py-2 rounded-lg font-semibold">💾 Save DRM Settings</button>
                            </div>
                            <div className="p-4 bg-red-50 dark:bg-red-900/10 rounded-lg border border-red-200 dark:border-red-800">
                                <h4 className="font-semibold text-red-600 dark:text-red-400 mb-2">⚠️ Danger Zone</h4>
                                <button className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 transition">🗑️ Clear All Data</button>
                                <button className="ml-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">📥 Export Data</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // MODULE RENDERER
        // ────────────────────────────────────────────────
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                upload: <UploadResourceModule />,
                resources: <ResourcesModule />,
                orders: <OrdersModule />,
                megapay: <MegaPayModule />,
                tutors: <TutorsModule />,
                finance: <FinanceModule />,
                settings: <SettingsModule />,
                ai: <AIChatModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ────────────────────────────────────────────────
        // MAIN APP
        // ────────────────────────────────────────────────
        function App() {
            const { isAuthenticated, notification } = useApp();

            if (!isAuthenticated) return <LoginPage />;

            return (
                <div className="flex min-h-screen bg-white dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
                            <ModuleRenderer />
                        </main>
                    </div>
                    {notification && (
                        <div className={`fixed bottom-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg ${notification.type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white animate-fade-in`}>
                            {notification.msg}
                        </div>
                    )}
                </div>
            );
        }

        // ────────────────────────────────────────────────
        // RENDER
        // ────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
