<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useContext, createContext, useRef } = React;

        // ── SUPABASE CONFIG ──
        const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';
        const STORAGE_BUCKET = 'academic-resources';

        // ── SUPABASE CLIENT ──
        let sbClient = null;
        
        try {
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase client initialized');
            } else {
                console.warn('⚠️ Supabase library not loaded, waiting...');
                setTimeout(() => {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log('✅ Supabase client initialized (delayed)');
                    }
                }, 2000);
            }
        } catch (e) {
            console.error('❌ Error initializing Supabase:', e);
        }

        const ADMIN_CREDENTIALS = {
            username: 'adminnexalearn@gmail.com',
            password: 'KenyaVault2026'
        };

        const adminModules = [
            { id: 'dashboard', icon: '📊', label: 'Dashboard' },
            { id: 'resources', icon: '📚', label: 'Resources' },
            { id: 'tutors', icon: '🧑‍🏫', label: 'Tutors' },
            { id: 'classes', icon: '📹', label: 'Classes' },
            { id: 'orders', icon: '📦', label: 'Orders' },
            { id: 'finance', icon: '💰', label: 'Finance' },
        ];

        // ── CONTEXT ──
        const AppContext = createContext(null);

        function AppProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('kv-dark-mode') === 'true');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [currentModule, setCurrentModule] = useState('dashboard');
            const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('kv-auth') === 'true');
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [loading, setLoading] = useState(true);
            const [tutors, setTutors] = useState([]);
            const [orders, setOrders] = useState([]);
            const [resources, setResources] = useState([]);
            const [classes, setClasses] = useState([]);
            const [toast, setToast] = useState(null);
            const [newOrderIds, setNewOrderIds] = useState([]);
            const [chartRange, setChartRange] = useState('daily');
            const [orderBadgeCount, setOrderBadgeCount] = useState(0);
            const [hasNotifiedOrders, setHasNotifiedOrders] = useState({});

            useEffect(() => {
                localStorage.setItem('kv-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            const getSupabaseClient = () => {
                if (sbClient) return sbClient;
                try {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log('✅ Supabase client re-initialized');
                        return sbClient;
                    }
                } catch (e) {
                    console.error('❌ Failed to re-initialize Supabase:', e);
                }
                return null;
            };

            useEffect(() => {
                if (isAuthenticated) {
                    loadAllData();
                    setupRealtimeSubscription();
                    startPolling();
                }
                return () => {
                    stopPolling();
                    if (window._realtimeChannel) {
                        try {
                            window._realtimeChannel.unsubscribe();
                        } catch (e) {
                            console.error('Unsubscribe error:', e);
                        }
                        window._realtimeChannel = null;
                    }
                };
            }, [isAuthenticated]);

            const setupRealtimeSubscription = () => {
                const client = getSupabaseClient();
                if (!client) {
                    console.warn('⚠️ Supabase client not available for realtime subscription');
                    return;
                }

                try {
                    if (window._realtimeChannel) {
                        window._realtimeChannel.unsubscribe();
                        window._realtimeChannel = null;
                    }

                    const channel = client
                        .channel('orders-live')
                        .on(
                            'postgres_changes',
                            { event: 'INSERT', schema: 'public', table: 'orders' },
                            (payload) => {
                                const newOrder = payload.new;
                                if (newOrder) {
                                    console.log('🆕 New order received via realtime:', newOrder);
                                    // Add to orders list
                                    setOrders(prev => [newOrder, ...prev]);
                                    // Track new order ID
                                    setNewOrderIds(prev => {
                                        const updated = [newOrder.id, ...prev];
                                        return [...new Set(updated)].slice(0, 50);
                                    });
                                    // Update badge
                                    setOrderBadgeCount(prev => prev + 1);
                                    // Show toast notification
                                    showToast(
                                        '🆕 New Order!',
                                        `Order #${newOrder.payment_ref || newOrder.id.slice(0, 8).toUpperCase()} - ${newOrder.customer_name || 'Customer'}`
                                    );
                                }
                            }
                        )
                        .subscribe((status) => {
                            console.log('📡 Realtime subscription status:', status);
                            if (status === 'SUBSCRIBED') {
                                console.log('✅ Realtime subscription active');
                            } else if (status === 'CHANNEL_ERROR') {
                                console.warn('⚠️ Realtime subscription error, will retry...');
                                setTimeout(() => {
                                    setupRealtimeSubscription();
                                }, 5000);
                            }
                        });

                    window._realtimeChannel = channel;
                } catch (e) {
                    console.error('❌ Error setting up realtime subscription:', e);
                }
            };

            const startPolling = () => {
                if (window._pollingInterval) {
                    clearInterval(window._pollingInterval);
                    window._pollingInterval = null;
                }
                
                const interval = setInterval(() => {
                    checkNewOrders();
                }, 5000);
                window._pollingInterval = interval;
                setTimeout(() => checkNewOrders(), 1000);
            };

            const stopPolling = () => {
                if (window._pollingInterval) {
                    clearInterval(window._pollingInterval);
                    window._pollingInterval = null;
                }
            };

            const checkNewOrders = async () => {
                const client = getSupabaseClient();
                if (!client) {
                    return;
                }

                try {
                    const { data, error } = await client
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(30);
                    
                    if (error) {
                        console.error('❌ Polling error:', error);
                        return;
                    }
                    
                    if (data && data.length > 0) {
                        // Get all current order IDs from the orders list
                        const currentOrderIds = orders.map(o => o.id);
                        
                        // Find new orders that are in the database but not in our current list
                        const newOrders = data.filter(o => !currentOrderIds.includes(o.id));
                        
                        if (newOrders.length > 0) {
                            // Update orders list with new orders at top
                            setOrders(prev => {
                                const existingIds = prev.map(o => o.id);
                                const filteredNew = newOrders.filter(o => !existingIds.includes(o.id));
                                return [...filteredNew, ...prev];
                            });
                            
                            // Update new order IDs for tracking (only if not already notified)
                            setNewOrderIds(prev => {
                                const newIds = newOrders.map(o => o.id);
                                // Filter out IDs we've already notified about
                                const uniqueNewIds = newIds.filter(id => !hasNotifiedOrders[id]);
                                const updated = [...uniqueNewIds, ...prev];
                                return [...new Set(updated)].slice(0, 50);
                            });
                            
                            // Update badge count with total pending orders
                            const pending = data.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                            setOrderBadgeCount(pending);
                            
                            // Show notifications for each new order (only once)
                            newOrders.forEach(order => {
                                // Check if we've already notified about this order
                                if (!hasNotifiedOrders[order.id]) {
                                    // Mark as notified
                                    setHasNotifiedOrders(prev => ({ ...prev, [order.id]: true }));
                                    
                                    showToast(
                                        '🆕 New Order!',
                                        `Order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()} - ${order.customer_name || 'Customer'}`
                                    );
                                }
                            });
                            
                            // Clean up old notification tracking (keep last 100)
                            const orderIds = data.map(o => o.id);
                            setHasNotifiedOrders(prev => {
                                const cleaned = {};
                                Object.keys(prev).forEach(key => {
                                    if (orderIds.includes(key)) {
                                        cleaned[key] = prev[key];
                                    }
                                });
                                return cleaned;
                            });
                        }
                    }
                } catch (e) {
                    console.error('❌ Check new orders error:', e);
                }
            };

            const showToast = (title, message) => {
                setToast({ title, message, id: Date.now() });
                setTimeout(() => setToast(null), 6000);
            };

            const loadOrders = async () => {
                const client = getSupabaseClient();
                if (!client) {
                    console.warn('⚠️ Supabase client not available for loading orders');
                    setOrders([]);
                    return;
                }

                try {
                    const { data, error } = await client
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (!error && data) {
                        setOrders(data || []);
                        const pending = data.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                        setOrderBadgeCount(pending);
                    } else {
                        setOrders([]);
                    }
                } catch (e) {
                    console.error('Load orders error:', e);
                    setOrders([]);
                }
            };

            const loadAllData = async () => {
                const client = getSupabaseClient();
                if (!client) {
                    console.warn('⚠️ Supabase client not available for loading data');
                    setLoading(false);
                    return;
                }

                setLoading(true);
                try {
                    const { data: ordersData, error: ordersError } = await client
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (!ordersError && ordersData) {
                        setOrders(ordersData);
                        const pending = ordersData.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                        setOrderBadgeCount(pending);
                    }

                    const { data: resourcesData, error: resourcesError } = await client
                        .from('resources')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (!resourcesError && resourcesData) {
                        setResources(resourcesData);
                    }

                    const { data: tutorsData, error: tutorsError } = await client
                        .from('tutors')
                        .select('*');
                    
                    if (!tutorsError && tutorsData) {
                        setTutors(tutorsData);
                    }

                    const { data: classesData, error: classesError } = await client
                        .from('classes')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (!classesError && classesData) {
                        setClasses(classesData);
                    }
                } catch (e) { 
                    console.error('Load error:', e);
                }
                setLoading(false);
            };

            const login = (username, password) => {
                setAuthLoading(true);
                setAuthError('');
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                            sessionStorage.setItem('kv-auth', 'true');
                            sessionStorage.setItem('kv-user', username);
                            setIsAuthenticated(true);
                            setAuthLoading(false);
                            resolve(true);
                        } else {
                            setAuthError('Invalid username or password.');
                            setAuthLoading(false);
                            reject(new Error('Invalid credentials'));
                        }
                    }, 800);
                });
            };

            const logout = () => {
                stopPolling();
                if (window._realtimeChannel) {
                    try {
                        window._realtimeChannel.unsubscribe();
                    } catch (e) {
                        console.error('Unsubscribe error:', e);
                    }
                    window._realtimeChannel = null;
                }
                sessionStorage.removeItem('kv-auth');
                sessionStorage.removeItem('kv-user');
                setIsAuthenticated(false);
                setCurrentModule('dashboard');
                window.location.href = '/index.html';
            };

            const toggleSidebar = () => {
                if (window.innerWidth < 1024) setMobileSidebarOpen(!mobileSidebarOpen);
                else setSidebarOpen(!sidebarOpen);
            };

            const showNotification = (msg, type = 'success') => {
                showToast(type === 'success' ? '✅ Success' : '❌ Error', msg);
            };

            const generateSignedUrl = async (filePath) => {
                const client = getSupabaseClient();
                if (!client) {
                    console.warn('⚠️ Supabase client not available for signed URL');
                    return null;
                }

                try {
                    if (!filePath) return null;
                    
                    let cleanPath = filePath;
                    cleanPath = cleanPath.replace(/^academic-resources\//, '');
                    cleanPath = cleanPath.replace(/^resources\//, '');
                    cleanPath = cleanPath.replace(/^\/+/, '');
                    cleanPath = decodeURIComponent(cleanPath);
                    
                    const { data, error } = await client
                        .storage
                        .from(STORAGE_BUCKET)
                        .createSignedUrl(cleanPath, 604800);
                    
                    if (error) {
                        console.error('Signed URL error:', error);
                        return null;
                    }
                    
                    return data?.signedUrl || null;
                } catch (e) {
                    console.error('Error generating signed URL:', e);
                    return null;
                }
            };

            const sendWhatsApp = async (order) => {
                const client = getSupabaseClient();
                if (!client) {
                    showNotification('❌ Supabase client not available', 'error');
                    return;
                }

                try {
                    const { data: items, error: itemsError } = await client
                        .from('order_items')
                        .select('*')
                        .eq('order_id', order.id);
                    
                    if (itemsError) {
                        console.error('Items error:', itemsError);
                    }
                    
                    const orderItems = items || [];
                    const itemsWithUrls = [];
                    
                    for (const item of orderItems) {
                        let downloadUrl = null;
                        let filePath = item.resource_path || '';
                        
                        if (filePath) {
                            const signedUrl = await generateSignedUrl(filePath);
                            if (signedUrl) downloadUrl = signedUrl;
                        }
                        
                        if (!downloadUrl) {
                            const { data: resourcesData, error: resourcesError } = await client
                                .from('resources')
                                .select('*')
                                .eq('title', item.resource_title)
                                .limit(1);
                            
                            if (!resourcesError && resourcesData && resourcesData.length > 0 && resourcesData[0].file_url) {
                                const signedUrl = await generateSignedUrl(resourcesData[0].file_url);
                                if (signedUrl) downloadUrl = signedUrl;
                            }
                        }
                        
                        itemsWithUrls.push({ ...item, downloadUrl });
                    }

                    const ref = order.payment_ref || order.id.slice(0, 8).toUpperCase();
                    let message = `✅ *Your KenyaVault Order is Ready!*\n\n`;
                    message += `Order #: *${ref}*\n\n`;
                    message += `Amount: *KES ${order.total_amount || 0}*\n\n`;
                    message += `📥 *Download Links:*\n`;
                    
                    let hasLinks = false;
                    itemsWithUrls.forEach((item, idx) => {
                        if (item.downloadUrl) {
                            message += `\n${idx + 1}. ${item.resource_title}:\n${item.downloadUrl}\n`;
                            hasLinks = true;
                        }
                    });
                    
                    if (!hasLinks) {
                        message += `\n⚠️ Your download links are being prepared. You will receive them shortly.\n`;
                        message += `Please contact support if you don't receive them within 5 minutes.\n`;
                    }
                    
                    message += `\n🔒 *Valid for 7 days.*\n\n`;
                    message += `Thank you for choosing KenyaVault! 📚\n`;

                    const phone = order.customer_phone || '254700000000';
                    const formattedPhone = phone.replace(/^0/, '254').replace(/^\+/, '');
                    const whatsappUrl = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
                    
                    window.open(whatsappUrl, '_blank', 'width=400,height=600');
                    showNotification('📱 WhatsApp opened with download links!', 'success');
                    
                    await client
                        .from('orders')
                        .update({ payment_status: 'confirmed', confirmed_at: new Date().toISOString() })
                        .eq('id', order.id);
                    
                    await loadOrders();
                    
                } catch (e) {
                    console.error('WhatsApp error:', e);
                    showNotification('Error sending WhatsApp: ' + e.message, 'error');
                }
            };

            return (
                <AppContext.Provider value={{
                    darkMode, setDarkMode,
                    sidebarOpen, setSidebarOpen,
                    mobileSidebarOpen, setMobileSidebarOpen,
                    currentModule, setCurrentModule,
                    isAuthenticated,
                    authLoading, authError,
                    login, logout,
                    loading,
                    tutors, setTutors,
                    orders, setOrders,
                    resources, setResources,
                    classes, setClasses,
                    toast, showToast: showNotification,
                    toggleSidebar,
                    loadAllData,
                    loadOrders,
                    newOrderIds, setNewOrderIds,
                    chartRange, setChartRange,
                    orderBadgeCount,
                    sendWhatsApp,
                    generateSignedUrl,
                    getSupabaseClient,
                    hasNotifiedOrders, setHasNotifiedOrders
                }}>
                    {children}
                </AppContext.Provider>
            );
        }

            const { orders, resources, tutors, classes, chartRange, setChartRange } = useApp();

            const stats = useMemo(() => {
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                const pendingOrders = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                const paidOrders = orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed').length;
                const activeResources = resources.filter(r => r.status === 'live').length;
                return { totalRevenue, pendingOrders, paidOrders, activeResources, totalOrders: orders.length };
            }, [orders, resources]);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                    chartInstance.current = null;
                }

                const ctx = chartRef.current?.getContext('2d');
                if (!ctx) return;

                const days = chartRange === 'daily' ? 7 : chartRange === 'weekly' ? 30 : 90;
                const labels = [];
                const data = [];

                for (let i = days - 1; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const label = chartRange === 'daily' 
                        ? d.toLocaleDateString('en', { weekday: 'short' })
                        : d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
                    labels.push(label);

                    const dailyTotal = orders
                        .filter(o => {
                            const od = new Date(o.created_at);
                            return od.toDateString() === d.toDateString() && 
                                   (o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed');
                        })
                        .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                    data.push(dailyTotal);
                }

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Revenue (KES)',
                            data: data,
                            borderColor: '#D4A017',
                            backgroundColor: 'rgba(212, 160, 23, 0.1)',
                            fill: true,
                            tension: 0.3,
                            borderWidth: 3,
                            pointBackgroundColor: '#D4A017',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 4

                        maintainAspectRatio: false,
                        plugins: {

                                callbacks: {

                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return 'KES ' + value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };

            return (
                <div className="fade-in space-y-6">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

                        <div className="stat-card bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Total Orders</div>

                        </div>
                        <div className="stat-card bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Active Resources</div>
                            <div className="text-2xl font-bold text-gray-800 dark:text-white">{stats.activeResources}</div>

                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">

                        <h3 className="text-lg font-semibold text-gray-800 dark:text-white mb-4">📋 Recent Orders</h3>

                                                <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                <td className="px-4 py-2">
                                                    <span className={`status-badge ${o.payment_status || 'pending'}`}>
                                                        {o.payment_status === 'pending_verification' ? '⏳ Pending' :
                                                         o.payment_status === 'paid' || o.payment_status === 'confirmed' ? '✅ Paid' :

                                                         o.payment_status === 'cancelled' ? '❌ Cancelled' :
                                                         'Pending'}

                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function ResourcesModule() {
            const { resources, setResources, showToast, getSupabaseClient } = useApp();
            const [uploading, setUploading] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);
            const [editingResource, setEditingResource] = useState(null);
            const [editFormData, setEditFormData] = useState({ title: '', price: 0, status: 'draft' });
            const [showEditModal, setShowEditModal] = useState(false);
            const [formData, setFormData] = useState({
                title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: ''
            });

            const loadResources = async () => {
                const client = getSupabaseClient();
                if (!client) {
                    setResources([]);
                    return;
                }
                try {
                    const { data, error } = await client
                        .from('resources')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!error && data) setResources(data || []);
                    else setResources([]);
                } catch (e) {
                    console.error('Load resources error:', e);
                    setResources([]);
                }
            };

            useEffect(() => { loadResources(); }, []);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) setSelectedFile(file);
            };

            const handleUpload = async (e) => {
                e.preventDefault();

        // ── CLASSES MODULE ──
        function ClassesModule() {
            const { classes, setClasses, tutors, showToast, getSupabaseClient } = useApp();
            const [formData, setFormData] = useState({
                title: '', level: '', tutor_id: '', price_per_learner: 0,
                meeting_link: '', scheduled_time: '', is_live: false, description: ''
            });

            const loadClasses = async () => {
                const client = getSupabaseClient();
                if (!client) {
                    setClasses([]);
                    return;
                }
                try {
                    const { data, error } = await client
                        .from('classes')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!error && data) setClasses(data || []);
                    else setClasses([]);
                } catch (e) {
                    console.error('Load classes error:', e);
                    setClasses([]);
                }
            };

            useEffect(() => { loadClasses(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const client = getSupabaseClient();
                if (!client) {
                    showToast('⚠️ Supabase client not available', 'error');
                    return;
                }

                const { title, level, tutor_id, meeting_link, scheduled_time } = formData;
                if (!title || !level || !tutor_id || !meeting_link || !scheduled_time) {
                    showToast('⚠️ Please fill in all required fields', 'error');
                    return;
                }
                const { error } = await client
                    .from('classes')
                    .insert([{ ...formData, created_at: new Date().toISOString() }]);

                if (!error) {
                    showToast('✅ Class created successfully!');
                    setFormData({ title: '', level: '', tutor_id: '', price_per_learner: 0, meeting_link: '', scheduled_time: '', is_live: false, description: '' });
                    loadClasses();
                }
            };

            const toggleStatus = async (id, currentStatus) => {
                const client = getSupabaseClient();
                if (!client) return;

                const { error } = await client
                    .from('classes')
                    .update({ is_live: !currentStatus })
                    .eq('id', id);

                if (!error) {
                    showToast(`✅ Class ${!currentStatus ? 'started' : 'ended'}`);
                    loadClasses();
                }
            };

            const deleteClass = async (id) => {
                const client = getSupabaseClient();
                if (!client) return;

                if (!confirm('Delete this class?')) return;
                const { error } = await client
                    .from('classes')
                    .delete()
                    .eq('id', id);

                if (!error) {
                    showToast('✅ Class deleted');
                    loadClasses();
                }
            };

            return (
                <div className="fade-in space-y-6">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">

                        <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">

                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Target Level *</label>
                                <select value={formData.level} onChange={(e) => setFormData({...formData, level: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                                    <option value="">Select</option>
                                    <option value="primary-cbc">Primary School CBC</option>
                                    <option value="junior-secondary">Junior Secondary School (JSS)</option>
                                    <option value="high-school">High School 8-4-4 / SSS</option>
                                    <option value="exam-bootcamp">Exam Revision Bootcamp</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Assign Tutor *</label>
                                <select value={formData.tutor_id} onChange={(e) => setFormData({...formData, tutor_id: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                                    <option value="">Select Tutor</option>
                                    {tutors.filter(t => t.status === 'active').map(t => (
                                        <option key={t.id} value={t.id}>{t.name} ({t.specialization || 'General'})</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Price Per Learner (KES)</label>
                                <input type="number" value={formData.price_per_learner} onChange={(e) => setFormData({...formData, price_per_learner: parseFloat(e.target.value) || 0})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" min="0" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Meeting Link *</label>
                                <input type="url" value={formData.meeting_link} onChange={(e) => setFormData({...formData, meeting_link: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" placeholder="https://meet.google.com/..." required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Scheduled Time *</label>
                                <input type="datetime-local" value={formData.scheduled_time} onChange={(e) => setFormData({...formData, scheduled_time: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
                                <select value={formData.is_live} onChange={(e) => setFormData({...formData, is_live: e.target.value === 'true'})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white">
                                    <option value="false">🔴 Scheduled</option>
                                    <option value="true">🟢 Live Now</option>
                                </select>
                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
                                <textarea value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" rows="2"></textarea>
                            </div>
                            <div className="md:col-span-2">
                                <button type="submit" className="px-6 py-2 bg-[#D4A017] text-[#0a1a3a] font-semibold rounded-lg hover:bg-[#FCD34D] transition">📹 Create Class</button>
                            </div>
                        </form>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📋 Live Classes</h3>
                            <button onClick={loadClasses} className="text-sm text-[#D4A017] hover:text-[#FCD34D] transition">🔄 Refresh</button>
                        </div>
                        {classes.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No classes created yet</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Title</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Tutor</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Level</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Price</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>

                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{c.level || '—'}</td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">{c.price_per_learner === 0 ? 'FREE' : 'KES ' + c.price_per_learner}</td>
                                                    <td className="px-4 py-2"><span className={`status-badge ${c.is_live ? 'live' : 'draft'}`}>{c.is_live ? '🟢 Live' : '⏳ Scheduled'}</span></td>

        // ── ORDERS MODULE ──
        function OrdersModule() {
            const { orders, loadOrders, showToast, newOrderIds, sendWhatsApp, orderBadgeCount } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);

            useEffect(() => {
                const interval = setInterval(() => loadOrders(), 5000);
                return () => clearInterval(interval);
            }, []);

            const confirmOrder = async (order) => {
                if (!confirm(`Confirm order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                setLoadingOrderId(order.id);
                try {
                    await sendWhatsApp(order);
                    await loadOrders();
                    showToast('✅ Order confirmed and WhatsApp sent!', 'success');
                } catch (e) {
                    showToast('❌ Error confirming order: ' + e.message, 'error');
                }
                setLoadingOrderId(null);
            };

            const rejectOrder = async (order) => {
                if (!confirm(`Reject order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                try {
                    const client = useApp().getSupabaseClient();
                    if (!client) {
                        showToast('❌ Supabase client not available', 'error');
                        return;
                    }
                    const { error } = await client
                        .from('orders')
                        .update({ payment_status: 'cancelled' })
                        .eq('id', order.id);
                    if (!error) {
                        showToast('❌ Order rejected', 'success');
                        await loadOrders();
                    }
                } catch (e) {
                    showToast('Error rejecting order', 'error');
                }
            };

            const filteredOrders = orders.filter(o => {
                if (filter === 'pending') return o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                if (filter === 'paid') return o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed';
                if (filter === 'cancelled') return o.payment_status === 'cancelled';
                return true;
            });

            const pendingCount = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;

            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">
                                📦 Orders ({orders.length})
                                {pendingCount > 0 && (
                                    <span className="ml-2 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-full animate-pulse">
                                        {pendingCount} pending
                                    </span>
                                )}
                            </h2>
                            <button onClick={() => loadOrders()} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition">
                                🔄 Refresh
                            </button>
                        </div>

                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Pending</button>
                            <button onClick={() => setFilter('paid')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'paid' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Paid</button>
                            <button onClick={() => setFilter('cancelled')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'cancelled' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Cancelled</button>
                        </div>

                        {filteredOrders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders found</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Reference</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Customer</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Items</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Total</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">M-PESA Code</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.map(o => {
                                            const isNew = newOrderIds.includes(o.id);
                                            const isPending = o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                                            const hasCode = o.mpesa_code && o.mpesa_code.length >= 4;
                                            
                                            return (
                                                <tr key={o.id} className={`border-t border-gray-100 dark:border-gray-700 ${isPending ? 'bg-amber-50 dark:bg-amber-900/10' : ''} ${isNew ? 'new-order-flash' : ''}`}>
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">
                                                        {o.customer_name || 'N/A'}
                                                        <br /><small className="text-xs">{o.customer_phone || ''}</small>
                                                    </td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">
                                                        <span className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded-full">
                                                            {o.item_count || 0} items
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                    <td className="px-4 py-2">
                                                        <span className={`status-badge ${
                                                            o.payment_status === 'pending_verification' ? 'pending_verification' :
                                                            o.payment_status === 'paid' || o.payment_status === 'confirmed' ? 'paid' :
                                                            o.payment_status === 'completed' ? 'completed' :
                                                            o.payment_status === 'cancelled' ? 'rejected' :
                                                            'pending'
                                                        }`}>
                                                            {o.payment_status === 'pending_verification' ? '⏳ Pending' :
                                                             o.payment_status === 'paid' || o.payment_status === 'confirmed' ? '✅ Paid' :
                                                             o.payment_status === 'completed' ? '✅ Completed' :
                                                             o.payment_status === 'cancelled' ? '❌ Cancelled' :
                                                             'Pending'}
                                                        </span>
                                                        {isNew && <span className="ml-1 text-xs text-green-500 font-bold">NEW!</span>}
                                                    </td>
                                                    <td className="px-4 py-2">
                                                        {hasCode ? (
                                                            <span className="mpesa-code-badge">{o.mpesa_code}</span>
                                                        ) : (
                                                            <span className="mpesa-code-badge empty">⏳ Awaiting Code...</span>
                                                        )}
                                                    </td>
                                                    <td className="px-4 py-2">
                                                        <div className="flex gap-2 flex-wrap">
                                                            {isPending && (
                                                                <>
                                                                    <button 
                                                                        onClick={() => confirmOrder(o)} 
                                                                        disabled={loadingOrderId === o.id}
                                                                        className="btn-sm navy flex items-center gap-1"
                                                                    >
                                                                        {loadingOrderId === o.id ? (
                                                                            <><span className="spinner"></span> Processing</>
                                                                        ) : (
                                                                            '✅ Confirm'
                                                                        )}
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => rejectOrder(o)} 
                                                                        className="btn-sm gold"
                                                                    >
                                                                        ❌ Reject
                                                                    </button>
                                                                </>
                                                            )}
                                                            {(o.payment_status === 'paid' || o.payment_status === 'confirmed') && (
                                                                <button 
                                                                    onClick={() => sendWhatsApp(o)} 
                                                                    className="btn-whatsapp"
                                                                >
                                                                    💬 Resend
                                                                </button>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── FINANCE MODULE ──
        function FinanceModule() {
            const { orders } = useApp();
            
            const stats = useMemo(() => {
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                const paidOrders = orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed').length;
                const pendingOrders = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                const avgOrderValue = paidOrders > 0 ? totalRevenue / paidOrders : 0;
                return { totalRevenue, paidOrders, pendingOrders, avgOrderValue };
            }, [orders]);

            return (
                <div className="fade-in space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</div>
                            <div className="text-2xl font-bold text-[#D4A017]">KES {stats.totalRevenue.toLocaleString()}</div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Paid Orders</div>
                            <div className="text-2xl font-bold text-green-600 dark:text-green-400">{stats.paidOrders}</div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Pending Orders</div>
                            <div className="text-2xl font-bold text-amber-600 dark:text-amber-400">{stats.pendingOrders}</div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Avg Order Value</div>
                            <div className="text-2xl font-bold text-gray-800 dark:text-white">KES {stats.avgOrderValue.toFixed(0)}</div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-lg font-semibold text-gray-800 dark:text-white mb-4">📋 All Orders</h3>
                        {orders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders yet</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Reference</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Customer</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Amount</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {orders.map(o => (
                                            <tr key={o.id} className="border-t border-gray-100 dark:border-gray-700">
                                                <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                <td className="px-4 py-2"><span className={`status-badge ${o.payment_status || 'pending'}`}>{o.payment_status || 'pending'}</span></td>
                                                <td className="px-4 py-2 text-gray-500 dark:text-gray-400">{o.created_at ? new Date(o.created_at).toLocaleDateString() : '—'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                classes: <ClassesModule />,
                orders: <OrdersModule />,
                finance: <FinanceModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            return (
                <div className="flex min-h-screen bg-white dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
                            <ModuleRenderer />
                        </main>
                    </div>
                    <ToastContainer />
                </div>
            );
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>
</body>
</html>
