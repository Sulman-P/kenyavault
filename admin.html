<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f3f4f6; }
        .dark body { background: #111827; color: #e5e7eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.active { background: #dbeafe; color: #1e40af; }
        .status-badge.completed { background: #d1fae5; color: #065f46; }
        .status-badge.rejected { background: #fee2e2; color: #991b1b; }
        .status-badge.pending_verification { background: #fef3c7; color: #92400e; }
        .status-badge.confirmed { background: #dbeafe; color: #1e40af; }
        .status-badge.suspended { background: #fee2e2; color: #991b1b; }
        .status-badge.live { background: #d1fae5; color: #065f46; }
        .status-badge.paid { background: #d1fae5; color: #065f46; }
        .status-badge.draft { background: #e5e7eb; color: #6b7280; }
        .status-badge.verified { background: #d1fae5; color: #065f46; }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.active { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.completed { background: #064e3b; color: #34d399; }
        .dark .status-badge.rejected { background: #7f1d1d; color: #f87171; }
        .dark .status-badge.pending_verification { background: #78350f; color: #fbbf24; }
        .dark .status-badge.confirmed { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.suspended { background: #7f1d1d; color: #f87171; }
        .dark .status-badge.live { background: #064e3b; color: #34d399; }
        .dark .status-badge.paid { background: #064e3b; color: #34d399; }
        .dark .status-badge.draft { background: #374151; color: #9ca3af; }
        
        .login-bg {
            background: linear-gradient(135deg, #0a1a3a 0%, #1a2a5a 50%, #2a3a6a 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px;
            pointer-events: none;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-gold {
            background: #D4A017;
            color: #0a1a3a;
            transition: all 0.2s ease;
        }
        .btn-gold:hover { background: #FCD34D; transform: translateY(-1px); }
        .gold-text { color: #D4A017; }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            max-width: 380px;
            width: 100%;
        }
        .toast-item {
            background: white;
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border-left: 4px solid #D4A017;
            margin-bottom: 8px;
            animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dark .toast-item { background: #1f2937; }
        .toast-item .toast-title { font-weight: 600; font-size: 0.85rem; color: #1f2937; }
        .dark .toast-item .toast-title { color: #f3f4f6; }
        .toast-item .toast-msg { font-size: 0.8rem; color: #6b7280; }
        .dark .toast-item .toast-msg { color: #9ca3af; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f9fafb;
        }
        .drop-zone:hover {
            border-color: #D4A017;
            background: rgba(212, 160, 23, 0.05);
        }
        .dark .drop-zone {
            background: #1f2937;
            border-color: #374151;
        }
        .dark .drop-zone:hover {
            border-color: #D4A017;
            background: rgba(212, 160, 23, 0.1);
        }
        
        .progress-track {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 99px;
            overflow: hidden;
            margin-top: 5px;
        }
        .dark .progress-track { background: #374151; }
        .progress-bar {
            height: 100%;
            background: #D4A017;
            border-radius: 99px;
            transition: width 0.3s ease;
        }
        
        .chart-container {
            height: 280px;
            position: relative;
        }
        
        .stat-card {
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .dark .stat-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .new-order-flash {
            animation: flashRow 1s ease 3;
        }
        @keyframes flashRow {
            0%, 100% { background: transparent; }
            50% { background: rgba(212, 160, 23, 0.15); }
        }
        .dark .new-order-flash {
            animation: flashRowDark 1s ease 3;
        }
        @keyframes flashRowDark {
            0%, 100% { background: transparent; }
            50% { background: rgba(212, 160, 23, 0.2); }
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .dark .modal-box { background: #1f2937; }
        
        .timeframe-toggle {
            display: flex;
            gap: 4px;
            background: #f3f4f6;
            border-radius: 8px;
            padding: 4px;
            border: 1px solid #e5e7eb;
        }
        .dark .timeframe-toggle {
            background: #1f2937;
            border-color: #374151;
        }
        .timeframe-toggle button {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .timeframe-toggle button:hover { color: #1f2937; }
        .dark .timeframe-toggle button:hover { color: #f3f4f6; }
        .timeframe-toggle button.active {
            background: #D4A017;
            color: #0a1a3a;
        }
        .dark .timeframe-toggle button.active {
            background: #D4A017;
            color: #0a1a3a;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useContext, createContext, useRef } = React;

        // ── SUPABASE CONFIG ──
        const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';
        const STORAGE_BUCKET = 'academic-resources';
        const STORAGE_URL = `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}`;

        const ADMIN_CREDENTIALS = {
            username: 'adminnexalearn@gmail.com',
            password: 'KenyaVault2026'
        };

        const adminModules = [
            { id: 'dashboard', icon: '📊', label: 'Dashboard' },
            { id: 'resources', icon: '📚', label: 'Resources' },
            { id: 'tutors', icon: '🧑‍🏫', label: 'Tutors' },
            { id: 'classes', icon: '📹', label: 'Classes' },
            { id: 'orders', icon: '📦', label: 'Orders' },
            { id: 'finance', icon: '💰', label: 'Finance' },
        ];

        // ── CONTEXT ──
        const AppContext = createContext(null);

        function AppProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('kv-dark-mode') === 'true');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [currentModule, setCurrentModule] = useState('dashboard');
            const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('kv-auth') === 'true');
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [loading, setLoading] = useState(true);
            const [tutors, setTutors] = useState([]);
            const [orders, setOrders] = useState([]);
            const [resources, setResources] = useState([]);
            const [classes, setClasses] = useState([]);
            const [toast, setToast] = useState(null);
            const [newOrderIds, setNewOrderIds] = useState([]);
            const [chartRange, setChartRange] = useState('daily');

            useEffect(() => {
                localStorage.setItem('kv-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                if (isAuthenticated) {
                    loadAllData();
                    startPolling();
                }
                return () => stopPolling();
            }, [isAuthenticated]);

            const startPolling = () => {
                const interval = setInterval(() => checkNewOrders(), 10000);
                window._pollingInterval = interval;
                setTimeout(checkNewOrders, 2000);
            };

            const stopPolling = () => {
                if (window._pollingInterval) {
                    clearInterval(window._pollingInterval);
                    window._pollingInterval = null;
                }
            };

            const checkNewOrders = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc&limit=20`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const pendingOrders = data.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification');
                        const currentIds = pendingOrders.map(o => o.id);
                        const newIds = currentIds.filter(id => !newOrderIds.includes(id));
                        
                        if (newIds.length > 0) {
                            setNewOrderIds(prev => [...prev, ...newIds]);
                            const newOrders = pendingOrders.filter(o => newIds.includes(o.id));
                            newOrders.forEach(order => {
                                showToast(
                                    '🆕 New Order!',
                                    `Order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()} - ${order.customer_name || 'Customer'}`
                                );
                            });
                            await loadOrders();
                        }
                    }
                } catch (e) {
                    console.error('Polling error:', e);
                }
            };

            const showToast = (title, message) => {
                setToast({ title, message, id: Date.now() });
                setTimeout(() => setToast(null), 6000);
            };

            const fetchWithErrorHandling = async (endpoint, options = {}) => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
                        ...options,
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            ...(options.headers || {})
                        }
                    });
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error(`❌ ${endpoint} error (${response.status}):`, errorText);
                        return { error: true, status: response.status, message: errorText || response.statusText };
                    }
                    
                    const data = await response.json();
                    return { data, error: false };
                } catch (e) {
                    console.error(`❌ ${endpoint} fetch error:`, e);
                    return { error: true, message: e.message };
                }
            };

            const loadOrders = async () => {
                const result = await fetchWithErrorHandling('orders?select=*&order=created_at.desc');
                if (!result.error) setOrders(result.data || []);
                else setOrders([]);
            };

            const loadAllData = async () => {
                setLoading(true);
                try {
                    await loadOrders();
                    
                    const [rRes, tRes, cRes] = await Promise.all([
                        fetchWithErrorHandling('resources?select=*&order=created_at.desc'),
                        fetchWithErrorHandling('tutors?select=*'),
                        fetchWithErrorHandling('classes?select=*&order=created_at.desc')
                    ]);

                    if (!rRes.error) setResources(rRes.data || []);
                    if (!tRes.error) setTutors(tRes.data || []);
                    if (!cRes.error) setClasses(cRes.data || []);
                } catch (e) { console.error('Load error:', e); }
                setLoading(false);
            };

            const login = (username, password) => {
                setAuthLoading(true);
                setAuthError('');
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                            sessionStorage.setItem('kv-auth', 'true');
                            sessionStorage.setItem('kv-user', username);
                            setIsAuthenticated(true);
                            setAuthLoading(false);
                            resolve(true);
                        } else {
                            setAuthError('Invalid username or password.');
                            setAuthLoading(false);
                            reject(new Error('Invalid credentials'));
                        }
                    }, 800);
                });
            };

            const logout = () => {
                stopPolling();
                sessionStorage.removeItem('kv-auth');
                sessionStorage.removeItem('kv-user');
                setIsAuthenticated(false);
                setCurrentModule('dashboard');
            };

            const toggleSidebar = () => {
                if (window.innerWidth < 1024) setMobileSidebarOpen(!mobileSidebarOpen);
                else setSidebarOpen(!sidebarOpen);
            };

            const showNotification = (msg, type = 'success') => {
                showToast(type === 'success' ? '✅ Success' : '❌ Error', msg);
            };

            return (
                <AppContext.Provider value={{
                    darkMode, setDarkMode,
                    sidebarOpen, setSidebarOpen,
                    mobileSidebarOpen, setMobileSidebarOpen,
                    currentModule, setCurrentModule,
                    isAuthenticated,
                    authLoading, authError,
                    login, logout,
                    loading,
                    tutors, setTutors,
                    orders, setOrders,
                    resources, setResources,
                    classes, setClasses,
                    toast, showToast: showNotification,
                    toggleSidebar,
                    loadAllData,
                    loadOrders,
                    newOrderIds, setNewOrderIds,
                    chartRange, setChartRange,
                    fetchWithErrorHandling
                }}>
                    {children}
                </AppContext.Provider>
            );
        }

        function useApp() {
            const context = useContext(AppContext);
            if (!context) throw new Error('useApp must be used within AppProvider');
            return context;
        }

        // ── TOAST ──
        function ToastContainer() {
            const { toast } = useApp();
            if (!toast) return null;
            return (
                <div className="toast-container">
                    <div className="toast-item">
                        <div className="toast-title">{toast.title}</div>
                        <div className="toast-msg">{toast.message}</div>
                    </div>
                </div>
            );
        }

        // ── LOGIN PAGE ──
        function LoginPage() {
            const { login, authLoading, authError, darkMode, setDarkMode } = useApp();
            const [username, setUsername] = useState('adminnexalearn@gmail.com');
            const [password, setPassword] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                try { await login(username, password); } catch (err) {}
            };

            return (
                <div className="login-bg flex items-center justify-center p-4 relative min-h-screen">
                    <button onClick={() => setDarkMode(!darkMode)} className="absolute top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition">
                        {darkMode ? '☀️' : '🌙'}
                    </button>
                    <div className="w-full max-w-md relative z-10">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-2xl border border-white/10">
                                <div className="w-10 h-10 rounded-xl bg-[#D4A017] flex items-center justify-center text-[#0a1a3a] font-bold text-lg">KV</div>
                                <div className="text-left">
                                    <h1 className="text-xl font-bold text-white">Kenya<span className="text-[#FCD34D]">Vault</span></h1>
                                    <p className="text-xs text-gray-400">Admin Portal</p>
                                </div>
                            </div>
                        </div>
                        <div className="login-box rounded-2xl p-8 shadow-2xl border border-white/10">
                            <h2 className="text-2xl font-bold text-white mb-2">Welcome Back</h2>
                            <p className="text-gray-400 text-sm mb-6">Sign in to manage your KenyaVault platform</p>
                            {authError && <div className="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm">{authError}</div>}
                            <form onSubmit={handleSubmit}>
                                <div className="mb-4">
                                    <label className="block text-gray-300 text-sm font-medium mb-2">Email / Username</label>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#D4A017] transition" required />
                                </div>
                                <div className="mb-4">
                                    <label className="block text-gray-300 text-sm font-medium mb-2">Password</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#D4A017] transition" required />
                                </div>
                                <button type="submit" disabled={authLoading} className="w-full py-3 bg-[#D4A017] hover:bg-[#FCD34D] text-[#0a1a3a] font-semibold rounded-xl transition flex items-center justify-center gap-2 disabled:opacity-50">
                                    {authLoading ? '⏳ Signing in...' : '🔑 Sign In'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // ── SIDEBAR ──
        function Sidebar() {
            const { sidebarOpen, mobileSidebarOpen, currentModule, setCurrentModule, toggleSidebar, logout } = useApp();
            const isVisible = sidebarOpen || mobileSidebarOpen;

            return (
                <>
                    {mobileSidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden" onClick={toggleSidebar} />}
                    <aside className={`fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-[#0a1a3a] border-r border-[#D4A017]/20 sidebar-transition ${isVisible ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'} lg:w-20 lg:hover:w-64 group flex flex-col`}>
                        <div className="flex items-center gap-3 px-4 h-16 border-b border-[#D4A017]/20 flex-shrink-0">
                            <div className="w-8 h-8 rounded-lg bg-[#D4A017] flex items-center justify-center text-[#0a1a3a] font-bold text-sm flex-shrink-0">KV</div>
                            <span className={`font-bold text-lg text-white whitespace-nowrap transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>KenyaVault</span>
                            <span className={`text-[10px] font-bold text-[#D4A017] bg-[#D4A017]/20 px-2 py-0.5 rounded-full transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>Admin</span>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-4 px-3">
                            {adminModules.map((mod) => (
                                <button key={mod.id} onClick={() => { setCurrentModule(mod.id); if (mobileSidebarOpen) toggleSidebar(); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all ${currentModule === mod.id ? 'bg-[#D4A017]/20 text-[#FCD34D]' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}>
                                    <span className="text-xl flex-shrink-0">{mod.icon}</span>

        // ── DASHBOARD MODULE ──
        function DashboardModule() {
            const { orders, resources, tutors, classes, chartRange, setChartRange } = useApp();
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const stats = useMemo(() => {
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                const pendingOrders = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                const paidOrders = orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed').length;
                const activeResources = resources.filter(r => r.status === 'live').length;
                return { totalRevenue, pendingOrders, paidOrders, activeResources, totalOrders: orders.length };
            }, [orders, resources]);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                    chartInstance.current = null;
                }

                const ctx = chartRef.current?.getContext('2d');
                if (!ctx) return;

                const days = chartRange === 'daily' ? 7 : chartRange === 'weekly' ? 30 : 90;
                const labels = [];
                const data = [];

                for (let i = days - 1; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const label = chartRange === 'daily' 
                        ? d.toLocaleDateString('en', { weekday: 'short' })
                        : d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
                    labels.push(label);

                    const dailyTotal = orders
                        .filter(o => {
                            const od = new Date(o.created_at);
                            return od.toDateString() === d.toDateString() && 
                                   (o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed');
                        })
                        .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                    data.push(dailyTotal);
                }

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Revenue (KES)',
                            data: data,
                            borderColor: '#D4A017',
                            backgroundColor: 'rgba(212, 160, 23, 0.1)',
                            fill: true,
                            tension: 0.3,
                            borderWidth: 3,
                            pointBackgroundColor: '#D4A017',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return 'KES ' + context.parsed.y.toLocaleString();
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return 'KES ' + value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };
            }, [orders, chartRange]);

            return (
                <div className="fade-in space-y-6">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="stat-card bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</div>
                            <div className="text-2xl font-bold text-[#D4A017]">KES {stats.totalRevenue.toLocaleString()}</div>
                        </div>
                        <div className="stat-card bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Total Orders</div>
                            <div className="text-2xl font-bold text-gray-800 dark:text-white">{stats.totalOrders}</div>
                            <div className="text-xs text-amber-600 dark:text-amber-400">{stats.pendingOrders} pending</div>
                        </div>
                        <div className="stat-card bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Active Resources</div>
                            <div className="text-2xl font-bold text-gray-800 dark:text-white">{stats.activeResources}</div>
                        </div>
                        <div className="stat-card bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Tutors</div>
                            <div className="text-2xl font-bold text-gray-800 dark:text-white">{tutors.length}</div>
                            <div className="text-xs text-green-600 dark:text-green-400">{tutors.filter(t => t.status === 'active').length} active</div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📈 Revenue Overview</h3>
                            <div className="timeframe-toggle">
                                <button className={chartRange === 'daily' ? 'active' : ''} onClick={() => setChartRange('daily')}>Daily</button>
                                <button className={chartRange === 'weekly' ? 'active' : ''} onClick={() => setChartRange('weekly')}>Weekly</button>
                                <button className={chartRange === 'monthly' ? 'active' : ''} onClick={() => setChartRange('monthly')}>Monthly</button>
                            </div>
                        </div>
                        <div className="chart-container">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-lg font-semibold text-gray-800 dark:text-white mb-4">📋 Recent Orders</h3>
                        {orders.slice(0, 5).length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders yet</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Reference</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Customer</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Amount</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {orders.slice(0, 5).map(o => (
                                            <tr key={o.id} className="border-t border-gray-100 dark:border-gray-700">
                                                <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                <td className="px-4 py-2">
                                                    <span className={`status-badge ${o.payment_status || 'pending'}`}>
                                                        {o.payment_status === 'pending_verification' ? '⏳ Pending' :
                                                         o.payment_status === 'paid' || o.payment_status === 'confirmed' ? '✅ Paid' :
                                                         o.payment_status === 'completed' ? '✅ Completed' :
                                                         o.payment_status === 'cancelled' ? '❌ Cancelled' :
                                                         'Pending'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── RESOURCES MODULE ──
        function ResourcesModule() {
            const { resources, setResources, showToast, fetchWithErrorHandling } = useApp();
            const [uploading, setUploading] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);
            const [editingResource, setEditingResource] = useState(null);
            const [editFormData, setEditFormData] = useState({ title: '', price: 0, status: 'draft' });
            const [showEditModal, setShowEditModal] = useState(false);
            const [formData, setFormData] = useState({
                title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: ''
            });

            const loadResources = async () => {
                const result = await fetchWithErrorHandling('resources?select=*&order=created_at.desc');
                if (!result.error) setResources(result.data || []);
            };

            useEffect(() => { loadResources(); }, []);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) setSelectedFile(file);
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                const { title, subject, level, resource_type } = formData;
                if (!title || !subject || !level || !resource_type || !selectedFile) {
                    showToast('⚠️ Please fill in all required fields and select a file', 'error');
                    return;
                }

                setUploading(true);
                try {
                    const fileExt = selectedFile.name.split('.').pop();
                    const filePath = `resources/${Date.now()}-${title.replace(/\s+/g, '_')}.${fileExt}`;

                    const formData2 = new FormData();
                    formData2.append('file', selectedFile);

                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${filePath}`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        },
                        body: formData2
                    });

                    if (!uploadRes.ok) throw new Error('Upload failed');

                    const resourceData = {
                        title, subject, level,
                        curriculum: formData.curriculum,
                        resource_type: formData.resource_type,
                        price: parseFloat(formData.price) || 0,
                        description: formData.description,
                        file_url: filePath,
                        status: 'draft',
                        created_at: new Date().toISOString(),
                        download_count: 0
                    };

                    const createResult = await fetchWithErrorHandling('resources', {
                        method: 'POST',
                        body: JSON.stringify(resourceData)
                    });

                    if (createResult.error) throw new Error('Failed to create resource record');

                    showToast('✅ Resource uploaded successfully!');
                    setFormData({ title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: '' });
                    setSelectedFile(null);
                    document.getElementById('fileInput').value = '';
                    loadResources();
                } catch (err) {
                    showToast('❌ Upload failed: ' + err.message, 'error');
                }
                setUploading(false);
            };

            const openEditModal = (resource) => {
                setEditingResource(resource);
                setEditFormData({
                    title: resource.title || '',
                    price: resource.price || 0,
                    status: resource.status || 'draft'
                });
                setShowEditModal(true);
            };

            const closeEditModal = () => {
                setShowEditModal(false);
                setEditingResource(null);
            };

            const handleEditSave = async () => {
                if (!editingResource) return;
                try {
                    const result = await fetchWithErrorHandling(`resources?id=eq.${editingResource.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({
                            title: editFormData.title,
                            price: parseFloat(editFormData.price) || 0,
                            status: editFormData.status
                        })
                    });
                    if (!result.error) {
                        showToast('✅ Resource updated successfully!');
                        closeEditModal();
                        loadResources();
                    } else {
                        showToast('❌ Update failed', 'error');
                    }
                } catch (e) {
                    showToast('❌ Update failed: ' + e.message, 'error');
                }
            };

            const toggleStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'live' ? 'draft' : 'live';
                const result = await fetchWithErrorHandling(`resources?id=eq.${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });
                if (!result.error) {
                    showToast(`✅ Resource ${newStatus === 'live' ? 'published' : 'drafted'}`);
                    loadResources();
                }
            };

            const deleteResource = async (id) => {
                if (!confirm('Delete this resource permanently?')) return;
                const result = await fetchWithErrorHandling(`resources?id=eq.${id}`, { method: 'DELETE' });
                if (!result.error) {
                    showToast('✅ Resource deleted');
                    loadResources();
                }
            };

            return (
                <div className="fade-in space-y-6">
                    {/* Upload Form */}
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-lg font-semibold text-gray-800 dark:text-white mb-4">📤 Upload New Resource</h3>
                        <form onSubmit={handleUpload} className="space-y-4">

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title *</label>
                                    <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Subject *</label>
                                    <select value={formData.subject} onChange={(e) => setFormData({...formData, subject: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                                        <option value="">Select</option>
                                        <option value="mathematics">Mathematics</option>
                                        <option value="english">English</option>
                                        <option value="kiswahili">Kiswahili</option>
                                        <option value="integrated-science">Integrated Science</option>
                                        <option value="social-studies">Social Studies</option>
                                        <option value="biology">Biology</option>
                                        <option value="chemistry">Chemistry</option>
                                        <option value="physics">Physics</option>
                                        <option value="business">Business</option>
                                        <option value="computer-studies">Computer Studies</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Level *</label>
                                    <select value={formData.level} onChange={(e) => setFormData({...formData, level: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                                        <option value="">Select</option>
                                        <option value="pp1">PP1</option><option value="pp2">PP2</option>
                                        <option value="grade-1">Grade 1</option><option value="grade-2">Grade 2</option>
                                        <option value="grade-3">Grade 3</option><option value="grade-4">Grade 4</option>
                                        <option value="grade-5">Grade 5</option><option value="grade-6">Grade 6</option>

            const [showEditModal, setShowEditModal] = useState(false);

            const loadTutors = async () => {
                const result = await fetchWithErrorHandling('tutors?select=*');

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { name, email, specialization } = formData;
                if (!name || !email || !specialization) {
                    showToast('⚠️ Please fill in all required fields', 'error');
                    return;
                }
                const result = await fetchWithErrorHandling('tutors', {
                    method: 'POST',
                    body: JSON.stringify({
                        name, email, phone: formData.phone, specialization,
                        status: 'active',
                        created_at: new Date().toISOString()
                    })
                });
                if (!result.error) {
                    showToast('✅ Tutor added successfully!');
                    setFormData({ name: '', email: '', phone: '', specialization: '' });
                    loadTutors();
                }
            };

            const openEditModal = (tutor) => {
                setEditingTutor(tutor);
                setEditFormData({
                    name: tutor.name || '',
                    email: tutor.email || '',
                    phone: tutor.phone || '',
                    specialization: tutor.specialization || '',
                    status: tutor.status || 'active'

                setShowEditModal(true);

                setShowEditModal(false);
                setEditingTutor(null);

                if (!editingTutor) return;
                try {

                        body: JSON.stringify({
                            name: editFormData.name,
                            email: editFormData.email,
                            phone: editFormData.phone,
                            specialization: editFormData.specialization,
                            status: editFormData.status

                        showToast('✅ Tutor updated successfully!');
                        closeEditModal();

                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Tutor</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Level</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Price</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {classes.map(c => {
                                            const tutor = tutors.find(t => t.id === c.tutor_id);
                                            return (
                                                <tr key={c.id} className="border-t border-gray-100 dark:border-gray-700">
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">{c.title}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{tutor ? tutor.name : '—'}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{c.level || '—'}</td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">{c.price_per_learner === 0 ? 'FREE' : 'KES ' + c.price_per_learner}</td>
                                                    <td className="px-4 py-2"><span className={`status-badge ${c.is_live ? 'live' : 'draft'}`}>{c.is_live ? '🟢 Live' : '⏳ Scheduled'}</span></td>
                                                    <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                        <button onClick={() => toggleStatus(c.id, c.is_live)} className="px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded hover:bg-blue-200 transition">
                                                            {c.is_live ? '⏸️ End' : '▶️ Start'}
                                                        </button>
                                                        <button onClick={() => deleteClass(c.id)} className="px-2 py-1 text-xs bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded hover:bg-red-200 transition">🗑️</button>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── ORDERS MODULE ──
        function OrdersModule() {
            const { orders, loadOrders, showToast, newOrderIds, fetchWithErrorHandling } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);

            useEffect(() => {
                const interval = setInterval(() => loadOrders(), 15000);
                return () => clearInterval(interval);
            }, []);

            const confirmOrder = async (order) => {
                if (!confirm(`Confirm order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                setLoadingOrderId(order.id);
                const result = await fetchWithErrorHandling(`orders?id=eq.${order.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ payment_status: 'paid', confirmed_at: new Date().toISOString() })
                });
                if (!result.error) {
                    showToast('✅ Order confirmed');
                    loadOrders();
                }
                setLoadingOrderId(null);
            };

            const rejectOrder = async (order) => {
                if (!confirm(`Reject order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                const result = await fetchWithErrorHandling(`orders?id=eq.${order.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ payment_status: 'cancelled' })
                });
                if (!result.error) {
                    showToast('❌ Order rejected');
                    loadOrders();
                }
            };

            const filteredOrders = orders.filter(o => {
                if (filter === 'pending') return o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                if (filter === 'paid') return o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed';
                if (filter === 'cancelled') return o.payment_status === 'cancelled';
                return true;
            });

            const pendingCount = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;

            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">
                                📦 Orders ({orders.length})
                                {pendingCount > 0 && (
                                    <span className="ml-2 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-full animate-pulse">
                                        {pendingCount} pending
                                    </span>
                                )}
                            </h2>
                            <button onClick={() => loadOrders()} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition">
                                🔄 Refresh
                            </button>
                        </div>

                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Pending</button>
                            <button onClick={() => setFilter('paid')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'paid' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Paid</button>
                            <button onClick={() => setFilter('cancelled')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'cancelled' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Cancelled</button>
                        </div>

                        {filteredOrders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders found</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Reference</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Customer</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Items</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Total</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.map(o => {
                                            const isNew = newOrderIds.includes(o.id);
                                            const isPending = o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                                            return (
                                                <tr key={o.id} className={`border-t border-gray-100 dark:border-gray-700 ${isPending ? 'bg-amber-50 dark:bg-amber-900/10' : ''} ${isNew ? 'new-order-flash' : ''}`}>
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.item_count || 0}</td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                    <td className="px-4 py-2">
                                                        <span className={`status-badge ${o.payment_status || 'pending'}`}>
                                                            {o.payment_status === 'pending_verification' ? '⏳ Pending' :
                                                             o.payment_status === 'paid' || o.payment_status === 'confirmed' ? '✅ Paid' :
                                                             o.payment_status === 'completed' ? '✅ Completed' :
                                                             o.payment_status === 'cancelled' ? '❌ Cancelled' :
                                                             'Pending'}
                                                        </span>
                                                        {isNew && <span className="ml-1 text-xs text-green-500 font-bold">NEW!</span>}
                                                    </td>
                                                    <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                        {isPending && (
                                                            <>
                                                                <button onClick={() => confirmOrder(o)} disabled={loadingOrderId === o.id} className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs hover:bg-green-200 transition disabled:opacity-50 flex items-center gap-1">
                                                                    {loadingOrderId === o.id ? <><span className="spinner"></span> Processing</> : '✅ Confirm'}
                                                                </button>
                                                                <button onClick={() => rejectOrder(o)} className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs hover:bg-red-200 transition">❌ Reject</button>
                                                            </>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── FINANCE MODULE ──
        function FinanceModule() {
            const { orders } = useApp();
            
            const stats = useMemo(() => {
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                const paidOrders = orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed').length;
                const pendingOrders = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                const avgOrderValue = paidOrders > 0 ? totalRevenue / paidOrders : 0;
                return { totalRevenue, paidOrders, pendingOrders, avgOrderValue };
            }, [orders]);

            return (
                <div className="fade-in space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</div>
                            <div className="text-2xl font-bold text-[#D4A017]">KES {stats.totalRevenue.toLocaleString()}</div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Paid Orders</div>
                            <div className="text-2xl font-bold text-green-600 dark:text-green-400">{stats.paidOrders}</div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Pending Orders</div>
                            <div className="text-2xl font-bold text-amber-600 dark:text-amber-400">{stats.pendingOrders}</div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="text-sm text-gray-500 dark:text-gray-400">Avg Order Value</div>
                            <div className="text-2xl font-bold text-gray-800 dark:text-white">KES {stats.avgOrderValue.toFixed(0)}</div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-lg font-semibold text-gray-800 dark:text-white mb-4">📋 All Orders</h3>
                        {orders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders yet</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Reference</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Customer</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Amount</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Status</th>
                                            <th className="px-4 py-2 text-left text-gray-600 dark:text-gray-400">Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {orders.map(o => (
                                            <tr key={o.id} className="border-t border-gray-100 dark:border-gray-700">
                                                <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                <td className="px-4 py-2"><span className={`status-badge ${o.payment_status || 'pending'}`}>{o.payment_status || 'pending'}</span></td>
                                                <td className="px-4 py-2 text-gray-500 dark:text-gray-400">{o.created_at ? new Date(o.created_at).toLocaleDateString() : '—'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            return (
                <div className="flex min-h-screen bg-white dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
                            <ModuleRenderer />
                        </main>
                    </div>
                    <ToastContainer />
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                classes: <ClassesModule />,
                orders: <OrdersModule />,
                finance: <FinanceModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>
</body>
</html>
