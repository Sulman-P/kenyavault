                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Price (KES)</label>
                                        <input type="number" value={editFormData.price} onChange={(e) => setEditFormData({...editFormData, price: parseFloat(e.target.value) || 0})} className="w-full px-4 py-2 border border-gray-300 rounded-lg" min="0" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Status</label>
                                        <select value={editFormData.status} onChange={(e) => setEditFormData({...editFormData, status: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                            <option value="draft">Draft</option>
                                            <option value="live">Live</option>
                                            <option value="archived">Archived</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={handleEditSave} className="btn-primary">💾 Save Changes</button>
                                        <button onClick={closeEditModal} className="btn-secondary">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── TUTORS MODULE ──
        function TutorsModule() {
            const { tutors, setTutors, showToast } = useApp();
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', specialization: '' });
            const [editingTutor, setEditingTutor] = useState(null);
            const [editFormData, setEditFormData] = useState({ name: '', email: '', phone: '', specialization: '', status: 'active' });
            const [showEditModal, setShowEditModal] = useState(false);

            const loadTutors = async () => {
                try {
                    const { data, error } = await sbClient
                        .from('tutors')
                        .select('*');
                    if (!error && data) setTutors(data || []);
                    else setTutors([]);
                } catch (e) {
                    console.error('Load tutors error:', e);
                    setTutors([]);
                }
            };

            useEffect(() => { loadTutors(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { name, email, specialization } = formData;
                if (!name || !email || !specialization) {
                    showToast('⚠️ Please fill in all required fields', 'error');
                    return;
                }
                const { error } = await sbClient
                    .from('tutors')
                    .insert([{
                        name, email, phone: formData.phone, specialization,
                        status: 'active',
                        created_at: new Date().toISOString()
                    }]);

                if (!error) {
                    showToast('✅ Tutor added successfully!');
                    setFormData({ name: '', email: '', phone: '', specialization: '' });
                    loadTutors();
                }
            };

            const openEditModal = (tutor) => {
                setEditingTutor(tutor);
                setEditFormData({
                    name: tutor.name || '',
                    email: tutor.email || '',
                    phone: tutor.phone || '',
                    specialization: tutor.specialization || '',
                    status: tutor.status || 'active'
                });
                setShowEditModal(true);
            };

            const closeEditModal = () => {
                setShowEditModal(false);
                setEditingTutor(null);
            };

            const handleEditSave = async () => {
                if (!editingTutor) return;
                const { error } = await sbClient
                    .from('tutors')
                    .update({
                        name: editFormData.name,
                        email: editFormData.email,
                        phone: editFormData.phone,
                        specialization: editFormData.specialization,
                        status: editFormData.status
                    })
                    .eq('id', editingTutor.id);

                if (!error) {
                    showToast('✅ Tutor updated successfully!');
                    closeEditModal();
                    loadTutors();
                }
            };

            const toggleStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
                const { error } = await sbClient
                    .from('tutors')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (!error) {
                    showToast(`✅ Tutor ${newStatus === 'active' ? 'activated' : 'suspended'}`);
                    loadTutors();
                }
            };

            const deleteTutor = async (id) => {
                if (!confirm('Delete this tutor?')) return;
                const { error } = await sbClient
                    .from('tutors')
                    .delete()
                    .eq('id', id);

                if (!error) {
                    showToast('✅ Tutor deleted');
                    loadTutors();
                }
            };

            return (
                <div className="fade-in space-y-6">
                    <div className="admin-form">
                        <div className="form-title">🧑‍🏫 Add New Tutor</div>
                        <form onSubmit={handleSubmit} className="form-grid">
                            <div>
                                <label>Full Name <span className="required">*</span></label>
                                <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} required />
                            </div>
                            <div>
                                <label>Email <span className="required">*</span></label>
                                <input type="email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} required />
                            </div>
                            <div>
                                <label>Phone</label>
                                <input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
                            </div>
                            <div>
                                <label>Specialization <span className="required">*</span></label>
                                <select value={formData.specialization} onChange={(e) => setFormData({...formData, specialization: e.target.value})} required>
                                    <option value="">Select</option>
                                    <option value="mathematics">Mathematics</option>
                                    <option value="english">English</option>
                                    <option value="kiswahili">Kiswahili</option>
                                    <option value="science">Science</option>
                                    <option value="social-studies">Social Studies</option>
                                    <option value="creative-arts">Creative Arts</option>
                                    <option value="business">Business</option>
                                    <option value="computer-studies">Computer Studies</option>
                                </select>
                            </div>
                            <div className="full-width">
                                <button type="submit" className="btn-primary">➕ Add Tutor</button>
                            </div>
                        </form>
                    </div>

                    <div className="data-grid">
                        <div className="grid-header">
                            <h3>📋 Tutor Roster</h3>
                            <button onClick={loadTutors} className="btn-secondary" style={{padding: '6px 16px', fontSize: '0.75rem'}}>🔄 Refresh</button>
                        </div>
                        {tutors.length === 0 ? (
                            <div className="text-center py-8 text-[#64748B]">No tutors added yet</div>
                        ) : (
                            <div className="table-wrap">
                                <table className="orders-table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Email</th>
                                            <th>Specialization</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {tutors.map(t => (
                                            <tr key={t.id}>
                                                <td className="font-medium text-[#0A192F]">{t.name}</td>
                                                <td className="text-[#64748B]">{t.email}</td>
                                                <td className="text-[#64748B]">{t.specialization || '—'}</td>
                                                <td><span className={`status-badge ${t.status === 'active' ? 'paid' : 'rejected'}`}>{t.status || 'inactive'}</span></td>
                                                <td>
                                                    <div className="action-btns">
                                                        <button onClick={() => openEditModal(t)} className="btn-sm navy">✏️ Edit</button>
                                                        <button onClick={() => toggleStatus(t.id, t.status)} className="btn-sm gold">
                                                            {t.status === 'active' ? '⏸️ Suspend' : '▶️ Activate'}
                                                        </button>
                                                        <button onClick={() => deleteTutor(t.id)} className="btn-sm delete">🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {showEditModal && (
                        <div className="modal-overlay open" onClick={closeEditModal}>
                            <div className="modal-box" onClick={(e) => e.stopPropagation()}>
                                <h3 className="text-lg font-semibold text-[#0A192F] mb-4">✏️ Edit Tutor</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                                        <input type="text" value={editFormData.name} onChange={(e) => setEditFormData({...editFormData, name: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                                        <input type="email" value={editFormData.email} onChange={(e) => setEditFormData({...editFormData, email: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                        <input type="tel" value={editFormData.phone} onChange={(e) => setEditFormData({...editFormData, phone: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Specialization *</label>
                                        <select value={editFormData.specialization} onChange={(e) => setEditFormData({...editFormData, specialization: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                            <option value="mathematics">Mathematics</option>
                                            <option value="english">English</option>
                                            <option value="kiswahili">Kiswahili</option>
                                            <option value="science">Science</option>
                                            <option value="social-studies">Social Studies</option>
                                            <option value="creative-arts">Creative Arts</option>
                                            <option value="business">Business</option>
                                            <option value="computer-studies">Computer Studies</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Status</label>
                                        <select value={editFormData.status} onChange={(e) => setEditFormData({...editFormData, status: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                            <option value="active">Active</option>
                                            <option value="suspended">Suspended</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={handleEditSave} className="btn-primary">💾 Save Changes</button>
                                        <button onClick={closeEditModal} className="btn-secondary">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── CLASSES MODULE ──
        function ClassesModule() {
            const { classes, setClasses, tutors, showToast } = useApp();
            const [formData, setFormData] = useState({
                title: '', level: '', tutor_id: '', price_per_learner: 0,
                meeting_link: '', scheduled_time: '', is_live: false, description: ''
            });

            const loadClasses = async () => {
                try {
                    const { data, error } = await sbClient
                        .from('classes')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!error && data) setClasses(data || []);
                    else setClasses([]);
                } catch (e) {
                    console.error('Load classes error:', e);
                    setClasses([]);
                }
            };

            useEffect(() => { loadClasses(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { title, level, tutor_id, meeting_link, scheduled_time } = formData;
                if (!title || !level || !tutor_id || !meeting_link || !scheduled_time) {
                    showToast('⚠️ Please fill in all required fields', 'error');
                    return;
                }
                const { error } = await sbClient
                    .from('classes')
                    .insert([{ ...formData, created_at: new Date().toISOString() }]);

                if (!error) {
                    showToast('✅ Class created successfully!');
                    setFormData({ title: '', level: '', tutor_id: '', price_per_learner: 0, meeting_link: '', scheduled_time: '', is_live: false, description: '' });
                    loadClasses();
                }
            };

            const toggleStatus = async (id, currentStatus) => {
                const { error } = await sbClient
                    .from('classes')
                    .update({ is_live: !currentStatus })
                    .eq('id', id);

                if (!error) {
                    showToast(`✅ Class ${!currentStatus ? 'started' : 'ended'}`);
                    loadClasses();
                }
            };

            const deleteClass = async (id) => {
                if (!confirm('Delete this class?')) return;
                const { error } = await sbClient
                    .from('classes')
                    .delete()
                    .eq('id', id);

                if (!error) {
                    showToast('✅ Class deleted');
                    loadClasses();
                }
            };

            return (
                <div className="fade-in space-y-6">
                    <div className="admin-form">
                        <div className="form-title">📹 Create Live Class</div>
                        <form onSubmit={handleSubmit} className="form-grid">
                            <div>
                                <label>Class Title <span className="required">*</span></label>
                                <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} required />
                            </div>
                            <div>
                                <label>Target Level <span className="required">*</span></label>
                                <select value={formData.level} onChange={(e) => setFormData({...formData, level: e.target.value})} required>
                                    <option value="">Select Level</option>
                                    <option value="primary-cbc">Primary School CBC</option>
                                    <option value="junior-secondary">Junior Secondary School (JSS)</option>
                                    <option value="high-school">High School 8-4-4 / SSS</option>
                                    <option value="exam-bootcamp">Exam Revision Bootcamp</option>
                                </select>
                            </div>
                            <div>
                                <label>Assign Tutor <span className="required">*</span></label>
                                <select value={formData.tutor_id} onChange={(e) => setFormData({...formData, tutor_id: e.target.value})} required>
                                    <option value="">Select Tutor</option>
                                    {tutors.filter(t => t.status === 'active').map(t => (
                                        <option key={t.id} value={t.id}>{t.name} ({t.specialization || 'General'})</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label>Price Per Learner (KES) <span className="required">*</span></label>
                                <input type="number" value={formData.price_per_learner} onChange={(e) => setFormData({...formData, price_per_learner: parseFloat(e.target.value) || 0})} min="0" required />
                            </div>
                            <div>
                                <label>Meeting Link <span className="required">*</span></label>
                                <input type="url" value={formData.meeting_link} onChange={(e) => setFormData({...formData, meeting_link: e.target.value})} placeholder="https://meet.google.com/..." required />
                            </div>
                            <div>
                                <label>Scheduled Time <span className="required">*</span></label>
                                <input type="datetime-local" value={formData.scheduled_time} onChange={(e) => setFormData({...formData, scheduled_time: e.target.value})} required />
                            </div>
                            <div>
                                <label>Status</label>
                                <select value={formData.is_live} onChange={(e) => setFormData({...formData, is_live: e.target.value === 'true'})}>
                                    <option value="false">🔴 Scheduled</option>
                                    <option value="true">🟢 Live Now</option>
                                </select>
                            </div>
                            <div className="full-width">
                                <label>Description</label>
                                <textarea value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} rows="2"></textarea>
                            </div>
                            <div className="full-width">
                                <button type="submit" className="btn-primary">📹 Create Class</button>
                            </div>
                        </form>
                    </div>

                    <div className="data-grid">
                        <div className="grid-header">
                            <h3>📋 Live Classes</h3>
                            <button onClick={loadClasses} className="btn-secondary" style={{padding: '6px 16px', fontSize: '0.75rem'}}>🔄 Refresh</button>
                        </div>
                        {classes.length === 0 ? (
                            <div className="text-center py-8 text-[#64748B]">No classes created yet</div>
                        ) : (
                            <div className="table-wrap">
                                <table className="orders-table">
                                    <thead>
                                        <tr>
                                            <th>Title</th>
                                            <th>Tutor</th>
                                            <th>Level</th>
                                            <th>Price</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {classes.map(c => {
                                            const tutor = tutors.find(t => t.id === c.tutor_id);
                                            return (
                                                <tr key={c.id}>
                                                    <td className="font-medium text-[#0A192F]">{c.title}</td>
                                                    <td className="text-[#64748B]">{tutor ? tutor.name : '—'}</td>
                                                    <td className="text-[#64748B]">{c.level || '—'}</td>
                                                    <td className="font-semibold text-[#D4A017]">{c.price_per_learner === 0 ? 'FREE' : 'KES ' + c.price_per_learner}</td>
                                                    <td><span className={`status-badge ${c.is_live ? 'paid' : 'pending'}`}>{c.is_live ? '🟢 Live' : '⏳ Scheduled'}</span></td>
                                                    <td>
                                                        <div className="action-btns">
                                                            <button onClick={() => toggleStatus(c.id, c.is_live)} className="btn-sm navy">
                                                                {c.is_live ? '⏸️ End' : '▶️ Start'}
                                                            </button>
                                                            <button onClick={() => deleteClass(c.id)} className="btn-sm delete">🗑️</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── FINANCE MODULE ──
        function FinanceModule() {
            const { orders } = useApp();
            
            const stats = useMemo(() => {
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                const paidOrders = orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed').length;
                const pendingOrders = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                const avgOrderValue = paidOrders > 0 ? totalRevenue / paidOrders : 0;
                return { totalRevenue, paidOrders, pendingOrders, avgOrderValue };
            }, [orders]);

            return (
                <div className="fade-in space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="stat-card">
                            <div className="stat-label">Total Revenue</div>
                            <div className="stat-value text-[#D4A017]">KES {stats.totalRevenue.toLocaleString()}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Paid Orders</div>
                            <div className="stat-value text-green-600">{stats.paidOrders}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Pending Orders</div>
                            <div className="stat-value text-amber-600">{stats.pendingOrders}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Avg Order Value</div>
                            <div className="stat-value">KES {stats.avgOrderValue.toFixed(0)}</div>
                        </div>
                    </div>

                    <div className="data-grid">
                        <div className="grid-header">
                            <h3>📋 All Orders</h3>
                        </div>
                        {orders.length === 0 ? (
                            <div className="text-center py-8 text-[#64748B]">No orders yet</div>
                        ) : (
                            <div className="table-wrap">
                                <table className="orders-table">
                                    <thead>
                                        <tr>
                                            <th>Reference</th>
                                            <th>Customer</th>
                                            <th>Amount</th>
                                            <th>Status</th>
                                            <th>Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {orders.map(o => (
                                            <tr key={o.id}>
                                                <td className="font-medium text-[#0A192F]">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                <td className="text-[#64748B]">{o.customer_name || 'N/A'}</td>
                                                <td className="font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                <td><span className={`status-badge ${o.payment_status || 'pending'}`}>{o.payment_status || 'pending'}</span></td>
                                                <td className="text-[#64748B]">{o.created_at ? new Date(o.created_at).toLocaleDateString() : '—'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                classes: <ClassesModule />,
                orders: <OrdersModule />,
                finance: <FinanceModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            return (
                <div className="admin-body flex min-h-screen">
                    <Sidebar />
                    <div className="main-content flex-1 min-w-0">
                        <Topbar />
                        <main className="tab-content active">
                            <ModuleRenderer />
                        </main>
                    </div>
                    <ToastContainer />
                </div>
            );
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
