<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin — Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── CSS VARIABLES ── */
        :root {
            --navy: #0A192F;
            --navy-light: #172A45;
            --navy-dark: #060F1A;
            --gold: #D4A017;
            --gold-light: #F5C842;
            --gold-pale: #FFFBF0;
            --white: #FFFFFF;
            --off-white: #FAFAFA;
            --surface: #F8F9FA;
            --text: #0A192F;
            --muted: #64748B;
            --border: #E8ECF0;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(10,25,47,0.05);
            --shadow-md: 0 4px 12px rgba(10,25,47,0.08);
            --shadow-lg: 0 10px 30px rgba(10,25,47,0.12);
            --transition: all 0.2s ease;
            --max-width: 1440px;
            --sidebar-width: 240px;
            --safearea-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FFFFFF;
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(20px + var(--safearea-bottom));
        }
        
        .admin-body {
            background: #FFFFFF;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--navy);
            color: #E8EDF5;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(212,160,23,0.15);
        }
        .sidebar-logo {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo span { color: var(--gold-light); }
        .sidebar-logo .badge-admin {
            font-size: 0.5rem;
            font-weight: 700;
            background: var(--gold);
            color: var(--navy);
            padding: 2px 10px;
            border-radius: 99px;
            letter-spacing: 0.5px;
        }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }
        .sidebar-nav .nav-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            padding: 8px 8px 4px;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            color: #A8B5C8;
            font-size: 0.82rem;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            margin-bottom: 2px;
            width: 100%;
            text-align: left;
        }
        .sidebar-nav .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--white);
        }
        .sidebar-nav .nav-item.active {
            background: rgba(212,160,23,0.15);
            color: var(--gold-light);
        }
        .sidebar-nav .nav-item .nav-icon { width: 20px; text-align: center; font-size: 0.9rem; }
        .sidebar-nav .nav-item .nav-badge {
            margin-left: auto;
            background: var(--gold);
            color: var(--navy);
            font-size: 0.55rem;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 99px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        .sidebar-footer .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #EF4444;
            font-weight: 600;
            font-size: 0.78rem;
            padding: 6px 0;
            cursor: pointer;
            transition: var(--transition);
        }
        .sidebar-footer .logout-btn:hover { color: #DC2626; }

        /* ── MAIN CONTENT ── */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            background: #FFFFFF;
        }

        /* ── TOP BAR ── */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.95);
        }
        .topbar .page-title { 
            font-family: 'Sora', sans-serif; 
            font-weight: 700; 
            font-size: 1.1rem;
            color: var(--navy);
        }
        .topbar .page-title .sub { 
            font-weight: 400; 
            color: var(--muted); 
            font-size: 0.8rem; 
            font-family: 'Inter', sans-serif; 
        }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar-right .admin-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .topbar-right .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #16A34A;
            font-weight: 600;
        }
        .topbar-right .live-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #16A34A;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ── HAMBURGER ── */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--navy);
            border-radius: 2px;
            transition: var(--transition);
        }

        /* ── TAB CONTENT ── */
        .tab-content {
            padding: 24px;
            display: none;
            background: #FFFFFF;
        }
        .tab-content.active { display: block; }

        /* ── STAT CARDS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .stat-card:hover { 
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }
        .stat-card .stat-value {
            font-family: 'Sora', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--navy);
            margin-top: 2px;
        }
        .stat-card .stat-value .currency { font-size: 1rem; color: var(--muted); }
        .stat-card .stat-change {
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .stat-card .stat-change.up { color: #16A34A; }
        .stat-card .stat-change.down { color: #DC2626; }

        /* ── CHART WRAPPER ── */
        .chart-wrapper {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .chart-header h3 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--navy);
        }
        .chart-header .chart-toggles {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }
        .chart-header .chart-toggles button {
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            transition: var(--transition);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .chart-header .chart-toggles button.active {
            background: var(--gold);
            color: var(--navy);
            box-shadow: var(--shadow-sm);
        }
        .chart-header .chart-toggles button:hover:not(.active) { background: rgba(0,0,0,0.04); }
        .chart-container { position: relative; height: 280px; }

        /* ── ORDERS SECTION ── */
        .orders-section {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }
        .orders-section .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .orders-section .section-header h3 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--navy);
        }
        .orders-section .section-header .live-badge {
            font-size: 0.65rem;
            font-weight: 700;
            color: #16A34A;
            background: #F0FDF4;
            padding: 2px 14px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .orders-section .section-header .live-badge .pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #16A34A;
            animation: pulse-dot 1.5s infinite;
        }

        .table-wrap { overflow-x: auto; }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .orders-table th {
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            color: var(--muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }
        .orders-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .orders-table tr:hover td { background: var(--gold-pale); }
        .orders-table .status-badge {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 99px;
            display: inline-block;
        }
        .status-badge.paid { background: #F0FDF4; color: #16A34A; }
        .status-badge.pending { background: #FEF3C7; color: #92400E; }
        .status-badge.failed { background: #FEF2F2; color: #DC2626; }
        .status-badge.verified { background: #DBEAFE; color: #1E40AF; }
        .status-badge.pending_verification { background: #FEF3C7; color: #92400E; }

        .mpesa-code-badge {
            background: var(--gold-pale);
            color: var(--navy);
            font-family: 'Inter', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 6px;
            border: 1px solid var(--gold);
            letter-spacing: 1px;
        }
        .mpesa-code-badge.empty {
            color: #F59E0B;
            background: #FEF3C7;
            border-color: #FCD34D;
            animation: pulse-amber 2s infinite;
            font-weight: 600;
        }
        @keyframes pulse-amber {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn-whatsapp {
            padding: 4px 14px;
            border-radius: 6px;
            background: #25D366;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-whatsapp:hover { 
            background: #1DA851; 
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(37,211,102,0.3);
        }

        /* ── FORMS ── */
        .admin-form {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .admin-form .form-title {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--navy);
            margin-bottom: 16px;
        }
        .admin-form .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .admin-form .form-grid .full-width { grid-column: 1 / -1; }
        .admin-form label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .admin-form label .required { color: #DC2626; }
        .admin-form input,
        .admin-form select,
        .admin-form textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background: var(--white);
            color: var(--text);
        }
        .admin-form input:focus,
        .admin-form select:focus,
        .admin-form textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,160,23,0.12);
        }
        .admin-form textarea { resize: vertical; min-height: 60px; }
        .admin-form .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--surface);
        }
        .admin-form .file-upload-area:hover { 
            border-color: var(--gold); 
            background: var(--gold-pale); 
        }
        .admin-form .file-upload-area .file-icon { font-size: 2rem; color: var(--muted); }
        .admin-form .file-upload-area .file-text { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

        /* ── BUTTONS ── */
        .btn-primary {
            padding: 10px 24px;
            background: var(--navy);
            color: var(--white);
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
        }
        .btn-primary:hover { 
            background: var(--navy-light); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10,25,47,0.2);
        }

        .btn-secondary {
            padding: 10px 24px;
            background: var(--gold);
            color: var(--navy);
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
        }
        .btn-secondary:hover { 
            background: var(--gold-light); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212,160,23,0.3);
        }

        /* ── DATA GRID ── */
        .data-grid {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }
        .data-grid .grid-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .data-grid .grid-header h3 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--navy);
        }

        .action-btns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .action-btns .btn-sm {
            padding: 2px 12px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .btn-sm.navy { background: var(--navy); color: var(--white); }
        .btn-sm.navy:hover { background: var(--navy-light); }
        .btn-sm.gold { background: var(--gold); color: var(--navy); }
        .btn-sm.gold:hover { background: var(--gold-light); }
        .btn-sm.activate { background: #F0FDF4; color: #16A34A; }
        .btn-sm.activate:hover { background: #DCFCE7; }
        .btn-sm.suspend { background: #FEF2F2; color: #DC2626; }
        .btn-sm.suspend:hover { background: #FEE2E2; }
        .btn-sm.edit { background: #EFF6FF; color: #2563EB; }
        .btn-sm.edit:hover { background: #DBEAFE; }
        .btn-sm.delete { background: #FEF2F2; color: #DC2626; }
        .btn-sm.delete:hover { background: #FEE2E2; }
        .btn-sm.draft { background: #FEF3C7; color: #92400E; }
        .btn-sm.live { background: #F0FDF4; color: #16A34A; }

        /* ── TOAST ── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
            max-width: 380px;
            width: 100%;
        }
        .toast-item {
            background: var(--white);
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--gold);
            margin-bottom: 8px;
            animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast-item .toast-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--navy);
        }
        .toast-item .toast-msg {
            font-size: 0.8rem;
            color: var(--muted);
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ALERT ── */
        .alert-warning {
            background: #FEF3C7;
            color: #92400E;
            border: 1px solid #FCD34D;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        /* ── SIDEBAR OVERLAY ── */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.open { display: block; }

        /* ── TOGGLE SWITCH ── */
        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: #D1D5DB;
            border-radius: 99px;
            transition: var(--transition);
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle-switch.active { background: #16A34A; }
        .toggle-switch .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .toggle-switch.active .toggle-knob { left: 18px; }

        /* ── LOGIN ── */
        .login-bg {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #1E3A5F 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px;
            pointer-events: none;
        }
        .login-box {

        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';

                const channel = sbClient
                    .channel('orders-live')
                    .on(
                        'postgres_changes',
                        { event: 'INSERT', schema: 'public', table: 'orders' },
                        (payload) => {
                            const newOrder = payload.new;
                            if (newOrder) {
                                setOrders(prev => [newOrder, ...prev]);
                                setNewOrderIds(prev => [newOrder.id, ...prev]);
                                setOrderBadgeCount(prev => prev + 1);
                                showToast(
                                    '🆕 New Order!',
                                    `Order #${newOrder.payment_ref || newOrder.id.slice(0, 8).toUpperCase()} - ${newOrder.customer_name || 'Customer'}`

            const generateSignedUrl = async (filePath) => {
                try {
                    if (!filePath) return null;
                    
                    let cleanPath = filePath;
                    cleanPath = cleanPath.replace(/^academic-resources\//, '');
                    cleanPath = cleanPath.replace(/^resources\//, '');
                    cleanPath = cleanPath.replace(/^\/+/, '');
                    cleanPath = decodeURIComponent(cleanPath);
                    
                    const { data, error } = await sbClient
                        .storage
                        .from(STORAGE_BUCKET)
                        .createSignedUrl(cleanPath, 604800);
                    
                    if (error) {

                    return data?.signedUrl || null;

            const sendWhatsApp = async (order) => {

                    window.open(whatsappUrl, '_blank', 'width=400,height=600');

                    await sbClient

                    await loadOrders();
                    
                } catch (e) {
                    console.error('WhatsApp error:', e);
                    showNotification('Error sending WhatsApp: ' + e.message, 'error');

            };

            return (

        // ── DASHBOARD MODULE ──
        function DashboardModule() {
            const { orders, resources, tutors, classes, chartRange, setChartRange } = useApp();
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const stats = useMemo(() => {
                const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                const pendingOrders = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;
                const paidOrders = orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed').length;
                const activeResources = resources.filter(r => r.status === 'live').length;
                return { totalRevenue, pendingOrders, paidOrders, activeResources, totalOrders: orders.length };
            }, [orders, resources]);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                    chartInstance.current = null;
                }

                const ctx = chartRef.current?.getContext('2d');
                if (!ctx) return;

                const days = chartRange === 'daily' ? 7 : chartRange === 'weekly' ? 30 : 90;
                const labels = [];
                const data = [];

                for (let i = days - 1; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const label = chartRange === 'daily' 
                        ? d.toLocaleDateString('en', { weekday: 'short' })
                        : d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
                    labels.push(label);

                    const dailyTotal = orders
                        .filter(o => {
                            const od = new Date(o.created_at);
                            return od.toDateString() === d.toDateString() && 
                                   (o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed');
                        })
                        .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                    data.push(dailyTotal);
                }

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Revenue (KES)',
                            data: data,
                            borderColor: '#D4A017',
                            backgroundColor: 'rgba(212, 160, 23, 0.1)',

                            pointBorderColor: '#fff',

                        maintainAspectRatio: false,
                        plugins: {

                            tooltip: {
                                callbacks: {
                                    label: function(context) {

                        scales: {

                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return 'KES ' + value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };
            }, [orders, chartRange]);

            return (
                <div className="fade-in space-y-6">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="stat-card">

                            <div className="stat-change up">{tutors.filter(t => t.status === 'active').length} active</div>

                    </div>

                    <div className="chart-wrapper">
                        <div className="chart-header">
                            <h3>📈 Revenue Overview</h3>
                            <div className="chart-toggles">
                                <button className={chartRange === 'daily' ? 'active' : ''} onClick={() => setChartRange('daily')}>Daily</button>
                                <button className={chartRange === 'weekly' ? 'active' : ''} onClick={() => setChartRange('weekly')}>Weekly</button>
                                <button className={chartRange === 'monthly' ? 'active' : ''} onClick={() => setChartRange('monthly')}>Monthly</button>

                        <div className="chart-container">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>

                    <div className="orders-section">
                        <div className="section-header">
                            <h3>📋 Recent Orders</h3>
                            <div className="live-badge">
                                <span className="pulse"></span>
                                Live Updates
                            </div>
                        </div>
                        {orders.slice(0, 5).length === 0 ? (
                            <div className="text-center py-8 text-[#64748B]">No orders yet</div>
                        ) : (
                            <div className="table-wrap">
                                <table className="orders-table">
                                    <thead>
                                        <tr>
                                            <th>Reference</th>
                                            <th>Customer</th>
                                            <th>Amount</th>

                                                <td className="text-[#64748B]">{o.customer_name || 'N/A'}</td>
                                                <td className="font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>

        // ── ORDERS MODULE ──
        function OrdersModule() {
            const { orders, loadOrders, showToast, newOrderIds, sendWhatsApp } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);

            useEffect(() => {
                const interval = setInterval(() => loadOrders(), 10000);
                return () => clearInterval(interval);
            }, []);

            const handleConfirmOrder = async (order) => {
                if (!confirm(`Confirm order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                setLoadingOrderId(order.id);
                try {
                    await sendWhatsApp(order);
                    await loadOrders();
                    showToast('✅ Order confirmed and WhatsApp sent!', 'success');
                } catch (e) {
                    showToast('❌ Error confirming order: ' + e.message, 'error');
                }
                setLoadingOrderId(null);
            };

            const handleRejectOrder = async (order) => {
                if (!confirm(`Reject order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                try {
                    const { error } = await sbClient
                        .from('orders')
                        .update({ payment_status: 'cancelled' })
                        .eq('id', order.id);
                    if (!error) {
                        showToast('❌ Order rejected', 'success');
                        await loadOrders();
                    }
                } catch (e) {
                    showToast('Error rejecting order', 'error');
                }
            };

            const filteredOrders = orders.filter(o => {
                if (filter === 'pending') return o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                if (filter === 'paid') return o.payment_status === 'paid' || o.payment_status === 'confirmed' || o.payment_status === 'completed';
                if (filter === 'cancelled') return o.payment_status === 'cancelled';
                return true;
            });

            const pendingCount = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;

            return (
                <div className="fade-in">
                    <div className="orders-section">
                        <div className="section-header">
                            <h2 className="text-xl font-bold text-[#0A192F]">
                                📦 Orders ({orders.length})
                                {pendingCount > 0 && (
                                    <span className="ml-2 text-xs bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full animate-pulse">
                                        {pendingCount} pending
                                    </span>
                                )}
                            </h2>
                            <button onClick={() => loadOrders()} className="btn-primary" style={{padding: '6px 16px', fontSize: '0.75rem'}}>
                                🔄 Refresh
                            </button>
                        </div>

                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0A192F]' : 'bg-gray-100 text-gray-600'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0A192F]' : 'bg-gray-100 text-gray-600'}`}>Pending</button>
                            <button onClick={() => setFilter('paid')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'paid' ? 'bg-[#D4A017] text-[#0A192F]' : 'bg-gray-100 text-gray-600'}`}>Paid</button>
                            <button onClick={() => setFilter('cancelled')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'cancelled' ? 'bg-[#D4A017] text-[#0A192F]' : 'bg-gray-100 text-gray-600'}`}>Cancelled</button>
                        </div>

                        {filteredOrders.length === 0 ? (
                            <div className="text-center py-8 text-[#64748B]">No orders found</div>
                        ) : (
                            <div className="table-wrap">
                                <table className="orders-table">
                                    <thead>
                                        <tr>
                                            <th>Reference</th>
                                            <th>Customer</th>
                                            <th>Items</th>
                                            <th>Total</th>
                                            <th>Status</th>
                                            <th>M-PESA Code</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.map(o => {
                                            const isNew = newOrderIds.includes(o.id);
                                            const isPending = o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                                            const hasCode = o.mpesa_code && o.mpesa_code.length >= 4;
                                            
                                            return (
                                                <tr key={o.id} className={`${isPending ? 'bg-amber-50' : ''} ${isNew ? 'new-order-flash' : ''}`}>
                                                    <td className="font-medium text-[#0A192F]">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                    <td className="text-[#64748B]">
                                                        {o.customer_name || 'N/A'}
                                                        <br /><small className="text-xs">{o.customer_phone || ''}</small>
                                                    </td>
                                                    <td className="text-[#64748B]">
                                                        <span className="text-xs bg-gray-100 px-2 py-1 rounded-full">
                                                            {o.item_count || 0} items
                                                        </span>
                                                    </td>
                                                    <td className="font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                    <td>
                                                        <span className={`status-badge ${
                                                            o.payment_status === 'pending_verification' ? 'pending_verification' :
                                                            o.payment_status === 'paid' || o.payment_status === 'confirmed' ? 'paid' :
                                                            o.payment_status === 'completed' ? 'verified' :
                                                            o.payment_status === 'cancelled' ? 'failed' :
                                                            'pending'
                                                        }`}>
                                                            {o.payment_status === 'pending_verification' ? '⏳ Pending' :
                                                             o.payment_status === 'paid' || o.payment_status === 'confirmed' ? '✅ Paid' :
                                                             o.payment_status === 'completed' ? '✅ Verified' :
                                                             o.payment_status === 'cancelled' ? '❌ Cancelled' :
                                                             'Pending'}
                                                        </span>
                                                        {isNew && <span className="ml-1 text-xs text-green-500 font-bold">NEW!</span>}
                                                    </td>
                                                    <td>
                                                        {hasCode ? (
                                                            <span className="mpesa-code-badge">{o.mpesa_code}</span>
                                                        ) : (
                                                            <span className="mpesa-code-badge empty">⏳ Awaiting Code...</span>
                                                        )}
                                                    </td>
                                                    <td>
                                                        <div className="flex gap-2 flex-wrap">
                                                            {isPending && (
                                                                <>
                                                                    <button 
                                                                        onClick={() => handleConfirmOrder(o)} 
                                                                        disabled={loadingOrderId === o.id}
                                                                        className="btn-sm navy flex items-center gap-1"
                                                                    >
                                                                        {loadingOrderId === o.id ? (
                                                                            <><span className="spinner"></span> Processing</>
                                                                        ) : (
                                                                            '✅ Confirm'
                                                                        )}
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => handleRejectOrder(o)} 
                                                                        className="btn-sm gold"
                                                                    >
                                                                        ❌ Reject
                                                                    </button>
                                                                </>
                                                            )}
                                                            {(o.payment_status === 'paid' || o.payment_status === 'confirmed') && (
                                                                <button 
                                                                    onClick={() => sendWhatsApp(o)} 
                                                                    className="btn-whatsapp"
                                                                >
                                                                    💬 Resend
                                                                </button>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── RESOURCES MODULE ──
        function ResourcesModule() {
            const { resources, setResources, showToast } = useApp();
            const [uploading, setUploading] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);
            const [editingResource, setEditingResource] = useState(null);
            const [editFormData, setEditFormData] = useState({ title: '', price: 0, status: 'draft' });
            const [showEditModal, setShowEditModal] = useState(false);
            const [formData, setFormData] = useState({
                title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: ''
            });

            const loadResources = async () => {
                try {
                    const { data, error } = await sbClient
                        .from('resources')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!error && data) setResources(data || []);
                    else setResources([]);
                } catch (e) {
                    console.error('Load resources error:', e);
                    setResources([]);
                }
            };

            useEffect(() => { loadResources(); }, []);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) setSelectedFile(file);
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                const { title, subject, level, resource_type } = formData;
                if (!title || !subject || !level || !resource_type || !selectedFile) {
                    showToast('⚠️ Please fill in all required fields and select a file', 'error');
                    return;
                }

                setUploading(true);
                try {
                    const fileExt = selectedFile.name.split('.').pop();
                    const filePath = `resources/${Date.now()}-${title.replace(/\s+/g, '_')}.${fileExt}`;

                    const { error: uploadError } = await sbClient
                        .storage
                        .from(STORAGE_BUCKET)
                        .upload(filePath, selectedFile);

                    if (uploadError) throw new Error(uploadError.message);

                    const resourceData = {
                        title, subject, level,
                        curriculum: formData.curriculum,
                        resource_type: formData.resource_type,
                        price: parseFloat(formData.price) || 0,
                        description: formData.description,
                        file_url: filePath,
                        status: 'draft',
                        created_at: new Date().toISOString(),
                        download_count: 0
                    };

                    const { error: insertError } = await sbClient
                        .from('resources')
                        .insert([resourceData]);

                    if (insertError) throw new Error(insertError.message);

                    showToast('✅ Resource uploaded successfully!');
                    setFormData({ title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: '' });
                    setSelectedFile(null);
                    document.getElementById('fileInput').value = '';
                    loadResources();
                } catch (err) {
                    showToast('❌ Upload failed: ' + err.message, 'error');
                }
                setUploading(false);
            };

            const openEditModal = (resource) => {
                setEditingResource(resource);
                setEditFormData({
                    title: resource.title || '',
                    price: resource.price || 0,
                    status: resource.status || 'draft'
                });
                setShowEditModal(true);
            };

            const closeEditModal = () => {
                setShowEditModal(false);
                setEditingResource(null);
            };

            const handleEditSave = async () => {
                if (!editingResource) return;
                try {
                    const { error } = await sbClient
                        .from('resources')
                        .update({
                            title: editFormData.title,
                            price: parseFloat(editFormData.price) || 0,
                            status: editFormData.status
                        })
                        .eq('id', editingResource.id);

                    if (error) throw new Error(error.message);

                    showToast('✅ Resource updated successfully!');
                    closeEditModal();
                    loadResources();
                } catch (e) {
                    showToast('❌ Update failed: ' + e.message, 'error');
                }
            };

            const toggleStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'live' ? 'draft' : 'live';
                const { error } = await sbClient
                    .from('resources')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (!error) {
                    showToast(`✅ Resource ${newStatus === 'live' ? 'published' : 'drafted'}`);
                    loadResources();
                }
            };

            const deleteResource = async (id) => {
                if (!confirm('Delete this resource permanently?')) return;
                try {
                    const { error } = await sbClient
                        .from('resources')
                        .delete()
                        .eq('id', id);

                    if (!error) {
                        showToast('✅ Resource deleted');
                        loadResources();
                    }
                } catch (e) {
                    showToast('❌ Delete failed', 'error');
                }
            };

            return (
                <div className="fade-in space-y-6">
                    <div className="admin-form">
                        <div className="form-title">📤 Upload New Resource</div>
                        <form onSubmit={handleUpload} className="space-y-4">
                            <div className="form-grid">
                                <div>
                                    <label>Title <span className="required">*</span></label>
                                    <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} required />
                                </div>
                                <div>
                                    <label>Subject <span className="required">*</span></label>
                                    <select value={formData.subject} onChange={(e) => setFormData({...formData, subject: e.target.value})} required>
                                        <option value="">Select</option>
                                        <option value="mathematics">Mathematics</option>
                                        <option value="english">English</option>
                                        <option value="kiswahili">Kiswahili</option>
                                        <option value="integrated-science">Integrated Science</option>
                                        <option value="social-studies">Social Studies</option>
                                        <option value="biology">Biology</option>
                                        <option value="chemistry">Chemistry</option>
                                        <option value="physics">Physics</option>
                                        <option value="business">Business</option>
                                        <option value="computer-studies">Computer Studies</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Level <span className="required">*</span></label>
                                    <select value={formData.level} onChange={(e) => setFormData({...formData, level: e.target.value})} required>
                                        <option value="">Select</option>
                                        <option value="pp1">PP1</option><option value="pp2">PP2</option>
                                        <option value="grade-1">Grade 1</option><option value="grade-2">Grade 2</option>
                                        <option value="grade-3">Grade 3</option><option value="grade-4">Grade 4</option>
                                        <option value="grade-5">Grade 5</option><option value="grade-6">Grade 6</option>
                                        <option value="grade-7">Grade 7</option><option value="grade-8">Grade 8</option>
                                        <option value="grade-9">Grade 9</option><option value="grade-10">Grade 10</option>
                                        <option value="grade-11">Grade 11</option><option value="grade-12">Grade 12</option>
                                        <option value="form-1">Form 1</option><option value="form-2">Form 2</option>
                                        <option value="form-3">Form 3</option><option value="form-4">Form 4</option>
                                        <option value="college">College</option><option value="tvet">TVET</option>
                                        <option value="university">University</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Resource Type <span className="required">*</span></label>
                                    <select value={formData.resource_type} onChange={(e) => setFormData({...formData, resource_type: e.target.value})} required>
                                        <option value="lesson-plan">Lesson Plan</option>
                                        <option value="scheme-work">Scheme of Work</option>
                                        <option value="revision-paper">Revision Paper</option>
                                        <option value="cbc-portfolio">CBC Portfolio</option>
                                        <option value="exam-paper">Exam Paper</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Curriculum</label>
                                    <select value={formData.curriculum} onChange={(e) => setFormData({...formData, curriculum: e.target.value})}>
                                        <option value="cbc">CBC</option>
                                        <option value="8-4-4">8-4-4</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Price (KES)</label>
                                    <input type="number" value={formData.price} onChange={(e) => setFormData({...formData, price: parseFloat(e.target.value) || 0})} min="0" />
                                </div>
                            </div>
                            <div>
                                <label>Description</label>
                                <textarea value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} rows="2"></textarea>
                            </div>
                            <div>
                                <label>Upload File <span className="required">*</span></label>
                                <div className="file-upload-area" onClick={() => document.getElementById('fileInput').click()}>
                                    <input type="file" id="fileInput" style={{display:'none'}} onChange={handleFileSelect} accept=".pdf,.docx,.pptx,.jpg,.jpeg,.png" />
                                    <div className="file-icon">📄</div>
                                    <div className="file-text">{selectedFile ? selectedFile.name : 'Click to upload'}</div>
                                    {selectedFile && <div className="text-xs text-[#64748B] mt-1">{(selectedFile.size / 1024 / 1024).toFixed(2)} MB</div>}
                                </div>
                            </div>
                            <button type="submit" disabled={uploading} className="btn-primary" style={{padding: '10px 24px'}}>
                                {uploading ? '⏳ Uploading...' : '📤 Upload Resource'}
                            </button>
                        </form>
                    </div>

                    <div className="data-grid">
                        <div className="grid-header">
                            <h3>📚 Resource Inventory</h3>
                            <button onClick={loadResources} className="btn-secondary" style={{padding: '6px 16px', fontSize: '0.75rem'}}>🔄 Refresh</button>
                        </div>
                        {resources.length === 0 ? (
                            <div className="text-center py-8 text-[#64748B]">No resources uploaded yet</div>
                        ) : (
                            <div className="table-wrap">
                                <table className="orders-table">
                                    <thead>
                                        <tr>
                                            <th>Title</th>
                                            <th>Subject</th>
                                            <th>Level</th>
                                            <th>Price</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {resources.map(r => (
                                            <tr key={r.id}>
                                                <td className="font-medium text-[#0A192F]">{r.title}</td>
                                                <td className="text-[#64748B]">{r.subject || '—'}</td>
                                                <td className="text-[#64748B]">{r.level || '—'}</td>
                                                <td className="font-semibold text-[#D4A017]">{r.price === 0 ? 'FREE' : 'KES ' + r.price}</td>
                                                <td><span className={`status-badge ${r.status === 'live' ? 'paid' : 'pending'}`}>{r.status || 'draft'}</span></td>
                                                <td>
                                                    <div className="action-btns">
                                                        <button onClick={() => openEditModal(r)} className="btn-sm navy">✏️ Edit</button>
                                                        <button onClick={() => toggleStatus(r.id, r.status)} className="btn-sm gold">
                                                            {r.status === 'live' ? '📄 Draft' : '✅ Publish'}
                                                        </button>
                                                        <button onClick={() => deleteResource(r.id)} className="btn-sm delete">🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {showEditModal && (
                        <div className="modal-overlay open" onClick={closeEditModal}>
