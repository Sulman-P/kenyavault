<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background: #111827;
            color: #e5e7eb;
        }

        /* ── SIDEBAR STYLES ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: #0a1a3a;
            color: #fff;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .dark .sidebar {
            background: #0f172a;
        }

        /* Sidebar open state */
        .sidebar.open {
            transform: translateX(0);
        }

        /* ── OVERLAY ── */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── SIDEBAR HEADER WITH CLOSE BUTTON ── */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
        .sidebar-header .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
        }
        .sidebar-header .logo span { color: #FCD34D; }
        .sidebar-close-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .sidebar-close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ── SIDEBAR MENU ── */
        .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }
        .sidebar-menu .menu-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.3);
            padding: 0 12px 8px;
        }
        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }
        .sidebar-menu .menu-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .sidebar-menu .menu-item.active {
            background: rgba(212, 160, 23, 0.15);
            color: #FCD34D;
            border-left: 3px solid #D4A017;
        }
        .sidebar-menu .menu-item i {
            width: 20px;
            font-size: 1rem;
            text-align: center;
        }
        .sidebar-menu .menu-item .badge {
            margin-left: auto;
            background: rgba(212, 160, 23, 0.2);
            color: #FCD34D;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .pending-badge {
            position: relative;
        }
        .pending-badge .badge-count {
            position: absolute;
            top: -4px;
            right: -8px;
            background: #dc2626;
            color: white;
            font-size: 0.55rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-badge 2s infinite;
        }
        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* ── SIDEBAR FOOTER ── */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }
        .sidebar-footer .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            color: #ef4444;
            background: rgba(220, 38, 38, 0.1);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .sidebar-footer .logout-btn:hover {
            background: rgba(220, 38, 38, 0.2);
        }
        .sidebar-footer .logout-btn i {
            font-size: 1rem;
        }

        /* ── TOP NAVBAR ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dark .topbar {
            background: rgba(17, 24, 39, 0.9);
            border-color: #374151;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            color: #1f2937;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .dark .hamburger-btn {
            color: #f3f4f6;
        }
        .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .dark .hamburger-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .topbar-title {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #1f2937;
        }
        .dark .topbar-title { color: #f3f4f6; }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            color: #6b7280;
        }
        .topbar-actions button:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .dark .topbar-actions button {
            color: #9ca3af;
        }
        .dark .topbar-actions button:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .topbar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #D4A017;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a1a3a;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #16a34a;
            background: #dcfce7;
            padding: 4px 12px;
            border-radius: 99px;
        }
        .dark .live-indicator {
            background: rgba(22, 163, 74, 0.2);
            color: #34d399;
        }
        .live-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #16a34a;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            min-height: 100vh;
            padding: 20px;
            background: #f3f4f6;
            transition: margin-left 0.3s ease;
        }
        .dark .main-content {
            background: #111827;
        }

        /* ── DESKTOP SIDEBAR BEHAVIOR ── */
        @media (min-width: 769px) {
            .sidebar {
                transform: translateX(0) !important;
                position: sticky;
                top: 0;
                height: 100vh;
                flex-shrink: 0;
            }
            .sidebar-overlay {
                display: none !important;
            }
            .sidebar-close-btn {
                display: none !important;
            }
            .hamburger-btn {
                display: none !important;
            }
            .dashboard-wrapper {
                display: flex;
            }
            .main-content {
                margin-left: 0;
            }
        }

        /* ── MOBILE SIDEBAR BEHAVIOR ── */
        @media (max-width: 768px) {
            .sidebar {
                width: 80%;
                max-width: 320px;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-close-btn {
                display: block !important;
            }
            .hamburger-btn {
                display: block !important;
            }
            .dashboard-wrapper {
                display: block;
            }
            .main-content {
                padding: 16px;
                width: 100%;
            }
            .topbar {
                padding: 0 16px;
                height: 60px;
            }
            .topbar-title {
                font-size: 0.9rem;
            }
            .live-indicator .label {
                display: none;
            }
            .live-indicator {
                padding: 4px 8px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 85%;
            }
            .main-content {
                padding: 12px;
            }
            .topbar {
                padding: 0 12px;
                height: 56px;
            }
        }

        /* ── SCROLLBAR ── */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 2px; }

        /* ── STATUS BADGES ── */
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.confirmed { background: #dbeafe; color: #1e40af; }
        .status-badge.live { background: #d1fae5; color: #065f46; }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.confirmed { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.live { background: #064e3b; color: #34d399; }

        /* ── STAT CARDS ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        .dark .stat-card {
            background: #1f2937;
            border-color: #374151;
        }
        .stat-card .stat-icon { font-size: 1.4rem; }
        .stat-card .stat-number {
            font-weight: 800;
            font-size: 1.5rem;
            color: #0a1a3a;
        }
        .dark .stat-card .stat-number { color: #fff; }
        .stat-card .stat-number.gold { color: #D4A017; }
        .stat-card .stat-number.green { color: #16a34a; }
        .stat-card .stat-number.purple { color: #8b5cf6; }
        .stat-card .stat-number.blue { color: #3b82f6; }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: #6b7280;
        }
        .dark .stat-card .stat-label { color: #9ca3af; }

        .content-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }
        .dark .content-card {
            background: #1f2937;
            border-color: #374151;
        }
        .content-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        .dark .content-card .card-header {
            border-color: #374151;
        }
        .content-card .card-header h3 {
            font-weight: 700;
            font-size: 1rem;
            color: #1f2937;
        }
        .dark .content-card .card-header h3 { color: #fff; }

        .btn-gold {
            background: #D4A017;
            color: #0a1a3a;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-gold:hover {
            background: #FCD34D;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.7rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-sm.green { background: #dcfce7; color: #16a34a; }
        .btn-sm.red { background: #fee2e2; color: #dc2626; }
        .btn-sm.blue { background: #dbeafe; color: #2563eb; }
        .dark .btn-sm.green { background: rgba(22, 163, 74, 0.2); color: #34d399; }
        .dark .btn-sm.red { background: rgba(220, 38, 38, 0.2); color: #f87171; }
        .dark .btn-sm.blue { background: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        .btn-sm:hover { transform: translateY(-1px); }

        .btn-sm .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead {
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
        }
        .dark thead {
            background: #1f2937;
            border-color: #374151;
        }
        th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #6b7280;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dark th { color: #9ca3af; }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            color: #1f2937;
        }
        .dark td {
            border-color: #374151;
            color: #e5e7eb;
        }
        tr:hover td { background: #f9fafb; }
        .dark tr:hover td { background: #1f2937; }

        .new-order-flash {
            animation: flashRow 1s ease 3;
        }
        @keyframes flashRow {
            0%, 100% { background: transparent; }
            50% { background: rgba(212, 160, 23, 0.1); }
        }
        .dark .new-order-flash {
            animation: flashRowDark 1s ease 3;
        }
        @keyframes flashRowDark {
            0%, 100% { background: transparent; }
            50% { background: rgba(212, 160, 23, 0.15); }
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99999;
            max-width: 380px;
            width: 100%;
        }
        .toast-item {
            background: white;
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border-left: 4px solid #7C3AED;
            margin-bottom: 8px;
            animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dark .toast-item { background: #1f2937; }
        .toast-item .toast-title { font-weight: 600; font-size: 0.85rem; color: #1f2937; }
        .dark .toast-item .toast-title { color: #f3f4f6; }
        .toast-item .toast-msg { font-size: 0.8rem; color: #6b7280; }
        .dark .toast-item .toast-msg { color: #9ca3af; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ── PENDING ALERT ── */
        .pending-alert {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99998;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .pending-alert .alert-text {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .pending-alert .alert-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.75rem;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 640px) {
            .toast-container {
                bottom: 10px;
                right: 10px;
                max-width: calc(100% - 20px);
            }
            .pending-alert {
                bottom: 10px;
                padding: 8px 14px;
                width: calc(100% - 20px);
                font-size: 0.8rem;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .stat-card {
                padding: 12px 14px;
            }
            .stat-card .stat-number {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 420px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;

    // ── SUPABASE CONFIG ──
    const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';

    const ADMIN_CREDENTIALS = {
        username: 'adminnexalearn@gmail.com',
        password: 'KenyaVault2026'
    };

    const adminModules = [
        { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
        { id: 'orders', icon: 'fa-shopping-bag', label: 'Orders' },
        { id: 'resources', icon: 'fa-book', label: 'Resources' },
        { id: 'tutors', icon: 'fa-users', label: 'Tutors' },
        { id: 'classes', icon: 'fa-video', label: 'Classes' },
        { id: 'finance', icon: 'fa-coins', label: 'Finance' },
        { id: 'settings', icon: 'fa-gear', label: 'Settings' },
    ];

    // ── CONTEXT ──
    const AppContext = createContext(null);

    function AppProvider({ children }) {
        const [darkMode, setDarkMode] = useState(() => localStorage.getItem('kv-dark-mode') === 'true');
        const [currentModule, setCurrentModule] = useState('dashboard');
        const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('kv-auth') === 'true');
        const [authLoading, setAuthLoading] = useState(false);
        const [authError, setAuthError] = useState('');
        const [loading, setLoading] = useState(true);
        const [toast, setToast] = useState(null);
        const [orders, setOrders] = useState([]);
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [pendingOrderCount, setPendingOrderCount] = useState(0);
        const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);

        useEffect(() => {
            localStorage.setItem('kv-dark-mode', darkMode);
            if (darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }, [darkMode]);

        useEffect(() => {
            const handleResize = () => {
                setIsMobile(window.innerWidth <= 768);
                if (window.innerWidth > 768) {
                    setSidebarOpen(false);
                }
            };
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
        }, []);

        useEffect(() => {
            if (isAuthenticated) loadData();
        }, [isAuthenticated]);

        const showToast = (title, message, type = 'success') => {
            setToast({ title, message, type, id: Date.now() });
            setTimeout(() => setToast(null), 4000);
        };

        const loadOrders = async () => {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    setOrders(data || []);
                    setPendingOrderCount(data.filter(o => o.payment_status === 'pending' || o.status === 'pending').length);
                }
            } catch (e) { console.error('Load orders error:', e); }
        };

        const loadData = async () => {
            setLoading(true);
            await loadOrders();
            setLoading(false);
        };

        const login = (username, password) => {
            setAuthLoading(true);
            setAuthError('');
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                        sessionStorage.setItem('kv-auth', 'true');
                        setIsAuthenticated(true);
                        setAuthLoading(false);
                        resolve(true);
                    } else {
                        setAuthError('Invalid username or password.');
                        setAuthLoading(false);
                        reject(new Error('Invalid credentials'));
                    }
                }, 800);
            });
        };

        const logout = () => {
            sessionStorage.removeItem('kv-auth');
            setIsAuthenticated(false);
            setCurrentModule('dashboard');
            window.location.href = '/';
        };

        const toggleDarkMode = () => setDarkMode(!darkMode);
        const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
        const closeSidebar = () => setSidebarOpen(false);

        return (
            <AppContext.Provider value={{
                darkMode, toggleDarkMode,
                currentModule, setCurrentModule,
                isAuthenticated,
                authLoading, authError, login, logout,
                loading,
                orders, setOrders, loadOrders,
                toast, showToast,
                sidebarOpen, toggleSidebar, closeSidebar,
                isMobile,
                pendingOrderCount,
                TUTOR_PAYOUT_PERCENTAGE: 80
            }}>
                {children}
            </AppContext.Provider>
        );
    }

        const context = useContext(AppContext);

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                    method: 'PATCH',

                        'apikey': SUPABASE_ANON_KEY,

                        'Content-Type': 'application/json'

                });

                    showToast('✅ Order confirmed!', 'success');
                    await loadOrders();
                } else throw new Error('Failed to confirm');
            } catch (e) {
                showToast('❌ Error: ' + e.message, 'error');

            setLoadingId(null);
        };

        const handleReject = async (order) => {
            if (!confirm(`Reject order #${order.order_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'

                    body: JSON.stringify({ payment_status: 'rejected', status: 'rejected' })

                    showToast('❌ Order rejected', 'success');

    // ── FINANCE MODULE ──
function FinanceModule() {
    const { orders, tutors, payments, setPayments, showNotification, TUTOR_PAYOUT_PERCENTAGE } = useApp();
    const [selectedTutor, setSelectedTutor] = useState(null);
    const [showPaymentModal, setShowPaymentModal] = useState(false);
    const [paymentAmount, setPaymentAmount] = useState(0);
    const [showAuditModal, setShowAuditModal] = useState(false);
    const [auditData, setAuditData] = useState({
        marketing_spent: 0,
        tutor_payouts_total: 0,
        notes: ''
    });
    const [auditLoading, setAuditLoading] = useState(false);
    const [financeSummary, setFinanceSummary] = useState({
        total_revenue: 0,
        platform_fee: 0,
        tutor_payouts: 0,
        marketing_spent: 0,
        actual_balance: 0,
        pending_payouts: 0
    });

    const loadPayments = async () => {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments?select=*&order=created_at.desc`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (response.ok) {
                const data = await response.json();
                setPayments(data || []);
                return data;
            }
        } catch (e) { console.error('Load payments error:', e); }
    };

    // ── LOAD FINANCE SUMMARY ──
    const loadFinanceSummary = async () => {
        try {
            // Load finance settings from localStorage or Supabase
            const savedAudit = localStorage.getItem('kv_finance_audit');
            if (savedAudit) {
                const parsed = JSON.parse(savedAudit);
                setAuditData({
                    marketing_spent: parsed.marketing_spent || 0,
                    tutor_payouts_total: parsed.tutor_payouts_total || 0,
                    notes: parsed.notes || ''
                });
            }

            // Calculate totals from orders
            const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
            const platformFee = totalRevenue * 0.2;
            const tutorEarnings = totalRevenue * 0.8;

            // Calculate pending payouts (orders not yet paid to tutors)
            const pendingPayouts = orders
                .filter(o => o.payment_status === 'confirmed' || o.payment_status === 'completed' || o.status === 'confirmed')
                .reduce((sum, o) => sum + Math.round((o.total_amount || o.item_price || 0) * 0.8), 0);

            // Get paid payouts
            const paidPayouts = payments
                .filter(p => p.status === 'paid')
                .reduce((sum, p) => sum + (p.amount || 0), 0);

            // Get audit data
            const marketingSpent = auditData.marketing_spent || 0;
            const tutorPayoutsTotal = auditData.tutor_payouts_total || paidPayouts;

            // Calculate actual balance
            const actualBalance = totalRevenue - marketingSpent - tutorPayoutsTotal;

            setFinanceSummary({
                total_revenue: totalRevenue,
                platform_fee: platformFee,
                tutor_payouts: tutorPayoutsTotal,
                marketing_spent: marketingSpent,
                actual_balance: actualBalance,
                pending_payouts: pendingPayouts
            });

        } catch (e) {
            console.error('Error loading finance summary:', e);
        }
    };

    useEffect(() => {
        loadPayments();
    }, []);

    useEffect(() => {
        loadFinanceSummary();
    }, [orders, payments]);

    // ── SAVE AUDIT ──
    const saveAudit = async () => {
        if (!confirm('Save audit changes? This will update the account balance.')) return;
        
        setAuditLoading(true);
        try {
            const auditRecord = {
                marketing_spent: parseFloat(auditData.marketing_spent) || 0,
                tutor_payouts_total: parseFloat(auditData.tutor_payouts_total) || 0,
                notes: auditData.notes || '',
                updated_at: new Date().toISOString(),
                updated_by: 'Admin'
            };

            localStorage.setItem('kv_finance_audit', JSON.stringify(auditRecord));
            
            // Update the actual balance
            const totalRevenue = orders.reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
            const actualBalance = totalRevenue - auditRecord.marketing_spent - auditRecord.tutor_payouts_total;
            
            setFinanceSummary(prev => ({
                ...prev,
                marketing_spent: auditRecord.marketing_spent,
                tutor_payouts: auditRecord.tutor_payouts_total,
                actual_balance: actualBalance
            }));

            showNotification('✅ Audit saved successfully!', 'success');
            setShowAuditModal(false);
        } catch (e) {
            showNotification('❌ Failed to save audit: ' + e.message, 'error');
        }
        setAuditLoading(false);
    };

    // ── CALCULATE TUTOR EARNINGS ──
    const calculateTutorEarnings = (tutorId) => {
        const tutorOrders = orders.filter(o => o.tutor_id === tutorId);
        let totalRevenue = 0;
        let completedRevenue = 0;
        
        tutorOrders.forEach(o => {
            const amount = o.total_amount || o.item_price || 0;
            totalRevenue += amount;
            if (o.payment_status === 'confirmed' || o.payment_status === 'completed' || o.status === 'confirmed') {
                completedRevenue += amount;
            }
        });
        
        const tutorPayout = totalRevenue * (TUTOR_PAYOUT_PERCENTAGE / 100);
        const completedPayout = completedRevenue * (TUTOR_PAYOUT_PERCENTAGE / 100);
        
        return {
            totalRevenue,
            completedRevenue,
            tutorPayout,
            completedPayout,
            ordersCount: tutorOrders.length
        };
    };

    // ── PROCESS TUTOR PAYMENT ──
    const handleProcessPayment = async (tutor) => {
        const earnings = calculateTutorEarnings(tutor.id);
        const pendingAmount = earnings.completedPayout;
        
        if (pendingAmount <= 0) {
            showNotification('⚠️ No pending earnings for this tutor', 'warning');
            return;
        }
        
        setSelectedTutor(tutor);
        setPaymentAmount(pendingAmount);
        setShowPaymentModal(true);
    };

    const confirmPayment = async () => {
        if (!selectedTutor) return;
        
        try {
            const paymentData = {
                tutor_id: selectedTutor.id,
                tutor_name: selectedTutor.name,
                amount: paymentAmount,
                status: 'paid',
                payment_date: new Date().toISOString(),
                created_at: new Date().toISOString()
            };
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(paymentData)
            });
            
            if (response.ok) {
                showNotification(`✅ Payment of KES ${paymentAmount.toLocaleString()} processed for ${selectedTutor.name}`, 'success');
                setShowPaymentModal(false);
                await loadPayments();
                await loadFinanceSummary();
            } else {
                throw new Error('Failed to process payment');
            }
        } catch (e) {
            showNotification('❌ Failed to process payment: ' + e.message, 'error');
        }
    };

    // ── GET TUTOR PAYMENT STATUS ──
    const getTutorPaymentStatus = (tutorId) => {
        const tutorPayments = payments.filter(p => p.tutor_id === tutorId);
        const totalPaid = tutorPayments
            .filter(p => p.status === 'paid')
            .reduce((sum, p) => sum + (p.amount || 0), 0);
        const hasPending = tutorPayments.some(p => p.status === 'pending');
        return { totalPaid, hasPending };
    };

    // ── OPEN AUDIT MODAL ──
    const openAuditModal = () => {
        setAuditData({
            marketing_spent: financeSummary.marketing_spent || 0,
            tutor_payouts_total: financeSummary.tutor_payouts || 0,
            notes: auditData.notes || ''
        });
        setShowAuditModal(true);
    };

    return (
        <div className="space-y-6 fade-in">
            {/* ── MAIN FINANCE SUMMARY CARDS ── */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                    <p className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</p>
                    <p className="text-2xl font-bold text-[#D4A017]">KES {financeSummary.total_revenue.toLocaleString()}</p>
                    <p className="text-xs text-gray-400">{orders.length} total orders</p>
                </div>
                <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                    <p className="text-sm text-gray-500 dark:text-gray-400">Pending Payouts</p>
                    <p className="text-2xl font-bold text-amber-600">KES {financeSummary.pending_payouts.toLocaleString()}</p>
                    <p className="text-xs text-gray-400">Awaiting tutor payment</p>
                </div>
                <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                    <p className="text-sm text-gray-500 dark:text-gray-400">Amount Spent</p>
                    <p className="text-2xl font-bold text-red-600">KES {financeSummary.marketing_spent.toLocaleString()}</p>
                    <p className="text-xs text-gray-400">Marketing + Tutor Payouts</p>
                </div>
                <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 payout-card paid">
                    <p className="text-sm text-gray-500 dark:text-gray-400">💰 Actual Balance</p>
                    <p className="text-2xl font-bold text-green-600">KES {financeSummary.actual_balance.toLocaleString()}</p>
                    <p className="text-xs text-gray-400">Revenue - Spending</p>
                </div>
            </div>

            {/* ── DETAILED BREAKDOWN ── */}
            <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📊 Financial Breakdown</h3>
                    <button onClick={openAuditModal} className="btn-gold px-4 py-2 rounded-lg font-semibold text-sm">
                        🔍 Audit Account
                    </button>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="space-y-2">
                        <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                            <span className="text-gray-600 dark:text-gray-400">Total Revenue</span>
                            <span className="font-semibold text-[#D4A017]">KES {financeSummary.total_revenue.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                            <span className="text-gray-600 dark:text-gray-400">Platform Fee (20%)</span>
                            <span className="font-semibold text-blue-600">KES {financeSummary.platform_fee.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                            <span className="text-gray-600 dark:text-gray-400">Tutor Payouts (80%)</span>
                            <span className="font-semibold text-amber-600">KES {financeSummary.tutor_payouts.toLocaleString()}</span>
                        </div>
                    </div>
                    <div className="space-y-2">
                        <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                            <span className="text-gray-600 dark:text-gray-400">Marketing Spent</span>
                            <span className="font-semibold text-red-600">KES {financeSummary.marketing_spent.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                            <span className="text-gray-600 dark:text-gray-400">Pending Payouts</span>
                            <span className="font-semibold text-amber-600">KES {financeSummary.pending_payouts.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between py-2 bg-green-50 dark:bg-green-900/20 rounded-lg px-3 -mx-3">
                            <span className="font-bold text-gray-800 dark:text-white">💰 Actual Balance</span>
                            <span className="font-bold text-green-600">KES {financeSummary.actual_balance.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            </div>

            {/* ── TUTOR PAYOUTS TABLE ── */}
            <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-semibold text-gray-800 dark:text-white">🧑‍🏫 Tutor Payouts ({TUTOR_PAYOUT_PERCENTAGE}% of Revenue)</h3>
                    <span className="text-xs text-gray-500 dark:text-gray-400">80% to tutors · 20% to platform</span>
                </div>
                
                {tutors.filter(t => t.status === 'active' || t.status === 'approved').length === 0 ? (
                    <div className="text-center py-8 text-gray-500 dark:text-gray-400">No active tutors available</div>
                ) : (
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="bg-gray-50 dark:bg-gray-700/50">
                                <tr>
                                    <th className="px-4 py-2 text-left">Tutor</th>
                                    <th className="px-4 py-2 text-left">Orders</th>
                                    <th className="px-4 py-2 text-left">Total Revenue</th>
                                    <th className="px-4 py-2 text-left">Payout (80%)</th>
                                    <th className="px-4 py-2 text-left">Paid</th>
                                    <th className="px-4 py-2 text-left">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {tutors.filter(t => t.status === 'active' || t.status === 'approved').map(tutor => {
                                    const earnings = calculateTutorEarnings(tutor.id);
                                    const { totalPaid, hasPending } = getTutorPaymentStatus(tutor.id);
                                    const pendingAmount = earnings.completedPayout - totalPaid;
                                    
                                    return (
                                        <tr key={tutor.id} className="border-t border-gray-100 dark:border-gray-700">
                                            <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">{tutor.name}</td>
                                            <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{earnings.ordersCount}</td>
                                            <td className="px-4 py-2 text-gray-600 dark:text-gray-400">KES {earnings.totalRevenue.toLocaleString()}</td>
                                            <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {earnings.tutorPayout.toLocaleString()}</td>
                                            <td className="px-4 py-2 text-gray-600 dark:text-gray-400">KES {totalPaid.toLocaleString()}</td>
                                            <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                {pendingAmount > 0 && (
                                                    <button 
                                                        onClick={() => handleProcessPayment(tutor)}
                                                        className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs hover:bg-green-200 transition"
                                                    >
                                                        💰 Pay KES {pendingAmount.toLocaleString()}
                                                    </button>
                                                )}
                                                {pendingAmount <= 0 && earnings.ordersCount > 0 && (
                                                    <span className="text-xs text-green-600 dark:text-green-400">✅ Fully Paid</span>
                                                )}
                                                {earnings.ordersCount === 0 && (
                                                    <span className="text-xs text-gray-400">No revenue yet</span>
                                                )}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                )}
            </div>

            {/* ── PAYMENT HISTORY ── */}
            <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-semibold text-gray-800 dark:text-white">📋 Payment History</h3>
                    <button onClick={() => { loadPayments(); loadFinanceSummary(); }} className="text-sm text-[#D4A017] hover:text-[#FCD34D] transition">
                        🔄 Refresh
                    </button>
                </div>
                
                {payments.length === 0 ? (
                    <div className="text-center py-8 text-gray-500 dark:text-gray-400">No payments recorded yet</div>
                ) : (
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="bg-gray-50 dark:bg-gray-700/50">
                                <tr>
                                    <th className="px-4 py-2 text-left">Tutor</th>
                                    <th className="px-4 py-2 text-left">Amount</th>
                                    <th className="px-4 py-2 text-left">Status</th>
                                    <th className="px-4 py-2 text-left">Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                {payments.slice(0, 20).map(p => (
                                    <tr key={p.id} className="border-t border-gray-100 dark:border-gray-700">
                                        <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">{p.tutor_name || 'Unknown'}</td>
                                        <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {p.amount?.toLocaleString() || 0}</td>
                                        <td className="px-4 py-2">
                                            <span className={`status-badge ${p.status === 'paid' ? 'paid-out' : 'pending-payment'}`}>
                                                {p.status === 'paid' ? '✅ Paid' : '⏳ Pending'}
                                            </span>
                                        </td>
                                        <td className="px-4 py-2 text-gray-500 dark:text-gray-400">
                                            {p.payment_date ? new Date(p.payment_date).toLocaleDateString() : new Date(p.created_at).toLocaleDateString()}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                            <tfoot>
                                <tr className="bg-gray-50 dark:bg-gray-700/50 font-bold">
                                    <td className="px-4 py-2">TOTAL PAID</td>
                                    <td className="px-4 py-2 text-[#D4A017]">
                                        KES {payments.filter(p => p.status === 'paid').reduce((s, p) => s + (p.amount || 0), 0).toLocaleString()}
                                    </td>
                                    <td colSpan="2"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                )}
            </div>

            {/* ── PAYMENT MODAL ── */}
            {showPaymentModal && selectedTutor && (
                <div className="modal-overlay open" onClick={() => setShowPaymentModal(false)}>
                    <div className="modal-box" onClick={(e) => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-gray-800 dark:text-white mb-4">💳 Process Payment</h3>
                        <div className="space-y-4">
                            <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-4">
                                <p className="text-sm text-gray-600 dark:text-gray-300">
                                    <strong>Tutor:</strong> {selectedTutor.name}
                                </p>
                                <p className="text-sm text-gray-600 dark:text-gray-300">
                                    <strong>Amount:</strong> KES {paymentAmount.toLocaleString()}
                                </p>
                                <p className="text-sm text-gray-600 dark:text-gray-300">
                                    <strong>Payout Rate:</strong> {TUTOR_PAYOUT_PERCENTAGE}% of revenue
                                </p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={confirmPayment} className="btn-gold px-6 py-2 rounded-lg font-semibold flex-1">
                                    ✅ Confirm Payment
                                </button>
                                <button onClick={() => setShowPaymentModal(false)} className="px-6 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-500 transition">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ── AUDIT MODAL ── */}
            {showAuditModal && (
                <div className="modal-overlay open" onClick={() => setShowAuditModal(false)}>
                    <div className="modal-box max-w-2xl" onClick={(e) => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-gray-800 dark:text-white">🔍 Audit Account</h3>
                            <button onClick={() => setShowAuditModal(false)} className="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-xl">✕</button>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-4 border border-blue-200 dark:border-blue-800">
                                <p className="text-sm text-blue-700 dark:text-blue-300">
                                    <strong>Current Balance:</strong> KES {financeSummary.actual_balance.toLocaleString()}
                                </p>
                                <p className="text-xs text-blue-600 dark:text-blue-400 mt-1">
                                    Update marketing spend and tutor payouts to reflect actual account balance.
                                </p>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Marketing Spent (KES)</label>
                                <input 
                                    type="number" 
                                    value={auditData.marketing_spent} 
                                    onChange={(e) => setAuditData({...auditData, marketing_spent: parseFloat(e.target.value) || 0})}
                                    className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    min="0"
                                    step="100"
                                />
                                <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">Total spent on marketing campaigns</p>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tutor Payouts Total (KES)</label>
                                <input 
                                    type="number" 
                                    value={auditData.tutor_payouts_total} 
                                    onChange={(e) => setAuditData({...auditData, tutor_payouts_total: parseFloat(e.target.value) || 0})}
                                    className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    min="0"
                                    step="100"
                                />
                                <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">Total paid to tutors (from payment history)</p>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Notes</label>
                                <textarea 
                                    value={auditData.notes} 
                                    onChange={(e) => setAuditData({...auditData, notes: e.target.value})}
                                    className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white"
                                    rows="2"
                                    placeholder="Audit notes..."
                                />
                            </div>

                            <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-4">
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-600 dark:text-gray-400">Total Revenue:</span>
                                    <span className="font-semibold">KES {financeSummary.total_revenue.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between text-sm mt-1">
                                    <span className="text-gray-600 dark:text-gray-400">Marketing Spent:</span>
                                    <span className="font-semibold text-red-600">- KES {(auditData.marketing_spent || 0).toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between text-sm mt-1">
                                    <span className="text-gray-600 dark:text-gray-400">Tutor Payouts:</span>
                                    <span className="font-semibold text-amber-600">- KES {(auditData.tutor_payouts_total || 0).toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between text-sm mt-2 pt-2 border-t border-gray-200 dark:border-gray-600">
                                    <span className="font-bold text-gray-800 dark:text-white">New Balance:</span>
                                    <span className="font-bold text-green-600">
                                        KES {(financeSummary.total_revenue - (auditData.marketing_spent || 0) - (auditData.tutor_payouts_total || 0)).toLocaleString()}
                                    </span>
                                </div>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={saveAudit} disabled={auditLoading} className="btn-gold px-6 py-2 rounded-lg font-semibold flex-1 disabled:opacity-50">
                                    {auditLoading ? '⏳ Saving...' : '💾 Save Audit'}
                                </button>
                                <button onClick={() => setShowAuditModal(false)} className="px-6 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-500 transition">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
  }

    // ── MODULE RENDERER ──
    function ModuleRenderer() {
        const { currentModule } = useApp();
        const map = {
            dashboard: <DashboardModule />,
            orders: <OrdersModule />,
            resources: <div className="content-card"><h3 className="font-semibold">📚 Resources</h3><p className="text-gray-500 dark:text-gray-400 mt-2">Resource management coming soon...</p></div>,
            tutors: <div className="content-card"><h3 className="font-semibold">🧑‍🏫 Tutors</h3><p className="text-gray-500 dark:text-gray-400 mt-2">Tutor management coming soon...</p></div>,
            classes: <div className="content-card"><h3 className="font-semibold">📹 Classes</h3><p className="text-gray-500 dark:text-gray-400 mt-2">Class management coming soon...</p></div>,
            finance: <div className="content-card"><h3 className="font-semibold">💰 Finance</h3><p className="text-gray-500 dark:text-gray-400 mt-2">Finance management coming soon...</p></div>,
            settings: <div className="content-card"><h3 className="font-semibold">⚙️ Settings</h3><p className="text-gray-500 dark:text-gray-400 mt-2">Settings coming soon...</p></div>,
        };
        return map[currentModule] || <DashboardModule />;
    }

    // ── MAIN APP ──
    function App() {
        const { isAuthenticated } = useApp();

        if (!isAuthenticated) {
            return <LoginPage />;
        }

        return (
            <div className="dashboard-wrapper">
                <Sidebar />
                <div className="main-content">
                    <Topbar />
                    <ModuleRenderer />
                </div>
                <ToastContainer />
                <PendingAlert />
            </div>
        );
    }

    // ── RENDER ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
        <AppProvider>
            <App />
        </AppProvider>
    );
</script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</body>
</html>
