<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin Dashboard — Year-Round Resource Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background: #111827;
            color: #e5e7eb;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: #0a1a3a;
            color: #fff;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .dark .sidebar { background: #0f172a; }
        .sidebar.open { transform: translateX(0); }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
        .sidebar-header .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
        }
        .sidebar-header .logo span { color: #FCD34D; }
        .sidebar-close-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .sidebar-close-btn:hover { background: rgba(255,255,255,0.1); }

        .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }
        .sidebar-menu .menu-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            padding: 0 12px 8px;
        }
        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }
        .sidebar-menu .menu-item:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }
        .sidebar-menu .menu-item.active {
            background: rgba(212, 160, 23, 0.15);
            color: #FCD34D;
            border-left: 3px solid #D4A017;
        }
        .sidebar-menu .menu-item i {
            width: 20px;
            font-size: 1rem;
            text-align: center;
        }
        .sidebar-menu .menu-item .badge {
            margin-left: auto;
            background: rgba(212, 160, 23, 0.2);
            color: #FCD34D;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .pending-badge { position: relative; }
        .pending-badge .badge-count {
            position: absolute;
            top: -4px;
            right: -8px;
            background: #dc2626;
            color: white;
            font-size: 0.55rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-badge 2s infinite;
        }
        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .sidebar-footer .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            color: #ef4444;
            background: rgba(220, 38, 38, 0.1);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .sidebar-footer .logout-btn:hover { background: rgba(220, 38, 38, 0.2); }
        .sidebar-footer .logout-btn i { font-size: 1rem; }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dark .topbar {
            background: rgba(17,24,39,0.9);
            border-color: #374151;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            color: #1f2937;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .dark .hamburger-btn { color: #f3f4f6; }
        .hamburger-btn:hover { background: rgba(0,0,0,0.05); }
        .dark .hamburger-btn:hover { background: rgba(255,255,255,0.05); }
        .topbar-title {
            font-weight: 700;
            font-size: 1rem;
            color: #1f2937;
        }
        .dark .topbar-title { color: #f3f4f6; }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            color: #6b7280;
        }
        .topbar-actions button:hover { background: rgba(0,0,0,0.05); }
        .dark .topbar-actions button { color: #9ca3af; }
        .dark .topbar-actions button:hover { background: rgba(255,255,255,0.05); }
        .topbar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #D4A017;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a1a3a;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #16a34a;
            background: #dcfce7;
            padding: 4px 12px;
            border-radius: 99px;
        }
        .dark .live-indicator {
            background: rgba(22,163,74,0.2);
            color: #34d399;
        }
        .live-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #16a34a;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .main-content {
            flex: 1;
            min-height: 100vh;
            padding: 20px;
            background: #f3f4f6;
            transition: margin-left 0.3s ease;
        }
        .dark .main-content { background: #111827; }

        /* ── DESKTOP ── */
        @media (min-width: 769px) {
            .sidebar {
                transform: translateX(0) !important;
                position: sticky;
                top: 0;
                height: 100vh;
                flex-shrink: 0;
            }
            .sidebar-overlay { display: none !important; }
            .sidebar-close-btn { display: none !important; }
            .hamburger-btn { display: none !important; }
            .dashboard-wrapper { display: flex; }
            .main-content { margin-left: 0; }
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .sidebar { width: 80%; max-width: 320px; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-close-btn { display: block !important; }
            .hamburger-btn { display: block !important; }
            .dashboard-wrapper { display: block; }
            .main-content { padding: 16px; width: 100%; }
            .topbar { padding: 0 16px; height: 60px; }
            .topbar-title { font-size: 0.9rem; }
            .live-indicator .label { display: none; }
            .live-indicator { padding: 4px 8px; }
        }
        @media (max-width: 480px) {
            .sidebar { width: 85%; }
            .main-content { padding: 12px; }
            .topbar { padding: 0 12px; height: 56px; }
        }

        /* ── STATUS BADGES ── */
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.confirmed { background: #dbeafe; color: #1e40af; }
        .status-badge.live { background: #d1fae5; color: #065f46; }
        .status-badge.completed { background: #d1fae5; color: #065f46; }
        .status-badge.scheduled { background: #fef3c7; color: #92400e; }
        .status-badge.paid { background: #d1fae5; color: #065f46; }
        .status-badge.paid-out { background: #d1fae5; color: #065f46; }
        .status-badge.pending-payment { background: #fef3c7; color: #92400e; }
        .status-badge.rejected { background: #fee2e2; color: #991b1b; }
        .status-badge.suspended { background: #fee2e2; color: #991b1b; }
        .status-badge.draft { background: #f3f4f6; color: #6b7280; }
        .status-badge.active { background: #dbeafe; color: #1e40af; }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.confirmed { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.live { background: #064e3b; color: #34d399; }
        .dark .status-badge.completed { background: #064e3b; color: #34d399; }
        .dark .status-badge.scheduled { background: #78350f; color: #fbbf24; }
        .dark .status-badge.paid { background: #064e3b; color: #34d399; }
        .dark .status-badge.paid-out { background: #064e3b; color: #34d399; }
        .dark .status-badge.pending-payment { background: #78350f; color: #fbbf24; }
        .dark .status-badge.rejected { background: #7f1d1d; color: #f87171; }
        .dark .status-badge.suspended { background: #7f1d1d; color: #f87171; }
        .dark .status-badge.draft { background: #374151; color: #9ca3af; }
        .dark .status-badge.active { background: #1e3a5f; color: #60a5fa; }

        /* ── STAT CARDS ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        .dark .stat-card {
            background: #1f2937;
            border-color: #374151;
        }
        .stat-card .stat-icon { font-size: 1.4rem; }
        .stat-card .stat-number {
            font-weight: 800;
            font-size: 1.5rem;
            color: #0a1a3a;
        }
        .dark .stat-card .stat-number { color: #fff; }
        .stat-card .stat-number.gold { color: #D4A017; }
        .stat-card .stat-number.green { color: #16a34a; }
        .stat-card .stat-number.purple { color: #8b5cf6; }
        .stat-card .stat-number.blue { color: #3b82f6; }
        .stat-card .stat-number.red { color: #dc2626; }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: #6b7280;
        }
        .dark .stat-card .stat-label { color: #9ca3af; }

        .content-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }
        .dark .content-card {
            background: #1f2937;
            border-color: #374151;
        }
        .content-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        .dark .content-card .card-header {
            border-color: #374151;
        }
        .content-card .card-header h3 {
            font-weight: 700;
            font-size: 1rem;
            color: #1f2937;
        }
        .dark .content-card .card-header h3 { color: #fff; }

        .btn-gold {
            background: #D4A017;
            color: #0a1a3a;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-gold:hover {
            background: #FCD34D;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.7rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-sm.green { background: #dcfce7; color: #16a34a; }
        .btn-sm.red { background: #fee2e2; color: #dc2626; }
        .btn-sm.blue { background: #dbeafe; color: #2563eb; }
        .dark .btn-sm.green { background: rgba(22,163,74,0.2); color: #34d399; }
        .dark .btn-sm.red { background: rgba(220,38,38,0.2); color: #f87171; }
        .dark .btn-sm.blue { background: rgba(37,99,235,0.2); color: #60a5fa; }
        .btn-sm:hover { transform: translateY(-1px); }

        .btn-sm .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead {
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
        }
        .dark thead {
            background: #1f2937;
            border-color: #374151;
        }
        th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #6b7280;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dark th { color: #9ca3af; }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            color: #1f2937;
        }
        .dark td {
            border-color: #374151;
            color: #e5e7eb;
        }
        tr:hover td { background: #f9fafb; }
        .dark tr:hover td { background: #1f2937; }

        .new-order-flash {
            animation: flashRow 1s ease 3;
        }
        @keyframes flashRow {
            0%, 100% { background: transparent; }
            50% { background: rgba(212,160,23,0.1); }
        }
        .dark .new-order-flash {
            animation: flashRowDark 1s ease 3;
        }
        @keyframes flashRowDark {
            0%, 100% { background: transparent; }
            50% { background: rgba(212,160,23,0.15); }
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99999;
            max-width: 380px;
            width: 100%;
        }
        .toast-item {
            background: white;
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border-left: 4px solid #7C3AED;
            margin-bottom: 8px;
            animation: slideInRight 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .dark .toast-item { background: #1f2937; }
        .toast-item .toast-title { font-weight: 600; font-size: 0.85rem; color: #1f2937; }
        .dark .toast-item .toast-title { color: #f3f4f6; }
        .toast-item .toast-msg { font-size: 0.8rem; color: #6b7280; }
        .dark .toast-item .toast-msg { color: #9ca3af; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .pending-alert {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99998;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(245,158,11,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        .pending-alert .alert-text { font-weight: 600; font-size: 0.85rem; }
        .pending-alert .alert-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.75rem;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .dark .modal-box { background: #1f2937; }

        .timeframe-toggle {
            display: flex;
            gap: 4px;
            background: #f3f4f6;
            border-radius: 8px;
            padding: 4px;
            border: 1px solid #e5e7eb;
        }
        .dark .timeframe-toggle {
            background: #1f2937;
            border-color: #374151;
        }
        .timeframe-toggle button {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .timeframe-toggle button:hover { color: #1f2937; }
        .dark .timeframe-toggle button:hover { color: #f3f4f6; }
        .timeframe-toggle button.active {
            background: #D4A017;
            color: #0a1a3a;
        }
        .dark .timeframe-toggle button.active {
            background: #D4A017;
            color: #0a1a3a;
        }

        .chart-container { height: 280px; position: relative; }

        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f9fafb;
        }
        .dark .drop-zone {
            background: #1f2937;
            border-color: #374151;
        }
        .drop-zone:hover {
            border-color: #D4A017;
            background: rgba(212,160,23,0.05);
        }
        .dark .drop-zone:hover {
            border-color: #D4A017;
            background: rgba(212,160,23,0.1);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 99px;
            overflow: hidden;
            margin-top: 5px;
        }
        .dark .progress-track { background: #374151; }
        .progress-bar {
            height: 100%;
            background: #D4A017;
            border-radius: 99px;
            transition: width 0.3s ease;
        }

        .settings-section {
            padding: 16px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .settings-section:last-child { border-bottom: none; }
        .dark .settings-section { border-color: #374151; }

        .login-bg {
            background: linear-gradient(135deg, #0a1a3a 0%, #1a2a5a 50%, #2a3a6a 100%);
            position: relative;
            overflow: hidden;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FCD34D' fill-opacity='0.03'%3E%3Cpath d='M50 30L20 46l30 16 30-16-30-16zm0 0l-20 10 20 10 20-10-20-10zM20 46v18l30 16 30-16V46l-30 16-30-16z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px, 100px 100px;

        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);

            box-shadow: 0 0 0 3px rgba(212,160,23,0.3), 0 0 20px rgba(212,160,23,0.1);

        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        @media (max-width: 640px) {
            .toast-container { bottom: 10px; right: 10px; max-width: calc(100% - 20px); }
            .pending-alert { bottom: 10px; padding: 8px 14px; width: calc(100% - 20px); font-size: 0.8rem; }
            .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 12px 14px; }
            .stat-card .stat-number { font-size: 1.2rem; }
        }
        @media (max-width: 420px) { .stat-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext, useRef, useReducer } = React;

        // ── SUPABASE CONFIG ──
        const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';
        
        // ── STORAGE CONFIG ──
        const STORAGE_BUCKET = 'kenyavault-pdfs';
        const STORAGE_URL = `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}`;

        // ── CONSTANTS ──
        const ADMIN_CREDENTIALS = {
            username: 'adminnexalearn@gmail.com',
            password: 'KenyaVault2026'
        };
        const TUTOR_PAYOUT_PERCENTAGE = 80;

        // ── ADD "Updates & News" to adminModules ──
        const adminModules = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard', desc: 'Overview & Analytics' },
            { id: 'resources', icon: 'fa-book', label: 'Resources', desc: 'Advanced Resource Manager' },
            { id: 'tutors', icon: 'fa-users', label: 'Tutors', desc: 'Tutor Operations Center' },
            { id: 'orders', icon: 'fa-shopping-bag', label: 'Orders', desc: 'Real-time order management' },
            { id: 'finance', icon: 'fa-coins', label: 'Finance', desc: 'Revenue & Reconciliation' },
            { id: 'news', icon: 'fa-bell', label: 'Updates & News', desc: 'Manage news & announcements' },
            { id: 'settings', icon: 'fa-gear', label: 'Settings', desc: 'Configuration' },
        ];

        // ── CONTEXT ──
        const AppContext = createContext(null);

        function AppProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('kv-dark-mode') === 'true');
            const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
            const [currentModule, setCurrentModule] = useState('dashboard');
            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('kv-auth') === 'true');
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [loading, setLoading] = useState(true);
            const [tutors, setTutors] = useState([]);
            const [orders, setOrders] = useState([]);
            const [resources, setResources] = useState([]);
            const [classes, setClasses] = useState([]);
            const [toast, setToast] = useState(null);
            const [newOrderIds, setNewOrderIds] = useState([]);
            const [payments, setPayments] = useState([]);
            const [pendingOrderCount, setPendingOrderCount] = useState(0);
            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);

            // ── NEWS STATE ──
            const [newsItems, setNewsItems] = useState([]);
            const [newsLoading, setNewsLoading] = useState(false);

            // ── LOAD NEWS FROM SUPABASE ──
            const loadNewsFromSupabase = async () => {
                setNewsLoading(true);
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/news?select=*&order=date.desc`, {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        setNewsItems(data || []);
                        localStorage.setItem('kv_news_items', JSON.stringify(data));
                    } else {
                        loadNewsFromLocalStorage();
                    }
                } catch (e) {
                    loadNewsFromLocalStorage();
                } finally {
                    setNewsLoading(false);
                }
            };

            const loadNewsFromLocalStorage = () => {
                const saved = localStorage.getItem('kv_news_items');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setNewsItems(data);
                        return data;
                    } catch (e) { setNewsItems([]); return []; }
                }
                const demos = [
                    { id: '1', title: 'KJSEA 2026: Complete Preparation Guide', category: 'CBC News', audience: 'All', content: 'Everything you need to know about Kenya\'s second-ever CBC national examination — tips, strategies, and resources.', pinned: true, status: 'Active', date: '2026-07-01' },
                    { id: '2', title: 'CBC Senior School Subject Pathways', category: 'System Updates', audience: 'Teachers', content: 'Understanding the CBC Senior School structure, compulsory subjects, elective pathways, and career alignment.', pinned: false, status: 'Active', date: '2026-06-28' },
                    { id: '3', title: '8-4-4 to CBC Transition Guide', category: 'Exam Alerts', audience: 'Students', content: 'Understanding the transition from 8-4-4 to CBC, exam formats, and how to stay ahead during the change.', pinned: false, status: 'Draft', date: '2026-06-25' },
                ];
                setNewsItems(demos);
                localStorage.setItem('kv_news_items', JSON.stringify(demos));
                return demos;
            };

            const saveNewsToSupabase = async (newsData) => {
                try {
                    if (newsData.id && !newsData.id.startsWith('temp_')) {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/news?id=eq.${newsData.id}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify({
                                title: newsData.title,
                                category: newsData.category,
                                audience: newsData.audience,
                                content: newsData.content,
                                pinned: newsData.pinned || false,
                                status: newsData.status || 'Active',
                                date: newsData.date || new Date().toISOString().split('T')[0]
                            })
                        });
                        if (response.ok) {
                            const updated = await response.json();
                            return updated[0] || updated;
                        }
                        throw new Error('Failed to update news in Supabase');
                    } else {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/news`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify({
                                title: newsData.title,
                                category: newsData.category,
                                audience: newsData.audience,
                                content: newsData.content,
                                pinned: newsData.pinned || false,
                                status: newsData.status || 'Active',
                                date: newsData.date || new Date().toISOString().split('T')[0]
                            })
                        });
                        if (response.ok) {
                            const inserted = await response.json();
                            return inserted[0] || inserted;
                        }
                        throw new Error('Failed to save news to Supabase');
                    }
                } catch (e) {
                    return null;
                }
            };

            const deleteNewsFromSupabase = async (id) => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/news?id=eq.${id}`, {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    });
                    return response.ok;
                } catch (e) {
                    return false;
                }
            };

            const addNewsItem = async (item) => {
                const newItem = {
                    ...item,
                    id: 'temp_' + Date.now().toString() + '_' + Math.random().toString(36).substr(2, 4),
                    date: new Date().toISOString().split('T')[0],
                    status: 'Active'
                };
                setNewsItems(prev => [newItem, ...prev]);
                try {
                    const saved = await saveNewsToSupabase(newItem);
                    if (saved) {
                        setNewsItems(prev => prev.map(item => item.id === newItem.id ? saved : item));
                        await loadNewsFromSupabase();
                        return saved;
                    }
                    return newItem;
                } catch (e) {
                    return newItem;
                }
            };

            const updateNewsItem = async (id, updates) => {
                const itemToUpdate = newsItems.find(item => item.id === id);
                if (!itemToUpdate) return;
                const updatedItem = { ...itemToUpdate, ...updates };
                setNewsItems(prev => prev.map(item => item.id === id ? updatedItem : item));
                try {
                    const saved = await saveNewsToSupabase(updatedItem);
                    if (saved) {
                        setNewsItems(prev => prev.map(item => item.id === id ? saved : item));
                        await loadNewsFromSupabase();
                    }
                } catch (e) {
                    await loadNewsFromSupabase();
                }
            };

            const deleteNewsItem = async (id) => {
                setNewsItems(prev => prev.filter(item => item.id !== id));
                try {
                    const success = await deleteNewsFromSupabase(id);
                    if (!success) await loadNewsFromSupabase();
                } catch (e) {
                    await loadNewsFromSupabase();
                }
            };

            const togglePinNews = async (id) => {
                const item = newsItems.find(item => item.id === id);
                if (item) await updateNewsItem(id, { pinned: !item.pinned });
            };

            useEffect(() => {
                if (isAuthenticated) loadNewsFromSupabase();
            }, [isAuthenticated]);

            useEffect(() => {
                if (newsItems.length > 0) localStorage.setItem('kv_news_items', JSON.stringify(newsItems));
            }, [newsItems]);

            // ── EXISTING FUNCTIONS ──
            useEffect(() => {
                localStorage.setItem('kv-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth <= 768;
                    setIsMobile(mobile);
                    if (mobile) setSidebarOpen(false);
                    else setSidebarOpen(true);
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (isAuthenticated) {
                    loadData();
                    startPolling();
                }
                return () => stopPolling();
            }, [isAuthenticated]);

            const startPolling = () => {
                const interval = setInterval(checkNewOrders, 8000);
                window._pollingInterval = interval;
                setTimeout(checkNewOrders, 2000);
            };

            const stopPolling = () => {
                if (window._pollingInterval) {
                    clearInterval(window._pollingInterval);
                    window._pollingInterval = null;
                }
            };

            const checkNewOrders = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc&limit=20`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const pendingOrders = data.filter(o => 
                            o.payment_status === 'pending' || 
                            o.payment_status === 'pending_verification' || 
                            o.status === 'pending'
                        );
                        for (const order of pendingOrders) {
                            if (order.mpesa_code || order.payment_ref || order.transaction_id) {
                                try {
                                    await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                                        method: 'PATCH',
                                        headers: {
                                            'apikey': SUPABASE_ANON_KEY,
                                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                            'Content-Type': 'application/json'
                                        },
                                        body: JSON.stringify({ payment_status: 'confirmed', status: 'confirmed' })
                                    });
                                } catch (e) { console.error('Auto-confirm error:', e); }
                            }
                        }
                        await loadOrders();
                        const currentIds = data.filter(o => o.payment_status === 'pending' || o.status === 'pending').map(o => o.id);
                        const newIds = currentIds.filter(id => !newOrderIds.includes(id));
                        if (newIds.length > 0) {
                            setNewOrderIds(prev => [...prev, ...newIds]);
                            const newOrders = data.filter(o => newIds.includes(o.id));
                            newOrders.forEach(order => {
                                const ref = order.order_ref || order.payment_ref || order.id.slice(0, 8).toUpperCase();
                                showToast(
                                    '🆕 New Order!',
                                    `Order #${ref} - ${order.customer_name || 'Customer'} (KES ${order.total_amount || order.item_price || 0})`,
                                    'warning'
                                );
                            });
                            await loadOrders();
                        }
                    }
                } catch (e) { console.error('Polling error:', e); }
            };

            const showToast = (title, message, type = 'success') => {
                setToast({ title, message, type, id: Date.now() });
                setTimeout(() => setToast(null), 6000);
            };

            const loadOrders = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('❌ API Error:', response.status, errorText);
                        throw new Error(`Failed to load orders: ${response.status}`);
                    }
                    const data = await response.json();
                    setOrders(data || []);
                    const pending = (data || []).filter(o => o.payment_status === 'pending' || o.status === 'pending');
                    setPendingOrderCount(pending.length);
                    return data;
                } catch (e) {
                    console.error('❌ Load orders error:', e);
                    setOrders([]);
                    setPendingOrderCount(0);
                    throw e;
                }
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    await loadOrders();
                    try {
                        const rRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?select=*&order=created_at.desc`, {
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                        });
                        if (rRes.ok) {
                            const data = await rRes.json();
                            setResources(data || []);
                        } else { setResources([]); }
                    } catch (e) { setResources([]); }

                    try {
                        const tRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?select=*`, {
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                        });
                        if (tRes.ok) {
                            const data = await tRes.json();
                            setTutors(data || []);
                        } else { setTutors([]); }
                    } catch (e) { setTutors([]); }

                    try {
                        const cRes = await fetch(`${SUPABASE_URL}/rest/v1/classes?select=*&order=created_at.desc`, {
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                        });
                        if (cRes.ok) {
                            const data = await cRes.json();
                            setClasses(data || []);
                        } else { setClasses([]); }
                    } catch (e) { setClasses([]); }

                    try {
                        const pRes = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments?select=*&order=created_at.desc`, {
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                        });
                        if (pRes.ok) {
                            const data = await pRes.json();
                            setPayments(data || []);
                        } else { setPayments([]); }
                    } catch (e) { setPayments([]); }
                    
                    await loadNewsFromSupabase();
                    
                } catch (e) { 
                    console.error('❌ Load data error:', e); 
                    showToast('Error loading data: ' + e.message, 'error');
                }
                setLoading(false);
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
            const closeSidebar = () => setSidebarOpen(false);

            const login = (username, password) => {
                setAuthLoading(true);
                setAuthError('');
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                            sessionStorage.setItem('kv-auth', 'true');
                            sessionStorage.setItem('kv-user', username);
                            setIsAuthenticated(true);
                            setAuthLoading(false);
                            resolve(true);
                        } else {
                            setAuthError('Invalid username or password.');
                            setAuthLoading(false);
                            reject(new Error('Invalid credentials'));
                        }
                    }, 800);
                });
            };

            const logout = () => {
                stopPolling();
                sessionStorage.removeItem('kv-auth');
                sessionStorage.removeItem('kv-user');
                setIsAuthenticated(false);
                setCurrentModule('dashboard');
                window.location.href = '/';
            };

            const showNotification = (msg, type = 'success') => {
                setToast({ title: type === 'success' ? '✅ Success' : '❌ Error', message: msg, type: type, id: Date.now() });
                setTimeout(() => setToast(null), 4000);
            };

            return (
                <AppContext.Provider value={{
                    darkMode, toggleDarkMode,
                    sidebarOpen, toggleSidebar, closeSidebar,
                    currentModule, setCurrentModule,
                    isAuthenticated,
                    authLoading, authError,
                    login, logout,
                    loading,
                    tutors, setTutors,
                    orders, setOrders,
                    resources, setResources,
                    classes, setClasses,
                    payments, setPayments,
                    toast, showToast,
                    loadData,
                    loadOrders,
                    newOrderIds,
                    setNewOrderIds,
                    showNotification,
                    TUTOR_PAYOUT_PERCENTAGE,
                    pendingOrderCount,
                    setPendingOrderCount,
                    isMobile,
                    newsItems, setNewsItems,
                    newsLoading,
                    addNewsItem,
                    updateNewsItem,
                    deleteNewsItem,
                    togglePinNews,
                    loadNewsFromSupabase,
                }}>
                    {children}
                </AppContext.Provider>
            );
        }

        function useApp() {
            const context = useContext(AppContext);
            if (!context) throw new Error('useApp must be used within AppProvider');
            return context;
        }

        // ── TOAST CONTAINER ──
        function ToastContainer() {
            const { toast, setToast } = useApp();
            const [hiding, setHiding] = useState(false);

            useEffect(() => {
                if (toast) {
                    setHiding(false);
                    const timer = setTimeout(() => {
                        setHiding(true);
                        setTimeout(() => setToast(null), 300);
                    }, 5500);
                    return () => clearTimeout(timer);
                }
            }, [toast, setToast]);

            if (!toast) return null;

            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };

            return (
                <div className="toast-container">
                    <div className={`toast-item ${toast.type || 'info'} ${hiding ? 'hiding' : ''}`}>
                        <span className="toast-icon">{icons[toast.type] || 'ℹ️'}</span>
                        <div className="toast-content">
                            <div className="toast-title">{toast.title}</div>
                            <div className="toast-message">{toast.message}</div>
                        </div>
                        <button className="toast-close" onClick={() => {
                            setHiding(true);
                            setTimeout(() => setToast(null), 300);
                        }}>✕</button>
                    </div>
                </div>
            );
        }

        // ── PENDING ALERT ──
        function PendingAlert() {
            const { pendingOrderCount, setCurrentModule } = useApp();
            const [visible, setVisible] = useState(true);

            useEffect(() => {
                if (pendingOrderCount > 0) {
                    setVisible(true);
                    const timer = setTimeout(() => setVisible(false), 10000);
                    return () => clearTimeout(timer);
                }
            }, [pendingOrderCount]);

            if (pendingOrderCount === 0 || !visible) return null;

            return (
                <button 
                    className="pending-alert"
                    onClick={() => {
                        setCurrentModule('orders');
                        setVisible(false);
                    }}
                >
                    <span className="alert-icon">🔔</span>
                    <span className="alert-text">{pendingOrderCount} order{pendingOrderCount > 1 ? 's' : ''} pending approval</span>
                    <span className="alert-count">View</span>
                </button>
            );
        }

        // ── LOGIN PAGE ──
        function LoginPage() {
            const { login, authLoading, authError, darkMode, toggleDarkMode } = useApp();
            const [username, setUsername] = useState('adminnexalearn@gmail.com');
            const [password, setPassword] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                try { await login(username, password); } catch (err) {}
            };

            return (
                <div className="min-h-screen login-bg flex items-center justify-center p-4 relative">
                    <button onClick={toggleDarkMode} className="absolute top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition">
                        {darkMode ? '☀️' : '🌙'}
                    </button>
                    <div className="w-full max-w-md relative z-10">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-2xl border border-white/10">

        // ── DASHBOARD MODULE ──
        function DashboardModule() {
            const { orders, resources, tutors, classes, showNotification, pendingOrderCount } = useApp();
            const chartRef = useRef(null);
            const [timeframe, setTimeframe] = useState('daily');
            const [chartData, setChartData] = useState({ labels: [], values: [] });
            const { darkMode } = useApp();

            const fetchAndRenderRevenue = useCallback(async (tf) => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=total_amount,created_at,payment_status`, {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (!response.ok) throw new Error('Failed to fetch revenue data');
                    
                    const data = await response.json();
                    const paidOrders = data.filter(o => o.payment_status === 'paid' || o.payment_status === 'completed' || o.payment_status === 'confirmed');
                    
                    let labels = [];
                    let values = [];
                    const now = new Date();
                    
                    if (tf === 'daily') {
                        for (let i = 6; i >= 0; i--) {
                            const date = new Date(now);
                            date.setDate(date.getDate() - i);
                            const dateStr = date.toISOString().split('T')[0];
                            const dayTotal = paidOrders
                                .filter(o => o.created_at && o.created_at.startsWith(dateStr))
                                .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                            labels.push(date.toLocaleDateString('en', { weekday: 'short' }));
                            values.push(dayTotal);
                        }
                    } else if (tf === 'weekly') {
                        for (let i = 3; i >= 0; i--) {
                            const weekStart = new Date(now);
                            weekStart.setDate(weekStart.getDate() - (weekStart.getDay() + 7 * i));
                            const weekEnd = new Date(weekStart);
                            weekEnd.setDate(weekEnd.getDate() + 6);
                            
                            const weekTotal = paidOrders
                                .filter(o => {
                                    if (!o.created_at) return false;
                                    const orderDate = new Date(o.created_at);
                                    return orderDate >= weekStart && orderDate <= weekEnd;
                                })
                                .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                            
                            labels.push(`W${4 - i}`);
                            values.push(weekTotal);
                        }
                    } else if (tf === 'monthly') {
                        for (let i = 11; i >= 0; i--) {
                            const month = new Date(now);
                            month.setMonth(month.getMonth() - i);
                            const monthStr = month.toISOString().slice(0, 7);
                            const monthTotal = paidOrders
                                .filter(o => o.created_at && o.created_at.startsWith(monthStr))
                                .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                            labels.push(month.toLocaleDateString('en', { month: 'short' }));
                            values.push(monthTotal);
                        }
                    }
                    
                    setChartData({ labels, values });
                    
                    if (chartRef.current) {
                        chartRef.current.data.labels = labels;
                        chartRef.current.data.datasets[0].data = values;
                        chartRef.current.update();
                    }
                    
                } catch (error) {
                    console.error('Revenue fetch error:', error);
                    showNotification('Error loading revenue data', 'error');
                }
            }, [showNotification]);

            useEffect(() => {
                if (typeof Chart === 'undefined') return;
                
                const ctx = document.getElementById('revenueChart')?.getContext('2d');
                if (!ctx) return;
                
                if (chartRef.current) {
                    chartRef.current.destroy();
                }
                
                const isDark = document.documentElement.classList.contains('dark');
                const gradient = ctx.createLinearGradient(0, 0, 0, 280);
                gradient.addColorStop(0, 'rgba(212, 160, 23, 0.3)');
                gradient.addColorStop(1, 'rgba(212, 160, 23, 0)');
                
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartData.labels.length ? chartData.labels : ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                        datasets: [{
                            label: 'Revenue (KES)',
                            data: chartData.values.length ? chartData.values : [0, 0, 0, 0, 0, 0, 0],
                            borderColor: '#D4A017',
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#D4A017',
                            pointBorderColor: isDark ? '#1f2937' : '#ffffff',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return 'KES ' + context.parsed.y.toLocaleString();
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: (v) => 'KES ' + v.toLocaleString(),
                                    color: isDark ? '#9ca3af' : '#6b7280'
                                },
                                grid: {
                                    color: isDark ? 'rgba(55,65,81,0.3)' : 'rgba(209,213,219,0.3)'
                                }
                            },
                            x: {
                                ticks: {
                                    color: isDark ? '#9ca3af' : '#6b7280'
                                },
                                grid: { display: false }
                            }
                        },
                        interaction: {
                            intersect: false,
                            mode: 'index'
                        }
                    }
                });
            }, [darkMode]);

            useEffect(() => {
                fetchAndRenderRevenue(timeframe);
            }, [timeframe, fetchAndRenderRevenue]);

            useEffect(() => {
                const interval = setInterval(() => {
                    fetchAndRenderRevenue(timeframe);
                }, 10000);
                return () => clearInterval(interval);
            }, [timeframe, fetchAndRenderRevenue]);

            // Safe calculations with fallbacks
            const totalRevenue = Array.isArray(orders) ? orders.reduce((s, o) => s + (o.total_amount || 0), 0) : 0;
            const confirmedOrders = Array.isArray(orders) ? orders.filter(o => o.payment_status === 'confirmed' || o.status === 'confirmed').length : 0;
            const activeTutors = Array.isArray(tutors) ? tutors.filter(t => t.status === 'active').length : 0;
            const totalClasses = Array.isArray(classes) ? classes.length : 0;
            const liveClasses = Array.isArray(classes) ? classes.filter(c => c.is_live === true).length : 0;

            return (
                <div className="space-y-6 fade-in">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[
                            { label: 'Total Revenue', value: 'KES ' + totalRevenue.toLocaleString(), change: '+15%', icon: '💰' },
                            { label: 'Pending Orders', value: pendingOrderCount || 0, change: '', icon: '⏳' },
                            { label: 'Active Tutors', value: activeTutors || 0, change: '', icon: '🧑‍🏫' },
                            { label: 'Live Classes', value: liveClasses || 0, change: '', icon: '📹' },
                        ].map((stat, i) => (
                            <div key={i} className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                                <div className="flex items-center justify-between">
                                    <div className="w-10 h-10 rounded-lg bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xl">{stat.icon}</div>
                                    {stat.change && <span className="text-xs font-medium text-[#D4A017] bg-[#D4A017]/10 px-2 py-0.5 rounded-full">{stat.change}</span>}
                                </div>
                                <p className="text-2xl font-bold text-gray-800 dark:text-white mt-2">{stat.value}</p>
                                <p className="text-sm text-gray-500 dark:text-gray-400">{stat.label}</p>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-semibold text-gray-800 dark:text-white">📈 Revenue Overview</h3>
                            <div className="timeframe-toggle">
                                <button onClick={() => setTimeframe('daily')} className={timeframe === 'daily' ? 'active' : ''}>Daily</button>
                                <button onClick={() => setTimeframe('weekly')} className={timeframe === 'weekly' ? 'active' : ''}>Weekly</button>
                                <button onClick={() => setTimeframe('monthly')} className={timeframe === 'monthly' ? 'active' : ''}>Monthly</button>
                            </div>
                        </div>
                        <div className="chart-container">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="flex items-center justify-between">
                                <span className="text-sm text-gray-500 dark:text-gray-400">Total Orders</span>
                                <span className="text-2xl font-bold text-blue-600">{(Array.isArray(orders) ? orders.length : 0)}</span>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="flex items-center justify-between">
                                <span className="text-sm text-gray-500 dark:text-gray-400">Total Resources</span>
                                <span className="text-2xl font-bold text-green-600">{(Array.isArray(resources) ? resources.length : 0)}</span>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="flex items-center justify-between">
                                <span className="text-sm text-gray-500 dark:text-gray-400">Confirmed Orders</span>
                                <span className="text-2xl font-bold text-purple-600">{confirmedOrders}</span>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <div className="flex items-center justify-between">
                                <span className="text-sm text-gray-500 dark:text-gray-400">Total Classes</span>
                                <span className="text-2xl font-bold text-amber-600">{totalClasses}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── RESOURCES MODULE ──
        function ResourcesModule() {
            const { resources, setResources, showToast } = useApp();
            const [uploading, setUploading] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);
            const [compressedFile, setCompressedFile] = useState(null);
            const [progress, setProgress] = useState(0);
            const [formData, setFormData] = useState({
                title: '', subject: '', level: '', curriculum: 'cbc',
                resource_type: 'lesson-plan', price: 0, description: ''
            });
            const [editingResource, setEditingResource] = useState(null);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editFormData, setEditFormData] = useState({ title: '', price: 0, status: 'draft', subject: '', level: '', description: '' });
            const [uploadError, setUploadError] = useState('');

            const loadResources = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/resources?select=*&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setResources(data || []);
                    }
                } catch (e) { console.error('Load resources error:', e); }
            };

            useEffect(() => { loadResources(); }, []);

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setSelectedFile(file);
                setCompressedFile(null);
                setProgress(0);
                setUploadError('');

                if (file.type === 'application/pdf' && file.size > 1024 * 1024) {
                    showToast('🔄 Compressing PDF...', 'Compressing file to reduce size');
                    try {
                        const compressed = await compressPDF(file, (pct) => {
                            setProgress(pct);
                        });
                        setCompressedFile(compressed);
                        setProgress(100);
                        showToast('✅ Compression complete!', `Saved ${((1 - compressed.size / file.size) * 100).toFixed(0)}% space`);
                    } catch (err) {
                        showToast('⚠️ Compression failed', 'Using original file');
                        setCompressedFile(file);
                        setProgress(100);
                    }
                } else {
                    setCompressedFile(file);
                    setProgress(100);
                }
            };

            const openEditModal = (resource) => {
                setEditingResource(resource);
                setEditFormData({
                    title: resource.title || '',
                    price: resource.price || 0,
                    status: resource.status || 'draft',
                    subject: resource.subject || '',
                    level: resource.level || '',
                    description: resource.description || ''
                });
                setShowEditModal(true);
            };

            const closeEditModal = () => {
                setShowEditModal(false);
                setEditingResource(null);
            };

            const handleEditSave = async () => {
                if (!editingResource) return;
                
                if (!editFormData.title || !editFormData.subject || !editFormData.level) {
                    showToast('⚠️ Please fill in all required fields', 'error');
                    return;
                }

                try {
                    const updateData = {
                        title: editFormData.title,
                        price: parseFloat(editFormData.price) || 0,
                        status: editFormData.status,
                        subject: editFormData.subject,
                        level: editFormData.level,
                        description: editFormData.description || ''
                    };

                    const response = await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${editingResource.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(updateData)
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('❌ Edit error:', errorText);
                        throw new Error('Failed to update resource: ' + errorText);
                    }

                    showToast('✅ Resource updated successfully!');
                    closeEditModal();
                    loadResources();
                } catch (e) {
                    console.error('Edit error:', e);
                    showToast('❌ Update failed: ' + e.message, 'error');
                }
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                const { title, subject, level, resource_type } = formData;
                if (!title || !subject || !level || !resource_type || !selectedFile) {
                    showToast('⚠️ Please fill in all required fields and select a file', 'error');
                    return;
                }

                setUploading(true);
                setUploadError('');
                setProgress(10);

                try {
                    const fileToUpload = compressedFile || selectedFile;
                    
                    const bucketName = 'kenyavault-pdfs';
                    const fileExt = fileToUpload.name.split('.').pop();
                    const fileName = `${Date.now()}-${title.replace(/\s+/g, '_')}.${fileExt}`;
                    const filePath = `resources/${fileName}`;
                    
                    console.log('📤 Uploading to bucket:', bucketName);
                    console.log('📁 File path:', filePath);
                    
                    const formData2 = new FormData();
                    formData2.append('file', fileToUpload);

                    let uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucketName}/${filePath}`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        },
                        body: formData2
                    });

                    let usedBucket = bucketName;
                    let fileUrl = '';

                    if (!uploadRes.ok) {
                        const errorText = await uploadRes.text();
                        console.warn('⚠️ Primary bucket upload failed:', errorText);
                        
                        const altBucket = 'kenyavault-resources';
                        console.log('🔄 Trying alternative bucket:', altBucket);
                        
                        const altUploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${altBucket}/${filePath}`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                            },
                            body: formData2
                        });
                        
                        if (!altUploadRes.ok) {
                            const altError = await altUploadRes.text();
                            console.error('❌ Alternative upload error:', altError);
                            
                            const thirdBucket = 'academic-resources';
                            console.log('🔄 Trying third bucket:', thirdBucket);
                            
                            const thirdRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${thirdBucket}/${filePath}`, {
                                method: 'POST',
                                headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                                },
                                body: formData2
                            });
                            
                            if (!thirdRes.ok) {
                                const thirdError = await thirdRes.text();
                                throw new Error(`Upload failed in all buckets. Primary: ${errorText}. Alternative: ${altError}. Third: ${thirdError}`);
                            }
                            
                            usedBucket = thirdBucket;
                            fileUrl = `${SUPABASE_URL}/storage/v1/object/public/${thirdBucket}/${filePath}`;
                        } else {
                            usedBucket = altBucket;
                            fileUrl = `${SUPABASE_URL}/storage/v1/object/public/${altBucket}/${filePath}`;
                        }
                    } else {
                        fileUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${filePath}`;
                    }

                    console.log('✅ File uploaded to:', fileUrl);
                    setProgress(60);

                    const resourceData = {
                        title: title,
                        subject: subject,
                        level: level,
                        curriculum: formData.curriculum || 'cbc',
                        resource_type: formData.resource_type,
                        price: parseFloat(formData.price) || 0,
                        description: formData.description || '',
                        file_url: fileUrl,
                        file_path: filePath,
                        status: 'draft',
                        created_at: new Date().toISOString(),
                        download_count: 0
                    };

                    console.log('💾 Saving resource data:', resourceData);
                    setProgress(80);

                    const createRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(resourceData)
                    });

                    if (!createRes.ok) {
                        const errorText = await createRes.text();
                        console.error('❌ Database save error:', errorText);
                        
                        if (errorText.includes('file_path')) {
                            console.log('🔄 Retrying without file_path...');
                            delete resourceData.file_path;
                            const retryRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
                                method: 'POST',
                                headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                    'Content-Type': 'application/json',
                                    'Prefer': 'return=representation'
                                },
                                body: JSON.stringify(resourceData)
                            });
                            if (!retryRes.ok) {
                                const retryError = await retryRes.text();
                                throw new Error('Failed to save resource: ' + retryError);
                            }
                        } else {
                            throw new Error('Failed to save resource: ' + errorText);
                        }
                    }

                    setProgress(100);
                    showToast('✅ Resource uploaded successfully!');
                    
                    setFormData({ 
                        title: '', 
                        subject: '',
