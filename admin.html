                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-[#D4A017]">KES {totalRevenue.toLocaleString()}</p>
                                <p className="text-sm text-gray-600 dark:text-gray-400">Total Revenue</p>
                            </div>
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-green-600">KES {paidRevenue.toLocaleString()}</p>
                                <p className="text-sm text-gray-600 dark:text-gray-400">Paid Revenue</p>
                            </div>
                            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-amber-600">KES {pendingRevenue.toLocaleString()}</p>
                                <p className="text-sm text-gray-600 dark:text-gray-400">Pending Revenue</p>
                            </div>
                        </div>
                        <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4">
                            <h4 className="font-semibold text-gray-800 dark:text-white mb-2">📊 Revenue Breakdown</h4>
                            <div className="space-y-2">
                                <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Total Orders</span><span className="font-semibold">{orders.length}</span></div>
                                <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Paid Orders</span><span className="font-semibold">{orders.filter(o => o.payment_status === 'paid' || o.payment_status === 'completed' || o.payment_status === 'confirmed').length}</span></div>
                                <div className="flex justify-between"><span className="text-gray-600 dark:text-gray-400">Pending Orders</span><span className="font-semibold">{orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── SETTINGS MODULE ──
        function SettingsModule() {
            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">⚙️ Settings</h2>
                        <div className="space-y-4">
                            <div className="p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">Payment Settings</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">MegaPay API Key</label><input type="password" value="••••••••••••••••" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" /></div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">Commission Rate</label><input type="number" value="80" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" />%</div>
                                </div>
                                <button className="mt-3 btn-gold px-4 py-2 rounded-lg font-semibold">💾 Save Settings</button>
                            </div>
                            <div className="p-4 bg-red-50 dark:bg-red-900/10 rounded-lg border border-red-200 dark:border-red-800">
                                <h4 className="font-semibold text-red-600 dark:text-red-400 mb-2">⚠️ Danger Zone</h4>
                                <button className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 transition">🗑️ Clear All Data</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                classes: <ClassesModule />,
                orders: <OrdersModule />,
                finance: <FinanceModule />,
                settings: <SettingsModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();

            if (!isAuthenticated) return <LoginPage />;

            return (
                <div className="flex min-h-screen bg-white dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
                            <ModuleRenderer />
                        </main>
                    </div>
                    <ToastContainer />
                </div>
            );
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
