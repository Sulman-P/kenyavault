<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin — Full Stack Dashboard</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; transition: background 0.3s, color 0.3s; }
        .dark body { background: #111827; color: #e5e7eb; }
        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        /* SIDEBAR */
        .sidebar {

            background: #0a1a3a; color: #fff; z-index: 1000;
            transform: translateX(-100%);

            overflow-y: auto; display: flex; flex-direction: column;
        }
        .dark .sidebar { background: #0f172a; }
        .sidebar.open { transform: translateX(0); }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); z-index: 999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .sidebar-header .logo { font-weight: 800; font-size: 1.2rem; color: #fff; }
        .sidebar-header .logo span { color: #FCD34D; }
        .sidebar-close-btn {
            display: none; background: none; border: none; color: #fff;
            font-size: 1.5rem; cursor: pointer; padding: 4px 8px; border-radius: 8px;
        }
        .sidebar-close-btn:hover { background: rgba(255,255,255,0.1); }

        .sidebar-menu { flex: 1; padding: 16px 12px; overflow-y: auto; }
        .sidebar-menu .menu-label {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3); padding: 0 12px 8px;
        }
        .sidebar-menu .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-radius: 8px;
            color: rgba(255,255,255,0.6); cursor: pointer;
            transition: all 0.2s; margin-bottom: 2px;
            border: none; background: transparent; width: 100%;
            font-size: 0.85rem; font-weight: 500; text-align: left;
            font-family: 'Inter', sans-serif;
        }
        .sidebar-menu .menu-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .sidebar-menu .menu-item.active {
            background: rgba(212, 160, 23, 0.15); color: #FCD34D;
            border-left: 3px solid #D4A017;
        }
        .sidebar-menu .menu-item i { width: 20px; text-align: center; }
        .sidebar-menu .menu-item .badge {
            margin-left: auto; background: rgba(212,160,23,0.2);
            color: #FCD34D; font-size: 0.65rem; padding: 2px 8px; border-radius: 12px;
        }
        .pending-badge { position: relative; }
        .pending-badge .badge-count {
            position: absolute; top: -4px; right: -8px;
            background: #dc2626; color: white; font-size: 0.55rem; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 99px;
            display: flex; align-items: center; justify-content: center;
            animation: pulse-badge 2s infinite;
        }
        @keyframes pulse-badge { 0%,100%{transform:scale(1)}50%{transform:scale(1.15)} }

        .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .sidebar-footer .logout-btn {
            width: 100%; display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 8px; color: #ef4444;
            background: rgba(220,38,38,0.1); border: none; cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
            font-weight: 600; font-size: 0.85rem;
        }
        .sidebar-footer .logout-btn:hover { background: rgba(220,38,38,0.2); }

        /* TOPBAR */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;

        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .hamburger-btn {

            font-size: 1.4rem; cursor: pointer; padding: 6px 8px; border-radius: 8px;

        .dark .topbar-actions button:hover { background: rgba(255,255,255,0.05); }

        .live-indicator {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.7rem; font-weight: 600; color: #16a34a;
            background: #dcfce7; padding: 4px 12px; border-radius: 99px;

        .dark .live-indicator { background: rgba(22,163,74,0.2); color: #34d399; }
        .live-indicator .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #16a34a; animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.3} }

        .main-content {
            flex: 1; min-height: 100vh; padding: 20px;
            background: #f3f4f6; transition: margin-left 0.3s;
        }
        .dark .main-content { background: #111827; }

        .status-badge.live { background: #d1fae5; color: #065f46; }

        .status-badge.paid-out { background: #d1fae5; color: #065f46; }
        .status-badge.pending-payment { background: #fef3c7; color: #92400e; }
        .status-badge.rejected { background: #fee2e2; color: #991b1b; }
        .status-badge.suspended { background: #fee2e2; color: #991b1b; }
        .status-badge.draft { background: #f3f4f6; color: #6b7280; }
        .status-badge.active { background: #dbeafe; color: #1e40af; }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.confirmed { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.live { background: #064e3b; color: #34d399; }
        .dark .status-badge.paid { background: #064e3b; color: #34d399; }

        .dark .status-badge.suspended { background: #7f1d1d; color: #f87171; }
        .dark .status-badge.draft { background: #374151; color: #9ca3af; }
        .dark .status-badge.active { background: #1e3a5f; color: #60a5fa; }

        .stat-card .stat-number { font-weight:800; font-size:1.5rem; color:#0a1a3a; }
        .dark .stat-card .stat-number { color:#fff; }
        .stat-card .stat-number.gold { color:#D4A017; }
        .stat-card .stat-number.green { color:#16a34a; }
        .stat-card .stat-number.blue { color:#3b82f6; }
        .stat-card .stat-number.red { color:#dc2626; }
        .stat-card .stat-label { font-size:0.8rem; color:#6b7280; }
        .dark .stat-card .stat-label { color:#9ca3af; }

        .content-card .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #e5e7eb; }
        .dark .content-card .card-header { border-color:#374151; }
        .content-card .card-header h3 { font-weight:700; font-size:1rem; color:#1f2937; }

        .btn-sm.red { background:#fee2e2; color:#dc2626; }

        .dark .btn-sm.red { background:rgba(220,38,38,0.2); color:#f87171; }

        .btn-sm:hover { transform:translateY(-1px); }

        .btn-sm .spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .table-wrapper { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        thead { background:#f9fafb; border-bottom:2px solid #e5e7eb; }
        .dark thead { background:#1f2937; border-color:#374151; }
        th { padding:10px 12px; text-align:left; font-weight:600; color:#6b7280; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; }
        .dark th { color:#9ca3af; }

        .dark td { border-color:#374151; color:#e5e7eb; }
        tr:hover td { background:#f9fafb; }
        .dark tr:hover td { background:#1f2937; }

        .new-order-flash { animation:flashRow 1s ease 3; }
        @keyframes flashRow { 0%,100%{background:transparent}50%{background:rgba(212,160,23,0.1)} }
        .dark .new-order-flash { animation:flashRowDark 1s ease 3; }
        @keyframes flashRowDark { 0%,100%{background:transparent}50%{background:rgba(212,160,23,0.15)} }

        .toast-container { position:fixed; bottom:20px; right:20px; z-index:99999; max-width:380px; width:100%; }
        .toast-item { background:white; border-radius:12px; padding:14px 18px; box-shadow:0 8px 32px rgba(0,0,0,0.15); border-left:4px solid #7C3AED; margin-bottom:8px; animation:slideInRight 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .dark .toast-item { background:#1f2937; }
        .toast-item .toast-title { font-weight:600; font-size:0.85rem; color:#1f2937; }
        .dark .toast-item .toast-title { color:#f3f4f6; }
        .toast-item .toast-msg { font-size:0.8rem; color:#6b7280; }
        .dark .toast-item .toast-msg { color:#9ca3af; }
        @keyframes slideInRight { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }

        .pending-alert {

        .pending-alert .alert-count { background:rgba(255,255,255,0.2); padding:2px 10px; border-radius:99px; font-weight:700; font-size:0.75rem; }
        @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

        .modal-overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:white; border-radius:16px; padding:24px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; }

        .timeframe-toggle { display:flex; gap:4px; background:#f3f4f6; border-radius:8px; padding:4px; border:1px solid #e5e7eb; }

        .dark .drop-zone { background:#1f2937; border-color:#374151; }

        .dark .progress-track { background:#374151; }

        @media (max-width:768px) {

            .sidebar-close-btn { display:block!important; }

        .fade-in { animation:fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
            const [newsItems, setNewsItems] = useState([]);

            useEffect(() => {
                localStorage.setItem('kv-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth <= 768;
                    setIsMobile(mobile);
                    if (mobile) setSidebarOpen(false);
                    else setSidebarOpen(true);
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (isAuthenticated) { loadData(); startPolling(); }
                return () => stopPolling();
            }, [isAuthenticated]);

            const startPolling = () => {
                const interval = setInterval(checkNewOrders, 8000);
                window._pollingInterval = interval;
                setTimeout(checkNewOrders, 2000);
            };
            const stopPolling = () => { if (window._pollingInterval) { clearInterval(window._pollingInterval); window._pollingInterval = null; } };

            const checkNewOrders = async () => {
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc&limit=20`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const pending = data.filter(o => o.payment_status === 'pending' || o.status === 'pending');
                        for (const order of pending) {
                            if (order.mpesa_code || order.payment_ref) {
                                await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                                    method: 'PATCH',
                                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ payment_status: 'confirmed', status: 'confirmed' })
                                });
                            }
                        }
                        await loadOrders();
                    }
                } catch (e) { console.error('Polling error:', e); }
            };

            const showToast = (title, message, type = 'success') => {
                setToast({ title, message, type, id: Date.now() });
                setTimeout(() => setToast(null), 5000);
            };

            const loadOrders = async () => {
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setOrders(data || []);
                        const pending = data.filter(o => o.payment_status === 'pending' || o.status === 'pending');
                        setPendingOrderCount(pending.length);
                        return data;
                    }
                } catch (e) { console.error('Load orders error:', e); setOrders([]); setPendingOrderCount(0); }
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    await loadOrders();
                    const [rRes, tRes, cRes, pRes] = await Promise.all([
                        fetch(`${SUPABASE_URL}/rest/v1/resources?select=*&order=created_at.desc`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }),
                        fetch(`${SUPABASE_URL}/rest/v1/tutors?select=*`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }),
                        fetch(`${SUPABASE_URL}/rest/v1/classes?select=*&order=created_at.desc`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }),
                        fetch(`${SUPABASE_URL}/rest/v1/tutor_payments?select=*&order=created_at.desc`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } })
                    ]);
                    if (rRes.ok) setResources(await rRes.json());
                    if (tRes.ok) setTutors(await tRes.json());
                    if (cRes.ok) setClasses(await cRes.json());
                    if (pRes.ok) setPayments(await pRes.json());
                    loadNewsFromLocal();
                } catch (e) { console.error('Load data error:', e); }
                setLoading(false);
            };

            const loadNewsFromLocal = () => {
                const saved = localStorage.getItem('kv_news_items');
                if (saved) try { setNewsItems(JSON.parse(saved)); } catch (e) { setNewsItems([]); }
                else {
                    const demos = [
                        { id: '1', title: 'KJSEA 2026: Complete Preparation Guide', category: 'CBC News', audience: 'All', content: 'Everything you need to know about Kenya\'s second-ever CBC national examination.', pinned: true, status: 'Active', date: '2026-07-01' },
                        { id: '2', title: 'CBC Senior School Subject Pathways', category: 'System Updates', audience: 'Teachers', content: 'Understanding the CBC Senior School structure.', pinned: false, status: 'Active', date: '2026-06-28' },
                    ];
                    setNewsItems(demos);
                    localStorage.setItem('kv_news_items', JSON.stringify(demos));
                }
            };

            const addNewsItem = async (item) => {
                const newItem = { ...item, id: 'temp_' + Date.now(), date: new Date().toISOString().split('T')[0], status: 'Active' };
                setNewsItems(prev => [newItem, ...prev]);
                localStorage.setItem('kv_news_items', JSON.stringify([newItem, ...newsItems]));
                return newItem;
            };
            const updateNewsItem = async (id, updates) => {
                setNewsItems(prev => prev.map(item => item.id === id ? { ...item, ...updates } : item));
                localStorage.setItem('kv_news_items', JSON.stringify(newsItems.map(item => item.id === id ? { ...item, ...updates } : item)));
            };
            const deleteNewsItem = async (id) => {
                setNewsItems(prev => prev.filter(item => item.id !== id));
                localStorage.setItem('kv_news_items', JSON.stringify(newsItems.filter(item => item.id !== id)));
            };
            const togglePinNews = async (id) => {
                setNewsItems(prev => prev.map(item => item.id === id ? { ...item, pinned: !item.pinned } : item));
                localStorage.setItem('kv_news_items', JSON.stringify(newsItems.map(item => item.id === id ? { ...item, pinned: !item.pinned } : item)));
            };

            const login = (username, password) => {
                setAuthLoading(true); setAuthError('');
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                            sessionStorage.setItem('kv-auth', 'true');
                            sessionStorage.setItem('kv-user', username);
                            setIsAuthenticated(true);
                            setAuthLoading(false);
                            resolve(true);
                        } else {
                            setAuthError('Invalid username or password.');
                            setAuthLoading(false);
                            reject(new Error('Invalid credentials'));
                        }
                    }, 800);
                });
            };

            const logout = () => {
                stopPolling();
                sessionStorage.removeItem('kv-auth');
                sessionStorage.removeItem('kv-user');
                setIsAuthenticated(false);
                setCurrentModule('dashboard');
                window.location.href = '/';
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
            const closeSidebar = () => setSidebarOpen(false);

            return (
                <AppContext.Provider value={{
                    darkMode, toggleDarkMode, sidebarOpen, toggleSidebar, closeSidebar,
                    currentModule, setCurrentModule, isAuthenticated, authLoading, authError,
                    login, logout, loading, tutors, setTutors, orders, setOrders,
                    resources, setResources, classes, setClasses, payments, setPayments,
                    toast, showToast, loadData, loadOrders, newOrderIds, setNewOrderIds,
                    pendingOrderCount, setPendingOrderCount, isMobile,
                    newsItems, addNewsItem, updateNewsItem, deleteNewsItem, togglePinNews,
                    TUTOR_PAYOUT_PERCENTAGE
                }}>
                    {children}
                </AppContext.Provider>
            );
        }

        // ── RESOURCES ──
        function ResourcesModule() {
            const { resources, setResources, showToast } = useApp();
            const [formData, setFormData] = useState({ title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: '' });
            const [selectedFile, setSelectedFile] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [editingResource, setEditingResource] = useState(null);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editFormData, setEditFormData] = useState({ title: '', price: 0, status: 'draft', subject: '', level: '', description: '' });

            const loadResources = async () => {
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/resources?select=*&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (res.ok) setResources(await res.json());
                } catch (e) { console.error(e); }
            };
            useEffect(() => { loadResources(); }, []);

            const openEditModal = (r) => { setEditingResource(r); setEditFormData({ title: r.title, price: r.price, status: r.status, subject: r.subject, level: r.level, description: r.description }); setShowEditModal(true); };
            const closeEditModal = () => { setShowEditModal(false); setEditingResource(null); };

            const handleEditSave = async () => {
                if (!editingResource) return;
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${editingResource.id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: editFormData.title, price: editFormData.price, status: editFormData.status, subject: editFormData.subject, level: editFormData.level, description: editFormData.description })
                    });
                    showToast('✅ Resource updated');
                    closeEditModal();
                    loadResources();
                } catch (e) { showToast('❌ Update failed', 'error'); }
            };

            const toggleStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'live' ? 'draft' : 'live';
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    showToast(`✅ ${newStatus === 'live' ? 'Published' : 'Drafted'}`);
                    loadResources();
                } catch (e) { showToast('❌ Status update failed', 'error'); }
            };

            const deleteResource = async (id) => {
                if (!confirm('Delete?')) return;
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } });
                    showToast('✅ Deleted');
                    loadResources();
                } catch (e) { showToast('❌ Delete failed', 'error'); }
            };

                e.preventDefault();
                if (!selectedFile || !formData.title) { showToast('⚠️ Fill all fields and select file', 'error'); return; }
                setUploading(true);
                try {
                    const fileExt = selectedFile.name.split('.').pop();
                    const fileName = `${Date.now()}-${formData.title.replace(/\s/g, '_')}.${fileExt}`;
                    const filePath = `resources/${fileName}`;
                    const formData2 = new FormData();
                    formData2.append('file', selectedFile);
                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/kenyavault-pdfs/${filePath}`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: formData2
                    });
                    if (!uploadRes.ok) throw new Error('Upload failed');
                    const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/kenyavault-pdfs/${filePath}`;
                    const resourceData = { ...formData, file_url: fileUrl, status: 'draft', created_at: new Date().toISOString(), download_count: 0 };
                    const createRes = await fetch(`${SUPABASE_URL}/rest/v1/resources`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(resourceData)
                    });
                    if (!createRes.ok) throw new Error('DB save failed');
                    showToast('✅ Uploaded successfully');
                    setFormData({ title: '', subject: '', level: '', curriculum: 'cbc', resource_type: 'lesson-plan', price: 0, description: '' });
                    setSelectedFile(null);
                    loadResources();
                } catch (err) { showToast('❌ Upload failed: ' + err.message, 'error'); }
                setUploading(false);
            };

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-lg font-semibold mb-4">📤 Upload New Resource</h3>
                        <form onSubmit={handleUpload} className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" placeholder="Title *" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required />
                                <select value={formData.subject} onChange={(e) => setFormData({...formData, subject: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                                    <option value="">Subject</option>
                                    <option value="mathematics">Mathematics</option><option value="english">English</option><option value="kiswahili">Kiswahili</option>
                                    <option value="science">Integrated Science</option><option value="social-studies">Social Studies</option>
                                    <option value="creative-arts">Creative Arts</option><option value="business-studies">Business Studies</option>
                                    <option value="religious-education">Religious Education</option><option value="computer-studies">Computer Studies</option>
                                    <option value="chemistry">Chemistry</option><option value="physics">Physics</option><option value="Biology">Biology</option>
                                    <option value="geography">Geography</option><option value="History-citizenship">History & Citizenship</option>
                                    <option value="pretechnical-studies">Pretechnical Studies</option><option value="tvet">TVET</option>
                                    <option value="college">College</option><option value="university">University</option>
                                </select>
                                <select value={formData.level} onChange={(e) => setFormData({...formData, level: e.target.value})} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                                    <option value="">Level</option>
                                    <option value="pp1">PP1</option><option value="pp2">PP2</option>

                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/tutors`, {

                            <select value={formData.specialization} onChange={(e) => setFormData({...formData, specialization: e.target.value})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700" required>

                                <option value="religious-education">Religious Education</option><option value="computer-studies">Computer Studies</option>

                                <option value="geography">Geography</option><option value="History-citizenship">History & Citizenship</option>

                            <div className="md:col-span-2"><button type="submit" className="btn-gold px-6 py-2 rounded-lg">➕ Add Tutor</button></div>

        // ── ORDERS ──
        function OrdersModule() {
            const { orders, loadOrders, showToast, newOrderIds, pendingOrderCount, setPendingOrderCount } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const interval = setInterval(() => loadOrders(), 10000);
                return () => clearInterval(interval);
            }, []);

            const getStatusBadge = (status) => {
                const map = { 'pending': 'pending', 'pending_verification': 'pending', 'confirmed': 'confirmed', 'paid': 'paid', 'completed': 'paid', 'cancelled': 'rejected', 'rejected': 'rejected' };
                return map[status] || 'pending';
            };
            const getStatusLabel = (status) => {
                const map = { 'pending': '⏳ Pending', 'pending_verification': '⏳ Pending Approval', 'confirmed': '✅ Confirmed', 'paid': '✅ Paid', 'completed': '✅ Paid', 'cancelled': '❌ Cancelled', 'rejected': '❌ Rejected' };
                return map[status] || '⏳ Pending';
            };
            const isPending = (o) => o.payment_status === 'pending' || o.status === 'pending';

            const handleConfirmOrder = async (order) => {
                if (!confirm(`Confirm order #${order.order_ref || order.id.slice(0,8)}?`)) return;
                setLoadingOrderId(order.id);
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ payment_status: 'confirmed', status: 'confirmed' })
                    });
                    showToast('✅ Order confirmed');
                    await loadOrders();
                } catch (e) { showToast('❌ Error: ' + e.message, 'error'); }
                setLoadingOrderId(null);
            };

            const handleRejectOrder = async (order) => {
                if (!confirm(`Reject order #${order.order_ref || order.id.slice(0,8)}?`)) return;
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ payment_status: 'rejected', status: 'rejected' })
                    });
                    showToast('❌ Order rejected');
                    await loadOrders();
                } catch (e) { showToast('❌ Error: ' + e.message, 'error'); }
            };

            const filteredOrders = orders.filter(o => {
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    if (!(o.order_ref || '').toLowerCase().includes(s) && !(o.customer_name || '').toLowerCase().includes(s) && !(o.phone || '').includes(s)) return false;
                }
                if (filter === 'pending') return isPending(o);
                if (filter === 'confirmed') return o.payment_status === 'confirmed' || o.status === 'confirmed';
                if (filter === 'paid') return o.payment_status === 'paid' || o.status === 'paid';
                if (filter === 'cancelled') return o.payment_status === 'cancelled' || o.payment_status === 'rejected';
                return true;
            });

            const totalRevenue = orders.reduce((s, o) => s + (o.total_amount || 0), 0);
            const pendingRevenue = orders.filter(o => isPending(o)).reduce((s, o) => s + (o.total_amount || 0), 0);
            const confirmedRevenue = orders.filter(o => o.payment_status === 'confirmed' || o.status === 'confirmed').reduce((s, o) => s + (o.total_amount || 0), 0);

            return (
                <div className="fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700"><p className="text-sm text-gray-500">Total Revenue</p><p className="text-2xl font-bold text-[#D4A017]">KES {totalRevenue.toLocaleString()}</p></div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700"><p className="text-sm text-gray-500">Pending Revenue</p><p className="text-2xl font-bold text-amber-600">KES {pendingRevenue.toLocaleString()}</p></div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700"><p className="text-sm text-gray-500">Confirmed Revenue</p><p className="text-2xl font-bold text-green-600">KES {confirmedRevenue.toLocaleString()}</p></div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700"><p className="text-sm text-gray-500">Platform Fee (20%)</p><p className="text-2xl font-bold text-purple-600">KES {Math.round(confirmedRevenue * 0.2).toLocaleString()}</p></div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold">📦 Orders ({orders.length}) {pendingOrderCount>0 && <span className="ml-2 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-full animate-pulse">{pendingOrderCount} pending</span>}</h2>
                            <button onClick={() => loadOrders()} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-lg text-xs">🔄 Refresh</button>
                        </div>
                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>⏳ Pending</button>
                            <button onClick={() => setFilter('confirmed')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'confirmed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>✅ Confirmed</button>
                            <button onClick={() => setFilter('paid')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'paid' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>💳 Paid</button>

                        <div className="mb-4"><input type="text" placeholder="🔍 Search by ref, customer, phone..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" /></div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">

        // ── FINANCE ──
        function FinanceModule() {
            const { orders, tutors, payments, setPayments, TUTOR_PAYOUT_PERCENTAGE } = useApp();
            const [selectedTutor, setSelectedTutor] = useState(null);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [paymentAmount, setPaymentAmount] = useState(0);
            const [showAuditModal, setShowAuditModal] = useState(false);
            const [auditData, setAuditData] = useState({ marketing_spent: 0, tutor_payouts_total: 0, notes: '' });
            const [financeSummary, setFinanceSummary] = useState({ total_revenue: 0, platform_fee: 0, tutor_payouts: 0, marketing_spent: 0, actual_balance: 0, pending_payouts: 0 });

            const loadPayments = async () => {
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments?select=*&order=created_at.desc`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } });
                    if (res.ok) setPayments(await res.json());
                } catch (e) { console.error(e); }
            };
            useEffect(() => { loadPayments(); }, []);

            useEffect(() => {
                const totalRevenue = orders.reduce((s, o) => s + (o.total_amount || 0), 0);
                const platformFee = totalRevenue * 0.2;
                const tutorPayouts = totalRevenue * 0.8;
                const pendingPayouts = orders.filter(o => o.payment_status === 'confirmed' || o.status === 'confirmed').reduce((s, o) => s + Math.round((o.total_amount || 0) * 0.8), 0);
                const paidPayouts = payments.filter(p => p.status === 'paid').reduce((s, p) => s + (p.amount || 0), 0);
                const marketingSpent = auditData.marketing_spent || 0;
                const actualBalance = totalRevenue - marketingSpent - paidPayouts;
                setFinanceSummary({ total_revenue: totalRevenue, platform_fee: platformFee, tutor_payouts: tutorPayouts, marketing_spent: marketingSpent, actual_balance: actualBalance, pending_payouts: pendingPayouts });
            }, [orders, payments, auditData]);

            const calculateTutorEarnings = (tutorId) => {
                const tutorOrders = orders.filter(o => o.tutor_id === tutorId);
                const totalRevenue = tutorOrders.reduce((s, o) => s + (o.total_amount || 0), 0);
                const completedRevenue = tutorOrders.filter(o => o.payment_status === 'confirmed' || o.status === 'confirmed').reduce((s, o) => s + (o.total_amount || 0), 0);
                return { totalRevenue, completedRevenue, tutorPayout: totalRevenue * (TUTOR_PAYOUT_PERCENTAGE / 100), completedPayout: completedRevenue * (TUTOR_PAYOUT_PERCENTAGE / 100), ordersCount: tutorOrders.length };
            };

            const getTutorPaymentStatus = (tutorId) => {
                const tutorPayments = payments.filter(p => p.tutor_id === tutorId);
                const totalPaid = tutorPayments.filter(p => p.status === 'paid').reduce((s, p) => s + (p.amount || 0), 0);
                return { totalPaid };
            };

            const handleProcessPayment = (tutor) => {
                const earnings = calculateTutorEarnings(tutor.id);
                const pendingAmount = earnings.completedPayout - getTutorPaymentStatus(tutor.id).totalPaid;
                if (pendingAmount <= 0) { alert('No pending earnings'); return; }
                setSelectedTutor(tutor); setPaymentAmount(pendingAmount); setShowPaymentModal(true);
            };

            const confirmPayment = async () => {
                if (!selectedTutor) return;
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/tutor_payments`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tutor_id: selectedTutor.id, tutor_name: selectedTutor.name, amount: paymentAmount, status: 'paid', payment_date: new Date().toISOString(), created_at: new Date().toISOString() })
                    });
                    alert('✅ Payment processed');
                    setShowPaymentModal(false);
                    loadPayments();
                } catch (e) { alert('❌ Failed'); }
            };

            const openAuditModal = () => { setAuditData({ marketing_spent: financeSummary.marketing_spent, tutor_payouts_total: financeSummary.tutor_payouts, notes: '' }); setShowAuditModal(true); };
            const saveAudit = () => {
                localStorage.setItem('kv_finance_audit', JSON.stringify(auditData));
                setFinanceSummary(prev => ({ ...prev, marketing_spent: auditData.marketing_spent, tutor_payouts: auditData.tutor_payouts_total }));
                setShowAuditModal(false);
                alert('✅ Audit saved');
            };

            return (
                <div className="space-y-6 fade-in">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border"><p className="text-sm text-gray-500">Total Revenue</p><p className="text-2xl font-bold text-[#D4A017]">KES {financeSummary.total_revenue.toLocaleString()}</p></div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border"><p className="text-sm text-gray-500">Pending Payouts</p><p className="text-2xl font-bold text-amber-600">KES {financeSummary.pending_payouts.toLocaleString()}</p></div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border"><p className="text-sm text-gray-500">Amount Spent</p><p className="text-2xl font-bold text-red-600">KES {(financeSummary.marketing_spent + financeSummary.tutor_payouts).toLocaleString()}</p></div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border"><p className="text-sm text-gray-500">💰 Actual Balance</p><p className="text-2xl font-bold text-green-600">KES {financeSummary.actual_balance.toLocaleString()}</p></div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border">
                        <div className="flex justify-between items-center mb-4"><h3 className="text-lg font-semibold">📊 Financial Breakdown</h3><button onClick={openAuditModal} className="btn-gold px-4 py-2 rounded-lg text-sm">🔍 Audit Account</button></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><div className="flex justify-between py-2 border-b"><span>Total Revenue</span><span className="font-semibold">KES {financeSummary.total_revenue.toLocaleString()}</span></div>
                            <div className="flex justify-between py-2 border-b"><span>Platform Fee (20%)</span><span className="font-semibold text-blue-600">KES {financeSummary.platform_fee.toLocaleString()}</span></div>
                            <div className="flex justify-between py-2 border-b"><span>Tutor Payouts (80%)</span><span className="font-semibold text-amber-600">KES {financeSummary.tutor_payouts.toLocaleString()}</span></div></div>
                            <div><div className="flex justify-between py-2 border-b"><span>Marketing Spent</span><span className="font-semibold text-red-600">KES {financeSummary.marketing_spent.toLocaleString()}</span></div>
                            <div className="flex justify-between py-2 border-b"><span>Pending Payouts</span><span className="font-semibold text-amber-600">KES {financeSummary.pending_payouts.toLocaleString()}</span></div>
                            <div className="flex justify-between py-2 bg-green-50 dark:bg-green-900/20 rounded-lg px-3"><span className="font-bold">💰 Actual Balance</span><span className="font-bold text-green-600">KES {financeSummary.actual_balance.toLocaleString()}</span></div></div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border">
                        <h3 className="text-lg font-semibold mb-4">🧑‍🏫 Tutor Payouts ({TUTOR_PAYOUT_PERCENTAGE}% of Revenue)</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 dark:bg-gray-700/50"><tr><th className="px-4 py-2 text-left">Tutor</th><th className="px-4 py-2 text-left">Orders</th><th className="px-4 py-2 text-left">Total Revenue</th><th className="px-4 py-2 text-left">Payout (80%)</th><th className="px-4 py-2 text-left">Paid</th><th className="px-4 py-2 text-left">Actions</th></tr></thead>
                                <tbody>
                                    {tutors.filter(t => t.status === 'active').map(t => {
                                        const earnings = calculateTutorEarnings(t.id);
                                        const { totalPaid } = getTutorPaymentStatus(t.id);
                                        const pendingAmount = earnings.completedPayout - totalPaid;
                                        return (
                                            <tr key={t.id} className="border-t border-gray-100 dark:border-gray-700">
                                                <td className="px-4 py-2 font-medium">{t.name}</td>
                                                <td className="px-4 py-2">{earnings.ordersCount}</td>
                                                <td className="px-4 py-2">KES {earnings.totalRevenue.toLocaleString()}</td>
                                                <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {earnings.tutorPayout.toLocaleString()}</td>
                                                <td className="px-4 py-2">KES {totalPaid.toLocaleString()}</td>
                                                <td className="px-4 py-2">{pendingAmount > 0 && <button onClick={() => handleProcessPayment(t)} className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-lg text-xs">💰 Pay KES {pendingAmount.toLocaleString()}</button>}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showPaymentModal && <div className="modal-overlay open" onClick={() => setShowPaymentModal(false)}><div className="modal-box" onClick={(e) => e.stopPropagation()}><h3 className="text-lg font-bold mb-4">💳 Process Payment</h3><p><strong>Tutor:</strong> {selectedTutor?.name}</p><p><strong>Amount:</strong> KES {paymentAmount.toLocaleString()}</p><div className="flex gap-3 mt-4"><button onClick={confirmPayment} className="btn-gold px-6 py-2 rounded-lg">✅ Confirm</button><button onClick={() => setShowPaymentModal(false)} className="px-6 py-2 bg-gray-200 dark:bg-gray-600 rounded-lg">Cancel</button></div></div></div>}

                    {showAuditModal && <div className="modal-overlay open" onClick={() => setShowAuditModal(false)}><div className="modal-box" onClick={(e) => e.stopPropagation()}><h3 className="text-lg font-bold mb-4">🔍 Audit Account</h3>
                        <div className="space-y-4">
                            <input type="number" placeholder="Marketing Spent" value={auditData.marketing_spent} onChange={(e) => setAuditData({...auditData, marketing_spent: parseFloat(e.target.value)||0})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700" />
                            <input type="number" placeholder="Tutor Payouts Total" value={auditData.tutor_payouts_total} onChange={(e) => setAuditData({...auditData, tutor_payouts_total: parseFloat(e.target.value)||0})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700" />
                            <textarea placeholder="Notes" value={auditData.notes} onChange={(e) => setAuditData({...auditData, notes: e.target.value})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700" rows="2"></textarea>
                            <div className="flex gap-3"><button onClick={saveAudit} className="btn-gold px-6 py-2 rounded-lg">💾 Save Audit</button><button onClick={() => setShowAuditModal(false)} className="px-6 py-2 bg-gray-200 dark:bg-gray-600 rounded-lg">Cancel</button></div>
                        </div>
                    </div></div>}
                </div>
            );
        }

        // ── NEWS ──
        function NewsModule() {
            const { newsItems, addNewsItem, updateNewsItem, deleteNewsItem, togglePinNews, showToast } = useApp();
            const [formData, setFormData] = useState({ title: '', category: 'CBC News', audience: 'All', content: '', pinned: false });
            const [editingId, setEditingId] = useState(null);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editFormData, setEditFormData] = useState({ title: '', category: 'CBC News', audience: 'All', content: '', pinned: false, status: 'Active' });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.title || !formData.content) { showToast('⚠️ Fill in title and content', 'error'); return; }
                setIsSubmitting(true);
                await addNewsItem(formData);
                showToast('✅ Published');
                setFormData({ title: '', category: 'CBC News', audience: 'All', content: '', pinned: false });
                setIsSubmitting(false);
            };

            const openEditModal = (item) => { setEditingId(item.id); setEditFormData({ title: item.title, category: item.category, audience: item.audience, content: item.content, pinned: item.pinned, status: item.status }); setShowEditModal(true); };
            const closeEditModal = () => { setShowEditModal(false); setEditingId(null); };

            const handleEditSave = async () => {
                if (!editingId) return;
                setIsSubmitting(true);
                await updateNewsItem(editingId, editFormData);
                showToast('✅ Updated');
                closeEditModal();
                setIsSubmitting(false);
            };

            const handleDelete = async (id) => { if (confirm('Delete?')) { await deleteNewsItem(id); showToast('🗑️ Deleted'); } };

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <select value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700"><option value="CBC News">CBC News</option><option value="Exam Alerts">Exam Alerts</option><option value="System Updates">System Updates</option><option value="Maintenance">Maintenance</option><option value="General">General</option></select>
                                <select value={formData.audience} onChange={(e) => setFormData({...formData, audience: e.target.value})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700"><option value="All">All</option><option value="Teachers">Teachers</option><option value="Students">Students</option><option value="Parents">Parents</option><option value="Admins">Admins</option></select>
                            </div>
                            <textarea placeholder="Content *" value={formData.content} onChange={(e) => setFormData({...formData, content: e.target.value})} className="w-full px-4 py-2 border rounded-lg dark:bg-gray-700" rows="3" required></textarea>
                            <div className="flex items-center gap-4">
                                <label className="flex items-center gap-2"><input type="checkbox" checked={formData.pinned} onChange={(e) => setFormData({...formData, pinned: e.target.checked})} className="w-4 h-4 accent-[#D4A017]" /> <span className="text-sm">📌 Pin</span></label>
                                <button type="submit" disabled={isSubmitting} className="btn-gold px-6 py-2 rounded-lg">{isSubmitting ? '⏳...' : '🚀 Publish'}</button>
                            </div>
                        </form>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border">
                        <h3 className="text-lg font-semibold mb-4">📋 Published Updates</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 dark:bg-gray-700/50"><tr><th className="px-4 py-2 text-left">Title</th><th className="px-4 py-2 text-left">Category</th><th className="px-4 py-2 text-left">Audience</th><th className="px-4 py-2 text-left">Date</th><th className="px-4 py-2 text-left">Status</th><th className="px-4 py-2 text-left">Actions</th></tr></thead>
                                <tbody>
                                    {sortedNews.map(item => (
                                        <tr key={item.id} className="border-t border-gray-100 dark:border-gray-700">
                                            <td className="px-4 py-2 font-medium flex items-center gap-2">{item.pinned && <span className="text-[#D4A017]">📌</span>}{item.title}</td>
                                            <td className="px-4 py-2"><span className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full">{item.category}</span></td>
                                            <td className="px-4 py-2">{item.audience}</td>
                                            <td className="px-4 py-2 text-gray-500">{item.date}</td>
                                            <td className="px-4 py-2"><span className={`status-badge ${item.status === 'Active' ? 'live' : 'draft'}`}>{item.status || 'Active'}</span></td>
                                            <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                <button onClick={() => openEditModal(item)} className="px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded">✏️</button>
                                                <button onClick={() => togglePinNews(item.id)} className="px-2 py-1 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded">{item.pinned ? '📌 Unpin' : '📌 Pin'}</button>

                    {showEditModal && <div className="modal-overlay open" onClick={closeEditModal}><div className="modal-box" onClick={(e) => e.stopPropagation()}><h3 className="text-lg font-semibold mb-4">✏️ Edit News</h3>

                        <div className="settings-section"><h4 className="text-sm font-semibold mb-3">Payout Settings</h4>
                            <div className="flex items-center gap-2">
                                <input type="number" name="payoutPercentage" value={settings.payoutPercentage} onChange={(e) => setSettings({...settings, payoutPercentage: parseInt(e.target.value) || 0})} min="0" max="100" className="w-24 px-4 py-2 border rounded-lg dark:bg-gray-700" />
                                <span>%</span>
                                <select name="currency" value={settings.currency} onChange={(e) => setSettings({...settings, currency: e.target.value})} className="px-4 py-2 border rounded-lg dark:bg-gray-700 ml-4"><option value="KES">KES</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
                            </div>
                        </div>
                        <div className="settings-section"><h4 className="text-sm font-semibold mb-3">Notifications</h4>
                            <label className="flex items-center gap-2"><input type="checkbox" checked={settings.emailNotifications} onChange={(e) => setSettings({...settings, emailNotifications: e.target.checked})} className="w-4 h-4 accent-[#D4A017]" /> Email notifications</label>
                            <label className="flex items-center gap-2"><input type="checkbox" checked={settings.orderNotifications} onChange={(e) => setSettings({...settings, orderNotifications: e.target.checked})} className="w-4 h-4 accent-[#D4A017]" /> Order notifications</label>
                        </div>
                        <div className="settings-section"><h4 className="text-sm font-semibold mb-3">Display</h4>
                            <div className="flex items-center justify-between"><span>Dark Mode</span><button type="button" onClick={toggleDarkMode} className="px-4 py-2 bg-gray-200 dark:bg-gray-600 rounded-lg">{darkMode ? '☀️ Light' : '🌙 Dark'}</button></div>
                        </div>
                        <div className="settings-section"><h4 className="text-sm font-semibold mb-3">Regional</h4>
                            <select name="timezone" value={settings.timezone} onChange={(e) => setSettings({...settings, timezone: e.target.value})} className="w-full md:w-64 px-4 py-2 border rounded-lg dark:bg-gray-700"><option value="Africa/Nairobi">Africa/Nairobi (EAT)</option><option value="Africa/Lagos">Africa/Lagos (WAT)</option><option value="UTC">UTC</option></select>
                        </div>
                        <div className="mt-6 flex gap-3">
                            <button type="submit" disabled={loading} className="btn-gold px-6 py-2 rounded-lg">{loading ? '⏳...' : '💾 Save'}</button>
                            <button type="button" onClick={() => { if (confirm('Reset?')) { localStorage.removeItem('kv-settings'); setSettings({ siteName: 'KenyaVault', siteTagline: 'Complete Education Resources', emailNotifications: true, orderNotifications: true, payoutPercentage: 80, currency: 'KES', timezone: 'Africa/Nairobi' }); showToast('✅ Reset'); } }} className="px-6 py-2 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-lg">Reset</button>
                        </div>
                    </form>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                orders: <OrdersModule />,
                finance: <FinanceModule />,
                news: <NewsModule />,
                settings: <SettingsModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();
            if (!isAuthenticated) return <LoginPage />;
            return (
                <div className="dashboard-wrapper">
                    <Sidebar />
                    <div className="main-content">
                        <Topbar />
                        <ModuleRenderer />
                    </div>
                    <ToastContainer />
                    <PendingAlert />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>
</body>
</html>
