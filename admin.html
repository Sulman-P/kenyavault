                                    <div className="flex gap-3">
                                        <button onClick={handleEditSave} disabled={isSubmitting} className="btn-gold px-4 py-2 rounded-lg font-semibold disabled:opacity-50">
                                            {isSubmitting ? '⏳ Saving...' : '💾 Save Changes'}
                                        </button>
                                        <button onClick={closeEditModal} className="px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-500 transition">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── SETTINGS MODULE ──
        function SettingsModule() {
            const { darkMode, toggleDarkMode, showNotification } = useApp();
            const [settings, setSettings] = useState({
                siteName: 'KenyaVault',
                siteTagline: 'Complete Education Resources',
                emailNotifications: true,
                orderNotifications: true,
                payoutPercentage: 80,
                currency: 'KES',
                timezone: 'Africa/Nairobi'
            });

            const [loading, setLoading] = useState(false);

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    localStorage.setItem('kv-settings', JSON.stringify(settings));
                    showNotification('✅ Settings saved successfully!', 'success');
                } catch (error) {
                    showNotification('❌ Failed to save settings', 'error');
                }
                setLoading(false);
            };

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setSettings(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            useEffect(() => {
                const savedSettings = localStorage.getItem('kv-settings');
                if (savedSettings) {
                    try {
                        const parsed = JSON.parse(savedSettings);
                        setSettings(prev => ({ ...prev, ...parsed }));
                    } catch (e) {
                        console.error('Error loading settings:', e);
                    }
                }
            }, []);

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-6">⚙️ Settings</h3>
                        
                        <form onSubmit={handleSaveSettings}>
                            <div className="settings-section">
                                <h4 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">General</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Site Name</label>
                                        <input type="text" name="siteName" value={settings.siteName} onChange={handleInputChange} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tagline</label>
                                        <input type="text" name="siteTagline" value={settings.siteTagline} onChange={handleInputChange} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" />
                                    </div>
                                </div>
                            </div>

                            <div className="settings-section">
                                <h4 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Payout Settings</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tutor Payout Percentage</label>
                                        <div className="flex items-center gap-2">
                                            <input type="number" name="payoutPercentage" value={settings.payoutPercentage} onChange={handleInputChange} min="0" max="100" className="w-24 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white" />
                                            <span className="text-gray-500 dark:text-gray-400">%</span>
                                        </div>
                                        <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">Percentage of revenue paid to tutors</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Currency</label>
                                        <select name="currency" value={settings.currency} onChange={handleInputChange} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white">
                                            <option value="KES">KES - Kenyan Shilling</option>
                                            <option value="USD">USD - US Dollar</option>
                                            <option value="EUR">EUR - Euro</option>
                                            <option value="GBP">GBP - British Pound</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div className="settings-section">
                                <h4 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Notifications</h4>
                                <div className="space-y-2">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" name="emailNotifications" checked={settings.emailNotifications} onChange={handleInputChange} className="w-4 h-4 accent-[#D4A017]" />
                                        <span className="text-sm text-gray-700 dark:text-gray-300">Enable email notifications</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" name="orderNotifications" checked={settings.orderNotifications} onChange={handleInputChange} className="w-4 h-4 accent-[#D4A017]" />
                                        <span className="text-sm text-gray-700 dark:text-gray-300">Enable order notifications</span>
                                    </label>
                                </div>
                            </div>

                            <div className="settings-section">
                                <h4 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Display</h4>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300">Dark Mode</label>
                                        <p className="text-xs text-gray-500 dark:text-gray-400">Toggle dark/light theme</p>
                                    </div>
                                    <button type="button" onClick={toggleDarkMode} className="px-4 py-2 bg-gray-200 dark:bg-gray-600 rounded-lg text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-500 transition">
                                        {darkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}
                                    </button>
                                </div>
                            </div>

                            <div className="settings-section">
                                <h4 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Regional</h4>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Timezone</label>
                                    <select name="timezone" value={settings.timezone} onChange={handleInputChange} className="w-full md:w-64 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white">
                                        <option value="Africa/Nairobi">Africa/Nairobi (EAT)</option>
                                        <option value="Africa/Lagos">Africa/Lagos (WAT)</option>
                                        <option value="Africa/Johannesburg">Africa/Johannesburg (SAST)</option>
                                        <option value="UTC">UTC</option>
                                        <option value="America/New_York">America/New_York (EST)</option>
                                        <option value="Europe/London">Europe/London (GMT)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="mt-6 flex gap-3">
                                <button type="submit" disabled={loading} className="btn-gold px-6 py-2 rounded-lg font-semibold disabled:opacity-50">
                                    {loading ? '⏳ Saving...' : '💾 Save Settings'}
                                </button>
                                <button type="button" onClick={() => {
                                    if (confirm('Reset all settings to default?')) {
                                        localStorage.removeItem('kv-settings');
                                        setSettings({
                                            siteName: 'KenyaVault',
                                            siteTagline: 'Complete Education Resources',
                                            emailNotifications: true,
                                            orderNotifications: true,
                                            payoutPercentage: 80,
                                            currency: 'KES',
                                            timezone: 'Africa/Nairobi'
                                        });
                                        showNotification('✅ Settings reset to default', 'success');
                                    }
                                }} className="px-6 py-2 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg font-semibold hover:bg-red-200 transition">
                                    🔄 Reset Defaults
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                orders: <OrdersModule />,
                finance: <FinanceModule />,
                news: <NewsModule />,
                settings: <SettingsModule />,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            return (
                <div className="dashboard-wrapper">
                    <Sidebar />
                    <div className="main-content">
                        <Topbar />
                        <ModuleRenderer />
                    </div>
                    <ToastContainer />
                    <PendingAlert />
                </div>
            );
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
