                        }

                        const pendingOrders = data.filter(o =>

                            o.payment_status === 'pending_verification' ||

        // ── PDF COMPRESSION UTILITY ──
        function compressPDF(file, onProgress) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const arrayBuffer = e.target.result;
                        const originalSize = file.size;
                        
                        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                        const pageCount = pdfDoc.getPageCount();
                        const newPdf = await PDFLib.PDFDocument.create();
                        
                        for (let i = 0; i < pageCount; i++) {
                            const [page] = await newPdf.copyPages(pdfDoc, [i]);
                            newPdf.addPage(page);
                            if (onProgress) {
                                const progress = ((i + 1) / pageCount) * 100;
                                onProgress(progress, originalSize);
                            }
                        }
                        
                        const compressedBytes = await newPdf.save({
                            useObjectStreams: true,
                            addDefaultPage: false,
                            objectsPerTick: 50,
                        });
                        
                        const compressedSize = compressedBytes.length;
                        const compressionRatio = (1 - compressedSize / originalSize) * 100;
                        
                        if (onProgress) {
                            onProgress(100, originalSize, compressedSize);
                        }
                        
                        const compressedFile = new File(
                            [compressedBytes],
                            file.name,
                            { type: 'application/pdf' }
                        );
                        
                        compressedFile.compressionRatio = compressionRatio;
                        compressedFile.originalSize = originalSize;
                        compressedFile.compressedSize = compressedSize;
                        compressedFile.pageCount = pageCount;
                        
                        resolve(compressedFile);
                    } catch (error) {
                        console.error('PDF compression error:', error);
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // ── GENERATE SIGNED URL ──
        const generateSignedUrl = async (filePath) => {
            try {
                if (!filePath) return null;
                
                let cleanPath = filePath;
                cleanPath = cleanPath.replace(/^kenyavault-pdfs\//, '');
                cleanPath = cleanPath.replace(/^academic-resources\//, '');
                cleanPath = cleanPath.replace(/^resources\//, '');
                cleanPath = cleanPath.replace(/^kenyavault-resources\//, '');
                cleanPath = cleanPath.replace(/^kenyavault-covers\//, '');
                cleanPath = cleanPath.replace(/^https?:\/\/[^\/]+\/storage\/v1\/object\/public\/[^\/]+\//, '');
                cleanPath = cleanPath.replace(/^\/+/, '');
                cleanPath = decodeURIComponent(cleanPath);
                
                console.log('📁 Generating signed URL for:', cleanPath);
                
                const signedRes = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/${STORAGE_BUCKET}/${encodeURIComponent(cleanPath)}?expiresIn=10800`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (signedRes.ok) {
                    const signedData = await signedRes.json();
                    console.log('✅ Signed URL generated successfully');
                    return signedData.signedURL || signedData.url || null;
                } else {
                    console.log('⚠️ Signed URL failed, trying public URL');
                    const publicUrl = `${STORAGE_URL}/${encodeURIComponent(cleanPath)}`;
                    
                    const checkRes = await fetch(publicUrl, {
                        method: 'HEAD',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    });
                    
                    if (checkRes.ok) {
                        console.log('✅ Public URL works');
                        return publicUrl;
                    }
                    
                    console.log('❌ File not found:', cleanPath);
                    return null;
                }
            } catch (e) {
                console.error('❌ Error generating signed URL:', e);
                return null;
            }
        };

        // ── FIND RESOURCE IN STORAGE ──
        const findResourceInStorage = async (resourceTitle, resourceLevel, resourceSubject) => {
            try {
                const listRes = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${STORAGE_BUCKET}`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (!listRes.ok) {
                    console.log('⚠️ Could not list bucket contents');
                    return null;
                }
                
                const files = await listRes.json();
                console.log(`📁 Found ${files.length} files in bucket`);
                
                const searchTitle = resourceTitle ? resourceTitle.toLowerCase() : '';
                const searchLevel = resourceLevel ? resourceLevel.toLowerCase() : '';
                const searchSubject = resourceSubject ? resourceSubject.toLowerCase() : '';
                
                const matchingFiles = files.filter(f => {
                    const fileName = f.name.toLowerCase();
                    return fileName.includes(searchTitle) || 
                           (searchLevel && fileName.includes(searchLevel)) || 
                           (searchSubject && fileName.includes(searchSubject));
                });
                
                if (matchingFiles.length > 0) {
                    console.log(`✅ Found ${matchingFiles.length} matching files`);
                    return matchingFiles[matchingFiles.length - 1].name;
                }
                
                return null;
            } catch (e) {
                console.error('Error finding resource:', e);
                return null;
            }
        };

                            const dateStr = date.toISOString().split('T')[0];
                            const dayTotal = paidOrders
                                .filter(o => o.created_at && o.created_at.startsWith(dateStr))
                                .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                            labels.push(date.toLocaleDateString('en', { weekday: 'short' }));
                            values.push(dayTotal);
                        }
                    } else if (tf === 'weekly') {
                        for (let i = 3; i >= 0; i--) {
                            const weekStart = new Date(now);
                            weekStart.setDate(weekStart.getDate() - (weekStart.getDay() + 7 * i));
                            const weekEnd = new Date(weekStart);
                            weekEnd.setDate(weekEnd.getDate() + 6);
                            
                            const weekTotal = paidOrders
                                .filter(o => {
                                    if (!o.created_at) return false;
                                    const orderDate = new Date(o.created_at);
                                    return orderDate >= weekStart && orderDate <= weekEnd;
                                })
                                .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                            
                            labels.push(`W${4 - i}`);
                            values.push(weekTotal);
                        }
                    } else if (tf === 'monthly') {
                        for (let i = 11; i >= 0; i--) {
                            const month = new Date(now);
                            month.setMonth(month.getMonth() - i);
                            const monthStr = month.toISOString().slice(0, 7);
                            const monthTotal = paidOrders
                                .filter(o => o.created_at && o.created_at.startsWith(monthStr))
                                .reduce((sum, o) => sum + (o.total_amount || 0), 0);
                            labels.push(month.toLocaleDateString('en', { month: 'short' }));
                            values.push(monthTotal);
                        }
                    }
                    
                    setChartData({ labels, values });
                    
                    if (chartRef.current) {
                        chartRef.current.data.labels = labels;
                        chartRef.current.data.datasets[0].data = values;
                        chartRef.current.update();
                    }
                    
                } catch (error) {

            const totalRevenue = orders.reduce((s, o) => s + (o.total_amount || 0), 0);

            const activeTutors = tutors.filter(t => t.status === 'active').length;

            return (
                <div className="space-y-6 fade-in">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4">

                            <div className="timeframe-toggle">

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">

        // ── ORDERS MODULE ──
        function OrdersModule() {
            const { orders, loadOrders, showNotification, newOrderIds, setNewOrderIds, pendingOrderCount, setPendingOrderCount } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [showOrderDetails, setShowOrderDetails] = useState(false);
            const [orderItems, setOrderItems] = useState([]);
            const [generatingLinks, setGeneratingLinks] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [revenueStats, setRevenueStats] = useState({
                totalRevenue: 0,
                pendingRevenue: 0,
                completedRevenue: 0,
                totalOrders: 0,
                pendingOrders: 0,
                completedOrders: 0
            });

            useEffect(() => {
                calculateRevenueStats();
            }, [orders]);

            const calculateRevenueStats = () => {
                const total = orders.reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
                const pending = orders
                    .filter(o => o.payment_status === 'pending' || o.status === 'pending')
                    .reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
                const completed = orders
                    .filter(o => o.payment_status === 'confirmed' || o.payment_status === 'paid' || o.payment_status === 'completed' || o.status === 'completed' || o.status === 'confirmed' || o.status === 'paid')
                    .reduce((sum, o) => sum + (o.total_amount || o.item_price || 0), 0);
                const pendingCount = orders.filter(o => o.payment_status === 'pending' || o.status === 'pending').length;
                const completedCount = orders.filter(o => o.payment_status === 'confirmed' || o.payment_status === 'paid' || o.payment_status === 'completed' || o.status === 'completed' || o.status === 'confirmed' || o.status === 'paid').length;
                
                setRevenueStats({
                    totalRevenue: total,
                    pendingRevenue: pending,
                    completedRevenue: completed,
                    totalOrders: orders.length,
                    pendingOrders: pendingCount,
                    completedOrders: completedCount
                });
                setPendingOrderCount(pendingCount);
            };

            useEffect(() => {
                const interval = setInterval(() => loadOrders(), 10000);
                return () => clearInterval(interval);
            }, []);

            const generateSignedUrl = async (filePath) => {
                try {
                    if (!filePath) return null;
                    let cleanPath = filePath;
                    cleanPath = cleanPath.replace(/^kenyavault-pdfs\//, '');
                    cleanPath = cleanPath.replace(/^academic-resources\//, '');
                    cleanPath = cleanPath.replace(/^resources\//, '');
                    cleanPath = cleanPath.replace(/^kenyavault-resources\//, '');
                    cleanPath = cleanPath.replace(/^https?:\/\/[^\/]+\/storage\/v1\/object\/public\/[^\/]+\//, '');
                    cleanPath = cleanPath.replace(/^\/+/, '');
                    cleanPath = decodeURIComponent(cleanPath);
                    if (!cleanPath) return null;
                    
                    const signedRes = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/${STORAGE_BUCKET}/${encodeURIComponent(cleanPath)}?expiresIn=10800`, {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    });
                    if (signedRes.ok) {
                        const signedData = await signedRes.json();
                        return signedData.signedURL || signedData.url || null;
                    }
                    const publicUrl = `${STORAGE_URL}/${encodeURIComponent(cleanPath)}`;
                    const checkRes = await fetch(publicUrl, { method: 'HEAD' });
                    if (checkRes.ok) return publicUrl;
                    return null;
                } catch (e) {
                    console.error('Error generating signed URL:', e);
                    return null;
                }
            };

            const fetchOrderItemsWithDetails = async (order) => {
                try {
                    let items = [];
                    if (order.order_ref) {
                        const itemsRes = await fetch(`${SUPABASE_URL}/rest/v1/order_items?order_ref=eq.${order.order_ref}`, {
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (itemsRes.ok) items = await itemsRes.json();
                    }
                    if (items.length === 0 && order.id) {
                        const itemsRes = await fetch(`${SUPABASE_URL}/rest/v1/order_items?order_id=eq.${order.id}`, {
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        if (itemsRes.ok) items = await itemsRes.json();
                    }
                    if (items.length === 0) {
                        items = [{
                            id: 'order-item-1',
                            order_ref: order.order_ref,
                            order_id: order.id,
                            product_id: order.resource_id || order.product_id,
                            resource_title: order.item_title || order.resource_title || 'Resource',
                            resource_file_path: order.resource_file_path || order.file_path || '',
                            resource_file_name: order.resource_file_name || '',
                            price: order.item_price || order.total_amount || 0,
                            quantity: 1,
                            created_at: order.created_at
                        }];
                    }
                    
                    const itemsWithDetails = await Promise.all(items.map(async (item) => {
                        let filePath = item.resource_file_path || item.file_path || '';
                        let downloadUrl = null;
                        let resourceDetails = null;
                        
                        if (item.product_id) {
                            try {
                                const resourceRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?id=eq.${item.product_id}`, {
                                    headers: {
                                        'apikey': SUPABASE_ANON_KEY,
                                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                        'Content-Type': 'application/json'
                                    }
                                });
                                if (resourceRes.ok) {
                                    const resources = await resourceRes.json();
                                    if (resources.length > 0) {
                                        resourceDetails = resources[0];
                                        if (resourceDetails.file_path || resourceDetails.file_url) {
                                            filePath = resourceDetails.file_path || resourceDetails.file_url;
                                        }
                                    }
                                }
                            } catch (e) {
                                console.error('Error fetching resource:', e);
                            }
                        }
                        if (filePath) downloadUrl = await generateSignedUrl(filePath);
                        if (!filePath && item.resource_title) {
                            try {
                                const searchRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?title=ilike.%25${encodeURIComponent(item.resource_title)}%25&limit=1`, {
                                    headers: {
                                        'apikey': SUPABASE_ANON_KEY,
                                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                        'Content-Type': 'application/json'
                                    }
                                });
                                if (searchRes.ok) {
                                    const results = await searchRes.json();
                                    if (results.length > 0) {
                                        const found = results[0];
                                        if (found.file_path || found.file_url) {
                                            filePath = found.file_path || found.file_url;
                                            resourceDetails = found;
                                            downloadUrl = await generateSignedUrl(filePath);
                                        }
                                    }
                                }
                            } catch (e) {
                                console.error('Error searching for resource:', e);
                            }
                        }
                        const fileName = filePath ? filePath.split('/').pop() : item.resource_file_name || 'resource.pdf';
                        return {
                            ...item,
                            resource: resourceDetails,
                            file_path: filePath,
                            file_name: fileName,
                            download_url: downloadUrl,
                            has_download: !!downloadUrl,
                            resource_title: item.resource_title || resourceDetails?.title || 'Resource'
                        };
                    }));
                    setOrderItems(itemsWithDetails);
                    return itemsWithDetails;
                } catch (e) {
                    console.error('Error fetching order items:', e);
                    showNotification('Error loading order details', 'error');
                    return [];
                }
            };

            const viewOrderDetails = async (order) => {
                setSelectedOrder(order);

                await fetchOrderItemsWithDetails(order);
            };

            const closeOrderDetails = () => {
                setShowOrderDetails(false);
                setSelectedOrder(null);
                setOrderItems([]);
            };

            const handleConfirmOrder = async (order) => {
                const ref = order.payment_ref || order.order_ref || order.id.slice(0, 8).toUpperCase();
                if (!confirm(`Confirm order #${ref}?`)) return;
                setLoadingOrderId(order.id);
                try {
                    const updateData = { payment_status: 'confirmed', status: 'confirmed' };
                    let updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updateData)
                    });
                    if (!updateRes.ok && order.order_ref) {
                        updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?order_ref=eq.${order.order_ref}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(updateData)
                        });
                    }
                    if (!updateRes.ok) {
                        const errorText = await updateRes.text();
                        throw new Error(`Failed to update order: ${updateRes.status} - ${errorText}`);
                    }
                    showNotification('✅ Order confirmed!', 'success');
                    await loadOrders();
                    setNewOrderIds(prev => prev.filter(id => id !== order.id));
                } catch (e) {
                    console.error('Confirm error:', e);
                    showNotification('Error confirming order: ' + e.message, 'error');
                }
                setLoadingOrderId(null);
            };

            const handleRejectOrder = async (order) => {
                const ref = order.payment_ref || order.order_ref || order.id.slice(0, 8).toUpperCase();
                if (!confirm(`Reject order #${ref}?`)) return;
                try {
                    const updateData = { payment_status: 'rejected', status: 'rejected' };
                    let updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updateData)
                    });
                    if (!updateRes.ok && order.order_ref) {
                        updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?order_ref=eq.${order.order_ref}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(updateData)
                        });
                    }
                    if (!updateRes.ok) {
                        const errorText = await updateRes.text();
                        throw new Error(`Failed to reject order: ${updateRes.status} - ${errorText}`);
                    }
                    showNotification('❌ Order rejected', 'success');
                    await loadOrders();
                    setNewOrderIds(prev => prev.filter(id => id !== order.id));
                } catch (e) {
                    console.error('Reject error:', e);
                    showNotification('Error rejecting order: ' + e.message, 'error');
                }
            };

            const handleResendWhatsApp = async (order) => {
                setGeneratingLinks(prev => ({ ...prev, [order.id]: true }));
                try {
                    const items = await fetchOrderItemsWithDetails(order);
                    const ref = order.payment_ref || order.order_ref || order.id.slice(0, 8).toUpperCase();
                    let message = `✅ *Your KenyaVault Order is Ready!*\n\nOrder #: *${ref}*\n\n`;
                    if (items.length > 0) {
                        items.forEach((item, idx) => {
                            message += `Resource ${idx + 1}: *${item.resource_title}* (x${item.quantity || 1})\n`;
                        });
                        message += `\n`;
                    } else {
                        message += `Resource: *${order.item_title || order.resource_title || 'Resource'}*\n\n`;
                    }
                    message += `Amount: *KES ${order.total_amount || order.item_price || 0}*\n\n📥 *Download Links:*\n`;
                    let hasLinks = false;
                    items.forEach((item, idx) => {
                        if (item.download_url) {
                            message += `\n${idx + 1}. ${item.resource_title}:\n${item.download_url}\n`;
                            hasLinks = true;
                        } else if (item.file_path) {
                            const publicUrl = `${STORAGE_URL}/${encodeURIComponent(item.file_path)}`;
                            message += `\n${idx + 1}. ${item.resource_title}:\n${publicUrl}\n`;
                            hasLinks = true;
                        }
                    });
                    if (!hasLinks) {
                        try {
                            const searchRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?title=ilike.%25${encodeURIComponent(order.item_title || order.resource_title || '')}%25&limit=1`, {
                                headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                    'Content-Type': 'application/json'
                                }
                            });
                            if (searchRes.ok) {
                                const results = await searchRes.json();
                                if (results.length > 0) {
                                    const found = results[0];
                                    const filePath = found.file_path || found.file_url;
                                    if (filePath) {
                                        const url = `${STORAGE_URL}/${encodeURIComponent(filePath)}`;
                                        message += `\n1. ${found.title}:\n${url}\n`;
                                        hasLinks = true;

                            console.error('Error searching for resource:', e);

                    if (!hasLinks) message += `\n⚠️ Please contact support to get your download links.\n`;
                    message += `\n🔒 *Valid for 3 hours.*\n\nThank you for choosing KenyaVault! 📚\nNeed help? WhatsApp: +254 768 515 494`;

                    const phone = order.customer_phone || order.phone || '254700000000';
                    const formattedPhone = phone.replace(/^0/, '254').replace(/^\+/, '');
                    const whatsappUrl = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
                    window.open(whatsappUrl, '_blank', 'width=400,height=600');
                    showNotification('📱 WhatsApp opened!', 'success');
                } catch (e) {
                    console.error('Resend error:', e);
                    showNotification('Error: ' + e.message, 'error');
                }
                setGeneratingLinks(prev => ({ ...prev, [order.id]: false }));
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    showNotification('📋 Copied to clipboard!', 'success');
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showNotification('📋 Copied to clipboard!', 'success');
                });
            };

            const generateDownloadMessage = (order, items) => {
                const ref = order.payment_ref || order.order_ref || order.id.slice(0, 8).toUpperCase();
                let message = `✅ *Your KenyaVault Order is Ready!*\n\nOrder #: *${ref}*\n\n`;
                if (items.length > 0) {
                    items.forEach((item, idx) => {
                        message += `Resource ${idx + 1}: *${item.resource_title}* (x${item.quantity || 1})\n`;
                    });
                    message += `\n`;
                } else {
                    message += `Resource: *${order.item_title || order.resource_title || 'Resource'}*\n\n`;
                }
                message += `Amount: *KES ${order.total_amount || order.item_price || 0}*\n\n📥 *Download Links:*\n`;
                let hasLinks = false;
                items.forEach((item, idx) => {
                    if (item.download_url) {
                        message += `\n${idx + 1}. ${item.resource_title}:\n${item.download_url}\n`;
                        hasLinks = true;
                    } else if (item.file_path) {
                        const publicUrl = `${STORAGE_URL}/${encodeURIComponent(item.file_path)}`;
                        message += `\n${idx + 1}. ${item.resource_title}:\n${publicUrl}\n`;
                        hasLinks = true;
                    }
                });
                if (!hasLinks) message += `\n⚠️ Please contact support to get your download links.\n`;
                message += `\n🔒 *Valid for 3 hours.*\n\nThank you for choosing KenyaVault! 📚\nNeed help? WhatsApp: +254 768 515 494`;
                return message;
            };

            const getStatusBadge = (status) => {
                const map = {
                    'pending': 'pending',
                    'pending_verification': 'pending_verification',
                    'confirmed': 'confirmed',
                    'paid': 'paid',
                    'completed': 'paid',
                    'cancelled': 'rejected',
                    'rejected': 'rejected'
                };
                return map[status] || 'pending';
            };

            const getStatusLabel = (status) => {
                const map = {
                    'pending': '⏳ Pending',
                    'pending_verification': '⏳ Pending Approval',
                    'confirmed': '✅ Confirmed',
                    'paid': '✅ Paid',
                    'completed': '✅ Paid',
                    'cancelled': '❌ Cancelled',
                    'rejected': '❌ Rejected'
                };
                return map[status] || '⏳ Pending';
            };

            const isPending = (order) => order.payment_status === 'pending' || order.status === 'pending';
            const isCompleted = (order) => order.payment_status === 'confirmed' || order.payment_status === 'paid' || order.payment_status === 'completed' || order.status === 'completed' || order.status === 'confirmed' || order.status === 'paid';

            const filteredOrders = orders.filter(o => {
                if (searchTerm) {
                    const search = searchTerm.toLowerCase();
                    const match = (o.order_ref || '').toLowerCase().includes(search) ||
                        (o.payment_ref || '').toLowerCase().includes(search) ||
                        (o.customer_name || '').toLowerCase().includes(search) ||
                        (o.customer_phone || '').includes(search) ||
                        (o.phone || '').includes(search) ||
                        (o.item_title || '').toLowerCase().includes(search) ||
                        (o.resource_title || '').toLowerCase().includes(search);
                    if (!match) return false;
                }
                if (filter === 'pending') return isPending(o);
                if (filter === 'confirmed') return o.payment_status === 'confirmed' || o.status === 'confirmed';
                if (filter === 'paid') return o.payment_status === 'paid' || o.payment_status === 'completed' || o.status === 'completed' || o.status === 'paid';
                if (filter === 'cancelled') return o.payment_status === 'cancelled' || o.payment_status === 'rejected' || o.status === 'cancelled' || o.status === 'rejected';
                return true;
            });

            return (
                <div className="fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Total Revenue</p>
                            <p className="text-2xl font-bold text-[#D4A017]">KES {revenueStats.totalRevenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{revenueStats.totalOrders} total orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Pending Revenue</p>
                            <p className="text-2xl font-bold text-amber-600">KES {revenueStats.pendingRevenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{revenueStats.pendingOrders} pending orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Completed Revenue</p>
                            <p className="text-2xl font-bold text-green-600">KES {revenueStats.completedRevenue.toLocaleString()}</p>
                            <p className="text-xs text-gray-400">{revenueStats.completedOrders} completed orders</p>
                        </div>
                        <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                            <p className="text-sm text-gray-500 dark:text-gray-400">Platform Fee (20%)</p>
                            <p className="text-2xl font-bold text-purple-600">KES {Math.round(revenueStats.completedRevenue * 0.2).toLocaleString()}</p>
                            <p className="text-xs text-gray-400">80% goes to tutors</p>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">📦 Orders ({orders.length})</h2>
                            <button onClick={() => loadOrders()} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition">🔄 Refresh</button>
                        </div>

                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>⏳ Pending</button>
                            <button onClick={() => setFilter('confirmed')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'confirmed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>✅ Confirmed</button>
                            <button onClick={() => setFilter('paid')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'paid' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>💳 Paid</button>
                            <button onClick={() => setFilter('cancelled')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'cancelled' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>❌ Cancelled/Rejected</button>
                        </div>

                        <div className="mb-4">
                            <input type="text" placeholder="🔍 Search by order ref, customer, phone, or resource..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#D4A017]" />
                        </div>

                        {filteredOrders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders found.</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left">Reference</th>
                                            <th className="px-4 py-2 text-left">Customer</th>
                                            <th className="px-4 py-2 text-left">Phone</th>
                                            <th className="px-4 py-2 text-left">Items</th>
                                            <th className="px-4 py-2 text-left">Total</th>
                                            <th className="px-4 py-2 text-left">Status</th>
                                            <th className="px-4 py-2 text-left">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.map(o => {
                                            const isNew = newOrderIds.includes(o.id);
                                            const pending = isPending(o);
                                            const ref = o.order_ref || o.payment_ref || o.id.slice(0, 8).toUpperCase();
                                            return (
                                                <tr key={o.id} className={`border-t border-gray-100 dark:border-gray-700 ${pending ? 'bg-amber-50 dark:bg-amber-900/10' : ''} ${isNew ? 'new-order-flash' : ''}`}>
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{ref}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_phone || o.phone || 'N/A'}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">
                                                        <button onClick={() => viewOrderDetails(o)} className="text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded-full hover:bg-blue-200 transition">📋 View Items</button>
                                                    </td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || o.item_price || 0}</td>
                                                    <td className="px-4 py-2">
                                                        <span className={`status-badge ${getStatusBadge(o.payment_status || o.status)}`}>{getStatusLabel(o.payment_status || o.status)}</span>
                                                        {isNew && <span className="ml-1 text-xs text-green-500 font-bold">NEW!</span>}
                                                        {o.mpesa_code && <div className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">M-PESA: {o.mpesa_code}</div>}
                                                    </td>
                                                    <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                        {pending && (
                                                            <>
                                                                <button onClick={() => handleConfirmOrder(o)} disabled={loadingOrderId === o.id} className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs hover:bg-green-200 transition disabled:opacity-50 flex items-center gap-1">
                                                                    {loadingOrderId === o.id ? <><span className="spinner"></span> Processing</> : '✅ Confirm'}
                                                                </button>
                                                                <button onClick={() => handleRejectOrder(o)} className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs hover:bg-red-200 transition">❌ Reject</button>
                                                                <button onClick={() => viewOrderDetails(o)} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition">📋 Details</button>
                                                            </>
                                                        )}
                                                        {isCompleted(o) && (
                                                            <>
                                                                <button onClick={() => handleResendWhatsApp(o)} disabled={generatingLinks[o.id]} className="px-3 py-1 bg-[#25D366] text-white rounded-lg text-xs hover:bg-[#1da85a] transition flex items-center gap-1">
                                                                    {generatingLinks[o.id] ? <><span className="spinner"></span> Sending</> : '📱 Resend WhatsApp'}
                                                                </button>
                                                                <button onClick={() => viewOrderDetails(o)} className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition">📋 Details</button>
                                                            </>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                orders: <OrdersModule />,
                resources: <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700"><h3 className="text-lg font-semibold">📚 Resources Module</h3><p className="text-gray-500 dark:text-gray-400">Resource management coming soon...</p></div>,
                tutors: <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700"><h3 className="text-lg font-semibold">🧑‍🏫 Tutors Module</h3><p className="text-gray-500 dark:text-gray-400">Tutor management coming soon...</p></div>,
                classes: <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700"><h3 className="text-lg font-semibold">📹 Classes Module</h3><p className="text-gray-500 dark:text-gray-400">Class management coming soon...</p></div>,
                finance: <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700"><h3 className="text-lg font-semibold">💰 Finance Module</h3><p className="text-gray-500 dark:text-gray-400">Finance management coming soon...</p></div>,
                settings: <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700"><h3 className="text-lg font-semibold">⚙️ Settings</h3><p className="text-gray-500 dark:text-gray-400">Settings coming soon...</p></div>,
            };
            return map[currentModule] || <DashboardModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated } = useApp();

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            return (
                <div className="flex min-h-screen bg-white dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
                            <ModuleRenderer />
                        </main>
                    </div>
                    <ToastContainer />
                    <PendingAlert />
                </div>
            );
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
