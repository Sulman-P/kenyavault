<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — KenyaVault Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
        --dark: #0B1A12;
        --green: #0D6E3F;
        --green-light: #16A34A;
        --gold: #D4A017;
        --gold-light: #FCD34D;
        --white: #FFFFFF;
        --surface: #F8FAF9;
        --text: #1F2937;
        --muted: #6B7280;
        --border: #E5E7EB;
        --radius: 12px;
        --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        --transition: all 0.2s ease;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--surface);
        color: var(--text);
        line-height: 1.6;
    }

    .admin-container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 40px 5%;
    }

    .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
        flex-wrap: wrap;
        gap: 16px;
    }

    .admin-header h1 {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.8rem;
        color: var(--dark);
    }

    .admin-header h1 span {
        color: var(--green);
    }

    .admin-stats {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .stat-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 24px;
        text-align: center;
        min-width: 100px;
    }

    .stat-card .number {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        color: var(--dark);
    }

    .stat-card .label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .stat-card.pending .number { color: #D97706; }
    .stat-card.completed .number { color: var(--green); }
    .stat-card.total .number { color: #7C3AED; }

    .admin-controls {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
        align-items: center;
    }

    .admin-controls input,
    .admin-controls select {
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        background: var(--white);
        outline: none;
        transition: var(--transition);
    }

    .admin-controls input:focus,
    .admin-controls select:focus {
        border-color: var(--green);
    }

    .admin-controls .search-input {
        flex: 1;
        min-width: 200px;
    }

    .btn-refresh {
        background: var(--green);
        color: var(--white);
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: var(--transition);
    }

    .btn-refresh:hover {
        background: var(--green-light);
        transform: translateY(-1px);
    }

    .orders-table-wrapper {
        background: var(--white);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        overflow: hidden;
        overflow-x: auto;
    }

    .orders-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
    }

    .orders-table th {
        background: var(--dark);
        color: var(--white);
        padding: 14px 16px;
        text-align: left;
        font-weight: 600;
        white-space: nowrap;
    }

    .orders-table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
    }

    .orders-table tr:hover td {
        background: var(--surface);
    }

    .orders-table .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
    }

    .status-badge.pending {
        background: #FEF3C7;
        color: #92400E;
    }

    .status-badge.completed {
        background: #DCFCE7;
        color: #15803D;
    }

    .status-badge.failed {
        background: #FEE2E2;
        color: #DC2626;
    }

    .status-badge .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
    }

    .status-badge.pending .dot { background: #D97706; }
    .status-badge.completed .dot { background: #16A34A; }
    .status-badge.failed .dot { background: #DC2626; }

    .download-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.7rem;
        font-weight: 600;
    }

    .download-status .yes { color: var(--green); }
    .download-status .no { color: var(--muted); }

    .btn-action {
        padding: 5px 12px;
        border: none;
        border-radius: 6px;
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    .btn-action.complete {
        background: #DCFCE7;
        color: #15803D;
    }

    .btn-action.complete:hover {
        background: #BBF7D0;
    }

    .btn-action.delete {
        background: #FEE2E2;
        color: #DC2626;
    }

    .btn-action.delete:hover {
        background: #FECACA;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
    }

    .empty-state .icon {
        font-size: 3rem;
        display: block;
        margin-bottom: 12px;
    }

    .loading-spinner {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
    }

    .loading-spinner .spin {
        display: inline-block;
        animation: spin 1s linear infinite;
        font-size: 2rem;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* ── TOAST ── */
    .toast-notification {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 99999;
        background: #0B1A12;
        color: #fff;
        padding: 13px 20px;
        border-radius: 12px;
        font-family: 'Inter', sans-serif;
        font-size: 0.86rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
        pointer-events: none;
        min-width: 220px;
        max-width: 360px;
    }

    .toast-notification.show {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
    }

    @media (max-width: 768px) {
        .admin-header {
            flex-direction: column;
            align-items: flex-start;
        }
        .admin-stats {
            width: 100%;
        }
        .stat-card {
            flex: 1;
            min-width: 80px;
        }
        .admin-controls {
            flex-direction: column;
        }
        .admin-controls .search-input {
            width: 100%;
        }
        .orders-table th,
        .orders-table td {
            padding: 8px 10px;
            font-size: 0.75rem;
        }
    }
</style>
</head>
<body>

<div class="admin-container">

    <!-- Header -->
    <div class="admin-header">
        <h1>📋 KenyaVault <span>Orders</span></h1>
        <div class="admin-stats">
            <div class="stat-card total">
                <div class="number" id="totalOrders">0</div>
                <div class="label">Total Orders</div>
            </div>
            <div class="stat-card pending">
                <div class="number" id="pendingOrders">0</div>
                <div class="label">Pending</div>
            </div>
            <div class="stat-card completed">
                <div class="number" id="completedOrders">0</div>
                <div class="label">Completed</div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="admin-controls">
        <input type="text" class="search-input" id="searchOrders" placeholder="🔍 Search by phone, order ID, or product..."/>
        <select id="filterStatus">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
        </select>
        <button class="btn-refresh" id="refreshBtn">🔄 Refresh</button>
    </div>

    <!-- Orders Table -->
    <div class="orders-table-wrapper">
        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Product</th>
                    <th>Customer</th>
                    <th>M-PESA Code</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Download</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr>
                    <td colspan="9">
                        <div class="loading-spinner">
                            <span class="spin">⏳</span>
                            <p>Loading orders...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Toast Notification -->
<div class="toast-notification" id="toastNotification">
    <span id="toastIcon">✅</span>
    <span id="toastMsg">Success</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';

// ── SUPABASE CONFIG ──
const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ACTUAL_ANON_KEY_HERE';

let sbClient = null;
let allOrders = [];

// ── INIT ──
async function init() {
    try {
        sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadOrders();
        setupEventListeners();
    } catch (e) {
        console.error('Init error:', e);
        showToast('❌', 'Failed to initialize: ' + e.message);
    }
}

// ── LOAD ORDERS ──
async function loadOrders() {
    const tbody = document.getElementById('ordersBody');
    tbody.innerHTML = `
        <tr>
            <td colspan="9">
                <div class="loading-spinner">
                    <span class="spin">⏳</span>
                    <p>Loading orders...</p>
                </div>
            </td>
        </tr>
    `;

    try {
        const { data, error } = await sbClient
            .from('orders')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error('Supabase error:', error);
            showToast('❌', 'Error loading orders: ' + error.message);
            tbody.innerHTML = `
                <tr>
                    <td colspan="9">
                        <div class="empty-state">
                            <span class="icon">⚠️</span>
                            <p>Error loading orders. Please refresh.</p>
                            <p style="font-size:0.8rem;color:#DC2626;">${error.message}</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }

        allOrders = data || [];
        updateStats();
        renderOrders();

    } catch (e) {
        console.error('Load error:', e);
        showToast('❌', 'Error loading orders: ' + e.message);
        tbody.innerHTML = `
            <tr>
                <td colspan="9">
                    <div class="empty-state">
                        <span class="icon">⚠️</span>
                        <p>Error loading orders. Please refresh.</p>
                    </div>
                </td>
            </tr>
        `;
    }
}

// ── UPDATE STATS ──
function updateStats() {
    const total = allOrders.length;
    const pending = allOrders.filter(o => o.status === 'pending').length;
    const completed = allOrders.filter(o => o.status === 'completed').length;

    document.getElementById('totalOrders').textContent = total;
    document.getElementById('pendingOrders').textContent = pending;
    document.getElementById('completedOrders').textContent = completed;
}

// ── RENDER ORDERS ──
function renderOrders() {
    const tbody = document.getElementById('ordersBody');
    const searchTerm = document.getElementById('searchOrders').value.toLowerCase().trim();
    const statusFilter = document.getElementById('filterStatus').value;

    let filtered = allOrders;

    if (searchTerm) {
        filtered = filtered.filter(o => 
            (o.id || '').toLowerCase().includes(searchTerm) ||
            (o.customer_phone || '').toLowerCase().includes(searchTerm) ||
            (o.product_title || '').toLowerCase().includes(searchTerm) ||
            (o.mpesa_code || '').toLowerCase().includes(searchTerm)
        );
    }

    if (statusFilter !== 'all') {
        filtered = filtered.filter(o => o.status === statusFilter);
    }

    if (filtered.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="9">
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        <p>No orders found</p>
                        <p style="font-size:0.8rem;color:var(--muted);">Try adjusting your filters</p>
                    </div>
                </td>
            </tr>
        `;
        return;
    }

    let html = '';
    filtered.forEach(order => {
        const statusClass = order.status || 'pending';
        const statusLabel = order.status || 'Pending';
        const downloadAccessed = order.download_accessed ? '✅ Yes' : '❌ No';
        const downloadClass = order.download_accessed ? 'yes' : 'no';
        const orderId = (order.id || '').slice(0, 8).toUpperCase();
        const date = order.created_at ? new Date(order.created_at).toLocaleString() : '—';
        const amount = order.product_price || 0;

        html += `
            <tr>
                <td><strong>#${orderId}</strong></td>
                <td>${order.product_title || '—'}</td>
                <td>${order.customer_phone || '—'}</td>
                <td><code>${order.mpesa_code || '—'}</code></td>
                <td>KSh ${amount}</td>
                <td>
                    <span class="status-badge ${statusClass}">
                        <span class="dot"></span>
                        ${statusLabel}
                    </span>
                </td>
                <td>
                    <span class="download-status">
                        <span class="${downloadClass}">${downloadAccessed}</span>
                    </span>
                </td>
                <td>${date}</td>
                <td>
                    <button class="btn-action complete" onclick="markComplete('${order.id}')">✅ Complete</button>
                    <button class="btn-action delete" onclick="deleteOrder('${order.id}')">🗑️</button>
                </td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

// ── MARK ORDER AS COMPLETED ──
async function markComplete(orderId) {
    if (!confirm('Mark this order as completed?')) return;

    try {
        const { error } = await sbClient
            .from('orders')
            .update({ status: 'completed' })
            .eq('id', orderId);

        if (error) {
            showToast('❌', 'Error updating order: ' + error.message);
            return;
        }

        showToast('✅', 'Order marked as completed!');
        await loadOrders();

    } catch (e) {
        console.error('Error:', e);
        showToast('❌', 'Error updating order: ' + e.message);
    }
}

// ── DELETE ORDER ──
async function deleteOrder(orderId) {
    if (!confirm('Are you sure you want to delete this order?')) return;

    try {
        const { error } = await sbClient
            .from('orders')
            .delete()
            .eq('id', orderId);

        if (error) {
            showToast('❌', 'Error deleting order: ' + error.message);
            return;
        }

        showToast('✅', 'Order deleted successfully!');
        await loadOrders();

    } catch (e) {
        console.error('Error:', e);
        showToast('❌', 'Error deleting order: ' + e.message);
    }
}

// ── TOAST ──
function showToast(icon, msg) {
    const toast = document.getElementById('toastNotification');
    document.getElementById('toastIcon').textContent = icon || '✅';
    document.getElementById('toastMsg').textContent = msg || 'Success';
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
    }, 4000);
}

// ── EVENT LISTENERS ──
function setupEventListeners() {
    document.getElementById('searchOrders').addEventListener('input', renderOrders);
    document.getElementById('filterStatus').addEventListener('change', renderOrders);
    document.getElementById('refreshBtn').addEventListener('click', loadOrders);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', init);

// Expose functions to global scope
window.markComplete = markComplete;
window.deleteOrder = deleteOrder;
window.loadOrders = loadOrders;

</script>
</body>
</html>
