        // ── PREVIEW FUNCTION ──
        function openPreviewModal(productId) {
            var product = allResources.find(function(r) { return r.id === productId; });
            if (!product) {
                showToast('⚠️ Product not found', 'error');
                return;
            }
            
            document.getElementById('previewTitle').textContent = 'Preview: ' + product.title;
            document.getElementById('previewPages').textContent = product.preview_pages || 2;
            
            var previewHTML = generatePreviewContent(product);
            document.getElementById('previewContent').innerHTML = previewHTML;
            
            document.getElementById('previewBuyBtn').onclick = function() {
                closePreviewModal();
                openPaymentModal(productId);
            };
            
            document.getElementById('previewModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closePreviewModal() {
            document.getElementById('previewModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        function generatePreviewContent(product) {
            var previewPages = product.preview_pages || 2;
            var html = '<div class="watermark">';
            
            for (var i = 1; i <= previewPages; i++) {
                html += '<div class="page-preview" style="position:relative;overflow:hidden;background:white;border-radius:6px;padding:20px;margin-bottom:16px;border:1px solid var(--border);box-shadow:var(--shadow-sm);">';
                html += '<div class="watermark-text" style="color:rgba(0,0,0,0.08);font-size:4rem;font-weight:800;text-align:center;transform:rotate(-30deg);pointer-events:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);width:100%;letter-spacing:8px;">PREVIEW</div>';
                html += '<div class="preview-content preview-blur" style="position:relative;z-index:1;font-size:0.85rem;line-height:1.8;color:#1F2937;filter:blur(4px);user-select:none;">';
                html += '<h4 style="color:var(--dark);margin-bottom:8px;">Preview Page ' + i + '</h4>';
                html += '<p>' + getSampleContent(product, i) + '</p>';
                html += '</div>';
                html += '<div style="text-align:center;margin-top:8px;">';
                html += '<span class="preview-badge" style="display:inline-block;background:#FEF3C7;color:#92400E;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:99px;">🔒 Preview - Full version available after purchase</span>';
                html += '</div>';
                html += '</div>';
            }
            
            html += '</div>';
            html += '<div style="text-align:center;margin-top:16px;color:var(--muted);font-size:0.78rem;">';
            html += '📌 <strong>' + (product.page_count || 0) + ' pages</strong> available in full document · ' + previewPages + ' pages previewed';
            html += '</div>';
            
            return html;
        }

        function getSampleContent(product, pageNum) {
            var samples = {
                'mathematics': [
                    'This section covers number operations including addition, subtraction, multiplication, and division of integers. We explore real-life applications of these concepts.',
                    'Algebraic expressions are introduced with step-by-step examples. Learn to simplify, factorize, and solve equations using various methods.',
                    'Geometry concepts including angles, shapes, and measurement. Practice problems with detailed solutions for better understanding.'
                ],
                'english': [
                    'Comprehensive grammar review covering parts of speech, sentence structure, and common errors. Exercises with answers for self-assessment.',
                    'Reading comprehension strategies including identifying main ideas, making inferences, and analyzing texts. Sample passages with questions.',
                    'Writing skills development including essay structure, creative writing, and formal letter writing. Tips for improving writing quality.'
                ],
                'integrated-science': [
                    'Introduction to scientific inquiry and the scientific method. Understanding variables, controls, and experimental design.',
                    'Life sciences covering cells, plant and animal systems, and ecosystems. Key concepts explained with diagrams.',
                    'Physical sciences including matter, energy, forces, and simple machines. Real-world applications and experiments.'
                ]
            };
            
            var subjectSamples = samples[product.subject] || [
                'Comprehensive coverage of key concepts with clear explanations and examples.',
                'Practice questions with detailed answers to reinforce learning.',
                'Revision notes summarizing important points for quick reference.'
            ];
            
            var index = (pageNum - 1) % subjectSamples.length;
            return subjectSamples[index] || 'Content preview showing the quality and structure of this resource.';
        }

        // ── GET PRICING TIER DISPLAY ──
        function getPricingDisplay(product) {
            var tier = product.pricing_tier || 'single';
            var price = product.price || 0;
            var originalPrice = 0;
            
            if (tier === 'bundle') {
                originalPrice = Math.round(price * 1.6);
                return '<span class="price-original">KSh ' + originalPrice + '</span> <span class="price-sale">KSh ' + price + '</span> <span class="pricing-tier">💡 Bundle savings!</span>';
            } else if (tier === 'termly') {
                originalPrice = Math.round(price * 1.5);
                return '<span class="price-original">KSh ' + originalPrice + '</span> <span class="price-sale">KSh ' + price + '</span> <span class="pricing-tier">📚 Termly set</span>';
            } else if (tier === 'kjsea') {
                return '<span class="price-sale">KSh ' + price + '</span> <span class="pricing-tier">🏆 Full KJSEA package</span>';
            } else {
                return 'KSh ' + price;
            }
        }

            if (product.teacher_reviewed !== false) {
                badges += '<span class="curriculum-badge badge-reviewed">👩‍🏫 Reviewed</span>';

            return badges;
        }
