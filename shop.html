<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KenyaVault Admin Panel — Realtime Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── Same styles as before ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background: #111827;
            color: #e5e7eb;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.active { background: #dbeafe; color: #1e40af; }
        .status-badge.completed { background: #d1fae5; color: #065f46; }
        .status-badge.rejected { background: #fee2e2; color: #991b1b; }
        .status-badge.pending_verification { background: #fef3c7; color: #92400e; }
        .status-badge.confirmed { background: #dbeafe; color: #1e40af; }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.active { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.completed { background: #064e3b; color: #34d399; }
        .dark .status-badge.rejected { background: #7f1d1d; color: #f87171; }
        .dark .status-badge.pending_verification { background: #78350f; color: #fbbf24; }
        .dark .status-badge.confirmed { background: #1e3a5f; color: #60a5fa; }
        .login-bg {
            background: linear-gradient(135deg, #0a1a3a 0%, #1a2a5a 50%, #2a3a6a 100%);
            position: relative;
            overflow: hidden;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.04'%3E%3Cpath d='M40 20c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V24c0-2.2-1.8-4-4-4H40zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H40c-1.1 0-2-.9-2-2V24c0-1.1.9-2 2-2zM16 32c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h24c2.2 0 4-1.8 4-4V36c0-2.2-1.8-4-4-4H16zm0 2h24c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H16c-1.1 0-2-.9-2-2V36c0-1.1.9-2 2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FCD34D' fill-opacity='0.03'%3E%3Cpath d='M50 30L20 46l30 16 30-16-30-16zm0 0l-20 10 20 10 20-10-20-10zM20 46v18l30 16 30-16V46l-30 16-30-16z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px, 100px 100px;
            background-position: 0 0, 40px 20px;
            pointer-events: none;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.3), 0 0 20px rgba(212, 160, 23, 0.1);
        }
        .btn-gold {
            background: #D4A017;
            color: #0a1a3a;
            transition: all 0.2s ease;
        }
        .btn-gold:hover {
            background: #FCD34D;
            transform: translateY(-1px);
        }
        .gold-text { color: #D4A017; }
        .gold-bg { background: #D4A017; }
        .navy-bg { background: #0a1a3a; }
        .new-order-flash {
            animation: flashRow 1s ease 3;
        }
        @keyframes flashRow {
            0%, 100% { background: transparent; }
            50% { background: rgba(212, 160, 23, 0.15); }
        }
        .dark .new-order-flash {
            animation: flashRowDark 1s ease 3;
        }
        @keyframes flashRowDark {
            0%, 100% { background: transparent; }
            50% { background: rgba(212, 160, 23, 0.2); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext, useRef } = React;

        // ── SUPABASE CONFIG ──
        const SUPABASE_URL = 'https://rewpminmqnrtwdvglxxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJld3BtaW5tcW5ydHdkdmdseHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkzOTksImV4cCI6MjA5NzMyNTM5OX0.2HnM4NMvxOlqrc2ChuFa_F6kqEniSah3NU5vTLNtfYs';

        // ── CONSTANTS ──
        const ADMIN_CREDENTIALS = {
            username: 'adminnexalearn@gmail.com',
            password: 'KenyaVault2026'
        };

        const modules = [
            { id: 'dashboard', icon: '📊', label: 'Dashboard', desc: 'Overview & Analytics' },
            { id: 'orders', icon: '📦', label: 'Orders', desc: 'Real-time order management' },
            { id: 'resources', icon: '📚', label: 'Resources', desc: 'Manage resources' },
            { id: 'tutors', icon: '👨‍🏫', label: 'Tutors', desc: 'Manage tutors & royalties' },
            { id: 'finance', icon: '💰', label: 'Finance', desc: 'Revenue & Reconciliation' },
            { id: 'settings', icon: '⚙️', label: 'Settings', desc: 'Configuration' },
        ];

        // ── CONTEXT ──
        const AppContext = createContext(null);

        function AppProvider({ children }) {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('kv-dark-mode') === 'true');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [currentModule, setCurrentModule] = useState('orders');
            const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('kv-auth') === 'true');
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [loading, setLoading] = useState(true);
            const [tutors, setTutors] = useState([]);
            const [orders, setOrders] = useState([]);
            const [resources, setResources] = useState([]);
            const [notification, setNotification] = useState(null);
            const [newOrderIds, setNewOrderIds] = useState([]);

            useEffect(() => {
                localStorage.setItem('kv-dark-mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                if (isAuthenticated) {
                    loadData();
                    setupRealtimeSubscription();
                }
                return () => {
                    // Cleanup subscription
                };
            }, [isAuthenticated]);

            const setupRealtimeSubscription = () => {
                // Using polling for simplicity since we don't have Supabase Realtime JS client
                // In production, use supabase-js with realtime
                const interval = setInterval(() => {
                    checkNewOrders();
                }, 8000);
                // Store interval for cleanup
                window._realtimeInterval = interval;
                
                // Initial check after 2 seconds
                setTimeout(checkNewOrders, 2000);
            };

            const checkNewOrders = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc&limit=10`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const pendingOrders = data.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification');
                        
                        // Check for new orders
                        const currentIds = pendingOrders.map(o => o.id);
                        const newIds = currentIds.filter(id => !newOrderIds.includes(id));
                        
                        if (newIds.length > 0) {
                            setNewOrderIds(prev => [...prev, ...newIds]);
                            // Show notification
                            const newOrders = pendingOrders.filter(o => newIds.includes(o.id));
                            newOrders.forEach(order => {
                                showToastNotification(
                                    '🆕 New Order!', 
                                    `Order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()} - ${order.customer_name || 'Customer'}`
                                );
                            });
                            // Reload orders
                            loadOrders();
                        }
                    }
                } catch (e) {
                    console.error('Realtime check error:', e);
                }
            };

            const showToastNotification = (title, message) => {
                setNotification({ title, message, type: 'order', timestamp: Date.now() });
                setTimeout(() => setNotification(null), 6000);
            };

            const loadOrders = async () => {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, {
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setOrders(data || []);
                    }
                } catch (e) {
                    console.error('Load orders error:', e);
                }
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    await loadOrders();
                    
                    const rRes = await fetch(`${SUPABASE_URL}/rest/v1/resources?select=*&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (rRes.ok) {
                        const data = await rRes.json();
                        setResources(data || []);
                    }

                    const tRes = await fetch(`${SUPABASE_URL}/rest/v1/tutors?select=*`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                    });
                    if (tRes.ok) {
                        const data = await tRes.json();
                        setTutors(data || []);
                    }
                } catch (e) { console.error('Load error:', e); }
                setLoading(false);
            };

            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => {
                if (window.innerWidth < 1024) setMobileSidebarOpen(!mobileSidebarOpen);
                else setSidebarOpen(!sidebarOpen);
            };

            const login = (username, password) => {
                setAuthLoading(true);
                setAuthError('');
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                            sessionStorage.setItem('kv-auth', 'true');
                            sessionStorage.setItem('kv-user', username);
                            setIsAuthenticated(true);
                            setAuthLoading(false);
                            resolve(true);
                        } else {
                            setAuthError('Invalid username or password.');
                            setAuthLoading(false);
                            reject(new Error('Invalid credentials'));
                        }
                    }, 800);
                });
            };

            const logout = () => {
                if (window._realtimeInterval) {
                    clearInterval(window._realtimeInterval);
                }
                sessionStorage.removeItem('kv-auth');
                sessionStorage.removeItem('kv-user');
                setIsAuthenticated(false);
                setCurrentModule('orders');
                window.location.href = '/';
            };

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            return (
                <AppContext.Provider value={{
                    darkMode, toggleDarkMode,
                    sidebarOpen, setSidebarOpen,
                    mobileSidebarOpen, setMobileSidebarOpen,
                    currentModule, setCurrentModule,
                    isAuthenticated,
                    authLoading, authError,
                    login, logout,
                    loading,
                    tutors, setTutors,
                    orders, setOrders,
                    resources, setResources,
                    notification, showNotification,
                    toggleSidebar,
                    loadData,
                    loadOrders,
                    newOrderIds,
                    setNewOrderIds
                }}>
                    {children}
                </AppContext.Provider>
            );
        }

        function useApp() {
            const context = useContext(AppContext);
            if (!context) throw new Error('useApp must be used within AppProvider');
            return context;
        }

        // ── TOAST NOTIFICATION ──
        function ToastContainer() {
            const { notification } = useApp();
            if (!notification) return null;

            return (
                <div className="fixed top-4 right-4 z-50 max-w-sm w-full">
                    <div className={`bg-white dark:bg-gray-800 rounded-lg shadow-lg border-l-4 ${notification.type === 'order' ? 'border-purple-500' : 'border-green-500'} p-4 animate-slide-in`}>
                        <div className="flex items-start gap-3">
                            <span className="text-xl">{notification.type === 'order' ? '🆕' : '✅'}</span>
                            <div className="flex-1">
                                <h4 className="font-semibold text-gray-800 dark:text-white">{notification.title || 'Notification'}</h4>
                                <p className="text-sm text-gray-600 dark:text-gray-300">{notification.message || notification.msg}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── LOGIN PAGE ──
        function LoginPage() {
            const { login, authLoading, authError, darkMode, toggleDarkMode } = useApp();
            const [username, setUsername] = useState('adminnexalearn@gmail.com');
            const [password, setPassword] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                try { await login(username, password); } catch (err) {}
            };

            return (
                <div className="min-h-screen login-bg flex items-center justify-center p-4 relative">
                    <button onClick={toggleDarkMode} className="absolute top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition">
                        {darkMode ? '☀️' : '🌙'}
                    </button>
                    <div className="w-full max-w-md relative z-10">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-2xl border border-white/10">
                                <div className="w-10 h-10 rounded-xl bg-[#D4A017] flex items-center justify-center text-[#0a1a3a] font-bold text-lg">KV</div>
                                <div className="text-left">
                                    <h1 className="text-xl font-bold text-white">Kenya<span className="text-[#FCD34D]">Vault</span></h1>
                                    <p className="text-xs text-gray-400">Admin Portal</p>
                                </div>
                            </div>
                        </div>
                        <div className="login-box rounded-2xl p-8 shadow-2xl border border-white/10">
                            <h2 className="text-2xl font-bold text-white mb-2">Welcome Back</h2>
                            <p className="text-gray-400 text-sm mb-6">Sign in to manage your KenyaVault platform</p>
                            {authError && <div className="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm">{authError}</div>}
                            <form onSubmit={handleSubmit}>
                                <div className="mb-4">
                                    <label className="block text-gray-300 text-sm font-medium mb-2">Email / Username</label>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#D4A017] input-glow transition" required />
                                </div>
                                <div className="mb-4">
                                    <label className="block text-gray-300 text-sm font-medium mb-2">Password</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#D4A017] input-glow transition" required />
                                </div>
                                <button type="submit" disabled={authLoading} className="w-full py-3 bg-[#D4A017] hover:bg-[#FCD34D] text-[#0a1a3a] font-semibold rounded-xl transition flex items-center justify-center gap-2 disabled:opacity-50">
                                    {authLoading ? '⏳ Signing in...' : '🔑 Sign In'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // ── SIDEBAR ──
        function Sidebar() {
            const { darkMode, sidebarOpen, mobileSidebarOpen, currentModule, setCurrentModule, toggleSidebar, logout } = useApp();
            const isVisible = sidebarOpen || mobileSidebarOpen;

            return (
                <>
                    {mobileSidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden" onClick={toggleSidebar} />}
                    <aside className={`fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-[#0a1a3a] border-r border-[#D4A017]/20 sidebar-transition ${isVisible ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'} lg:w-20 lg:hover:w-64 group flex flex-col`}>
                        <div className="flex items-center gap-3 px-4 h-16 border-b border-[#D4A017]/20 flex-shrink-0">
                            <div className="w-8 h-8 rounded-lg bg-[#D4A017] flex items-center justify-center text-[#0a1a3a] font-bold text-sm flex-shrink-0">KV</div>
                            <span className={`font-bold text-lg text-white whitespace-nowrap transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>KenyaVault</span>
                            <span className={`text-[10px] font-bold text-[#D4A017] bg-[#D4A017]/20 px-2 py-0.5 rounded-full transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>Admin</span>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-4 px-3">
                            {modules.map((mod) => (
                                <button key={mod.id} onClick={() => { setCurrentModule(mod.id); if (mobileSidebarOpen) toggleSidebar(); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all group/item relative ${currentModule === mod.id ? 'bg-[#D4A017]/20 text-[#FCD34D]' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}>
                                    <span className="text-xl flex-shrink-0">{mod.icon}</span>
                                    <span className={`text-sm font-medium whitespace-nowrap transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>{mod.label}</span>
                                    <span className={`absolute left-full ml-2 px-2 py-1 bg-gray-900 text-white text-xs rounded-md opacity-0 pointer-events-none transition-opacity duration-200 ${!sidebarOpen ? 'lg:group-hover/item:opacity-100' : 'opacity-0'}`}>{mod.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="border-t border-[#D4A017]/20 p-4 flex-shrink-0 space-y-3">
                            <button onClick={() => setCurrentModule('settings')} className="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition">
                                <span className="text-xl flex-shrink-0">⚙️</span>
                                <span className={`text-sm font-medium transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>Settings</span>
                            </button>
                            <button onClick={logout} className="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-red-400 hover:bg-red-500/10 transition">
                                <span className="text-xl flex-shrink-0">🚪</span>
                                <span className={`text-sm font-medium transition-opacity duration-300 ${!sidebarOpen ? 'lg:opacity-0 lg:group-hover:opacity-100' : 'opacity-100'}`}>Logout</span>
                            </button>
                        </div>
                    </aside>
                </>
            );
        }

        // ── TOPBAR ──
        function Topbar() {
            const { darkMode, toggleDarkMode, toggleSidebar, currentModule } = useApp();
            const currentMod = modules.find(m => m.id === currentModule) || modules[0];

            return (
                <header className="sticky top-0 z-40 bg-white/80 dark:bg-[#0a1a3a]/80 backdrop-blur-md border-b border-gray-200 dark:border-[#D4A017]/20">
                    <div className="flex items-center justify-between px-4 h-16">
                        <div className="flex items-center gap-3">
                            <button onClick={toggleSidebar} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-white/5 lg:hidden">
                                <svg className="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                            </button>
                            <div>
                                <h1 className="text-lg font-semibold text-gray-800 dark:text-white hidden sm:block">{currentMod.label}</h1>
                                <p className="text-xs text-gray-500 dark:text-gray-400 hidden sm:block">{currentMod.desc || 'Manage your platform'}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-xs bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 px-2 py-1 rounded-full flex items-center gap-1">
                                <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                Live
                            </span>
                            <button onClick={toggleDarkMode} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-white/5">

        // ── ORDERS MODULE (Realtime) ──
        function OrdersModule() {
            const { orders, resources, loadOrders, loadData, showNotification, newOrderIds, setNewOrderIds } = useApp();
            const [filter, setFilter] = useState('all');
            const [loadingOrderId, setLoadingOrderId] = useState(null);

            useEffect(() => {
                // Refresh orders every 10 seconds
                const interval = setInterval(() => {
                    loadOrders();
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            const handleConfirmOrder = async (order) => {
                if (!confirm(`Confirm order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}? This will send a WhatsApp message to ${order.customer_phone}.`)) return;
                
                setLoadingOrderId(order.id);
                try {
                    // 1. Update order status
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            payment_status: 'confirmed',
                            confirmed_at: new Date().toISOString()
                        })
                    });

                    if (!updateRes.ok) throw new Error('Failed to update order');

                    // 2. Generate signed URLs for resources
                    const orderItemsRes = await fetch(`${SUPABASE_URL}/rest/v1/order_items?order_id=eq.${order.id}`, {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const orderItems = await orderItemsRes.json() || [];

                    // 3. Build WhatsApp message
                    let message = `📚 *KenyaVault Order Confirmed!*\n\n`;
                    message += `Hello *${order.customer_name || 'Customer'}*,\n\n`;
                    message += `Your order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()} has been confirmed! ✅\n\n`;
                    message += `*Order Details:*\n`;
                    
                    // Add items
                    let totalItems = 0;
                    orderItems.forEach((item, idx) => {
                        message += `${idx + 1}. ${item.resource_title} (x${item.quantity || 1})\n`;
                        totalItems += (item.quantity || 1);
                    });
                    
                    message += `\n*Total Items:* ${totalItems}`;
                    message += `\n*Total Amount:* KES ${order.total_amount || 0}`;
                    
                    // Add download links using signed URLs
                    message += `\n\n*📥 Download Your Resources:*\n`;
                    
                    let hasLinks = false;
                    for (const item of orderItems) {
                        if (item.resource_path) {
                            try {
                                // Generate signed URL
                                const signedUrlRes = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/academic-resources/${encodeURIComponent(item.resource_path)}?expiresIn=604800`, {
                                    headers: {
                                        'apikey': SUPABASE_ANON_KEY,
                                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                                    }
                                });
                                if (signedUrlRes.ok) {
                                    const signedData = await signedUrlRes.json();
                                    const downloadUrl = signedData.signedURL || signedData.url || item.resource_path;
                                    message += `\n📄 ${item.resource_title}: ${downloadUrl}`;
                                    hasLinks = true;
                                } else {
                                    message += `\n📄 ${item.resource_title}: Link will be sent separately`;
                                }
                            } catch (e) {
                                message += `\n📄 ${item.resource_title}: Link will be sent separately`;
                            }
                        } else {
                            message += `\n📄 ${item.resource_title}: Link will be sent separately`;
                        }
                    }
                    
                    if (!hasLinks) {
                        message += `\nYour download links will be sent to you shortly.`;
                    }
                    
                    message += `\n\nThank you for choosing KenyaVault! 🇰🇪`;

                    // 4. Open WhatsApp with the message
                    const phone = order.customer_phone || order.phone || '254700000000';
                    const formattedPhone = phone.replace(/^0/, '254').replace(/^\+/, '');
                    const whatsappUrl = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
                    
                    window.open(whatsappUrl, '_blank', 'width=400,height=600');
                    
                    showNotification('✅ Order confirmed and WhatsApp sent!', 'success');
                    await loadOrders();
                    
                } catch (e) {
                    console.error('Confirm error:', e);
                    showNotification('Error confirming order: ' + e.message, 'error');
                }
                setLoadingOrderId(null);
            };

            const handleRejectOrder = async (order) => {
                if (!confirm(`Reject order #${order.payment_ref || order.id.slice(0, 8).toUpperCase()}?`)) return;
                
                try {
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ payment_status: 'cancelled' })
                    });
                    if (updateRes.ok) {
                        showNotification('Order rejected', 'success');
                        await loadOrders();
                    }
                } catch (e) {
                    showNotification('Error rejecting order', 'error');
                }
            };

            const filteredOrders = orders.filter(o => {
                if (filter === 'pending') return o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                if (filter === 'confirmed') return o.payment_status === 'confirmed';
                if (filter === 'completed') return o.payment_status === 'completed' || o.payment_status === 'paid';
                if (filter === 'cancelled') return o.payment_status === 'cancelled';
                return true;
            });

            const pendingCount = orders.filter(o => o.payment_status === 'pending' || o.payment_status === 'pending_verification').length;

            return (
                <div className="fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">
                                📦 Orders ({orders.length})
                                {pendingCount > 0 && (
                                    <span className="ml-2 text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-full animate-pulse">
                                        {pendingCount} pending
                                    </span>
                                )}
                            </h2>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => loadOrders()} 
                                    className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs hover:bg-blue-200 transition"
                                >
                                    🔄 Refresh
                                </button>
                            </div>
                        </div>

                        <div className="flex gap-2 flex-wrap mb-4">
                            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>All</button>
                            <button onClick={() => setFilter('pending')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'pending' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Pending</button>
                            <button onClick={() => setFilter('confirmed')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'confirmed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Confirmed</button>
                            <button onClick={() => setFilter('completed')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'completed' ? 'bg-[#D4A017] text-[#0a1a3a]' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>Completed</button>
                        </div>

                        {filteredOrders.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 dark:text-gray-400">No orders found</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <th className="px-4 py-2 text-left">Reference</th>
                                            <th className="px-4 py-2 text-left">Customer</th>
                                            <th className="px-4 py-2 text-left">Phone</th>
                                            <th className="px-4 py-2 text-left">Items</th>
                                            <th className="px-4 py-2 text-left">Total</th>
                                            <th className="px-4 py-2 text-left">Status</th>
                                            <th className="px-4 py-2 text-left">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredOrders.map(o => {
                                            const isNew = newOrderIds.includes(o.id);
                                            const isPending = o.payment_status === 'pending' || o.payment_status === 'pending_verification';
                                            return (
                                                <tr key={o.id} className={`border-t border-gray-100 dark:border-gray-700 ${isPending ? 'bg-amber-50 dark:bg-amber-900/10' : ''} ${isNew ? 'new-order-flash' : ''}`}>
                                                    <td className="px-4 py-2 font-medium text-gray-800 dark:text-white">#{o.payment_ref || o.id.slice(0, 8).toUpperCase()}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_name || 'N/A'}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">{o.customer_phone || 'N/A'}</td>
                                                    <td className="px-4 py-2 text-gray-600 dark:text-gray-400">
                                                        <span className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded-full">
                                                            {o.item_count || 0} items
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-2 font-semibold text-[#D4A017]">KES {o.total_amount || 0}</td>
                                                    <td className="px-4 py-2">
                                                        <span className={`status-badge ${
                                                            o.payment_status === 'pending_verification' ? 'pending_verification' :
                                                            o.payment_status === 'confirmed' ? 'confirmed' :
                                                            o.payment_status === 'completed' || o.payment_status === 'paid' ? 'completed' :
                                                            o.payment_status === 'cancelled' ? 'rejected' :
                                                            'pending'
                                                        }`}>
                                                            {o.payment_status === 'pending_verification' ? '⏳ Pending' :
                                                             o.payment_status === 'confirmed' ? '✅ Confirmed' :
                                                             o.payment_status === 'completed' || o.payment_status === 'paid' ? '✅ Completed' :
                                                             o.payment_status === 'cancelled' ? '❌ Cancelled' :
                                                             'Pending'}
                                                        </span>
                                                        {isNew && <span className="ml-1 text-xs text-green-500 font-bold">NEW!</span>}
                                                    </td>
                                                    <td className="px-4 py-2 flex gap-2 flex-wrap">
                                                        {isPending && (
                                                            <>
                                                                <button 
                                                                    onClick={() => handleConfirmOrder(o)} 
                                                                    disabled={loadingOrderId === o.id}
                                                                    className="px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs hover:bg-green-200 transition disabled:opacity-50"
                                                                >
                                                                    {loadingOrderId === o.id ? '⏳' : '✅ Confirm & Send'}
                                                                </button>
                                                                <button 
                                                                    onClick={() => handleRejectOrder(o)} 
                                                                    className="px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-xs hover:bg-red-200 transition"
                                                                >
                                                                    ❌ Reject
                                                                </button>
                                                            </>
                                                        )}
                                                        {o.payment_status === 'confirmed' && (
                                                            <button onClick={() => handleConfirmOrder(o)} className="px-3 py-1 bg-[#25D366] text-white rounded-lg text-xs hover:bg-[#1da85a] transition">
                                                                📱 Resend WhatsApp
                                                            </button>
                                                        )}
                                                        {o.payment_status === 'completed' && <span className="text-xs text-green-600 dark:text-green-400">✓ Done</span>}
                                                        {o.payment_status === 'cancelled' && <span className="text-xs text-red-600 dark:text-red-400">✗ Cancelled</span>}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

                                <h4 className="font-semibold text-gray-800 dark:text-white mb-2">Payment Settings</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">MegaPay API Key</label><input type="password" value="••••••••••••••••" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" /></div>
                                    <div><label className="block text-sm text-gray-600 dark:text-gray-400">Commission Rate</label><input type="number" value="80" className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" />%</div>
                                </div>
                                <button className="mt-3 btn-gold px-4 py-2 rounded-lg font-semibold">💾 Save Settings</button>
                            </div>
                            <div className="p-4 bg-red-50 dark:bg-red-900/10 rounded-lg border border-red-200 dark:border-red-800">
                                <h4 className="font-semibold text-red-600 dark:text-red-400 mb-2">⚠️ Danger Zone</h4>
                                <button className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 transition">🗑️ Clear All Data</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── MODULE RENDERER ──
        function ModuleRenderer() {
            const { currentModule } = useApp();
            const map = {
                dashboard: <DashboardModule />,
                orders: <OrdersModule />,
                resources: <ResourcesModule />,
                tutors: <TutorsModule />,
                finance: <FinanceModule />,
                settings: <SettingsModule />,
            };
            return map[currentModule] || <OrdersModule />;
        }

        // ── MAIN APP ──
        function App() {
            const { isAuthenticated, notification } = useApp();

            if (!isAuthenticated) return <LoginPage />;

            return (
                <div className="flex min-h-screen bg-white dark:bg-gray-950">
                    <Sidebar />
                    <div className="flex-1 min-w-0">
                        <Topbar />
                        <main className="p-4 lg:p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
                            <ModuleRenderer />
                        </main>
                    </div>
                    <ToastContainer />
                </div>
            );
        }

        // ── RENDER ──
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
